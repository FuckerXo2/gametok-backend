<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Game</title>
  <style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#111;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#fff;display:flex;justify-content:center;min-height:100dvh}
.feed-card{width:100%;display:flex;flex-direction:column;background:#111;height:100dvh}
.game-area{flex:1;width:100%;overflow:hidden;min-height:0;border-radius:24px;border:1px solid rgba(255,255,255,.05);background:#1a1a1a;position:relative}
.game-area iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.bottom-section{flex-shrink:0;position:relative;z-index:2;background:#111}
.bottom-bar{display:flex;align-items:center;justify-content:flex-start;padding:0 16px;height:48px;width:100%}
.bottom-bar-left{display:flex;align-items:center;gap:16px;flex-shrink:0}
.bottom-bar-right{display:flex;align-items:center;gap:16px;flex-shrink:0;margin-left:auto}
.icon-btn{display:flex;align-items:center;gap:4px;height:48px;min-height:44px;background:none;border:none;cursor:pointer;padding:0;touch-action:manipulation;-webkit-user-select:none;user-select:none;transition:transform .15s ease}
.icon-btn:active{transform:scale(.95)}
.icon-btn svg,.icon-btn img{flex-shrink:0;pointer-events:none}
.icon-btn .count{font-size:14px;font-weight:500;color:#999}
.ic-default{color:#999;fill:#999}
.ic-liked{color:#FF000E;fill:#FF000E}
.ic-saved{fill:#FFA300;color:#FFA300}
.creator-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;height:60px;width:100%}
.creator-left{display:flex;align-items:flex-start;gap:12px;flex:1;min-width:0}
.avatar-wrap{position:relative;flex-shrink:0}
.avatar-btn{width:40px;height:40px;border-radius:50%;overflow:hidden;border:.44px solid rgba(255,255,255,.05);background:none;padding:0;cursor:pointer;transition:opacity .15s}
.avatar-btn:active{opacity:.8}
.avatar-btn img{width:100%;height:100%;object-fit:cover;display:block}
.follow-indicator{position:absolute;bottom:0;right:0;width:20px;height:20px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;padding:0;transform:translate(4px,-4px);transition:transform .15s}
.follow-indicator:not([disabled]):active{transform:translate(4px,-4px) scale(.9)}
.follow-indicator[disabled]{cursor:default}
.fi-svg{width:20px;height:20px}
.fi-plus{transition:opacity .15s ease}
.fi-check{fill:none;stroke:#28a745;stroke-dasharray:20;stroke-dashoffset:20;opacity:0;transition:stroke-dashoffset .28s ease .08s,opacity .12s ease}
.fi-ring{stroke:#b3b3b3;transition:stroke .15s ease .1s}
.follow-indicator.fi-active .fi-plus{opacity:0}
.follow-indicator.fi-active .fi-check{stroke-dashoffset:0;opacity:1}
.follow-indicator.fi-active .fi-ring{stroke:#28a745}
@keyframes fi-pop{0%{transform:translate(4px,-4px) scale(1)}40%{transform:translate(4px,-4px) scale(1.28)}72%{transform:translate(4px,-4px) scale(.9)}100%{transform:translate(4px,-4px) scale(1)}}
.follow-indicator.fi-pop{animation:fi-pop .42s cubic-bezier(.34,1.56,.64,1)}
.user-info{display:flex;flex-direction:column;justify-content:center;align-items:flex-start;min-width:0;flex:1;overflow:hidden}
.username{width:100%;font-size:16px;font-weight:700;color:#fff;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left;background:none;border:none;cursor:pointer;padding:0;transition:opacity .15s}
.username:active{opacity:.8}
.title-row{display:flex;align-items:center;gap:5px;width:100%;min-width:0;line-height:1.2}
.remix-link{display:flex;align-items:center;gap:2px;max-width:50%;background:none;border:none;cursor:pointer;padding:0;transition:opacity .15s}
.remix-link:active{opacity:.7}
.remix-link span{font-size:14px;font-weight:700;color:#6B6B6B;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-title{font-size:14px;color:#999;line-height:1.2;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.remix-btn{display:flex;flex-direction:column;align-items:center;padding:6px 0 6px 12px;background:none;border:none;cursor:pointer;transition:opacity .15s;flex-shrink:0}
.remix-btn:active{opacity:.7}
.remix-btn-label{font-size:12px;font-weight:700;background:linear-gradient(152deg,#00F4FF 4.54%,#FFE754 85.02%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
@keyframes recordDotBlink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes recPillExpand{from{transform:scaleX(0.05);opacity:0}to{transform:scaleX(1);opacity:1}}
@keyframes recPillCollapse{from{transform:scaleX(1);opacity:1}to{transform:scaleX(0.05);opacity:0}}
@keyframes recFadeIn{from{opacity:0}to{opacity:1}}
@keyframes recFadeOut{from{opacity:1}to{opacity:0}}
.rec-icon-btn{position:relative}
.rec-pill-bar{display:none;align-items:center;justify-content:center;height:48px;padding:0 16px;width:100%}
.rec-pill-inner{width:100%;max-width:361px;background:#242424;border-radius:9999px;padding:8px 12px;overflow:hidden;transform-origin:center}
.rec-dot{display:block;flex-shrink:0;width:10px;height:10px;border-radius:50%;background:#E52434;animation:recordDotBlink 1s ease-in-out infinite}
.rp-center{display:flex;align-items:center;justify-content:center;gap:8px}
.rp-between{display:flex;align-items:center;justify-content:space-between}
.rp-left{display:flex;align-items:center;gap:8px}
.rp-label{color:#fff;font-size:14px;font-weight:500;line-height:1}
.rp-timer{color:#fff;font-size:14px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
.rp-stop{display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;padding:0;transition:opacity .15s;-webkit-user-select:none;user-select:none}
.rp-stop:active{opacity:.7}
.remix-nudge-wrap{position:relative;flex-shrink:0}
.remix-btn.nudge-active{position:relative;z-index:65}
.remix-nudge-overlay{position:absolute;inset:0;pointer-events:none;z-index:61;display:flex;align-items:center;justify-content:center;padding-left:12px;opacity:0;transition:opacity .3s ease-out}
.remix-nudge-overlay.visible{opacity:1}
.remix-nudge-ring{position:absolute;width:56px;height:56px;border-radius:50%;border:2px solid #05F0FF;box-shadow:0 0 0 9999px rgba(0,0,0,.6),0 0 20px 4px rgba(5,240,255,.5),0 0 8px 2px rgba(5,240,255,.3) inset}
.remix-nudge-overlay.visible .remix-nudge-ring{animation:remixGlowPulse 1.6s ease-in-out infinite}
.remix-nudge-tooltip{position:absolute;bottom:100%;right:-4px;margin-bottom:10px;white-space:nowrap;opacity:0;transform:translateY(8px);transition:opacity .3s ease-out,transform .3s ease-out}
.remix-nudge-overlay.visible .remix-nudge-tooltip{opacity:1;transform:translateY(0);animation:remixTooltipBounce 2s ease-in-out infinite}
.remix-nudge-bubble{background:#fff;border-radius:20px;padding:8px 16px;color:#111;font-weight:700;font-size:14px;line-height:20px;box-shadow:0 4px 20px rgba(0,0,0,.3);position:relative}
.remix-nudge-bubble::after{content:'';position:absolute;bottom:-7px;right:16px;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid #fff}
@keyframes remixGlowPulse{0%,100%{box-shadow:0 0 0 9999px rgba(0,0,0,.6),0 0 20px 4px rgba(5,240,255,.5),0 0 8px 2px rgba(5,240,255,.3) inset;border-color:#05F0FF}50%{box-shadow:0 0 0 9999px rgba(0,0,0,.6),0 0 28px 6px rgba(5,240,255,.7),0 0 12px 3px rgba(5,240,255,.4) inset;border-color:#00F4FF}}
@keyframes remixTooltipBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  </style>
</head>

(function setupIframe() {
  var iframe = document.querySelector('iframe');
  if (!iframe) return;

  var hasInitialLoad = false;
  var iframeActive = false;

  function loadIframe() {
    if (iframeActive) return;
    var gameArea = iframe.closest('.game-area') || iframe.parentElement;
    if (!gameArea || gameArea.clientHeight <= 0) { requestAnimationFrame(loadIframe); return; }
    iframeActive = true;
    hasInitialLoad = true;
    iframe.src = 'assets/game.html';
  }

  function unloadIframe() {
    if (!iframeActive) return;
    iframeActive = false;
    iframe.src = 'about:blank';
  }

  function tryInitialLoad() {
    if (hasInitialLoad || document.visibilityState !== 'visible') return;
    loadIframe();
  }

  if (document.visibilityState === 'visible') tryInitialLoad();

  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') tryInitialLoad();
  });

  window._sekaiIframeCtrl = {
    load: loadIframe,
    unload: unloadIframe,
    isActive: function() { return iframeActive; },
  };

  function sendViewportHeight() {
    if (!iframe.contentWindow) return;
    var gameArea = iframe.closest('.game-area') || iframe.parentElement;
    var height = gameArea ? gameArea.clientHeight : 0;
    if (height > 0) iframe.contentWindow.postMessage({ type: 'viewport_height_change', height: height }, '*');
  }

  window.addEventListener('message', function(event) {
    if (event.data && event.data.type === 'viewport_ready') sendViewportHeight();
  });

  iframe.addEventListener('load', function() {
    if (!iframe.contentWindow || !iframeActive) return;
    iframe.contentWindow.postMessage({
      origin: 'sekai_gaming_iframe_api',
      type: _audioMuted ? 'receive_audio_mute' : 'receive_audio_unmute',
      taskId: 'iframe_init',
      data: null,
    }, '*');

  });

/* ── HTTP 辅助：POST（原始 callApi 保留，供按钮事件使用） ── */
function callApi(endpoint, body) {
  var headers = { 'Content-Type': 'application/json' };
  if (_authToken) {
    var token = _authToken;
    try { token = decodeURIComponent(_authToken); } catch (_e) {}
    headers.Authorization = 'Bearer ' + token;
  }
  return fetch(_apiHost + endpoint, { method: 'POST', headers: headers, body: JSON.stringify(body) })
    .then(function(r) {
      if (r.status === 401) {
        sendFlutterMessage({ action: 'signout', arguments: { source: 'api_401', fromPage: 'feed' } });
        return Promise.reject(new Error('unauthorized'));
      }
      return r;
    });
}

/* ── HTTP 辅助：GET（带 query params） ── */
function callApiGet(endpoint, params) {
  var qs = '';
  if (params) {
    var parts = [];
    for (var k in params) {
      if (Object.prototype.hasOwnProperty.call(params, k) && params[k] !== undefined && params[k] !== null) {
        parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(String(params[k])));
      }
    }
    if (parts.length) qs = '?' + parts.join('&');
  }
  var headers = { 'Content-Type': 'application/json' };
  if (_authToken) {
    var token = _authToken;
    try { token = decodeURIComponent(_authToken); } catch (_e) {}
    headers.Authorization = 'Bearer ' + token;
  }
  return fetch(_apiHost + endpoint + qs, { method: 'GET', headers: headers })
    .then(function(r) {
      if (r.status === 401) {
        sendFlutterMessage({ action: 'signout', arguments: { source: 'api_401', fromPage: 'feed' } });
        return Promise.reject(new Error('unauthorized'));
      }
      return r;
    });
}

/* ── HTTP 辅助：POST，返回 Blob（用于流式音频） ── */
function callApiBlob(endpoint, body) {
  var headers = { 'Content-Type': 'application/json' };
  if (_authToken) {
    var token = _authToken;
    try { token = decodeURIComponent(_authToken); } catch (_e) {}
    headers.Authorization = 'Bearer ' + token;
  }
  return fetch(_apiHost + endpoint, { method: 'POST', headers: headers, body: JSON.stringify(body) })
    .then(function(r) {
      if (r.status === 401) {
        sendFlutterMessage({ action: 'signout', arguments: { source: 'api_401', fromPage: 'feed' } });
        return Promise.reject(new Error('unauthorized'));
      }
      if (!r.ok) return Promise.reject({ status: r.status, message: 'HTTP ' + r.status });
      return r.blob();
    });
}

/* ── S3 上传：base64 data URL → 预签名 URL → 返回 CDN hostUrl ── */
function uploadBase64ToS3(dataUrl, fileType) {
  var mimeMatch = dataUrl.match(/data:([^;]+);base64,/);
  var mimeType = mimeMatch ? mimeMatch[1] : (fileType === 'audio' ? 'audio/webm' : 'image/png');
  var base64Data = dataUrl.indexOf(',') !== -1 ? dataUrl.split(',')[1] : dataUrl;
  var ext = mimeType.split('/')[1] || (fileType === 'audio' ? 'webm' : 'png');
  var uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
  var folder = fileType === 'audio' ? 'audio' : 'images';
  var fileName = 'v3-games/dist/' + GAME.game_id + '/' + folder + '/' + uuid + '.' + ext;

  return callApi('/s3/generatePresignedUrl', { fileName: fileName, method: 'put_object' })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      var presignedUrl = (result && result.presignedUrl) ||
        (result && result.data && result.data.presignedUrl);
      if (!presignedUrl) return Promise.reject(new Error('No presigned URL returned'));

      /* atob → Uint8Array → ArrayBuffer，避免 TextEncoder 破坏二进制 */
      var binary = atob(base64Data);
      var bytes = new Uint8Array(binary.length);
      for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

      return fetch(presignedUrl, {
        method: 'PUT',
        headers: { 'Content-Type': mimeType },
        body: bytes.buffer,
      }).then(function(r) {
        if (!r.ok) return Promise.reject(new Error('S3 upload failed: ' + r.status));
        var url = new URL(presignedUrl);
        return url.origin + url.pathname;
      });
    });
}

}

}

var _screenshotLock = false;

var screenshotButton = getActionButton('screenshot');
if (screenshotButton) {
  screenshotButton.addEventListener('click', function() {
    if (_screenshotLock) return;
    _screenshotLock = true;
    logEvent('g3_interaction_page_click_share', { contentId: GAME.game_id, contentType: 'g3_game', fromPage: 'feed', source: 'toolbar_screenshot', tabName: 'home' });
    var shareLink = buildShareLink();
    var promise = sendFlutterMessage({ action: 'takeScreenshotOnWeb' });

    if (!promise || typeof promise.then !== 'function') { _screenshotLock = false; return; }

    promise
      .then(function(base64) {
        _screenshotLock = false;
        sendFlutterMessage({
          action: 'showSharePanel',
          arguments: {
            title: 'Share to', contentType: 'g3_game', contentId: GAME.game_id,
            fromPage: 'feed', link: shareLink, imageB64: base64 || null,
            showComment: true, needCut: !!base64, needWatermark: false, type: 'comments',
            extra: { cutBottom: 110, cutTop: 0, creatorId: GAME.creator_user_id, shareContent: buildShareContent() },
            commentBody: {
              action: 'showCommentPanel',
              arguments: {
                type: 'game_3', id: GAME.game_id, commentCount: _commentCount,
                sekaiCreatorId: GAME.creator_user_id, fromPage: 'feed', imageB64: base64 || null, showShot: true,
              },
            },
          },
        });
      })
      .catch(function() {
        _screenshotLock = false;
        var isCreator = _userId && String(_userId) === String(GAME.creator_user_id);
        sendFlutterMessage({
          action: 'showSharePanel',
          arguments: {
            title: 'Share to', contentType: 'g3_game', contentId: GAME.game_id,
            imageUrl: GAME.cover, link: shareLink, fromPage: 'feed',
            needWatermark: false, type: 'share_only',
            extra: { shareContent: buildShareContent(), creatorId: GAME.creator_user_id },
            other_actions: buildOtherActions(isCreator),
          },
        });
      });
  });
}

if (shareButton) {
  shareButton.addEventListener('click', function() {

    var isCreator = _userId && String(_userId) === String(GAME.creator_user_id);
    sendFlutterMessage({
      action: 'showSharePanel',
      arguments: {
        title: 'Share to', contentType: 'g3_game', contentId: GAME.game_id,
        imageUrl: GAME.cover, link: buildShareLink(), fromPage: 'feed',

var followButton = getActionButton('follow');
if (followButton) {
  followButton.addEventListener('click', function() {
    if (_isFollowing || requireAuth('g3_feed_follow_button', 'follow')) return;
    _isFollowing = true;
    updateFollowUI(true);
    logEvent('g3_interaction_page_click_follow', { contentId: GAME.game_id, fromPage: 'feed', source: 'profile', creatorId: GAME.creator_user_id, action: 'follow' });
    sendFlutterMessage({ action: 'vibrate', data: { type: 'medium' } });
    callApi('/user/v2/followOperation', { userId: GAME.creator_user_id, operate: 'follow' })
      .then(function() { sendFlutterMessage({ action: 'updateFollowStatus', data: { userId: GAME.creator_user_id, followed: true } }); })
      .catch(function() { _isFollowing = false; updateFollowUI(false); followButton.disabled = false; });
  });
}

function handleFollowUpdate(payload) {
  if (payload && String(payload.userId) === String(GAME.creator_user_id) && typeof payload.followed === 'boolean') {
    _isFollowing = payload.followed;
    updateFollowUI(false);
  }
}

function updateFollowUI(animate) {
  var fi = getActionButton('follow');
  if (!fi) return;
  if (_isFollowing) {
    fi.disabled = true;
    if (animate) {
      fi.classList.add('fi-pop');
      fi.addEventListener('animationend', function() { fi.classList.remove('fi-pop'); }, { once: true });
    }
    fi.classList.add('fi-active');
    return;
  }
  fi.disabled = false;
  fi.classList.remove('fi-active', 'fi-pop');
}

document.querySelectorAll('[data-action="profile"]').forEach(function(node) {
  node.addEventListener('click', function() {

    }

    var args = {

function updateRecordBtnVisibility() {
  var show = (_verMaj > 1) || (_verMaj === 1 && _verMin > 62) || (_verMaj === 1 && _verMin === 62 && _verPat >= 1);
  var btn = getActionButton('record');
  if (btn) btn.style.display = show ? 'flex' : 'none';
}

function formatRecordTime(s) {
  return '00:' + String(s).padStart(2, '0');
}

function clearRecordTimers() {
  if (_rCdT) { clearInterval(_rCdT); _rCdT = null; }
  if (_rST) { clearInterval(_rST); _rST = null; }
}

function getRecordBar() { return document.getElementById('rec-pill-bar'); }

function showRecordBar() {
  var b = getRecordBar();
  if (b) b.style.display = 'flex';
  var bb = document.querySelector('.bottom-bar');
  if (bb) bb.style.display = 'none';
}

function hideRecordBar() {
  var b = getRecordBar();
  if (b) { b.style.display = 'none'; b.innerHTML = ''; }
  var bb = document.querySelector('.bottom-bar');
  if (bb) bb.style.display = 'flex';
}

function renderRecordPill() {
  var b = getRecordBar();
  if (!b) return;
  var dot = '<span class="rec-dot"></span>';
  var stopBtn;
  if (_rp === 'countdown') {
    b.innerHTML = '<div class="rec-pill-inner" style="animation:recPillExpand .68s cubic-bezier(.16,1,.3,1) forwards"><div class="rp-center" style="animation:recFadeIn .6s ease forwards">' + dot + '<span class="rp-label" id="rec-cd-num">Recording in ' + _rCd + '</span></div></div>';
  } else if (_rp === 'recording') {
    b.innerHTML = '<div class="rec-pill-inner"><div class="rp-between" style="animation:recFadeIn .4s ease forwards"><div class="rp-left">' + dot + '<span class="rp-timer" id="rec-timer">' + formatRecordTime(_rSecs) + '</span></div><button class="rp-stop" id="rec-stop" type="button">' + _STOP_SVG + '<span class="rp-label">Screen Recording</span></button></div></div>';
    stopBtn = document.getElementById('rec-stop');
    if (stopBtn) stopBtn.addEventListener('click', function() { stopRecord(); });
  } else if (_rp === 'paused') {
    b.innerHTML = '<div class="rec-pill-inner"><div class="rp-between" style="animation:recFadeIn .4s ease forwards"><div class="rp-left"><span class="rec-dot" style="animation:none;opacity:.4"></span><span class="rp-timer">' + formatRecordTime(_rSecs) + '</span></div><button class="rp-stop" id="rec-stop" type="button">' + _STOP_SVG + '<span class="rp-label">Screen Recording</span></button></div></div>';
    stopBtn = document.getElementById('rec-stop');
    if (stopBtn) stopBtn.addEventListener('click', function() { stopRecord(); });
  } else if (_rp === 'collapsing') {
    b.innerHTML = '<div class="rec-pill-inner" style="animation:recPillCollapse .5s cubic-bezier(.32,0,.67,0) forwards"><div class="rp-between" style="animation:recFadeOut .35s ease forwards"><div class="rp-left">' + dot + '<span class="rp-timer">' + formatRecordTime(_rSecs) + '</span></div><div class="rp-stop">' + _STOP_SVG + '<span class="rp-label">Screen Recording</span></div></div></div>';
  }
}

function startRecordTimer() {
  _rST = setInterval(function() {
    _rSecs--;
    if (_rSecs <= 0) { clearInterval(_rST); _rST = null; stopRecord(); return; }
    var el = document.getElementById('rec-timer');
    if (el) el.textContent = formatRecordTime(_rSecs);
  }, 1000);
}

function startRecord() {
  if (_rp !== 'idle') return;
  clearRecordTimers();
  _rCd = 3; _rSecs = _MAX_S; _rp = 'countdown';
  showRecordBar(); renderRecordPill();
  sendFlutterMessage({ action: 'startVideoRecord', data: { gameId: GAME.game_id, source: 'feed' } });
  _rCdT = setInterval(function() {
    _rCd--;
    if (_rCd <= 0) {
      clearInterval(_rCdT); _rCdT = null;
      _rp = 'recording'; renderRecordPill(); startRecordTimer();
    } else {
      var el = document.getElementById('rec-cd-num');
      if (el) el.textContent = 'Recording in ' + _rCd;
    }
  }, 1000);
}

function stopRecord() {
  if (_rp === 'idle') return;
  clearRecordTimers();
  _rp = 'collapsing'; renderRecordPill();
  sendFlutterMessage({ action: 'stopVideoRecord', data: { gameId: GAME.game_id, source: 'feed' } });
  setTimeout(function() { _rp = 'idle'; hideRecordBar(); }, 600);
}

var recordButton = getActionButton('record');
if (recordButton) {
  recordButton.addEventListener('click', function() { startRecord(); });
}

updateRecordBtnVisibility();

renderStaticCard();

/* ── Page & Card Lifecycle Analytics ── */
var _pageEnterTime = Date.now();
var _hasTrackedExpose = false;
var _duration1minReported = false;
var _duration1minTimer = null;

function firePageExpose() {
  if (_hasTrackedExpose) return;
  _hasTrackedExpose = true;
  _pageEnterTime = Date.now();
  logEvent('g3_feed_page_expose', { fromPage: 'feed', needFlush: true });
}

function fireCardExpose() {
}

function fireCardLeave() {
}

function firePageLeave() {
  if (!_hasTrackedExpose) return;
  var dur = Date.now() - _pageEnterTime;
  logEvent('g3_feed_page_leave', { fromPage: 'feed', tabName: 'home', duration: dur });
  _hasTrackedExpose = false;
}

function start1minTimer() {
  clear1minTimer();
  _duration1minTimer = setTimeout(function() {
    if (_duration1minReported) return;
    _duration1minReported = true;
    logEvent('g3_play_over_1min', { contentId: GAME.game_id, contentType: 'g3_game', tabName: 'feed', position: 0 });
  }, 60000);
}

function clear1minTimer() {
  if (_duration1minTimer) { clearTimeout(_duration1minTimer); _duration1minTimer = null; }
}

firePageExpose();
fireCardExpose();
start1minTimer();

document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'hidden') {
    clear1minTimer();
    fireCardLeave();
    firePageLeave();
  } else {
    firePageExpose();
    fireCardExpose();
    _duration1minReported = false;
    start1minTimer();
  }
});
  </script>
