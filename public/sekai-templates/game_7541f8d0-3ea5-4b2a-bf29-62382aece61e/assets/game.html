    <script>
        (function() {
            let audioUnlocked = false;
            function unlockAudioContext() {
                if (audioUnlocked) return;
                if ('audioSession' in window.navigator) {
                    window.navigator.audioSession.type = "playback";
                }
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) {
                        const context = new AudioContext();
                        if (context.state === 'suspended') context.resume();
                        const buffer = context.createBuffer(1, 1, 22050);
                        const source = context.createBufferSource();
                        source.buffer = buffer;
                        source.connect(context.destination);
                        source.start(0);
                    }
                } catch (e) {}
                try {
                    const audio = new Audio();
                    audio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
                    audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {});
                } catch (e) {}
                audioUnlocked = true;
            }
            window.addEventListener('message', function(event) {
                if (event.data?.origin === 'sekai_gaming_iframe_api' && event.data?.type === 'receive_audio_unlock') {
                    unlockAudioContext();
                }
            });
            ['touchstart', 'touchend', 'mousedown', 'click', 'keydown'].forEach(function(event) {
                document.addEventListener(event, unlockAudioContext, { once: true });
            });
        })();
    </script>

            return window.sekaiEditable[category]?.find(i => i.id === id)?.value;

        // Helper: Set Nested Value
        function setNestedValue(obj, path, value) {
            const parts = path.split('.');
            let current = obj;
            for (let i = 0; i < parts.length - 1; i++) {
                if (!current[parts[i]]) current[parts[i]] = {};
                current = current[parts[i]];
            }
            current[parts[parts.length - 1]] = value;
        }

        // Apply Config
        function applyAllEditableValues() {
            window.sekaiEditable.tune?.forEach(t => {
                if (t.path) setNestedValue(window, t.path, t.value);

                if (c.cssVar) document.documentElement.style.setProperty(c.cssVar, c.value);
            });

                if (img.selector) {
                    const el = document.querySelector(img.selector);
                    if (el) {

                    case 'apply_change':
                        const success = applySingleChange(msg.data.id, msg.data.value);
                        window.parent.postMessage({
                            origin: 'sekai_gaming_iframe_api',
                            type: 'receive_apply_change',
                            taskId: msg.taskId,
                            data: { success }
                        }, '*');
                        break;
                    case 'get_current_html':
                        window.parent.postMessage({
                            origin: 'sekai_gaming_iframe_api',
                            type: 'receive_current_html',
                            taskId: msg.taskId,
                            data: { html: document.documentElement.outerHTML }
                        }, '*');
                        break;
                    case 'reset_changes':
                        location.reload();
                        break;
                }
            });

            function applySingleChange(id, value) {
                const categories = ['tune', 'images', 'videos', 'music', 'sfx', 'colors', 'text', 'prompts', 'voices'];
                for (const cat of categories) {
                    const item = window.sekaiEditable[cat]?.find(i => i.id === id);
                    if (!item) continue;
                    item.value = value;
                    if (item.cssVar) {
                        document.documentElement.style.setProperty(item.cssVar, value);
                    } else if (item.path) {
                        setNestedValue(window, item.path, value);
                    } else if (item.selector) {
                        const el = document.querySelector(item.selector);
                        if (!el) return false;
                        if (el.tagName === 'AUDIO') {
                            const wasPlaying = !el.paused;
                            el.src = value;
                            el.load();
                            if (wasPlaying) el.play().catch(() => {});
                        } else if (el.tagName === 'VIDEO') {
                            el.src = value;
                            el.load();
                        } else if (item.property === 'src') {
                            el.src = value;
                        } else if (item.property === 'backgroundImage') {
                            el.style.backgroundImage = `url('${value}')`;
                        } else if (item.property === 'placeholder') {
                            el.placeholder = value;
                        } else {
                            el.textContent = value;
                        }
                    }
                    return true;
                }
                return false;
            }
        })();

        // ==========================================
        // COMMUNICATION API
        // ==========================================
        function sendMessage(type, data, expectsResponse = true, sessionCode = null) {
            const taskId = crypto.randomUUID();
            const msg = { origin: 'sekai_gaming_iframe_api', type, taskId, data };
            if (sessionCode) msg.sessionCode = sessionCode;
            window.parent.postMessage(msg, '*');
            
            if (!expectsResponse) return Promise.resolve();

            return new Promise((resolve, reject) => {
                const handler = (event) => {
                    if (event.data?.origin !== 'sekai_gaming_iframe_api') return;
                    if (event.data?.taskId === taskId) {
                        window.removeEventListener('message', handler);
                        if (event.data.error) reject(event.data.error);
                        else resolve(event.data.data);
                    }
                };
                window.addEventListener('message', handler);
            });
        }

        // ==========================================
        // GAME STATE & LOGIC
        // ==========================================
        window.appState = {
            config: { maxLevels: 6 },
            level: 1,
            gameState: 'idle', // 'idle', 'playing', 'dodging', 'feedback', 'reveal'
            cursorPos: 0,
            dir: 1,
            speed: 1,
            targetPos: 40,
            targetJumped: false,
            buttonDodged: false,
            lastTime: performance.now()
        };

        const state = window.appState;
        let animationFrameId = null;

        const sarcasticMessages = [
            "Wow, that was impressively bad.",
            "You were closer... emotionally.",
            "This is harder than it looks, huh?",
            "My grandma could do this. And she doesn't exist.",
            "Are you tapping with your elbows?",
            "Error 404: Timing not found.",
            "Did you even look at the screen?",
            "I've seen better reflexes on a rock.",
            "Even autofill could tap better than that.",
            "That attempt was a crime against gaming."
        ];

        function getRandomSarcasticMessage() {
            return sarcasticMessages[Math.floor(Math.random() * sarcasticMessages.length)];
        }

        // ==========================================
        // AUDIO SYSTEM (PROCEDURAL & FALLBACKS)
        // ==========================================
        let audioCtx;
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        function initBGM() {
            const el = document.getElementById('music-bgm');
            if (!el?.src) return;
            el.loop = true;
            el.volume = 0.5;
            const playBgm = () => {
                el.play().catch(() => {
                    document.addEventListener('touchstart', playBgm, { once: true });
                    document.addEventListener('click', playBgm, { once: true });
                });
            };
            playBgm();
        }

        function playProceduralSound(type) {
            const ctx = getAudioContext();
            const customBuzzer = document.getElementById('sfx-fail');
            const customTap = document.getElementById('sfx-tap');

            if (type === 'tap') {
                if (customTap?.src) { customTap.currentTime=0; customTap.play().catch(()=>{}); return; }
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
            } else if (type === 'buzzer') {
                if (customBuzzer?.src) { customBuzzer.currentTime=0; customBuzzer.play().catch(()=>{}); return; }
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, ctx.currentTime);
                osc.frequency.setValueAtTime(120, ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.5);
            } else if (type === 'woosh') {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.2);
            } else if (type === 'tada') {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.setValueAtTime(600, ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime + 0.2);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.6);
            } else if (type === 'scratch') {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(800, ctx.currentTime + 0.1);
                osc.frequency.linearRampToValueAtTime(50, ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            }
        }

        // ==========================================
        // RENDERING & LOOP
        // ==========================================
        function updateTargetUI() {
            document.getElementById('target-zone').style.left = `${state.targetPos}%`;
        }

        function updateCursorUI() {
            document.getElementById('cursor-line').style.left = `${state.cursorPos}%`;
        }

        function gameLoop(time) {
            if (state.gameState !== 'playing') {
                state.lastTime = time;
                animationFrameId = requestAnimationFrame(gameLoop);
                return;
            }

            const dt = time - state.lastTime;
            state.lastTime = time;

            // Move cursor
            const moveAmt = state.speed * (dt / 16);
            state.cursorPos += moveAmt * state.dir;

            if (state.cursorPos >= 100) {
                state.cursorPos = 100;
                state.dir = -1;
            } else if (state.cursorPos <= 0) {
                state.cursorPos = 0;
                state.dir = 1;
            }

            // Troll 3: Target jump
            if (state.level === 3 && !state.targetJumped) {
                const distance = Math.abs(state.cursorPos - (state.targetPos + 10)); // +10 for center of 20% width
                if (distance < 15) {
                    state.targetJumped = true;
                    state.targetPos = state.targetPos > 50 ? 10 : 70;
                    updateTargetUI();
                    playProceduralSound('woosh');
                }
            }

            updateCursorUI();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function startLevel() {
            if (state.level > state.config.maxLevels) {
                showReveal();
                return;
            }

            state.gameState = 'playing';
            state.cursorPos = 0;
            state.dir = 1;
            state.buttonDodged = false;
            state.targetJumped = false;
            state.targetPos = 40; 
            
            const btn = document.getElementById('tap-btn');
            btn.style.transform = 'none';

            let displayLevel = `Level ${state.level}`;
            if (state.level === 5) {
                displayLevel = `FINAL LEVEL!`;
                state.speed = 1.6;
            } else if (state.level === 6) {
                displayLevel = `ACTUAL FINAL LEVEL`;
                state.speed = 3.5; 
            } else {
                state.speed = 1 + (state.level * 0.2); 
            }
            
            document.getElementById('level-display').textContent = displayLevel;
            updateTargetUI();
            document.getElementById('feedback-overlay').classList.remove('visible');
            
            state.lastTime = performance.now();
        }

        // ==========================================
        // INTERACTION
        // ==========================================
        function showFeedback(title, message, isFakeWin = false) {
            state.gameState = 'feedback';
            
            const overlay = document.getElementById('feedback-overlay');
            const card = document.getElementById('feedback-card');
            const titleEl = document.getElementById('feedback-title');
            const msgEl = document.getElementById('feedback-msg');
            const subtitle = document.getElementById('feedback-subtitle');
            const btn = document.getElementById('next-btn');

            titleEl.textContent = title;
            msgEl.textContent = message;

            if (isFakeWin) {
                titleEl.className = 'text-5xl font-black text-yellow-400 drop-shadow-lg uppercase italic tracking-tighter';
                subtitle.textContent = "INCREDIBLE!";
                btn.classList.add('hidden');
                overlay.classList.add('visible');
                card.classList.add('scale-100');

                sendMessage('gen_vibration', { duration: 200 }, false, null);

                setTimeout(() => {
                    playProceduralSound('scratch');
                    titleEl.textContent = "JUST KIDDING";
                    titleEl.className = 'text-4xl font-black text-red-500 drop-shadow-md uppercase italic tracking-tighter';
                    subtitle.textContent = "Almost! Try Again!";
                    msgEl.textContent = "You were way off. Let's move on.";
                    btn.classList.remove('hidden');
                    sendMessage('gen_vibration', { duration: 100 }, false, null);
                }, 2000);
            } else {
                titleEl.className = 'text-4xl font-black text-red-500 drop-shadow-md uppercase italic tracking-tighter';
                subtitle.textContent = "Almost! Try Again!";
                btn.classList.remove('hidden');
                overlay.classList.add('visible');
                card.classList.add('scale-100');
                sendMessage('gen_vibration', { duration: 80 }, false, null);
            }
        }

        function handleTap() {
            if (state.gameState !== 'playing') return;
            state.gameState = 'feedback';
            playProceduralSound('tap');

            // Evaluate fake miss
            let title = state.cursorPos > (state.targetPos + 10) ? "TOO LATE!" : "TOO EARLY!";
            let msg = getRandomSarcasticMessage();

            // Fake win on level 5
            if (state.level === 5) {
                playProceduralSound('tada');
                showFeedback("PERFECT!", "Flawless execution! You actually did it!", true);
                return;
            }

            playProceduralSound('buzzer');
            showFeedback(title, msg);
        }

        document.getElementById('tap-btn').addEventListener('pointerdown', (e) => {
            if (state.gameState !== 'playing') return;
            
            // Troll 4: Dodging button
            if (state.level === 4 && !state.buttonDodged) {
                state.buttonDodged = true;
                state.gameState = 'dodging'; // prevent further taps
                e.preventDefault();
                
                const btn = document.getElementById('tap-btn');
                const offset = Math.random() > 0.5 ? 90 : -90;
                btn.style.transform = `translate(${offset}px, -150px) scale(0.6)`;
                playProceduralSound('woosh');

                setTimeout(() => {
                    playProceduralSound('buzzer');
                    showFeedback("MISSED!", "You literally missed the button. How is that possible?");
                }, 400);
                return;
            }

            handleTap();
        });

        document.getElementById('next-btn').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (e.target.closest('button').classList.contains('hidden')) return;
            
            document.getElementById('feedback-card').classList.remove('scale-100');
            state.level++;
            startLevel();
        });

        // ==========================================
        // REVEAL & SHARE
        // ==========================================
        function showReveal() {
            state.gameState = 'reveal';
            document.getElementById('app').classList.add('hidden');
            const revealScreen = document.getElementById('reveal-screen');
            revealScreen.classList.remove('hidden');
            revealScreen.classList.add('flex');
            
            document.getElementById('final-level-score').textContent = state.config.maxLevels;
            
            playProceduralSound('tada');
            sendMessage('gen_vibration', { duration: 300 }, false, null);
        }

        document.getElementById('share-btn').addEventListener('click', async (e) => {
            const btn = e.currentTarget;
            if (btn.dataset.loading === 'true') return;
            
            btn.dataset.loading = 'true';
            btn.disabled = true;
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-3 text-2xl"></i> Generating...';

            try {
                const element = document.getElementById('share-zone');
                const targetScale = 2;
                
                // We ensure snapdom is loaded. Wait for module if needed.
                if (!window.snapdom) await new Promise(r => setTimeout(r, 500));
                
                const jpgImg = await window.snapdom.toJpg(element, {
                    quality: 0.8,
                    width: element.offsetWidth * targetScale,
                    height: element.offsetHeight * targetScale,
                });

                sendMessage('invoke_share', {
                    title: "I got pranked by the World's Hardest Button! Can you beat it?",
                    coverImageBase64: jpgImg.src
                }, false);
            } catch (err) {
                console.error('Share failed', err);
            } finally {
                btn.dataset.loading = 'false';
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            }
        });

        // ==========================================
        // INITIALIZATION
        // ==========================================
        function initApp() {
            applyAllEditableValues();
            initBGM();
            
            // Add interaction listeners for audio context unlocking as fallback
            const touchStartHandler = () => { getAudioContext(); document.removeEventListener('touchstart', touchStartHandler); };
            document.addEventListener('touchstart', touchStartHandler);

            startLevel();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
