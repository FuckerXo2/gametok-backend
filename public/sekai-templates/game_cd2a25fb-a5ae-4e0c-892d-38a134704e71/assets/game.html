    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokemon Fusion Kitchen</title>
    <script src="vendor/tailwind.css"></script>
    <link rel="stylesheet" href="vendor/fontawesome/all.min.css">
    <style>
        :root {
            --warm-bg: #FFF8E7;
            --wood-dark: #5D4037;
            --wood-light: #8D6E63;
            --pot-color: #263238;
            --liquid-color: #7CB342;
            --accent-orange: #FF7043;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--warm-bg);
            touch-action: none;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes bubble {
            0% { transform: scale(0.8) translateY(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: scale(1.2) translateY(-40px); opacity: 0; }
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes poof-expand {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            pointer-events: none;
        }

        .ingredient-card {
            transition: transform 0.2s, box-shadow 0.2s;
            touch-action: none; /* Changed to none to ensure custom JS drag handler captures all events */
            cursor: pointer;
            flex: 0 0 auto;
        }
        .ingredient-card:active {
            transform: scale(0.95);
            opacity: 0.9;
        }
        /* Ensure the container actually scrolls */
        #ingredient-scroll {
            display: flex !important;
            flex-direction: row !important;
            flex-wrap: nowrap !important;
            overflow-x: auto !important;
            overflow-y: hidden !important;
            -webkit-overflow-scrolling: touch !important;
            scroll-snap-type: x mandatory;
            min-height: 140px;
            touch-action: pan-x !important; /* Keep horizontal panning enabled for container */
        }
        .ingredient-card {
            scroll-snap-align: start;
        }

        .shaking {
            animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both infinite;
        }

        /* Cauldron Details */
        .cauldron-rim-highlight {
            background: linear-gradient(to bottom, #455A64 0%, #263238 100%);
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        
        .cauldron-glow {
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 60px rgba(var(--cauldron-glow-rgb, 124, 179, 66), 0.6);
        }

        .cauldron-texture {
            background-image: 
                radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15) 0%, transparent 60%),
                radial-gradient(circle at 70% 70%, rgba(0,0,0,0.2) 0%, transparent 60%),
                linear-gradient(45deg, rgba(0,0,0,0.3) 0%, transparent 100%);
        }
        
        .pot-lip {
            border: 4px solid #1a2327;
            background: #263238;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.1);
        }

        /* Stirring Challenge specific */
        #stirring-canvas {
            touch-action: none;
            cursor: crosshair;
        }
        
        .trace-path {
            stroke: rgba(255, 255, 255, 0.15);
            stroke-width: 25;
            stroke-linecap: round;
            fill: none;
        }

        .stirring-guide {
            animation: pulse-guide 1.5s infinite;
        }

        @keyframes pulse-guide {
            0%, 100% { opacity: 0.3; stroke-width: 20; }
            50% { opacity: 0.6; stroke-width: 25; }
        }

        /* Custom Scrollbar and Scrolling */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x;
        }

        /* Layers */
        .layer-bg { z-index: 10; }
        .layer-pot { z-index: 20; }
        .layer-ingredients { z-index: 30; }
        .layer-fx { z-index: 40; pointer-events: none; }
        .layer-ui { z-index: 50; }
        .layer-overlay { z-index: 60; }
        
        #result-modal {
            transition: opacity 0.3s ease;
        }
        #result-modal.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Mini-game styles: Catch the Ingredients */
        #catcher {
            position: absolute;
            bottom: 40px;
            left: 50%;
            width: 100px;
            height: 60px;
            transform: translateX(-50%);
            z-index: 40;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .catcher-spoon {
            width: 100%;
            height: 40px;
            background: #D7CCC8;
            border-radius: 50% 50% 40% 40%;
            border: 4px solid #5D4037;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .catcher-spoon::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 40px;
            background: #5D4037;
            border-radius: 5px;
            z-index: -1;
        }

        .falling-item {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 30;
            font-size: 20px;
            animation: fall-down linear forwards;
        }

        .score-pop {
            position: absolute;
            color: #FFEB3B;
            font-weight: bold;
            pointer-events: none;
            animation: score-float 0.8s ease-out forwards;
            z-index: 100;
        }

        @keyframes score-float {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }

        @keyframes fall-down {
            0% { transform: translateY(-50px) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }
    </style>

    <script>
      (function() {
        let audioUnlocked = false;
        function unlockAudioContext() {
          if (audioUnlocked) return;
          if ('audioSession' in window.navigator) {
            window.navigator.audioSession.type = "playback";
          }
          try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
              const context = new AudioContext();
              if (context.state === 'suspended') context.resume();
              const buffer = context.createBuffer(1, 1, 22050);
              const source = context.createBufferSource();
              source.buffer = buffer;
              source.connect(context.destination);
              source.start(0);
            }
          } catch (e) {}
          try {
            const audio = new Audio();
            audio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
            audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {});
          } catch (e) {}
          audioUnlocked = true;
        }
        window.addEventListener('message', function(event) {
          if (event.data?.origin === 'sekai_gaming_iframe_api' && event.data?.type === 'receive_audio_unlock') {
            unlockAudioContext();
          }
        });
        ['touchstart', 'touchend', 'mousedown', 'click', 'keydown'].forEach(function(event) {
          document.addEventListener(event, unlockAudioContext, { once: true });
        });
      })();
    </script>

// --- Sekai Helpers ---

function getConfig(category, id) {
    return window.sekaiEditable[category]?.find(i => i.id === id)?.value;
}

function setNestedValue(obj, path, value) {
    const parts = path.split('.');
    let current = obj;
    for (let i = 0; i < parts.length - 1; i++) {
        if (!current[parts[i]]) current[parts[i]] = {};
        current = current[parts[i]];
    }
    current[parts[parts.length - 1]] = value;
}

function applyAllEditableValues() {
    window.sekaiEditable.tune?.forEach(t => { if (t.path) setNestedValue(window, t.path, t.value); });
    window.sekaiEditable.colors?.forEach(c => { if (c.cssVar) document.documentElement.style.setProperty(c.cssVar, c.value); });
    window.sekaiEditable.images?.forEach(img => {
        if (img.selector) {
            const el = document.querySelector(img.selector);
            if (el) {
                if (img.property === 'src') el.src = img.value;
                else if (img.property === 'backgroundImage') el.style.backgroundImage = `url('${img.value}')`;
            }
        }
    });
    window.sekaiEditable.music?.forEach(m => {
        if (m.selector) { const el = document.querySelector(m.selector); if (el && el.src !== m.value) { el.src = m.value; el.load(); } }
    });
    window.sekaiEditable.sfx?.forEach(s => {

// --- Messaging API ---
const sendMessage = (type, data, expectResponse = true, customTaskId = null) => {
    return new Promise((resolve, reject) => {
        const taskId = customTaskId || crypto.randomUUID();
        const handler = (event) => {
            if (event.data?.origin !== 'sekai_gaming_iframe_api' || event.data?.taskId !== taskId) return;
            window.removeEventListener('message', handler);
            if (event.data.error) reject(event.data.error);
            else resolve(event.data.data);
        };
        if (expectResponse) window.addEventListener('message', handler);
        window.parent.postMessage({ origin: 'sekai_gaming_iframe_api', type, taskId, data }, '*');
    });
};

const genText = async (systemPrompt, userPrompt, responseSchema, imageUrl) => {
    return sendMessage('gen_text', { systemPrompt, userPrompt, responseSchema, imageUrl });
};

// --- Audio System ---
// Simple procedural synths for fallback
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx;

function initAudio() {
    if (!actx) actx = new AudioCtx();
    if (actx.state === 'suspended') actx.resume();
}

function playSound(type) {
    initAudio();
    
    // Check for custom audio file first
    const customMap = {
        'plop': 'sfx-plop',
        'bubble': 'sfx-bubble',
        'poof': 'sfx-poof',
        'success': 'sfx-success'
    };
    
    const elId = customMap[type];
    if (elId) {
        const el = document.getElementById(elId);
        if (el && el.src) {
            el.currentTime = 0;
            el.play().catch(e => console.log('Audio play blocked', e));
            return;
        }
    }

    // Procedural Fallbacks
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.connect(gain);
    gain.connect(actx.destination);

    const now = actx.currentTime;

    if (type === 'plop') {
        // High-pitched bright chime sound
        osc.type = 'sine';
        const freq = 1567.98; // G6
        osc.frequency.setValueAtTime(freq, now);
        osc.frequency.exponentialRampToValueAtTime(freq * 1.5, now + 0.05);
        gain.gain.setValueAtTime(0.4, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
        osc.start(now);
        osc.stop(now + 1.2);
        
        // Secondary harmonic for crystal clear chime
        const osc2 = actx.createOscillator();
        const gain2 = actx.createGain();
        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(freq * 2.5, now);
        osc2.connect(gain2);
        gain2.connect(actx.destination);
        gain2.gain.setValueAtTime(0.1, now);
        gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc2.start(now);
        osc2.stop(now + 0.4);
    } else if (type === 'bubble') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600 + Math.random() * 200, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.08);
        gain.gain.setValueAtTime(0.04, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.start(now);
        osc.stop(now + 0.08);
    } else if (type === 'poof') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(80, now);
        osc.frequency.exponentialRampToValueAtTime(20, now + 0.4);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.4);
    } else if (type === 'success') {
        // Ascending major chord
        const freqs = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
        freqs.forEach((f, i) => {
            const o = actx.createOscillator();
            const g = actx.createGain();
            o.type = 'sine';
            o.frequency.setValueAtTime(f, now + (i * 0.1));
            o.connect(g);
            g.connect(actx.destination);
            g.gain.setValueAtTime(0, now + (i * 0.1));
            g.gain.linearRampToValueAtTime(0.1, now + (i * 0.1) + 0.05);
            g.gain.exponentialRampToValueAtTime(0.001, now + (i * 0.1) + 0.5);
            o.start(now + (i * 0.1));
            o.stop(now + (i * 0.1) + 0.5);
        });
    }
}

    if (!el || !el.src) return;
    el.loop = true;
    el.volume = 0.4;
    const playBgm = () => {
        el.play().catch(() => {
            // On failure, retry on next user interaction
            document.addEventListener('touchstart', playBgm, { once: true });
            document.addEventListener('click', playBgm, { once: true });
        });
    };
    playBgm(); // IMMEDIATE attempt - do not wait
}

    // Initial Audio Unlock

    document.body.addEventListener('click', initAudio, { once: true });
}

        div.dataset.id = ing.id;
        
        // Image
        const img = document.createElement('img');
        img.src = ing.img;
        img.className = 'w-16 h-16 object-contain mb-1 pointer-events-none';
        
        // Name
        const name = document.createElement('span');
        name.innerText = ing.name;
        name.className = 'text-[10px] font-bold text-center leading-tight text-gray-600 pointer-events-none';
        
        // Type color strip
        const strip = document.createElement('div');
        strip.className = 'absolute top-0 left-0 right-0 h-2 w-full';
        strip.style.backgroundColor = ing.color;
        
        div.appendChild(strip);
        div.appendChild(img);
        div.appendChild(name);
        
        container.appendChild(div);
    });
}

function setupDragDrop() {
    let activeDrag = null;
    let startX, startY;
    let initialLeft, initialTop;
    let clone = null;

    const scrollContainer = document.getElementById('ingredient-scroll');
    const cauldronZone = document.getElementById('cauldron-zone');
    const overlay = document.getElementById('drag-target-overlay');

    scrollContainer.addEventListener('touchstart', (e) => {
        if(state.isCooking || state.potContents.length >= 4) return;

        const card = e.target.closest('.ingredient-card');
        if (!card) return;
        
        const id = card.dataset.id;
        if (state.potContents.find(i => i.id === id)) return;

        const touch = e.touches[0];
        startX = touch.clientX;
        startY = touch.clientY;
        activeDrag = card;
        activeDrag.dataset.dragging = "false";
    }, { passive: false });

    window.addEventListener('touchmove', (e) => {
        if (!activeDrag) return;
        
        const touch = e.touches[0];
        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;

        // Threshold to differentiate scroll vs drag (dragging up)
        if (!clone && dy < -5 && Math.abs(dy) > Math.abs(dx)) {
            activeDrag.dataset.dragging = "true";
            const rect = activeDrag.getBoundingClientRect();
            initialLeft = rect.left;
            initialTop = rect.top;

            overlay.style.opacity = '1';
            activeDrag.style.opacity = '0.3';

            clone = activeDrag.cloneNode(true);
            clone.className = 'ingredient-card-clone';
            clone.style.position = 'fixed';
            clone.style.width = rect.width + 'px';
            clone.style.height = rect.height + 'px';
            clone.style.left = rect.left + 'px';
            clone.style.top = rect.top + 'px';
            clone.style.zIndex = '1000';
            clone.style.transform = 'scale(1.1)';
            clone.style.pointerEvents = 'none';
            clone.style.boxShadow = '0 10px 20px rgba(0,0,0,0.2)';
            document.body.appendChild(clone);
            genVibration(20);
        }

        if (clone) {
            if (e.cancelable) e.preventDefault();
            clone.style.left = (initialLeft + dx) + 'px';
            clone.style.top = (initialTop + dy) + 'px';
            
            const potRect = cauldronZone.getBoundingClientRect();
            const touchX = touch.clientX;
            const touchY = touch.clientY;
            
            // Expand hit area slightly for better mobile feel
            const buffer = 30;
            if (touchX > potRect.left - buffer && touchX < potRect.right + buffer && 
                touchY > potRect.top - buffer && touchY < potRect.bottom + buffer) {
                cauldronZone.style.transform = 'scale(1.1) rotate(5deg)';
            } else {
                cauldronZone.style.transform = 'scale(1) rotate(0deg)';
            }
        }
    }, { passive: false });

    window.addEventListener('touchend', (e) => {
        if (!activeDrag || !clone) return;

        const touch = e.changedTouches[0];
        const potRect = cauldronZone.getBoundingClientRect();
        
        // Check drop
        if (touch.clientX > potRect.left && touch.clientX < potRect.right && 
            touch.clientY > potRect.top && touch.clientY < potRect.bottom) {
            
            // Successful Drop
            addIngredientToPot(activeDrag.dataset.id);
            genVibration(50);
        }

        // Cleanup
        clone.remove();
        clone = null;
        activeDrag.style.opacity = '1';
        activeDrag = null;
        overlay.style.opacity = '0';
        cauldronZone.style.transform = 'scale(1)';

    });
}

function addIngredientToPot(id) {
    const ing = state.ingredients.find(i => i.id === id);
    if (!ing || state.potContents.length >= 4) return;

    state.potContents.push(ing);
    
    // UI Update inside Pot
    const itemsContainer = document.getElementById('items-in-pot');
    const miniIcon = document.createElement('img');
    miniIcon.src = ing.img;
    miniIcon.className = 'w-12 h-12 object-contain drop-shadow-lg animate-bounce';
    itemsContainer.appendChild(miniIcon);

    // Show combine button if enough items
    if (state.potContents.length >= 2) {
        document.getElementById('combine-btn').style.transform = 'scale(1)';
    }

    // FX
    playSound('plop');
    createSplash();
}

function createSplash() {

}

function startPotionMiniGame() {
    state.miniGameActive = true;
    state.fusionReady = false;
    state.traceProgress = 0;
    document.getElementById('loading-overlay').classList.remove('hidden');
    document.getElementById('reveal-fusion-btn').style.transform = 'scale(0)';
    document.getElementById('stir-progress-bar').style.width = '0%';
    
    setupStirringCanvas();
    pickNextPattern();
    requestAnimationFrame(renderTracingGame);
}

function setupStirringCanvas() {
    const canvas = document.getElementById('stirring-canvas');
    const container = document.getElementById('potion-game-container');
    
    const resize = () => {
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    };
    resize();
    window.addEventListener('resize', resize);

    const handleStart = (e) => {
        if (!state.miniGameActive) return;
        state.isTracing = true;
        state.tracePoints = [];
    };

    const handleMove = (e) => {
        if (!state.miniGameActive || !state.isTracing) return;
        const touch = e.touches ? e.touches[0] : e;
        const rect = canvas.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;
        
        state.tracePoints.push({ x, y });
        if (state.tracePoints.length > 20) state.tracePoints.shift();

        checkTracingCollision(x, y);
        if (e.cancelable) e.preventDefault();
    };

    const handleEnd = () => {
        state.isTracing = false;
        state.tracePoints = [];
    };

    canvas.addEventListener('touchstart', handleStart);
    canvas.addEventListener('touchmove', handleMove, { passive: false });
    canvas.addEventListener('touchend', handleEnd);
}

function pickNextPattern() {
    const unused = state.patterns.filter(p => p !== state.currentPattern);
    state.currentPattern = unused[Math.floor(Math.random() * unused.length)];
    state.traceProgress = 0;
    state.patternTargetPoints = state.currentPattern.points.map(p => ({
        x: p.x, 
        y: p.y, 
        hit: false 
    }));
}

function checkTracingCollision(tx, ty) {
    if (!state.patternTargetPoints || state.isPausedBetweenPatterns) return;
    
    const canvas = document.getElementById('stirring-canvas');
    const cw = canvas.width;
    const ch = canvas.height;
    
    let newlyHit = false;
    state.patternTargetPoints.forEach(p => {
        if (p.hit) return;
        const px = (p.x / 100) * cw;
        const py = (p.y / 100) * ch;
        const dist = Math.sqrt(Math.pow(tx - px, 2) + Math.pow(ty - py, 2));
        
        if (dist < 45) { // Slightly increased hit radius
            p.hit = true;
            newlyHit = true;
        }
    });

    if (newlyHit) {
        const hits = state.patternTargetPoints.filter(p => p.hit).length;
        state.traceProgress = hits / state.patternTargetPoints.length;
        
        if (hits % 4 === 0) {
            playSound('bubble');
            genVibration(8);
        }

        if (state.traceProgress >= 0.98) {
            state.isPausedBetweenPatterns = true;
            state.isTracing = false;
            state.tracePoints = [];
            
            playSound('success');
            genVibration(30);
            showScorePop("STIRRED!", "#AED581");
            
            // Pause to allow user to feel accomplishment before next pattern
            setTimeout(() => {
                if (state.isCooking && !state.isViewingResults) {
                    pickNextPattern();
                    state.isPausedBetweenPatterns = false;
                }
            }, 1200); 
        }
    }
}

function renderTracingGame() {
    if (!state.miniGameActive) return;
    
    const canvas = document.getElementById('stirring-canvas');
    const ctx = canvas.getContext('2d');
    const cw = canvas.width;
    const ch = canvas.height;
    
    ctx.clearRect(0, 0, cw, ch);
    
    if (state.patternTargetPoints) {
        // Draw path shadow/guide
        ctx.beginPath();
        ctx.lineWidth = 30;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        
        state.patternTargetPoints.forEach((p, i) => {
            const px = (p.x / 100) * cw;
            const py = (p.y / 100) * ch;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        });
        ctx.stroke();

        // Draw progress path as segments to avoid jumping lines (fix continuous string issue)
        ctx.lineWidth = 15;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = `rgba(174, 213, 129, ${0.6 + 0.4 * state.traceProgress})`;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#AED581';
        
        for (let i = 0; i < state.patternTargetPoints.length - 1; i++) {
            const p1 = state.patternTargetPoints[i];
            const p2 = state.patternTargetPoints[i+1];
            if (p1.hit && p2.hit) {
                ctx.beginPath();
                ctx.moveTo((p1.x / 100) * cw, (p1.y / 100) * ch);
                ctx.lineTo((p2.x / 100) * cw, (p2.y / 100) * ch);
                ctx.stroke();
            }
        }
        ctx.shadowBlur = 0;

        // Draw points
        state.patternTargetPoints.forEach(p => {
            const px = (p.x / 100) * cw;
            const py = (p.y / 100) * ch;
            ctx.fillStyle = p.hit ? '#AED581' : 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.arc(px, py, p.hit ? 6 : 4, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    // Draw user trail
    if (state.tracePoints.length > 1) {
        ctx.beginPath();
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.strokeStyle = 'white';
        ctx.moveTo(state.tracePoints[0].x, state.tracePoints[0].y);
        for(let i=1; i<state.tracePoints.length; i++) {
            ctx.lineTo(state.tracePoints[i].x, state.tracePoints[i].y);
        }
        ctx.stroke();
    }

    requestAnimationFrame(renderTracingGame);
}

async function startFusionProcess() {
    if (state.isCooking || state.potContents.length < 2) return;
    state.isCooking = true;

    const cauldron = document.getElementById('cauldron-zone');
    const loadingText = document.getElementById('loading-text');
    const combineBtn = document.getElementById('combine-btn');
    const startTime = Date.now();

    cauldron.classList.add('shaking');
    combineBtn.style.transform = 'scale(0)';
    genVibration(500);

    const names = state.potContents.map(i => i.name).join(', ');
    
    startPotionMiniGame();

    try {
        const basePrompt = getConfig('prompts', 'fusionPrompt');
        const finalImagePrompt = basePrompt.replace('[NAMES]', names);
        const namingPrompt = window.globalPrompts.naming;
        const userPrompt = namingPrompt.userPrompt + names;

        let imgUrl = null;
        let fusionName = null;

        // Try AI generation first
        try {
            const [imgResult, textResult] = await Promise.all([
                genImage(finalImagePrompt),
                genText(namingPrompt.systemPrompt, userPrompt, namingPrompt.responseSchema)
            ]);
            imgUrl = imgResult.imageUrl;
            fusionName = textResult.name;
        } catch (aiError) {
            console.warn("Primary AI failed, using randomized fallback", aiError);
            
            // --- ENHANCED RANDOMIZED FALLBACK ---
            // To ensure it doesn't look like just one Pokemon, we pick a base and apply a color filter 
            // from the secondary Pokemon to signify a true 'blend'.
            const baseIng = state.potContents[0];
            const blendIng = state.potContents[1];
            
            imgUrl = baseIng.img; // Use the primary as the silhouette base
            
            // Create a creative name combination
            const p1 = baseIng.name;
            const p2 = blendIng.name;
            const nameChoices = [
                p1.substring(0, Math.ceil(p1.length/2)) + p2.substring(Math.floor(p2.length/2)),
                p2.substring(0, Math.ceil(p2.length/2)) + p1.substring(Math.floor(p1.length/2)),
                p1.substring(0, 3) + p2.toLowerCase(),
                "Mega " + p1.substring(0, p1.length-2) + "ius"
            ];
            fusionName = nameChoices[Math.floor(Math.random() * nameChoices.length)];
            
            // Visual indicator of fallback in silhouette
            const sil = document.getElementById('fusion-silhouette');
            sil.style.filter = `sepia(1) saturate(5) hue-rotate(${Math.random() * 360}deg) brightness(0.7)`;
        }

        state.pendingFusion = { 
            image: imgUrl, 
            name: fusionName || "Mystery Fusion", 
            parent1: state.potContents[0].name, 
            parent2: state.potContents.length > 2 ? `${state.potContents.length - 1} others` : state.potContents[1].name 
        };
        
        const silhouette = document.getElementById('fusion-silhouette');
        silhouette.src = state.pendingFusion.image;
        silhouette.style.filter = 'grayscale(100%) brightness(0%)';
        silhouette.parentElement.style.opacity = '0.4';

        const checkReady = setInterval(() => {
            const elapsed = Date.now() - startTime;
            const totalProgress = Math.min((elapsed / 8000) * 100, 100);
            document.getElementById('stir-progress-bar').style.width = totalProgress + '%';
            silhouette.parentElement.style.opacity = (0.4 + (totalProgress / 200)).toString();
            
            if (elapsed >= 8000 && state.pendingFusion) {
                clearInterval(checkReady);
                state.fusionReady = true;
                document.getElementById('reveal-fusion-btn').style.transform = 'scale(1)';
                document.getElementById('loading-text').innerText = "Ready to Reveal!";
                genVibration(100);
            }
        }, 100);

    } catch (e) {
        console.error("Critical Fusion Failure", e);
        document.getElementById('loading-text').innerText = "Kitchen Error!";
        setTimeout(() => {
            stopPotionMiniGame();
            cauldron.classList.remove('shaking');
            resetGame();
        }, 2000);
    }
}

function revealFusion() {
    if (!state.fusionReady || !state.pendingFusion) return;
    
    // Set content first
    const resultImg = document.getElementById('result-image');
    const resultName = document.getElementById('result-name');
    const p1 = document.getElementById('parent-1-name');
    const p2 = document.getElementById('parent-2-name');

    resultImg.src = state.pendingFusion.image;
    resultName.innerText = state.pendingFusion.name;
    p1.innerText = state.pendingFusion.parent1;
    p2.innerText = state.pendingFusion.parent2;

    // Transition UI
    state.isViewingResults = true;
    state.miniGameActive = false;
    state.isCooking = false; 
    
    document.getElementById('loading-overlay').classList.add('hidden');
    document.getElementById('result-modal').classList.remove('hidden');
    document.getElementById('cauldron-zone').classList.remove('shaking');
    document.getElementById('items-in-pot').style.opacity = '0';
    
    playSound('success');
    createConfetti();
}

function createConfetti() {
    const colors = ['#FF5722', '#FFC107', '#8BC34A', '#03A9F4'];
    const container = document.getElementById('fx-container');
    
    for(let i=0; i<30; i++) {
        const p = document.createElement('div');
        p.className = 'absolute w-3 h-3 z-50';
        p.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
        p.style.left = '50%';
        p.style.top = '50%';
        p.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        
        const angle = Math.random() * Math.PI * 2;
        const velocity = 5 + Math.random() * 10;
        const tx = Math.cos(angle) * 150;
        const ty = Math.sin(angle) * 150;
        
        p.style.transition = 'all 1s cubic-bezier(0.165, 0.84, 0.44, 1)';
        container.appendChild(p);
        
        setTimeout(() => {
            p.style.transform = `translate(${tx}px, ${ty}px) rotate(${Math.random()*360}deg) scale(0)`;
        }, 10);
        
        setTimeout(() => p.remove(), 1000);
    }
}

function resetGame() {
    state.potContents = [];
    state.isCooking = false;
    state.isViewingResults = false;
    state.pendingFusion = null;
    state.miniGameActive = false;
    state.fusionReady = false;
    state.isPausedBetweenPatterns = false;
    
    // UI Cleanup
    document.getElementById('items-in-pot').innerHTML = '';
    document.getElementById('items-in-pot').style.opacity = '1';
    document.getElementById('result-modal').classList.add('hidden');
    document.getElementById('loading-overlay').classList.add('hidden');
    document.getElementById('cauldron-zone').classList.remove('shaking');
    document.getElementById('combine-btn').style.transform = 'scale(0)';
    document.getElementById('reveal-fusion-btn').style.transform = 'scale(0)';
    document.getElementById('loading-text').innerText = "Cooking Fusion...";
    
    // Reset silhouette
    const sil = document.getElementById('fusion-silhouette');
    sil.src = "images/poke-ball.webp";
    sil.style.filter = 'grayscale(100%) brightness(0%)';
    sil.parentElement.style.opacity = '0.2';
    
    // Reset progress bar
    document.getElementById('stir-progress-bar').style.width = '0%';

    document.querySelectorAll('.ingredient-card').forEach(card => card.style.opacity = '1');
}

async function handleShare() {
    const shareZone = document.getElementById('share-zone');
    const resultName = document.getElementById('result-name').innerText;
    
    // Visual tweak for capture
    const originalBg = shareZone.style.background;
    shareZone.style.background = '#fff';
    shareZone.style.padding = '20px';
    
    try {
        const canvas = await html2canvas(shareZone, { scale: 2, backgroundColor: '#ffffff' });
        const base64 = canvas.toDataURL('image/png');
        
        // Restore style
        shareZone.style.background = originalBg;
        shareZone.style.padding = ''; // Reset to class-based

        // Upload
        const uploadId = crypto.randomUUID();
        const onUpload = (e) => {
            if (e.data?.taskId !== uploadId || e.data?.type !== 'receive_upload_image') return;
            window.removeEventListener('message', onUpload);
            
            sendMessage('invoke_share', {
                title: `I cooked up a ${resultName}!`,
                coverImgUrl: e.data.data?.hostUrl || ''
            }, false);
        };
        window.addEventListener('message', onUpload);
        sendMessage('upload_image', { image: base64 }, false, uploadId);
        
    } catch (e) {
        console.error("Share failed", e);
        // Fallback share without image
        sendMessage('invoke_share', { title: `I created ${resultName} in Pokemon Fusion Kitchen!` }, false);
    }
}

// Preview Editing API
(function setupPreviewEditingAPI() {
  window.addEventListener('message', (event) => {
    const msg = event.data;
    if (msg?.origin !== 'sekai_gaming_iframe_api') return;

    switch (msg.type) {
      case 'get_editable_metadata':
        window.parent.postMessage({
          origin: 'sekai_gaming_iframe_api',
          type: 'receive_editable_metadata',
          taskId: msg.taskId,
          data: window.sekaiEditable || {}
        }, '*');
        break;

      case 'apply_change':
        const success = applySingleChange(msg.data.id, msg.data.value);
        window.parent.postMessage({
          origin: 'sekai_gaming_iframe_api',
          type: 'receive_apply_change',
          taskId: msg.taskId,
          data: { success }
        }, '*');
        break;

      case 'get_current_html':
        window.parent.postMessage({
          origin: 'sekai_gaming_iframe_api',
          type: 'receive_current_html',
          taskId: msg.taskId,
          data: { html: document.documentElement.outerHTML }
        }, '*');
        break;

      case 'reset_changes':
        location.reload();
        break;
    }
  });

  function applySingleChange(id, value) {
    const categories = ['tune', 'images', 'videos', 'music', 'sfx', 'colors', 'text', 'prompts', 'voices'];
    for (const cat of categories) {
      const item = window.sekaiEditable[cat]?.find(i => i.id === id);
      if (!item) continue;
      item.value = value;
      if (item.cssVar) {
        document.documentElement.style.setProperty(item.cssVar, value);
      } else if (item.path) {
        setNestedValue(window, item.path, value);
      } else if (item.selector) {
        const el = document.querySelector(item.selector);
        if (!el) return false;
        if (el.tagName === 'AUDIO') {
          const wasPlaying = !el.paused;
          el.src = value;
          el.load();
          if (wasPlaying) el.play().catch(() => {});
        } else if (item.property === 'src') {
          el.src = value;
        } else if (item.property === 'backgroundImage') {
          el.style.backgroundImage = `url('${value}')`;
        } else {
          el.textContent = value;
        }
      }
      return true;
    }
    return false;
  }
})();
