      (function() {
        let audioUnlocked = false;
        function unlockAudioContext() {
          if (audioUnlocked) return;
          if ('audioSession' in window.navigator) {
            window.navigator.audioSession.type = "playback";
          }
          try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
              const context = new AudioContext();
              if (context.state === 'suspended') context.resume();
              const buffer = context.createBuffer(1, 1, 22050);
              const source = context.createBufferSource();
              source.buffer = buffer;
              source.connect(context.destination);
              source.start(0);
            }
          } catch (e) {}
          try {
            const audio = new Audio();
            audio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
            audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {});
          } catch (e) {}
          audioUnlocked = true;
        }
        window.addEventListener('message', function(event) {
          if (event.data?.origin === 'sekai_gaming_iframe_api' && event.data?.type === 'receive_audio_unlock') {
            unlockAudioContext();
          }
        });
        ['touchstart', 'touchend', 'mousedown', 'click', 'keydown'].forEach(function(event) {
          document.addEventListener(event, unlockAudioContext, { once: true });
        });
      })();

    <style>
        :root {
            --primary-color: #FF5E5E;
            --accent-color: #4A90E2;

        html, body {
            height: 100%;

        body {

            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Pulse Animation */
        @keyframes heartbeat {
            0% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.1); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.1; }
        }

        .pulsing {
            animation: heartbeat 0.4s infinite ease-in-out;
        }

        .cta-label {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Shake Animation for User Feedback */
        @keyframes shake-hard {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shake-active {
            animation: shake-hard 0.5s;
        }

        /* Physics / Movement */
        #asset-wrapper {
            will-change: transform;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
            transform-origin: center center;
        }
        
        #asset-wrapper:active {
            cursor: grabbing;
        }

        /* Text Overlays */
        #story-text-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 0 30px;
            text-align: center;
            pointer-events: none;
            z-index: 40; /* Text is normally above asset */
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
        }

        #story-text {
            color: #000;
            font-size: 4rem;
            font-weight: 900;
            line-height: 0.95;
            text-transform: uppercase;
            transition: opacity 0.3s ease;
            word-break: break-word;
        }

        /* Class for long lyrics to be smaller */
        #story-text.long-text {
            font-size: 2.2rem;
        }

        @media (min-width: 640px) {
            #story-text { font-size: 6rem; }
            #story-text.long-text { font-size: 3.5rem; }
        }

        #instruction-text {
            color: #fff;
            font-size: 1rem;
            text-transform: uppercase;

            backdrop-filter: blur(8px);
            position: absolute;
            top: -50px;

            pointer-events: none;

        }

        /* Physics / Movement */
        #asset-wrapper {
            will-change: transform;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease, z-index 0.1s step-end;
            transform-origin: center center;
        }

        #asset-bag { width: 100%; height: 100%; object-fit: contain; }
        #asset-robot span { font-size: 15rem; line-height: 1; }
        
        /* Final asset made a bit smaller as requested */
        #asset-final { 
            width: 80vw;

            object-position: center center;

        /* Utility */
        .full-screen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .hidden-ui {
            opacity: 0;
            pointer-events: none;

        }
        
        .visible-ui {
            opacity: 1;
            pointer-events: auto;
        }

        @keyframes ripple {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 300px; height: 300px; opacity: 0; }
        }

        .ripple-effect {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: ripple 0.6s ease-out forwards;

            { stage: 6, type: 'play', start: 23.0, end: 29.0, text: "I'm on Snapchat, I'm gettin' money I get racks, just like a crab Came from the bottom, now I'm at the top", mode: 'robot', textTrigger: 28.0, triggerText: "This is the sound of a robot", bgColor: '#D500F9', pulseColor: '#AA00FF' },
            { stage: 7, type: 'pause', trigger: 29.0, action: 'tap', startFrom: 29.25, playTo: 31.0, jumpTo: 31.0, instruction: "tap the robot", mode: 'robot', bgColor: '#D500F9', pulseColor: '#AA00FF' },
            { stage: 8, type: 'play', start: 31.0, end: 39.0, text: "Went to Japan and spoke to a turkey Went to Japan, brought a gingerbread cookie Jumped in the pool and turned the water brown E'rybody like \"Ay, what's that sound?\"", mode: 'final', textTrigger: 38.0, triggerText: "This is the sound of Yuno Miles", bgColor: '#FF1744', pulseColor: '#D50000' },
            { stage: 9, type: 'pause', trigger: 39.0, action: 'tap', startFrom: 39.25, playTo: 41.0, jumpTo: 41.0, instruction: "tap the prize", mode: 'final', bgColor: '#FF1744', pulseColor: '#D50000' },
            { stage: 10, type: 'play', start: 41.0, end: 9999.0, mode: 'final', bgColor: '#F8F9FA', pulseColor: '#FF5E5E' }
        ];

        function initBGM() {
            const el = document.getElementById('music-bgm');
            if (!el?.src) return;
            el.volume = 0.6;
            el.loop = false;
            const playBgm = () => {
                el.currentTime = 13.0;
                el.play().then(() => {
                    if (!state.isPlaying) startGame();
                }).catch(() => {
                    // Critical autoplay retry pattern
                    document.addEventListener('touchstart', playBgm, { once: true });
                    document.addEventListener('touchend', playBgm, { once: true });
                    document.addEventListener('click', playBgm, { once: true });
                });
            };
            playBgm();
        }

        let animationFrameId;

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', initApp);

        function applyAllEditableValues() {
            window.sekaiEditable.tune?.forEach(t => { if (t.path) setNestedValue(window, t.path, t.value); });
            window.sekaiEditable.colors?.forEach(c => { if (c.cssVar) document.documentElement.style.setProperty(c.cssVar, c.value); });
            window.sekaiEditable.images?.forEach(img => {
                if (img.selector) {
                    const el = document.querySelector(img.selector);
                    if (el) {
                        if (img.property === 'src') el.src = img.value;
                        else if (img.property === 'backgroundImage') el.style.backgroundImage = `url('${img.value}')`;
                    }
                }
            });
            window.sekaiEditable.music?.forEach(m => {
                if (m.selector) {
                    const el = document.querySelector(m.selector);
                    if (el && el.src !== m.value) { el.src = m.value; el.load(); }
                }
            });
            window.sekaiEditable.text?.forEach(t => {
                if (t.selector) {
                    const el = document.querySelector(t.selector);
                    if (el) el.textContent = t.value;
                }
            });
            // Force final modal text as per explicit user request overrides
            const modalTitle = document.querySelector('#success-modal h2');
            if (modalTitle) modalTitle.textContent = "Put the money in the bag";
            const modalSub = document.querySelector('#success-modal p');
            if (modalSub) modalSub.textContent = "ELELALAELE-BING-ALELILLELALE";
        }

        function initApp() {
            applyAllEditableValues();
            
            // Cache Elements
            elements.music = document.getElementById('music-bgm');
            elements.assetWrapper = document.getElementById('asset-wrapper');
            elements.instruction = document.getElementById('instruction-text');
            elements.storyText = document.getElementById('story-text');
            elements.pulseBg = document.getElementById('pulse-bg');
            elements.bag = document.getElementById('asset-bag');
            elements.robot = document.getElementById('asset-robot');
            elements.final = document.getElementById('asset-final');
            elements.successModal = document.getElementById('success-modal');
            elements.shareBtn = document.getElementById('btn-share');
            elements.replayBtn = document.getElementById('btn-replay');
            elements.shareZone = document.getElementById('share-zone');
            elements.dragHint = document.getElementById('drag-hint');

            // Set initial position
            state.targetX = window.innerWidth / 2;
            state.targetY = window.innerHeight / 2;
            state.currentX = 0;
            state.currentY = 0;

            initBGM(); 
            setupInputHandlers();
            setupSocialListeners();
            
            elements.shareBtn.addEventListener('click', handleShare);
            elements.replayBtn.addEventListener('click', () => location.reload());

            // Start physics loop immediately
            requestAnimationFrame(physicsLoop);
        }

        function setupSocialListeners() {
            window.addEventListener('message', (event) => {
                const msg = event.data;
                if (msg?.origin !== 'sekai_gaming_iframe_api') return;
                if (msg.type === 'receive_social_action' && msg.data?.type === 'like') {
                    confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 } });
                }
            });
        }

        function physicsLoop() {
            const current = timeline[state.stage];
            const isBagMode = current && current.mode === 'bag';
            const isFinalMode = current && current.mode === 'final';
            const isRobotMode = current && current.mode === 'robot';
            
            if (isBagMode) {
                const lerpSpeed = state.isDragging ? 0.25 : 0.15;
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;

                // Displacement relative to current pos
                let targetDX = state.isDragging ? (state.targetX - centerX) : 0;
                let targetDY = state.isDragging ? (state.targetY - centerY) : 0;

                const maxDis = 100;
                const d = Math.sqrt(targetDX * targetDX + targetDY * targetDY);
                if (d > maxDis) {
                    targetDX = (targetDX / d) * maxDis;
                    targetDY = (targetDY / d) * maxDis;
                }

                state.currentX += (targetDX - state.currentX) * lerpSpeed;
                state.currentY += (targetDY - state.currentY) * lerpSpeed;

                const vX = targetDX - state.currentX;
                state.rotation += (vX * 0.6 - state.rotation) * 0.1;

                elements.assetWrapper.style.transform = `translate3d(${state.currentX}px, ${state.currentY}px, 0) rotate(${state.rotation}deg) scale(1.1)`;
                elements.assetWrapper.classList.remove('shake-active');
            } else {
                // LOCK POSITION for Emoji and Final Image - perfectly centered
                state.currentX = 0;
                state.currentY = 0;
                state.rotation = 0;
                
                // Keep scale consistent
                elements.assetWrapper.style.transform = `translate3d(0, 0, 0) rotate(0deg) scale(1)`;

                // Only allow shaking for non-bag assets if segment is playing (interaction happening)
                if (state.segmentComplete && !isBagMode) {
                    elements.assetWrapper.classList.add('shake-active');
                } else {
                    elements.assetWrapper.classList.remove('shake-active');
                }
            }

            // USER REQUIREMENT: Asset is in front (OPAQUE) when interacting/playing action sound.
            // Otherwise, text is in front (ASSET SEMI-TRANSPARENT).
            if (state.isWaiting || state.segmentComplete) {
                elements.assetWrapper.style.opacity = "1";
                elements.assetWrapper.style.zIndex = "60";
                elements.storyText.style.opacity = "0.4"; // Semi-transparent lyrics behind
            } else {
                elements.assetWrapper.style.opacity = "0.5";
                elements.assetWrapper.style.zIndex = "20";
                elements.storyText.style.opacity = "1";
            }

            requestAnimationFrame(physicsLoop);
        }

        function startGame() {
            if (state.isPlaying) return;
            state.isPlaying = true;
            state.stage = 0;
            
            const audio = elements.music;
            audio.currentTime = 13.0;
            audio.play().catch(() => {});
            
            elements.pulseBg.classList.add('pulsing');
            elements.pulseBg.style.opacity = '1';

            gameLoop();
        }

        let lastStageApplied = -1;

        function gameLoop() {
            if (!state.isPlaying) return;
            
            const audio = elements.music;
            const t = audio.currentTime;
            const current = timeline[state.stage];

            if (!current) return;

            // Apply round colors
            if (state.stage !== lastStageApplied) {
                if (current.bgColor) {
                    document.documentElement.style.setProperty('--bg-color', current.bgColor);
                }
                if (current.pulseColor) {
                    document.documentElement.style.setProperty('--pulse-color', current.pulseColor);
                }
                lastStageApplied = state.stage;
            }

            // Handle Lyric Text Timings
            let activeText = current.text || "";
            // Handle cross-stage text triggers (e.g. Robot text at 28.0 while in stage 6)
            if (current.textTrigger && t >= current.textTrigger) {
                activeText = current.triggerText;
            }

            // Update text display
            if (activeText && elements.storyText.textContent !== activeText) {
                elements.storyText.textContent = activeText;
                if (activeText.length > 50) {
                    elements.storyText.classList.add('long-text');
                } else {
                    elements.storyText.classList.remove('long-text');
                }
            }

            // Mode Switching - Ensure visuals follow the timeline state
            let displayMode = current.mode;
            // Requirement: Robot stays until 0:38, then Prize (Final) shows
            if (state.stage === 8 && t < 38.0) displayMode = 'robot';

            if (displayMode === 'bag') {
                elements.bag.classList.remove('hidden');
                elements.robot.classList.add('hidden');
                elements.final.classList.add('hidden');
            } else if (displayMode === 'robot') {
                elements.bag.classList.add('hidden');
                elements.robot.classList.remove('hidden');
                elements.final.classList.add('hidden');
            } else if (displayMode === 'final') {
                elements.bag.classList.add('hidden');
                elements.robot.classList.add('hidden');
                elements.final.classList.remove('hidden');
            }

            // Interaction Check (Pause for user input)
            if (current.type === 'pause' && !state.isWaiting && !state.segmentComplete) {
                if (t >= current.trigger) {
                    audio.pause();
                    audio.currentTime = current.trigger;
                    state.isWaiting = true;
                    showInteractionUI(current.instruction);
                }
            }

            // Automatic segment transition
            if (current.type === 'play' && t >= current.end) {
                state.stage++;
            }

            // User Interaction Playback End Detection
            if (state.segmentComplete && t >= current.playTo) {
                audio.pause();
                audio.currentTime = current.jumpTo;
                state.segmentComplete = false;
                
                // USER REQUIREMENT: Show modal immediately after Stage 9 interaction (0:39-0:41)
                if (state.stage === 9) {
                    state.stage = 10;
                    audio.play(); // Let rest of song play in background
                    finishGame(); 
                    return;
                }
                
                state.stage++;
                audio.play();
            }

            // Continuous loop check
            requestAnimationFrame(gameLoop);
        }

        function showInteractionUI(instruction) {
            elements.instruction.textContent = instruction;
            elements.instruction.style.opacity = '1';
            elements.instruction.style.transform = 'scale(1)';
            
            // Show drag hint if it's a shake instruction
            if (instruction.toLowerCase().includes('drag')) {
                elements.dragHint.style.visibility = 'visible';
            }

            elements.pulseBg.classList.remove('pulsing');
            elements.pulseBg.style.opacity = '0.3';
        }

        function hideInteractionUI() {
            elements.instruction.style.opacity = '0';
            elements.instruction.style.transform = 'scale(0.8)';
            
            // Hide drag hint
            elements.dragHint.style.visibility = 'hidden';

            elements.pulseBg.classList.add('pulsing');
            elements.pulseBg.style.opacity = '1';
        }

        function setupInputHandlers() {
            let lastX = 0, lastY = 0;
            let totalDist = 0;
            const SHAKE_THRESHOLD = 300;

            const handleStart = (e) => {
                if (state.hasFinished) return;

                // Requirement: Hide drag hint on interaction
                if (elements.dragHint) {
                    elements.dragHint.style.visibility = 'hidden';
                }
                state.hasInteracted = true;

                const isBagVisible = !elements.bag.classList.contains('hidden');
                const touch = e.touches ? e.touches[0] : e;
                
                if (isBagVisible) {
                    state.isDragging = true;
                    state.targetX = touch.clientX;
                    state.targetY = touch.clientY;
                    lastX = touch.clientX;
                    lastY = touch.clientY;
                    totalDist = 0;
                } else {
                    // For stationary assets, never update targetX/Y from touch
                    state.targetX = window.innerWidth / 2;
                    state.targetY = window.innerHeight / 2;
                }

                // Tap interactions (Robot/Prize)
                if (state.isWaiting) {
                    const current = timeline[state.stage];
                    if (current && current.action === 'tap') {
                        completeAction();
                        createRipple(touch.clientX, touch.clientY);
                    }
                }
            };

            const handleMove = (e) => {
                if (!state.isDragging) return;
                const touch = e.touches ? e.touches[0] : e;
                state.targetX = touch.clientX;
                state.targetY = touch.clientY;

                if (state.isWaiting) {
                    const current = timeline[state.stage];
                    if (current && current.action === 'shake') {
                        const dx = Math.abs(touch.clientX - lastX);
                        const dy = Math.abs(touch.clientY - lastY);
                        totalDist += (dx + dy);
                        lastX = touch.clientX;
                        lastY = touch.clientY;

                        if (totalDist > SHAKE_THRESHOLD) {
                            completeAction();
                        }
                    }
                }
            };

            const handleEnd = () => {
                state.isDragging = false;
                // Don't snap back to center, stay where released
            };

            elements.assetWrapper.addEventListener('touchstart', handleStart, { passive: false });
            window.addEventListener('touchmove', handleMove, { passive: false });
            window.addEventListener('touchend', handleEnd);

            elements.assetWrapper.addEventListener('mousedown', handleStart);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', handleEnd);
        }

        function completeAction() {
            if (!state.isWaiting) return;
            
            state.isWaiting = false;
            state.segmentComplete = true;
            hideInteractionUI();
            
            const audio = elements.music;
            const current = timeline[state.stage];
            
            // Apply custom start offset if defined for this stage (e.g., 15.25 requested)
            if (current && current.startFrom !== undefined) {
                audio.currentTime = current.startFrom;
            }
            
            audio.play();

            // Haptic visual feedback for tap (robot/final)
            if (current.action === 'tap') {
                elements.assetWrapper.classList.add('shake-active');
                setTimeout(() => elements.assetWrapper.classList.remove('shake-active'), 500);
            }

            // Ensure coordinates are neutral for non-bag assets
            if (current.mode !== 'bag') {
                state.targetX = window.innerWidth / 2;
                state.targetY = window.innerHeight / 2;
                state.currentX = 0;
                state.currentY = 0;
            }
        }

        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple-effect';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        function finishGame() {
            if (state.hasFinished) return;
            state.hasFinished = true;
            state.isPlaying = false;
            elements.pulseBg.classList.remove('pulsing');
            elements.pulseBg.style.opacity = '0';
            
            // Confetti
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });
            
            // Show Modal Immediately
            elements.successModal.classList.remove('hidden-ui');
            elements.successModal.classList.add('visible-ui');
            elements.shareZone.style.transform = 'scale(1)';
        }

        // --- Sekai Iframe Message API ---
        function generateTaskId() {
            return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        }

        async function sendMessage(type, data, expectResponse = true, successType = null) {
            const taskId = generateTaskId();
            window.parent.postMessage({
                origin: 'sekai_gaming_iframe_api',
                type,
                taskId,
                data
            }, '*');

            if (!expectResponse) return null;

            return new Promise((resolve, reject) => {
                const handler = (event) => {
                    const msg = event.data;
                    if (msg?.origin !== 'sekai_gaming_iframe_api' || msg.taskId !== taskId) return;
                    
                    if (msg.type === successType) {
                        window.removeEventListener('message', handler);
                        resolve(msg.data);
                    } else if (msg.error) {
                        window.removeEventListener('message', handler);
                        reject(msg.error);
                    }
                };
                window.addEventListener('message', handler);
                setTimeout(() => {
                    window.removeEventListener('message', handler);
                    reject(new Error('Timeout calling ' + type));
                }, 15000);
            });
        }

        async function handleShare() {
            const shareBtn = elements.shareBtn;
            const originalContent = shareBtn.innerHTML;
            shareBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
            shareBtn.disabled = true;

            try {
                const shareZone = document.getElementById('share-zone');
                const canvas = await html2canvas(shareZone, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#ffffff'
                });
                
                const base64 = canvas.toDataURL('image/png');
                const uploadResult = await sendMessage('upload_image', { image: base64 }, true, 'receive_upload_image');

                if (uploadResult && uploadResult.hostUrl) {
                    sendMessage('invoke_share', {
                        title: "I kept the rhythm! Shake the bag!",
                        coverImgUrl: uploadResult.hostUrl
                    }, false);
                    
                    // Save to leaderboard
                    sendMessage('save_app_result', {
                        score: 100,
                        public: true,
                        result: { status: 'rhythm_complete' }
                    }, false);
                }
            } catch (e) {
                console.error('Share failed:', e);
            } finally {
                shareBtn.innerHTML = originalContent;
                shareBtn.disabled = false;
            }
        }

        // --- Preview Editing API (Mandatory) ---
        (function setupPreviewEditingAPI() {
            window.addEventListener('message', (event) => {
                const msg = event.data;
                if (msg?.origin !== 'sekai_gaming_iframe_api') return;

                switch (msg.type) {
                    case 'get_editable_metadata':
                        window.parent.postMessage({
                            origin: 'sekai_gaming_iframe_api',
                            type: 'receive_editable_metadata',
                            taskId: msg.taskId,
                            data: window.sekaiEditable || {}
                        }, '*');
                        break;
                    case 'apply_change':
                        const success = applySingleChange(msg.data.id, msg.data.value);
                        window.parent.postMessage({
                            origin: 'sekai_gaming_iframe_api',
                            type: 'receive_apply_change',
                            taskId: msg.taskId,
                            data: { success }
                        }, '*');
                        break;
                    case 'get_current_html':
                        window.parent.postMessage({
                            origin: 'sekai_gaming_iframe_api',
                            type: 'receive_current_html',
                            taskId: msg.taskId,
                            data: { html: document.documentElement.outerHTML }
                        }, '*');
                        break;
                    case 'reset_changes':
                        location.reload();
                        break;
                }
            });

            function applySingleChange(id, value) {
                const categories = ['tune', 'images', 'videos', 'music', 'sfx', 'colors', 'text', 'prompts', 'voices'];
                for (const cat of categories) {
                    const item = window.sekaiEditable[cat]?.find(i => i.id === id);
                    if (!item) continue;
                    item.value = value;
                    if (item.cssVar) document.documentElement.style.setProperty(item.cssVar, value);
                    else if (item.path) setNestedValue(window, item.path, value);
                    else if (item.selector) {
                        const el = document.querySelector(item.selector);
                        if (!el) return false;
                        if (el.tagName === 'AUDIO') {
                            const wasPlaying = !el.paused;
                            el.src = value;
                            el.load();
                            if (wasPlaying) el.play().catch(() => {});
                        } else if (item.property === 'src') {
                            el.src = value;
                        } else if (item.property === 'backgroundImage') {
                            el.style.backgroundImage = `url('${value}')`;
                        } else {
                            el.textContent = value;
                        }
                    }
                    return true;
                }
                return false;
            }
        })();
    </script>
