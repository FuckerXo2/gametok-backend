    <script>
    (function() {
      let audioUnlocked = false;
      function unlockAudioContext() {
        if (audioUnlocked) return;
        // Set audio session type to playback
        // it should change the audio channel to media on ios > 17
        if ('audioSession' in window.navigator) {
          window.navigator.audioSession.type = "playback";
        }
        // Unlock Web Audio API
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) {
            const context = new AudioContext();
            if (context.state === 'suspended') {
              context.resume();
            }
            const buffer = context.createBuffer(1, 1, 22050);
            const source = context.createBufferSource();
            source.buffer = buffer;
            source.connect(context.destination);
            source.start(0);
          }
        } catch (e) {}
        // Unlock HTML5 Audio
        try {
          const audio = new Audio();
          audio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
          audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {});
        } catch (e) {}
        audioUnlocked = true;
      }
      // Listen for unlock message from parent
      window.addEventListener('message', function(event) {
        if (event.data?.origin === 'sekai_gaming_iframe_api' && event.data?.type === 'receive_audio_unlock') {
          unlockAudioContext();
        }
      });
      // Also unlock on first user interaction
      ['touchstart', 'touchend', 'mousedown', 'click', 'keydown'].forEach(function(event) {
        document.addEventListener(event, unlockAudioContext, { once: true });
      });
    })();

                let animationFrameId;
                const animate = () => {
                    animationFrameId = requestAnimationFrame(animate);
                    padMeshes.forEach(mesh => {
                        const targetY = mesh.userData.isPressed ? -0.3 : 0;
                        mesh.position.y += (targetY - mesh.position.y) * 0.4;
                        const curTarget = sceneManagerRef.current.targetNote;
                        const myNote = PADS[mesh.userData.id].note;
                        if (mesh.userData.isPressed) {
                            mesh.material.emissive.setHex(parseInt(getComputedStyle(document.documentElement).getPropertyValue('--pad-color').replace('#', '0x')) || 0xfbbf24);
                            mesh.material.emissiveIntensity = 0.8; mesh.material.color.setHex(0xffffff);
                        } else if (curTarget === myNote && !sceneManagerRef.current.won) {
                            const pulse = (Math.sin(Date.now() * 0.004) + 1) * 0.2 + 0.1;
                            mesh.material.emissive.setHex(parseInt(getComputedStyle(document.documentElement).getPropertyValue('--hint-color').replace('#', '0x')) || 0x00FFFF);
                            mesh.material.emissiveIntensity = pulse; mesh.material.color.setHex(0x333333);
                        } else {
                            mesh.material.emissive.setHex(0x000000); mesh.material.emissiveIntensity = 0; mesh.material.color.setHex(0x222222);
                        }
                    });
                    if (!sceneManagerRef.current.won) group.rotation.y = Math.sin(Date.now() * 0.0005) * 0.05;
                    else group.rotation.y += 0.02;
                    renderer.render(scene, camera);
                };
                animate();
                const triggerPad = (id) => {
                     const mesh = padMeshes[id]; mesh.userData.isPressed = true;
                     setTimeout(() => { mesh.userData.isPressed = false; }, 150);
                     sceneManagerRef.current.onPadHit(id);
                };
                const onDown = (e) => {
                    e.preventDefault();
                    if (Tone.context.state !== 'running') Tone.start();
                    const rect = renderer.domElement.getBoundingClientRect();
                    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                    if (clientX === undefined) return;
                    mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
                    mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
                    raycaster.setFromCamera(mouse, camera);
                    const intersects = raycaster.intersectObjects(padMeshes);
                    if (intersects.length > 0) triggerPad(intersects[0].object.userData.id);
                };
                const canvas = renderer.domElement;
                canvas.addEventListener('mousedown', onDown); canvas.addEventListener('touchstart', onDown, { passive: false });
                const resize = () => { camera.aspect = mountRef.current.clientWidth / mountRef.current.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(mountRef.current.clientWidth, mountRef.current.clientHeight); };
                window.addEventListener('resize', resize);
                return () => {
                    window.removeEventListener('resize', resize); canvas.removeEventListener('mousedown', onDown); canvas.removeEventListener('touchstart', onDown);
                    cancelAnimationFrame(animationFrameId); geometry.dispose(); baseMaterial.dispose(); renderer.dispose();
                };
            }, []); 

            useEffect(() => { sceneManagerRef.current = { targetNote: SEQUENCE_NOTES[step], won: won, onPadHit: (id) => handleGameLogic(id) }; }, [step, won]);

            const handleGameLogic = (padId) => {
                if (won) return;
                const note = PADS[padId].note;
                if (synthRef.current) synthRef.current.triggerAttackRelease(note, "8n");
                const targetNote = SEQUENCE_NOTES[step];
                if (note === targetNote) {
                    const nextStep = step + 1;
                    if (nextStep === 1) setFeedbackMsg("TAP AGAIN!");
                    else if (nextStep === 2) setFeedbackMsg("KEEP GOING!");
                    else if (nextStep === 7) setFeedbackMsg("ON FIRE!");
                    setTimeout(() => setFeedbackMsg(null), 1000);
                    setStep(nextStep);
                    if (nextStep === SEQUENCE_NOTES.length) {
                        setWon(true);
                        if (audioRef.current) audioRef.current.play().catch(()=>{});
                    }
                } else {
                    setIsError(true);
                    setTimeout(() => { setIsError(false); setStep(0); }, 400);
                }
            };

            return e('div', { className: `relative w-screen h-screen flex flex-col bg-black overflow-hidden ${isError ? 'shake-screen' : ''}` },
                e('div', { className: `error-overlay ${isError ? 'visible' : ''}` }),
                e('div', { id: 'victory-overlay', className: "absolute inset-0 bg-cover bg-center pointer-events-none", style: { opacity: won ? 1 : 0, transition: 'opacity 3s ease-in', zIndex: 0 } }),
                e('audio', { id: 'music-bgm', ref: audioRef, preload: "auto" }),
                e('div', { className: `relative z-40 w-full h-full flex flex-col items-center justify-between py-6 px-4 transition-opacity duration-500 ${won ? 'opacity-0 pointer-events-none' : 'opacity-100'}` },
                    e('div', { className: "w-full flex flex-col items-center justify-center mt-4" },
                        e('div', { id: 'header-title', className: "text-xs sm:text-sm text-gray-500 uppercase tracking-[0.2em] mb-4 font-bold border-b border-gray-800 pb-2 text-center" }, "PLAY THE SEQUENCE"),
                        e('div', { className: "flex flex-wrap justify-center gap-2 min-h-[40px]" },
                            SEQUENCE_NOTES.map((_, idx) => e(PixelHeart, { key: idx, className: idx < step ? "done-heart" : (idx === step ? "current-heart" : "future-heart") }))
                        )
                    ),
                    e('div', { className: "relative w-full h-16 flex justify-center items-center z-50" }, feedbackMsg && e('div', { className: "floating-text" }, feedbackMsg)),
                    e('div', { className: "flex-grow flex items-center justify-center w-full relative" },
                        e('div', { ref: mountRef, id: "canvas-container" }),
                        step === 0 && !won && e('div', { className: "tutorial-container" },
                            e('div', { id: 'tutorial-text', className: "tutorial-label" }, "tap the tile"),
                            e(PointerDown)
                        )
                    )
                )
            );
        };

        document.addEventListener('DOMContentLoaded', () => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(e(App));
        });
    </script>
</body>
</html>
