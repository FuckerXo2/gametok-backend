  <style>
    :root {
      --bg-color-1: #fdfbf7;
      --bg-color-2: #e2e8f0;
      --accent-color: #3b82f6;
      --text-color: #1e293b;
    }

    body {
      touch-action: manipulation;
      background: radial-gradient(circle at center, var(--bg-color-1), var(--bg-color-2));
      color: var(--text-color);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    #game-container {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* The Spinning Cat Container */
    .cat-wrapper {
      position: relative;
      width: 70vmin;
      height: 70vmin;
      max-width: 400px;
      max-height: 400px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 10;
    }

    .cat-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      pointer-events: none; /* Let clicks pass to wrapper/container */
    }

    /* Tap Feedback Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.4);
      transform: scale(0);
      animation: ripple-anim 0.6s linear;
      pointer-events: none;
    }

    @keyframes ripple-anim {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    /* UI Overlay */
    .ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 20;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2rem;
    }

    .counter-display {
      font-size: 4rem;
      font-weight: 800;
      text-align: center;
      text-shadow: 0 4px 0 rgba(255,255,255,0.8), 0 8px 10px rgba(0,0,0,0.1);
      transition: transform 0.1s;
    }

    .speed-indicator {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
      opacity: 0.7;
      margin-top: -1rem;
    }

    .timer-display {
      font-family: 'Courier New', monospace;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--accent-color);
      text-align: center;
      margin-top: 0.5rem;
      text-shadow: 0 2px 0 rgba(255,255,255,0.8);
    }

    /* Win Modal */
    #win-modal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #win-modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .btn-primary {
      background: var(--accent-color);
      color: white;
      padding: 1rem 2rem;
      border-radius: 2rem;
      font-weight: bold;
      font-size: 1.5rem;
      border: none;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
      transition: transform 0.1s, box-shadow 0.1s;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary:active {
      transform: scale(0.95);
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
    }

    /* Tapping Finger Hint */
    #tap-hint {
      position: absolute;
      top: 55%;
      left: 55%;
      transform: translate(-50%, -50%);
      font-size: 3rem;
      color: var(--accent-color);
      z-index: 30;
      pointer-events: none;
      text-shadow: 0 4px 10px rgba(0,0,0,0.2);
      animation: slide-in-then-tap 3s infinite ease-in-out;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
    }

    @keyframes slide-in-then-tap {
      0% { transform: translate(300%, -50%); opacity: 0; }
      20% { transform: translate(-50%, -50%); opacity: 0.9; }
      30%, 50%, 70% { transform: translate(-50%, -50%) scale(0.8); }
      40%, 60%, 80% { transform: translate(-50%, -50%) scale(1); }
      90% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }

    .hidden {
      display: none !important;
    }
  </style>
  <script>
    // Audio Unlock Script
    (function() {
      let audioUnlocked = false;
      function unlockAudioContext() {
        if (audioUnlocked) return;
        if ('audioSession' in window.navigator) {
          window.navigator.audioSession.type = "playback";
        }
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (AudioContext) {
            const context = new AudioContext();
            if (context.state === 'suspended') context.resume();
            const buffer = context.createBuffer(1, 1, 22050);
            const source = context.createBufferSource();
            source.buffer = buffer;
            source.connect(context.destination);
            source.start(0);
          }
        } catch (e) {}
        try {
          const audio = new Audio();
          audio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
          audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {});
        } catch (e) {}
        audioUnlocked = true;
      }
      window.addEventListener('message', function(event) {
        if (event.data?.origin === 'sekai_gaming_iframe_api' && event.data?.type === 'receive_audio_unlock') {
          unlockAudioContext();
        }
      });
      ['touchstart', 'touchend', 'mousedown', 'click', 'keydown'].forEach(function(event) {
        document.addEventListener(event, unlockAudioContext, { once: true });
      });
    })();
  </script>

    // Include Preview Editing API
    (function setupPreviewEditingAPI() {

        switch (msg.type) {

          case 'apply_change':
            const result = applyChange(msg.data.id, msg.data.value);

          case 'get_current_html':
            window.parent.postMessage({ origin: 'sekai_gaming_iframe_api', type: 'receive_current_html', taskId: msg.taskId, data: { html: document.documentElement.outerHTML } }, '*');
            break;
          case 'reset_changes':
            location.reload();
            break;
        }
      });
      function applyChange(id, value) {
        const categories = ['tune', 'images', 'music', 'sfx', 'colors', 'text'];
        for (const cat of categories) {
          const item = window.sekaiEditable[cat]?.find(i => i.id === id);
          if (!item) continue;
          if (item.cssVar) document.documentElement.style.setProperty(item.cssVar, value);
          else if (item.selector) {
            const el = document.querySelector(item.selector);
            if (!el) return false;
            if (item.property === 'src') el.src = value;
            else el.textContent = value;
          } else if (item.path) {
            const parts = item.path.split('.');
            let current = window;
            for (let i = 0; i < parts.length - 1; i++) current = current[parts[i]];
            current[parts[parts.length - 1]] = value;
          }
          item.value = value;
          return true;
        }
        return false;
      }
    })();

    };

    const AUDIO_SOURCES = {
      slow: getEditableValue('music', 'musicSlow') || 'https://prod-data.sekai.chat/v3-games/chat-creation/05dbbf08-fcb7-440d-9bf0-527a35887773.wav',
      medium: getEditableValue('music', 'musicMed') || 'https://prod-data.sekai.chat/v3-games/chat-creation/7387e54b-3c9e-47cf-889c-89af548b774e.wav',
      win: getEditableValue('music', 'musicWin') || 'https://prod-data.sekai.chat/v3-games/chat-creation/4153e729-2f7b-4f23-9dcd-0efdddfd05d8.wav'
    };

    const state = {
      taps: 0,
      rotation: 0,
      velocity: 0,
      isWon: false,
      started: false,
      startTime: 0,
      currentAudioState: 'none', // 'none', 'slow', 'medium', 'win'
      audioObjects: {}
    };

    // DOM Elements
    const elements = {};

    function initApp() {
      // Map elements
      elements.container = document.getElementById('game-container');
      elements.catWrapper = document.getElementById('cat-wrapper');
      elements.catImage = document.getElementById('cat-image');
      elements.counter = document.getElementById('counter');
      elements.speedLabel = document.getElementById('speed-label');
      elements.timer = document.getElementById('timer');
      elements.winModal = document.getElementById('win-modal');
      elements.challengeBtn = document.getElementById('challenge-btn');
      elements.replayBtn = document.getElementById('replay-btn');
      elements.tapHint = document.getElementById('tap-hint');

      // Apply initial values from sekaiEditable
      const catImgValue = getEditableValue('images', 'catImg');
      if (catImgValue) elements.catImage.src = catImgValue;

      const titleTextValue = getEditableValue('text', 'titleText');
      if (titleTextValue) elements.speedLabel.textContent = titleTextValue;

      // Preload Audio
      preloadAudio();

      // Listeners
      // Use 'pointerdown' for better cross-device handling (touches & clicks)
      elements.container.addEventListener('pointerdown', handleTap);
      elements.challengeBtn.addEventListener('click', handleChallenge);
      elements.replayBtn.addEventListener('click', resetGame);

      // Start Loop
      requestAnimationFrame(gameLoop);
    }

    function preloadAudio() {
      // Initialize audio objects
      state.audioObjects.slow = new Audio(AUDIO_SOURCES.slow);
      state.audioObjects.slow.loop = true;
      
      state.audioObjects.medium = new Audio(AUDIO_SOURCES.medium);
      state.audioObjects.medium.loop = true;
      
      state.audioObjects.win = new Audio(AUDIO_SOURCES.win);
      state.audioObjects.win.loop = true;
    }

    function handleTap(e) {
      if (state.isWon) return; // Ignore taps if won
      if (e.target.closest('#win-modal')) return; // Ignore taps on modal

      if (!state.started) {
        state.started = true;
        state.startTime = Date.now();
        if (elements.tapHint) elements.tapHint.classList.add('hidden');
      }

      // Logic
      state.velocity += GAME_CONFIG.tapPower;
      // Cap velocity for sanity
      if (state.velocity > GAME_CONFIG.maxSpeed) state.velocity = GAME_CONFIG.maxSpeed;
      
      state.taps++;
      updateCounter();

      // Visual Feedack
      createRipple(e.clientX, e.clientY);
      triggerBounce();

      // Haptics
      sendMessage('gen_vibration', { duration: 50 }, false, null);

      // Check Win Condition
      if (state.taps >= GAME_CONFIG.winCount) {
        triggerWin();
      }
    }

    function triggerWin() {
      state.isWon = true;
      state.velocity = 200; // Force very high speed for infinite spin effect
      elements.winModal.classList.add('active');
      
      // Update Final Time Display
      const elapsed = (Date.now() - state.startTime) / 1000;
      const finalTimeStr = elapsed.toFixed(2) + 's';
      document.getElementById('final-time-display').textContent = finalTimeStr;

      // Save Result
      sendMessage('save_app_result', {
        score: state.taps,
        public: true,
        result: { timeStr: finalTimeStr }
      }, false, null);

      // Visuals - Clean up background UI
      elements.counter.style.opacity = '0';
      elements.speedLabel.style.opacity = '0';
      elements.timer.style.opacity = '0';
    }

    function resetGame() {
      state.isWon = false;
      state.started = false;
      state.taps = 0;
      state.velocity = 0;
      state.rotation = 0;
      
      updateCounter();
      const titleTextValue = getEditableValue('text', 'titleText') || "Tap to Spin!";
      elements.speedLabel.textContent = titleTextValue;
      elements.timer.textContent = "0.00s";
      
      // Restore UI visibility
      elements.counter.style.opacity = '1';
      elements.speedLabel.style.opacity = '1';
      elements.timer.style.opacity = '1';

      elements.winModal.classList.remove('active');
      elements.catImage.style.filter = "none";
      elements.catWrapper.style.transform = "rotate(0deg)";
      if (elements.tapHint) elements.tapHint.classList.remove('hidden');
      
      // Reset audio
      stopAllAudio();
      state.currentAudioState = 'none';
    }

    function handleChallenge() {
      sendMessage('invoke_share', {
        title: `I reached infinite velocity with ${state.taps} taps! Can you handle the spin?`,
      }, false, null);
    }

    function updateCounter() {
      elements.counter.textContent = state.taps;
      // Small scale pop on text
      elements.counter.style.transform = "scale(1.3)";
      setTimeout(() => elements.counter.style.transform = "scale(1)", 100);
    }

    function triggerBounce() {
      // Scale down slightly then back up
      elements.catWrapper.style.transform = `scale(0.95) rotate(${state.rotation}deg)`;
      setTimeout(() => {
        elements.catWrapper.style.transform = `scale(1.0) rotate(${state.rotation}deg)`; // Will be overwritten by loop but gives momentary effect
      }, 50);
    }

    function createRipple(x, y) {
      const ripple = document.createElement('div');
      ripple.className = 'ripple';
      // If x/y undefined (e.g. keyboard), center it
      if (!x || !y) {
        x = window.innerWidth / 2;
        y = window.innerHeight / 2;
      }
      
      const size = 100;
      ripple.style.width = size + 'px';
      ripple.style.height = size + 'px';
      ripple.style.left = (x - size/2) + 'px';
      ripple.style.top = (y - size/2) + 'px';
      
      elements.container.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    }

    function updateAudio(velocity) {
      let desiredState = 'none';

      if (state.isWon) {
        desiredState = 'win';
      } else if (velocity > GAME_CONFIG.thresholdMed) {
        desiredState = 'medium';
      } else if (velocity > GAME_CONFIG.thresholdSlow) {
        desiredState = 'slow';
      } else {
        desiredState = 'none';
      }

      if (desiredState !== state.currentAudioState) {
        // Transition
        stopAllAudio();
        
        if (desiredState !== 'none') {
          const track = state.audioObjects[desiredState];
          if (track) {
            track.currentTime = 0;
            track.play().catch(e => console.log('Audio play blocked', e));
          }
        }
        
        state.currentAudioState = desiredState;
        
        // Update label text if not won
        if (!state.isWon) {
          if (desiredState === 'medium') elements.speedLabel.textContent = "MAXIMUM OVERDRIVE!";
          else if (desiredState === 'slow') elements.speedLabel.textContent = "Keep going!";
          else {
            const titleTextValue = getEditableValue('text', 'titleText') || "Tap to Spin!";
            elements.speedLabel.textContent = titleTextValue;
          }
        }
      }
    }

    function stopAllAudio() {
      ['slow', 'medium', 'win'].forEach(key => {
        const audio = state.audioObjects[key];
        if (audio) {
          audio.pause();
          audio.currentTime = 0;
        }
      });
    }

    function gameLoop() {
      // Timer Update
      if (state.started && !state.isWon) {
        const elapsed = (Date.now() - state.startTime) / 1000;
        elements.timer.textContent = elapsed.toFixed(2) + 's';
      }

      // Physics
      if (!state.isWon) {
        // Apply friction
        state.velocity *= GAME_CONFIG.friction;
        if (state.velocity < 0.1) state.velocity = 0;
        
        // Apply rotation during gameplay
        state.rotation += state.velocity;
        state.rotation = state.rotation % 360;
      } else {
        // Win state: Maintain infinite high speed spin
        state.velocity = 200;
        state.rotation += state.velocity;
        state.rotation = state.rotation % 360;
      }

      // Render Rotation (Always rotate based on state.rotation)
      elements.catWrapper.style.transform = `rotate(${state.rotation}deg)`;

      // Audio Logic
      updateAudio(state.velocity);

      requestAnimationFrame(gameLoop);
    }

    /* =========================================
       COMMUNICATION HELPER
       ========================================= */
    function sendMessage(type, data, expectResponse, expectedType) {
      const taskId = crypto.randomUUID();
      window.parent.postMessage({ origin:'sekai_gaming_iframe_api', type, taskId, data }, '*');
    }

    // Init
    document.addEventListener('DOMContentLoaded', initApp);

  </script>
</body>
</html>
