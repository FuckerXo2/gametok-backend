  <script>
  (function() {
    let audioUnlocked = false;
    function unlockAudioContext() {
      if (audioUnlocked) return;
      if ('audioSession' in window.navigator) {
        window.navigator.audioSession.type = "playback";
      }
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (AudioContext) {
          const context = new AudioContext();
          if (context.state === 'suspended') context.resume();
          const buffer = context.createBuffer(1, 1, 22050);
          const source = context.createBufferSource();
          source.buffer = buffer;
          source.connect(context.destination);
          source.start(0);
        }
      } catch (e) {}
      audioUnlocked = true;
    }
    window.addEventListener('message', function(event) {
      if (event.data?.origin === 'sekai_gaming_iframe_api' && event.data?.type === 'receive_audio_unlock') {
        unlockAudioContext();
      }
    });
    ['touchstart', 'touchend', 'mousedown', 'click', 'keydown'].forEach(function(event) {
      document.addEventListener(event, unlockAudioContext, { once: true });
    });
  })();
  </script>

<script>
/**
 * PIZZA SLICE - GAME LOGIC
 */

// --- Global Prompts & Constants ---
const COLORS = {
  bg: '#FFF8F0',
  crust: '#D4A574',
  crustDark: '#B8956A',
  sauce: '#E85D4C',
  cheese: '#FFD93D',
  pepperoni: '#C41E3A',
  basil: '#4A7C59',
  cutLine: '#FFFFFF',
  text: '#3D2914'
};

function getLevelConfig(idx) {
  const slices = (idx + 1) * 2;
  return { slices: slices, cuts: slices / 2 };
}

// --- State Management ---
const state = {
  levelIndex: 0,
  levelPassed: false,
  currentCuts: [], // Array of angles (radians)
  particles: [],
  pizzaScale: 0, // For entry/exit animations
  pizzaRotation: 0,
  phase: 'intro', // intro, playing, cutting, result, outro
  shake: { x: 0, y: 0, time: 0 },
  score: 0,
  slicesData: [], // Calculated slice percentages
  pizzaSeed: 1234, // Random seed for toppings consistency
  lastTime: 0
};

// --- Audio System ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = audioCtx.createGain();
masterGain.connect(audioCtx.destination);
masterGain.gain.value = 0.5;

function playSound(type, val) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(masterGain);

  const now = audioCtx.currentTime;

  if (type === 'cut') {
    // Slicing sound
    const bufferSize = audioCtx.sampleRate * 0.15;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 1000;
    const noiseGain = audioCtx.createGain();
    
    noise.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(masterGain);
    
    noiseGain.gain.setValueAtTime(0.6, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    noise.start(now);
  } else if (type === 'fail') {
    const oscFail = audioCtx.createOscillator();
    const gainFail = audioCtx.createGain();
    oscFail.connect(gainFail);
    gainFail.connect(masterGain);
    oscFail.type = 'sawtooth';
    oscFail.frequency.setValueAtTime(200, now);
    oscFail.frequency.linearRampToValueAtTime(50, now + 0.6);
    gainFail.gain.setValueAtTime(0.3, now);
    gainFail.gain.linearRampToValueAtTime(0, now + 0.6);
    oscFail.start(now);
    oscFail.stop(now + 0.6);
  } else if (type === 'star') {
    // Ping
    osc.type = 'sine';
    const pitch = 440 + (val * 100);
    osc.frequency.setValueAtTime(pitch, now);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
    osc.start(now);
    osc.stop(now + 0.5);
  } else if (type === 'success') {
    // Chord
    [0, 4, 7].forEach((interval, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g);
      g.connect(masterGain);
      o.type = 'triangle';
      o.frequency.value = 440 * Math.pow(2, interval/12);
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.1, now + 0.1 + (i*0.05));
      g.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
      o.start(now);
      o.stop(now + 1.5);
    });
  }
}

// --- Haptics ---
function vibrate(ms) {
  window.parent.postMessage({
    origin: 'sekai_gaming_iframe_api',
    type: 'gen_vibration',
    taskId: crypto.randomUUID(),
    data: { duration: ms }
  }, '*');
}

// --- Helper Functions ---
function seededRandom(seed) {
  const x = Math.sin(seed++) * 10000;
  return x - Math.floor(x);
}

function normalizeAngle(angle) {
  let a = angle % (Math.PI * 2);
  if (a < 0) a += Math.PI * 2;
  return a;
}

// --- Game Engine ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let w, h, centerX, centerY, pizzaRadius;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
  centerX = w / 2;
  centerY = h / 2;
  // Pizza size: 85% of shortest dimension
  pizzaRadius = Math.min(w, h) * 0.4;
}

window.addEventListener('resize', resize);
resize();

// --- Topping Generation ---
// Generate static toppings relative to radius 1.0
function generateToppings(seed) {
  let toppings = [];
  let s = seed;
  
  // Pepperonis
  for (let i = 0; i < 10; i++) {
    const r = Math.sqrt(seededRandom(s++)) * 0.7; // Distribute area-wise
    const theta = seededRandom(s++) * Math.PI * 2;
    toppings.push({
      type: 'pepperoni',
      x: Math.cos(theta) * r,
      y: Math.sin(theta) * r,
      r: 0.1 + seededRandom(s++) * 0.05
    });
  }
  
  // Basil
  for (let i = 0; i < 6; i++) {
    const r = Math.sqrt(seededRandom(s++)) * 0.8;
    const theta = seededRandom(s++) * Math.PI * 2;
    toppings.push({
      type: 'basil',
      x: Math.cos(theta) * r,
      y: Math.sin(theta) * r,
      rot: seededRandom(s++) * Math.PI * 2,
      size: 0.08 + seededRandom(s++) * 0.03
    });
  }

  // Cheese spots
  for (let i = 0; i < 15; i++) {
    const r = Math.sqrt(seededRandom(s++)) * 0.85;
    const theta = seededRandom(s++) * Math.PI * 2;
    toppings.push({
      type: 'cheese',
      x: Math.cos(theta) * r,
      y: Math.sin(theta) * r,
      size: 0.05 + seededRandom(s++) * 0.04
    });
  }
  
  return toppings;
}

let currentToppings = [];

function initLevel() {
  const lvl = getLevelConfig(state.levelIndex);
  state.currentCuts = [];
  state.particles = [];
  state.pizzaRotation = 0;
  state.shake = { x: 0, y: 0, time: 0 };
  state.slicesData = [];
  state.phase = 'intro';
  state.pizzaSeed += 1;
  currentToppings = generateToppings(state.pizzaSeed);
  
  // Update UI
  document.getElementById('cta-text').textContent = `TAP TO CUT INTO ${lvl.slices} SLICES`;
  document.getElementById('level-badge').textContent = `LEVEL ${state.levelIndex + 1}`;
  
  // Reset Hint
  document.getElementById('tap-hint').classList.remove('opacity-0');

  // Reset Retry Button
  document.getElementById('retry-btn').classList.add('opacity-0', 'scale-0');

  // Reset Result UI
  const resultPanel = document.getElementById('results-panel');
  resultPanel.classList.remove('opacity-100', 'translate-y-0');
  resultPanel.classList.add('opacity-0', 'translate-y-10');
  
  // Reset Stars
  const stars = document.getElementById('stars-container').children;
  Array.from(stars).forEach(s => {
    s.classList.remove('text-[#FFB347]', 'scale-100');
    s.classList.add('text-[#E0E0E0]', 'scale-0');
  });
  
  const ratingText = document.getElementById('rating-text');
  ratingText.classList.remove('scale-100');
  ratingText.classList.add('scale-0');

  // Animation Start
  let startTime = Date.now();
  const entryAnim = () => {
    const now = Date.now();
    const p = Math.min((now - startTime) / 600, 1);
    // Elastic out
    const ease = p === 0 ? 0 : p === 1 ? 1 : Math.pow(2, -10 * p) * Math.sin((p * 10 - 0.75) * (2 * Math.PI) / 3) + 1;
    
    state.pizzaScale = ease;
    
    if (p < 1) requestAnimationFrame(entryAnim);
    else state.phase = 'playing';
  };
  requestAnimationFrame(entryAnim);
}

// --- Interaction ---
canvas.addEventListener('pointerdown', (e) => {
  if (state.phase !== 'playing') return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left - centerX;
  const y = e.clientY - rect.top - centerY;
  
  // Calculate angle
  const angle = Math.atan2(y, x);
  
  performCut(angle);
});

function performCut(angle) {
  const lvl = getLevelConfig(state.levelIndex);
  
  // Hide hint on first tap
  document.getElementById('tap-hint').classList.add('opacity-0');

  state.currentCuts.push(angle);
  
  // Juice
  state.shake.time = 10;
  spawnParticles(angle);
  playSound('cut');
  vibrate(50);

  // Show retry button on first cut (if not finished)
  if (state.currentCuts.length > 0 && state.currentCuts.length < lvl.cuts) {
    document.getElementById('retry-btn').classList.remove('opacity-0', 'scale-0');
  }
  
  // Check completion
  if (state.currentCuts.length >= lvl.cuts) {
    document.getElementById('retry-btn').classList.add('opacity-0', 'scale-0');
    calculateResults();
    state.phase = 'result';
  }
}

function spawnParticles(angle) {
  // Spawn particles along the cut line
  const count = 20;
  for (let i = 0; i < count; i++) {
    const r = (Math.random() * 2 - 1) * pizzaRadius; // Random pos along line
    const px = Math.cos(angle) * r;
    const py = Math.sin(angle) * r;
    
    // Velocity perpendicular to cut
    const perp = angle + Math.PI/2;
    const speed = Math.random() * 5 + 2;
    const dir = Math.random() > 0.5 ? 1 : -1;
    
    state.particles.push({
      x: px,
      y: py,
      vx: Math.cos(perp) * speed * dir,
      vy: Math.sin(perp) * speed * dir,
      life: 1.0,
      color: Math.random() > 0.5 ? COLORS.cheese : COLORS.crust
    });
  }
}

function calculateResults() {
  const lvl = getLevelConfig(state.levelIndex);
  const targetSlices = lvl.slices;
  
  // Combine all cuts into a list of angles in [0, 2PI]
  // Each diameter cut produces 2 angles: a and a+PI
  let angles = [];
  state.currentCuts.forEach(c => {
    angles.push(normalizeAngle(c));
    angles.push(normalizeAngle(c + Math.PI));
  });
  
  angles.sort((a, b) => a - b);
  
  // Calculate slice arcs
  let maxDev = 0;
  state.slicesData = [];
  const idealArc = (Math.PI * 2) / targetSlices;
  
  for (let i = 0; i < angles.length; i++) {
    const start = angles[i];
    const end = angles[(i + 1) % angles.length];
    let arc = end - start;
    if (arc < 0) arc += Math.PI * 2; // Wrap around
    
    const dev = Math.abs(arc - idealArc) / idealArc; // Percentage deviation
    if (dev > maxDev) maxDev = dev;
    
    // Store for rendering
    const centerAngle = start + arc / 2;
    state.slicesData.push({
      angle: centerAngle,
      percentage: (arc / (Math.PI * 2)) * 100,
      isGood: dev < 0.1 // Green if < 10% deviation
    });
  }
  
  // Determine Rating
  let stars = 1;
  let text = "Try Again";
  
  if (maxDev < 0.05) { stars = 5; text = "PERFECT!"; }
  else if (maxDev < 0.10) { stars = 4; text = "Great!"; }
  else if (maxDev < 0.20) { stars = 3; text = "Good"; }
  else if (maxDev < 0.30) { stars = 2; text = "Okay"; }
  
  state.levelPassed = stars >= 3;
  showResults(stars, text);
}

function showResults(starCount, textStr) {
  setTimeout(() => {
    const panel = document.getElementById('results-panel');
    panel.classList.remove('opacity-0', 'translate-y-10');
    panel.classList.add('opacity-100', 'translate-y-0');
    
    const stars = document.getElementById('stars-container').children;
    const text = document.getElementById('rating-text');
    
    // Animate stars sequentially
    for (let i = 0; i < starCount; i++) {
      setTimeout(() => {
        stars[i].classList.remove('text-[#E0E0E0]', 'scale-0');
        stars[i].classList.add('text-[#FFB347]', 'scale-100');
        playSound('star', i);
        vibrate(20);
      }, i * 200);
    }
    
    // Show text after stars
    setTimeout(() => {
      text.textContent = textStr;
      text.classList.remove('scale-0');
      text.classList.add('scale-100');
      
      const btn = document.getElementById('next-btn');
      if (state.levelPassed) {
        playSound('success');
        btn.textContent = "NEXT PIZZA";
        btn.className = "interactive bg-[#4CAF50] text-white px-10 py-4 rounded-full text-xl font-black shadow-lg hover:scale-105 active:scale-95 transition-all transform pointer-events-auto";
      } else {
        playSound('fail');
        btn.textContent = "TRY AGAIN";
        btn.className = "interactive bg-[#E85D4C] text-white px-10 py-4 rounded-full text-xl font-black shadow-lg hover:scale-105 active:scale-95 transition-all transform pointer-events-auto";
      }
    }, starCount * 200 + 100);
    
  }, 500);
}

document.getElementById('next-btn').addEventListener('click', () => {
  // Outro Animation
  let startTime = Date.now();
  state.phase = 'outro';
  
  const outroAnim = () => {
    const now = Date.now();
    const p = Math.min((now - startTime) / 500, 1);
    
    state.pizzaScale = 1 - p;
    state.pizzaRotation = p * Math.PI * 2;
    
    if (p < 1) requestAnimationFrame(outroAnim);
    else {
      if (state.levelPassed) {
        state.levelIndex++;
        // Save State
        window.parent.postMessage({
          origin: 'sekai_gaming_iframe_api',
          type: 'save_game_states',
          taskId: crypto.randomUUID(),
          data: { pageSettings: { levelIndex: state.levelIndex } }
        }, '*');
      }
      initLevel();
    }
  };
  requestAnimationFrame(outroAnim);
});

document.getElementById('retry-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  playSound('cut');
  initLevel();
});

// --- Main Render Loop ---
function drawPizza(ctx, radius) {
  // Shadow
  ctx.beginPath();
  ctx.arc(5, 5, radius, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.fill();

  // Crust Outer
  ctx.beginPath();
  ctx.arc(0, 0, radius, 0, Math.PI * 2);
  ctx.fillStyle = COLORS.crustDark;
  ctx.fill();

  // Crust Inner (Main)
  ctx.beginPath();
  ctx.arc(0, 0, radius * 0.96, 0, Math.PI * 2);
  ctx.fillStyle = COLORS.crust;
  ctx.fill();

  // Sauce
  ctx.beginPath();
  ctx.arc(0, 0, radius * 0.88, 0, Math.PI * 2);
  ctx.fillStyle = COLORS.sauce;
  ctx.fill();

  // Toppings
  currentToppings.forEach(t => {
    ctx.save();
    if (t.type === 'pepperoni') {
      ctx.translate(t.x * radius, t.y * radius);
      ctx.beginPath();
      ctx.arc(0, 0, t.r * radius, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.pepperoni;
      ctx.fill();
      // Detail
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.beginPath();
      ctx.arc(t.r*radius*0.3, t.r*radius*0.3, t.r*radius*0.2, 0, Math.PI*2);
      ctx.fill();
    } else if (t.type === 'basil') {
      ctx.translate(t.x * radius, t.y * radius);
      ctx.rotate(t.rot);
      ctx.beginPath();
      ctx.ellipse(0, 0, t.size * radius, t.size * radius * 0.5, 0, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.basil;
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-t.size*radius, 0);
      ctx.lineTo(t.size*radius, 0);
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 1;
      ctx.stroke();
    } else if (t.type === 'cheese') {
      ctx.translate(t.x * radius, t.y * radius);
      ctx.beginPath();
      ctx.arc(0, 0, t.size * radius, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.cheese;
      ctx.fill();
    }
    ctx.restore();
  });
}

function render() {
  // Clear
  ctx.clearRect(0, 0, w, h);

  // Shake check
  if (state.shake.time > 0) {
    state.shake.time--;
    state.shake.x = (Math.random() - 0.5) * 10;
    state.shake.y = (Math.random() - 0.5) * 10;
  } else {
    state.shake.x = 0;
    state.shake.y = 0;
  }

  ctx.save();
  ctx.translate(centerX + state.shake.x, centerY + state.shake.y);
  
  // Scale and Rotate for Intro/Outro
  ctx.scale(state.pizzaScale, state.pizzaScale);
  ctx.rotate(state.pizzaRotation);

  if (state.phase === 'result' && state.currentCuts.length > 0) {
    // Draw Separated Slices
    // We need to clip the pizza for each slice
    // Combine cuts to angles
    let angles = [];
    state.currentCuts.forEach(c => {
      angles.push(normalizeAngle(c));
      angles.push(normalizeAngle(c + Math.PI));
    });
    angles.sort((a, b) => a - b);

    // Render each slice with offset
    for (let i = 0; i < angles.length; i++) {
      const start = angles[i];
      const end = angles[(i + 1) % angles.length];
      let mid = start + (end - start)/2;
      if (end < start) mid = start + (Math.PI*2 - start + end)/2;

      const sep = 15; // Separation distance
      const dx = Math.cos(mid) * sep;
      const dy = Math.sin(mid) * sep;

      ctx.save();
      ctx.translate(dx, dy);
      
      // Clipping Path for Wedge
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, pizzaRadius * 1.5, start, end);
      ctx.lineTo(0, 0);
      ctx.clip();

      drawPizza(ctx, pizzaRadius);
      
      // Draw Percentage Text if result ready
      if (state.slicesData[i]) {
        const pData = state.slicesData[i];
        ctx.fillStyle = pData.isGood ? '#4CAF50' : '#E85D4C';
        ctx.font = `bold ${pizzaRadius * 0.12}px Nunito`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        // Position text
        const textDist = pizzaRadius * 0.6;
        const tx = Math.cos(pData.angle) * textDist;
        const ty = Math.sin(pData.angle) * textDist;
        
        ctx.shadowColor = "white";
        ctx.shadowBlur = 4;
        ctx.fillText(pData.percentage.toFixed(1) + '%', tx, ty);
        ctx.shadowBlur = 0;
      }

      ctx.restore();
    }

  } else {
    // Draw Whole Pizza
    drawPizza(ctx, pizzaRadius);
    
    // Draw Cut Lines
    state.currentCuts.forEach(angle => {
      ctx.beginPath();
      const x1 = Math.cos(angle) * pizzaRadius * 1.1;
      const y1 = Math.sin(angle) * pizzaRadius * 1.1;
      ctx.moveTo(-x1, -y1);
      ctx.lineTo(x1, y1);
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 3;
      ctx.shadowColor = 'rgba(0,0,0,0.3)';
      ctx.shadowBlur = 5;
      ctx.stroke();
      ctx.shadowBlur = 0;
    });
  }
  
  // Particles
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2; // Gravity
    p.life -= 0.03;
    
    if (p.life <= 0) {
      state.particles.splice(i, 1);
      continue;
    }
    
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, 6, 6);
    ctx.globalAlpha = 1.0;
  }

  ctx.restore();
  
  requestAnimationFrame(render);
}

// Start
function initApp() {
  resize();
  initLevel();
  requestAnimationFrame(render);

  // Load State
  const taskId = crypto.randomUUID();
  const handler = (event) => {
    const msg = event.data;
    if (msg?.origin !== 'sekai_gaming_iframe_api' || msg.taskId !== taskId) return;
    window.removeEventListener('message', handler);
    if (msg.data?.pageSettings?.levelIndex !== undefined) {
      state.levelIndex = msg.data.pageSettings.levelIndex;
      initLevel();
    }
  };
  window.addEventListener('message', handler);
  
  window.parent.postMessage({
    origin: 'sekai_gaming_iframe_api',
    type: 'get_game_states',
    taskId: taskId,
    data: null
  }, '*');
}

document.addEventListener('DOMContentLoaded', initApp);

</script>
</body>
