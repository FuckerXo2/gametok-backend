        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0D0D0D;
            color: #F5F5F5;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Animations */
        @keyframes pulse-beat {
            0%, 100% { transform: scale(1.0); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }

        .animate-pulse-beat {
            animation: pulse-beat 0.441s ease-in-out infinite;
        }

        .animate-shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes hint-pulse {
            0%, 100% { transform: translateY(0) scale(1); opacity: 1; }
            50% { transform: translateY(10px) scale(1.05); opacity: 0.9; }
        }

        .animate-hint-pulse {
            animation: hint-pulse 1.5s ease-in-out infinite;
        }

        #key-hint {
            position: absolute;
            bottom: 102%;
            left: 88%;
            width: 12%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 50;
            pointer-events: none;
            color: #FFD700;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* Piano Keys */
        .white-key {
            background: linear-gradient(to bottom, #F5F5F5 0%, #E0E0E0 100%);
            border-radius: 0 0 6px 6px;
            box-shadow: 0 4px 0 #999;
            transition: transform 0.1s, background-color 0.2s;
            z-index: 10;
        }
        .white-key:active, .white-key.active-touch {
            transform: translateY(4px);
            box-shadow: 0 0 0 #999;
            background: #FFD700;
        }
        .white-key.error {
            background: #FF4444 !important;
        }

        .black-key {
            background: linear-gradient(to bottom, #333 0%, #000 100%);
            border-radius: 0 0 4px 4px;
            box-shadow: 0 3px 0 #222;
            z-index: 20;
            transition: transform 0.1s, background-color 0.2s;
        }
        .black-key:active, .black-key.active-touch {
            transform: translateY(3px);
            box-shadow: 0 0 0 #222;
            background: #FFD700;
        }
        .black-key.error {
            background: #FF4444 !important;
        }

        /* Sequence Indicators */
        .seq-note {
            transition: all 0.3s ease;
            opacity: 0.4;
        }
        .seq-note.current {
            opacity: 1;
            color: #FFD700;
            transform: scale(1.3);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        .seq-note.done {
            opacity: 0.3;
            color: #888;
        }

        /* Celebration Image Fade */
        .celebration-img {
            transition: opacity 0.3s ease;
        }

        /* Rotation Prompt */
        #rotate-overlay {
            display: none;
        }
        @media (orientation: landscape) {
            #rotate-overlay {
                display: flex;
            }
        }

    <script>
      (function() {
        let audioUnlocked = false;

        function unlockAudioContext() {
          if (audioUnlocked) return;
          if ('audioSession' in window.navigator) {
            window.navigator.audioSession.type = "playback";
          }
          try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
              const context = new AudioContext();
              if (context.state === 'suspended') {
                context.resume();
              }
              const buffer = context.createBuffer(1, 1, 22050);
              const source = context.createBufferSource();
              source.buffer = buffer;
              source.connect(context.destination);
              source.start(0);
            }
          } catch (e) {}
          try {
            const audio = new Audio();
            audio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
            audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {});
          } catch (e) {}
          audioUnlocked = true;
        }

        window.addEventListener('message', function(event) {
          if (event.data?.origin === 'sekai_gaming_iframe_api' && event.data?.type === 'receive_audio_unlock') {
            unlockAudioContext();
          }
        });
        ['touchstart', 'touchend', 'mousedown', 'click', 'keydown'].forEach(function(event) {
          document.addEventListener(event, unlockAudioContext, { once: true });
        });
      })();
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
        });

        function initApp() {
            applyAllEditableValues();
            renderSequence();
            renderPiano();
            preloadAssets();
            
            // Rotation dismiss
            document.getElementById('dismiss-rotate').addEventListener('click', () => {
                document.getElementById('rotate-overlay').style.display = 'none';
            });
        }

        // ============================================
        // RENDER FUNCTIONS
        // ============================================

        function renderSequence() {
            const container = document.getElementById('sequence-display');
            container.innerHTML = '';
            
            TARGET_SEQUENCE.forEach((noteNum, index) => {
                const span = document.createElement('span');
                span.className = `seq-note ${index === 0 ? 'current' : ''}`;
                span.textContent = noteNum;
                span.dataset.index = index;
                container.appendChild(span);
                
                if (index < TARGET_SEQUENCE.length - 1) {
                    const dash = document.createElement('span');
                    dash.className = 'text-gray-700 opacity-50';
                    dash.textContent = '-';
                    container.appendChild(dash);
                }
            });
        }

        function renderPiano() {
            const container = document.getElementById('piano-container');
            
            // Reverted Layout: 5 White Keys (B, C, D, E, F) + 3 Black Keys
            // Width: 100% / 5 = 20% per white key
            
            const whiteKeys = [
                { id: 1, label: '1', note: 'B', left: 0 },
                { id: 2, label: '2', note: 'C', left: 20 },
                { id: 4, label: '4', note: 'D', left: 40 },
                { id: 6, label: '6', note: 'E', left: 60 },
                { id: 7, label: '7', note: 'F', left: 80 }
            ];

            whiteKeys.forEach(k => {
                const btn = document.createElement('div');
                btn.className = 'white-key absolute top-0 bottom-0 flex flex-col justify-end items-center pb-4 text-gray-400 font-bold select-none';
                btn.style.left = `${k.left}%`;
                btn.style.width = '19.5%'; // slight gap
                btn.style.height = '100%';
                
                // Content
                const label = document.createElement('span');
                label.className = 'text-xl text-black mb-1';
                label.textContent = k.label;
                
                const note = document.createElement('span');
                note.className = 'text-xs text-gray-500 font-mono';
                note.textContent = k.note;
                
                btn.appendChild(label);
                btn.appendChild(note);
                
                btn.dataset.id = k.id;
                attachTouchEvents(btn, k.id);
                container.appendChild(btn);
            });

            // Black Keys Positioning
            // Width ~12%
            // 3 (C#): Between C(20-40) and D(40-60) -> Center ~40% -> Left ~34%
            // 5 (D#): Between D(40-60) and E(60-80) -> Center ~60% -> Left ~54%
            // 8 (F#): Right of F(80-100) -> Center ~94% -> Left ~88%
            
            const blackKeys = [
                { id: 3, label: '3', note: 'C#', left: 34 },
                { id: 5, label: '5', note: 'D#', left: 54 },
                { id: 8, label: '8', note: 'F#', left: 88 }
            ];

            blackKeys.forEach(k => {
                const btn = document.createElement('div');
                btn.className = 'black-key absolute top-0 flex flex-col justify-end items-center pb-3 text-gray-500 select-none';
                btn.style.left = `${k.left}%`;
                btn.style.width = '12%';
                btn.style.height = '60%';
                
                const label = document.createElement('span');
                label.className = 'text-lg text-white mb-1';
                label.textContent = k.label;
                
                const note = document.createElement('span');
                note.className = 'text-[10px] text-gray-600 font-mono';
                note.textContent = k.note;
                
                btn.appendChild(label);
                btn.appendChild(note);
                
                btn.dataset.id = k.id;
                attachTouchEvents(btn, k.id);
                container.appendChild(btn);
            });

            // Add Pulsing Hint for Key 8
            const hint = document.createElement('div');
            hint.id = 'key-hint';
            hint.className = 'animate-hint-pulse';
            hint.innerHTML = `
                <span id="hint-label" class="text-[10px] uppercase font-black mb-1 whitespace-nowrap">tap the key</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(180deg);">
                    <path d="M10 11V6a2 2 0 0 1 4 0v7a2 2 0 0 1 4 0v-1.5a2 2 0 0 1 4 0V14a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
                    <path d="M10 11V5a2 2 0 1 0-4 0v9"/>
                </svg>
            `;
            container.appendChild(hint);
        }

        function hideHint() {
            if (!state.hintVisible) return;
            const hint = document.getElementById('key-hint');
            if (hint) {
                hint.style.opacity = '0';
                hint.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    if (hint.parentNode) hint.parentNode.removeChild(hint);
                    state.hintVisible = false;
                }, 300);
            }
        }

        // ============================================
        // AUDIO SYSTEM
        // ============================================

        function getAudioContext() {
            if (!state.audioContext) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                state.audioContext = new AudioContext();
            }
            if (state.audioContext.state === 'suspended') {
                state.audioContext.resume();
            }
            return state.audioContext;
        }

        function playTone(freq, type) {
            const ctx = getAudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.type = 'triangle'; // Clearer, game-like tone
            osc.frequency.setValueAtTime(freq, ctx.currentTime);

            // Envelope
            const now = ctx.currentTime;
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.5, now + 0.02); // Attack
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8); // Decay

            osc.connect(gain);
            gain.connect(ctx.destination);

            osc.start(now);
            osc.stop(now + 0.8);
        }

        function playErrorSound() {
            const ctx = getAudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);

            const now = ctx.currentTime;
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

            osc.connect(gain);
            gain.connect(ctx.destination);

            osc.start(now);
            osc.stop(now + 0.3);
            
            // Haptic
            if (window.parent) {
               window.parent.postMessage({
                   origin: 'sekai_gaming_iframe_api',
                   type: 'gen_vibration',
                   taskId: 'vib_err',
                   data: { duration: 200 }
               }, '*');
            }
        }

        // ============================================
        // GAME LOGIC
        // ============================================

        function attachTouchEvents(element, keyId) {
            // Use pointerdown to consolidate touch and mouse events into a single interaction
            const handleInput = (e) => {
                // Ignore right clicks or other buttons
                if (e.pointerType === 'mouse' && e.button !== 0) return;
                if (state.isPlaying) return; 
                
                hideHint();

                // Visual feedback
                element.classList.add('active-touch');
                setTimeout(() => element.classList.remove('active-touch'), 150);

                // Logic
                const keyData = PIANO_KEYS.find(k => k.id === keyId);
                if (keyData) {
                    processNote(keyId, keyData.freq, element);
                }
            };

            element.addEventListener('pointerdown', handleInput);
        }

        function processNote(noteId, freq, element) {
            const expectedNote = TARGET_SEQUENCE[state.currentNoteIndex];
            
            if (noteId === expectedNote) {
                // Correct
                playTone(freq);
                handleCorrect(element);
            } else {
                // Wrong
                playErrorSound();
                handleWrong(element);
            }
        }

        function handleCorrect(element) {
            // Haptic
            window.parent.postMessage({
                origin: 'sekai_gaming_iframe_api',
                type: 'gen_vibration',
                taskId: 'vib_hit',
                data: { duration: 50 }
            }, '*');

            // UI Update
            updateSequenceDisplay(state.currentNoteIndex, true);
            state.currentNoteIndex++;

            if (state.currentNoteIndex >= TARGET_SEQUENCE.length) {
                setTimeout(startCelebration, 500);
            }
        }

        function handleWrong(element) {
            element.classList.add('error');
            setTimeout(() => element.classList.remove('error'), 300);

            // Screen Shake
            const piano = document.getElementById('screen-piano');
            piano.classList.remove('animate-shake');
            void piano.offsetWidth; // trigger reflow
            piano.classList.add('animate-shake');

            // Reset Sequence
            state.currentNoteIndex = 0;
            renderSequence(); // Reset UI
        }

        function updateSequenceDisplay(index, isCorrect) {
            const spans = document.querySelectorAll('.seq-note');
            
            // Mark current as done
            if (spans[index]) {
                spans[index].classList.remove('current');
                spans[index].classList.add('done');
            }
            
            // Highlight next
            if (spans[index + 1]) {
                spans[index + 1].classList.add('current');
            }
        }

        // ============================================
        // CELEBRATION MODE
        // ============================================

        function preloadAssets() {
            CONFIG.images.forEach(url => {
                const img = new Image();
                img.src = url;
            });
        }

        function startCelebration() {
            state.isPlaying = true;
            
            // Fade UI
            const pianoScreen = document.getElementById('screen-piano');
            const celebScreen = document.getElementById('screen-celebration');
            
            pianoScreen.style.transition = 'opacity 0.5s';
            pianoScreen.style.opacity = '0';
            
            setTimeout(() => {
                pianoScreen.style.display = 'none';
                celebScreen.style.opacity = '1';
                celebScreen.style.pointerEvents = 'auto';
                
                playCelebrationAudio();
                startImageRotation();
                startVisualizer();
            }, 500);
        }

        function playCelebrationAudio() {
            const ctx = getAudioContext();
            const audio = new Audio(CONFIG.audioURL);
            audio.crossOrigin = "anonymous";
            audio.loop = true;
            
            state.celebrationAudio = audio;

            // Connect to analyser
            const source = ctx.createMediaElementSource(audio);
            state.analyser = ctx.createAnalyser();
            state.analyser.fftSize = 64;
            
            source.connect(state.analyser);
            state.analyser.connect(ctx.destination);
            
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Autoplay blocked or failed", e));
        }

        function startImageRotation() {
            const img1 = document.getElementById('celeb-img-1');
            const img2 = document.getElementById('celeb-img-2');
            
            // Initial Setup
            img1.src = CONFIG.images[0];
            img1.style.opacity = 1;
            
            state.imageIndex = 0;
            let activeImg = 1; // 1 or 2
            
            state.isRotationActive = true;
            
            setInterval(() => {
                if (!state.isRotationActive) return;
                
                state.imageIndex = (state.imageIndex + 1) % CONFIG.images.length;
                const nextSrc = CONFIG.images[state.imageIndex];
                
                if (activeImg === 1) {
                    // Transition to 2
                    img2.src = nextSrc;
                    img2.style.opacity = 1;
                    img1.style.opacity = 0;
                    activeImg = 2;
                } else {
                    // Transition to 1
                    img1.src = nextSrc;
                    img1.style.opacity = 1;
                    img2.style.opacity = 0;
                    activeImg = 1;
                }
                
            }, CONFIG.imageRotationMs);
        }

        function startVisualizer() {
            const canvas = document.getElementById('visualizer-canvas');
            const ctx = canvas.getContext('2d');
            const analyser = state.analyser;
            
            // Resize canvas
            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight * 0.35;
            };
            window.addEventListener('resize', resize);
            resize();
            
            state.dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            function draw() {
                if (!state.isPlaying) return;
                requestAnimationFrame(draw);
                
                analyser.getByteFrequencyData(state.dataArray);
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const barWidth = (canvas.width / state.dataArray.length) * 2.5;
                let barHeight;
                let x = 0;
                
                // Gradient
                const gradient = ctx.createLinearGradient(0, canvas.height, 0, 0);
                gradient.addColorStop(0, '#FFD700'); 
                gradient.addColorStop(1, '#FFFACD');

                for(let i = 0; i < state.dataArray.length; i++) {
                    barHeight = state.dataArray[i]; // 0-255
                    
                    // Scale height to canvas
                    const scaledHeight = (barHeight / 255) * canvas.height;
                    
                    if (scaledHeight > 0) {
                        ctx.fillStyle = gradient;
                        
                        // Rounded Top Bar
                        const barX = x;
                        const barY = canvas.height - scaledHeight;
                        const radius = Math.min(barWidth / 2, scaledHeight / 2);
                        
                        ctx.beginPath();
                        ctx.moveTo(barX, canvas.height);
                        ctx.lineTo(barX, barY + radius);
                        ctx.quadraticCurveTo(barX, barY, barX + radius, barY);
                        ctx.lineTo(barX + barWidth - radius, barY);
                        ctx.quadraticCurveTo(barX + barWidth, barY, barX + barWidth, barY + radius);
                        ctx.lineTo(barX + barWidth, canvas.height);
                        ctx.closePath();
                        ctx.fill();
                    }
                    
                    x += barWidth + 1;
                }
            }
            draw();
        }

    </script>
