<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GameTok · Generation Logs</title>
<style>
  :root {
    --bg: #0c0e14; --panel: #151823; --panel2: #1c2030; --line: #272c3d;
    --text: #e7e9f0; --dim: #8b91a7; --ok: #38d39f; --bad: #ff5c6c; --accent: #6c8cff;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  header { padding: 20px 24px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  h1 { font-size: 18px; margin: 0; font-weight: 650; }
  .muted { color: var(--dim); }
  .cards { display: flex; gap: 12px; padding: 18px 24px; flex-wrap: wrap; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 18px; min-width: 130px; }
  .card .n { font-size: 24px; font-weight: 700; }
  .card .l { color: var(--dim); font-size: 12px; margin-top: 2px; }
  .controls { padding: 0 24px 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .controls button { background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 13px; }
  .controls button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 24px; border-bottom: 1px solid var(--line);
    vertical-align: top; }
  th { color: var(--dim); font-weight: 600; font-size: 12px; text-transform: uppercase;
    letter-spacing: .04em; position: sticky; top: 0; background: var(--bg); }
  tr.row { cursor: pointer; }
  tr.row:hover { background: var(--panel); }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px;
    font-weight: 600; }
  .pill.ok { background: rgba(56,211,159,.14); color: var(--ok); }
  .pill.bad { background: rgba(255,92,108,.14); color: var(--bad); }
  .pill.run { background: rgba(108,140,255,.16); color: var(--accent); }
  .pill.cancel { background: rgba(139,145,167,.16); color: var(--dim); }
  .tag { color: var(--dim); font-size: 12px; }
  .title { font-weight: 600; }
  .err { color: var(--bad); font-size: 12px; max-width: 360px; }
  .detail td { background: var(--panel2); }
  .detail pre { white-space: pre-wrap; word-break: break-word; margin: 0; color: var(--dim);
    font-size: 12px; }
  .detail .k { color: var(--text); font-weight: 600; }
  .logbox { max-height: 380px; overflow: auto; background: #0a0c12; border: 1px solid var(--line);
    border-radius: 8px; padding: 10px 12px; margin-top: 4px; white-space: pre-wrap;
    word-break: break-word; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px; line-height: 1.45; color: #aeb6cf; }
  .empty { padding: 60px 24px; text-align: center; color: var(--dim); }
</style>
</head>
<body>
  <header>
    <h1>🎮 GameTok Generations</h1>
    <span class="muted" id="updated">loading…</span>
    <span style="flex:1"></span>
    <button id="refresh" style="background:#1c2030;color:#e7e9f0;border:1px solid #272c3d;border-radius:8px;padding:6px 14px;cursor:pointer">↻ Refresh</button>
  </header>
  <div class="cards" id="cards"></div>
  <div class="controls">
    <button data-f="all" class="active">All</button>
    <button data-f="complete">✅ Success</button>
    <button data-f="failed">❌ Failed</button>
    <button data-f="running">⏳ Running</button>
    <button data-f="canceled">🚫 Canceled</button>
  </div>
  <table>
    <thead><tr>
      <th>Status</th><th>Game</th><th>Type</th><th>Duration</th><th>Detail</th><th>When</th><th>User</th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">No generations yet.</div>

<script>
  // Forward an optional ?key= (matches ADMIN_KEY on the server, if set) to the API.
  const KEY = new URLSearchParams(location.search).get('key');
  const apiUrl = '/api/admin/generation-logs?limit=200' + (KEY ? '&key=' + encodeURIComponent(KEY) : '');
  let all = [];
  let filter = 'all';

  function ago(ts) {
    if (!ts) return '—';
    const s = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
    if (s < 60) return s + 's ago';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    return Math.floor(s / 86400) + 'd ago';
  }
  function dur(ms) {
    if (ms == null) return '—';
    if (ms < 1000) return ms + 'ms';
    if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
    return Math.floor(ms / 60000) + 'm ' + Math.round((ms % 60000) / 1000) + 's';
  }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  }
  function statusPill(s) {
    if (s === 'complete') return '<span class="pill ok">✅ done</span>';
    if (s === 'failed') return '<span class="pill bad">❌ failed</span>';
    if (s === 'running' || s === 'queued') return '<span class="pill run">⏳ ' + esc(s) + '</span>';
    if (s === 'canceled') return '<span class="pill cancel">🚫 canceled</span>';
    return '<span class="pill run">' + esc(s) + '</span>';
  }

  function renderCards() {
    const total = all.length;
    const done = all.filter(r => r.status === 'complete').length;
    const failed = all.filter(r => r.status === 'failed').length;
    const finished = done + failed;
    const rate = finished ? Math.round((done / finished) * 100) : 0;
    const durs = all.filter(r => r.status === 'complete' && r.durationMs).map(r => r.durationMs);
    const avg = durs.length ? dur(Math.round(durs.reduce((a, b) => a + b, 0) / durs.length)) : '—';
    document.getElementById('cards').innerHTML =
      card(total, 'Total') + card(rate + '%', 'Success rate') +
      card(done, 'Succeeded') + card(failed, 'Failed') + card(avg, 'Avg build (success)');
  }
  function card(n, l) {
    return '<div class="card"><div class="n">' + esc(n) + '</div><div class="l">' + esc(l) + '</div></div>';
  }

  function renderRows() {
    const rows = all.filter(r => filter === 'all' ? true : r.status === filter);
    const tbody = document.getElementById('rows');
    document.getElementById('empty').style.display = rows.length ? 'none' : 'block';
    tbody.innerHTML = rows.map((r, i) => {
      const type = [r.dimension, r.lane].filter(Boolean).join(' · ') || '—';
      const game = r.resultTitle || r.prompt || '(untitled)';
      const detail = r.status === 'failed'
        ? '<span class="err">' + esc((r.error || '').slice(0, 220)) + '</span>'
        : '<span class="tag">' + esc(r.engine || '') + '</span>';
      const main = '<tr class="row" data-i="' + i + '" data-id="' + esc(r.id) + '">' +
        '<td>' + statusPill(r.status) + '</td>' +
        '<td><div class="title">' + esc(String(game).slice(0, 80)) + '</div></td>' +
        '<td><span class="tag">' + esc(type) + '</span></td>' +
        '<td>' + esc(dur(r.durationMs)) + '</td>' +
        '<td>' + detail + '</td>' +
        '<td class="tag">' + esc(ago(r.createdAt)) + '</td>' +
        '<td class="tag">' + esc(r.username || r.userId || '—') + '</td></tr>';
      const det = '<tr class="detail" id="det-' + i + '" style="display:none"><td colspan="7">' +
        '<div><span class="k">Prompt:</span> <pre>' + esc(r.prompt || '—') + '</pre></div>' +
        (r.error ? '<div style="margin-top:8px"><span class="k">Error:</span> <pre>' + esc(r.error) + '</pre></div>' : '') +
        '<div style="margin-top:8px" class="tag">job ' + esc(r.id) + ' · phase ' + esc(r.phase || '—') +
        ' · attempts ' + esc(r.attempts) + '</div>' +
        '<div style="margin-top:10px"><span class="k">Full generation log:</span>' +
        '<pre class="logbox" id="log-' + i + '">click row to load…</pre></div>' +
        '</td></tr>';
      return main + det;
    }).join('');
    tbody.querySelectorAll('tr.row').forEach(tr => tr.addEventListener('click', async () => {
      const i = tr.dataset.i;
      const d = document.getElementById('det-' + i);
      const opening = d.style.display === 'none';
      d.style.display = opening ? 'table-row' : 'none';
      if (!opening) return;
      const box = document.getElementById('log-' + i);
      if (!box || box.dataset.loaded) return;
      box.dataset.loaded = '1';
      box.textContent = 'loading log…';
      try {
        const url = '/api/admin/generation-logs/' + encodeURIComponent(tr.dataset.id) + (KEY ? '?key=' + encodeURIComponent(KEY) : '');
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        box.textContent = data.log || '(no full log captured — this generation ran before log capture was deployed, or produced no output)';
        box.scrollTop = box.scrollHeight;
      } catch (e) {
        box.dataset.loaded = '';
        box.textContent = 'failed to load log: ' + e.message;
      }
    }));
  }

  async function load() {
    document.getElementById('updated').textContent = 'loading…';
    try {
      const res = await fetch(apiUrl);
      if (!res.ok) throw new Error('HTTP ' + res.status + (res.status === 401 ? ' — add ?key=YOUR_ADMIN_KEY to the URL' : ''));
      all = await res.json();
      renderCards();
      renderRows();
      document.getElementById('updated').textContent = 'updated ' + new Date().toLocaleTimeString();
    } catch (e) {
      document.getElementById('updated').textContent = 'error: ' + e.message;
    }
  }

  document.querySelectorAll('.controls button[data-f]').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.controls button[data-f]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    filter = b.dataset.f;
    renderRows();
  }));
  document.getElementById('refresh').addEventListener('click', load);
  load();
  setInterval(load, 30000); // light auto-refresh
</script>
</body>
</html>
