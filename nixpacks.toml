[phases.setup]
nixPkgs = ["...", "nodejs_20", "git", "ffmpeg", "python3", "unzip"]
aptPkgs = [
    "...",
    "git",
    "fonts-liberation",
    "libappindicator3-1",
    "libasound2",
    "libatk-bridge2.0-0",
    "libatk1.0-0",
    "libgbm1",
    "libgtk-3-0",
    "libnspr4",
    "libnss3",
    "libx11-xcb1",
    "libxcomposite1",
    "libxdamage1",
    "libxfixes3",
    "libxi6",
    "libxrandr2",
    "libxss1",
    "libxtst6",
    "libdrm2",
    "libxkbcommon0",
    "libxshmfence1"
]

[phases.install]
cmds = [
    "npm ci",
    "curl -fsSL https://code.kimi.com/kimi-code/install.sh | bash",
    "ln -sf $HOME/.kimi-code/bin/kimi /usr/local/bin/kimi || ln -sf /root/.kimi-code/bin/kimi /usr/local/bin/kimi || ln -sf /home/nixpacks/.kimi-code/bin/kimi /usr/local/bin/kimi || true"
]

[variables]
NIXPACKS_NODE_VERSION = "20"
GAMETOK_MAKER_AGENT_IMPLEMENT_TURNS = "2"
