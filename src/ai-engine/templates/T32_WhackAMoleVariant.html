<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let gameOver = false;
let moles = [];
let moleHoles = [];
let moleSpeed = params.speed;
let moleSize = 50;
let holeSize = 100;
let canvasWidth = canvas.width = window.innerWidth;
let canvasHeight = canvas.height = window.innerHeight;

// Initialize mole holes
for (let i = 0; i < 9; i++) {
  moleHoles.push({
    x: (i % 3) * (holeSize + 20) + 20,
    y: Math.floor(i / 3) * (holeSize + 20) + 20,
  });
}

// Initialize moles
for (let i = 0; i < 9; i++) {
  moles.push({
    x: moleHoles[i].x + holeSize / 2 - moleSize / 2,
    y: moleHoles[i].y + holeSize / 2 - moleSize / 2,
    visible: false,
    timer: 0,
  });
}

function draw() {
  ctx.fillStyle = params.bgColor;
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  // Draw mole holes
  ctx.fillStyle = '#444';
  for (let i = 0; i < moleHoles.length; i++) {
    ctx.fillRect(moleHoles[i].x, moleHoles[i].y, holeSize, holeSize);
  }

  // Draw moles
  ctx.fillStyle = '#fff';
  for (let i = 0; i < moles.length; i++) {
    if (moles[i].visible) {
      ctx.fillRect(moles[i].x, moles[i].y, moleSize, moleSize);
    }
  }

  // Update mole timers
  for (let i = 0; i < moles.length; i++) {
    if (moles[i].visible) {
      moles[i].timer -= 1 / 60;
      if (moles[i].timer <= 0) {
        moles[i].visible = false;
      }
    } else {
      moles[i].timer += 1 / 60;
      if (moles[i].timer >= moleSpeed) {
        moles[i].visible = true;
        moles[i].timer = moleSpeed;
      }
    }
  }

  // Update score
  scoreSpan.textContent = score;

  // Check for game over
  if (gameOver) {
    finalScoreSpan.textContent = score;
    gameOverDiv.style.display = 'flex';
  }
}

function handleMouseDown(event) {
  if (gameOver) return;

  const rect = canvas.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;

  // Check if mole was clicked
  for (let i = 0; i < moles.length; i++) {
    if (moles[i].visible && x >= moles[i].x && x <= moles[i].x + moleSize && y >= moles[i].y && y <= moles[i].y + moleSize) {
      moles[i].visible = false;
      score++;
    }
  }
}

function handleRestart() {
  gameOver = false;
  score = 0;
  for (let i = 0; i < moles.length; i++) {
    moles[i].visible = false;
    moles[i].timer = 0;
  }
  gameOverDiv.style.display = 'none';
}

canvas.addEventListener('mousedown', handleMouseDown);
restartBtn.addEventListener('click', handleRestart);

function loop() {
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
