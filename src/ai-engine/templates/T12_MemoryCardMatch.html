<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let gameOver = false;
let cards = [];
let flippedCards = [];
let cardWidth = 100;
let cardHeight = 150;
let cardSpacing = 20;
let cardRows = 4;
let cardCols = 4;
let cardCount = cardRows * cardCols;
let cardValues = Array.from({length: cardCount / 2}, (_, i) => i).concat(Array.from({length: cardCount / 2}, (_, i) => i));

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function createCards() {
  cards = [];
  for (let i = 0; i < cardCount; i++) {
    const card = {
      x: (i % cardCols) * (cardWidth + cardSpacing),
      y: Math.floor(i / cardCols) * (cardHeight + cardSpacing),
      value: cardValues[i],
      flipped: false,
    };
    cards.push(card);
  }
  shuffleArray(cards);
}

function drawCards() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < cardCount; i++) {
    const card = cards[i];
    if (card.flipped) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(card.x, card.y, cardWidth, cardHeight);
      ctx.font = '36px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#222';
      ctx.fillText(card.value, card.x + cardWidth / 2, card.y + cardHeight / 2);
    } else {
      ctx.fillStyle = '#333';
      ctx.fillRect(card.x, card.y, cardWidth, cardHeight);
    }
  }
}

function checkMatch() {
  if (flippedCards.length === 2) {
    const card1 = flippedCards[0];
    const card2 = flippedCards[1];
    if (card1.value === card2.value) {
      score++;
      scoreSpan.textContent = score;
      flippedCards = [];
    } else {
      setTimeout(() => {
        card1.flipped = false;
        card2.flipped = false;
        flippedCards = [];
        drawCards();
      }, 1000);
    }
  }
}

function handleCardClick(event) {
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;
  for (let i = 0; i < cardCount; i++) {
    const card = cards[i];
    if (x >= card.x && x <= card.x + cardWidth && y >= card.y && y <= card.y + cardHeight) {
      if (!card.flipped) {
        card.flipped = true;
        flippedCards.push(card);
        drawCards();
        checkMatch();
      }
    }
  }
}

function handleRestartClick() {
  gameOver = false;
  score = 0;
  scoreSpan.textContent = score;
  createCards();
  drawCards();
  gameOverDiv.style.display = 'none';
}

function update() {
  if (gameOver) return;
  if (score === cardCount / 2) {
    gameOver = true;
    finalScoreSpan.textContent = score;
    gameOverDiv.style.display = 'flex';
  }
  requestAnimationFrame(update);
}

canvas.width = cardCols * (cardWidth + cardSpacing);
canvas.height = cardRows * (cardHeight + cardSpacing);
createCards();
drawCards();
canvas.addEventListener('click', handleCardClick);
restartBtn.addEventListener('click', handleRestartClick);
update();
</script>
</body>
</html>
