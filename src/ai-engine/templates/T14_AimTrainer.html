<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let gameOver = false;
let targets = [];
let targetSpeed = params.speed;
let targetSize = 50;
let targetColor = '#fff';
let targetSpawnInterval = 1000;
let targetSpawnTimeout = null;
let lastTargetSpawnTime = 0;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function spawnTarget() {
  const target = {
    x: Math.random() * (canvas.width - targetSize),
    y: Math.random() * (canvas.height - targetSize),
    width: targetSize,
    height: targetSize,
    color: targetColor,
  };
  targets.push(target);
  lastTargetSpawnTime = Date.now();
  targetSpawnTimeout = setTimeout(spawnTarget, targetSpawnInterval);
}

function drawTargets() {
  targets.forEach((target, index) => {
    ctx.fillStyle = target.color;
    ctx.fillRect(target.x, target.y, target.width, target.height);
    target.y += targetSpeed;
    if (target.y > canvas.height) {
      targets.splice(index, 1);
    }
  });
}

function draw() {
  ctx.fillStyle = params.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawTargets();
}

function handleMouseDown(event) {
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;
  targets.forEach((target, index) => {
    if (x > target.x && x < target.x + target.width && y > target.y && y < target.y + target.height) {
      targets.splice(index, 1);
      score++;
      scoreSpan.textContent = score;
    }
  });
}

function handleGameOver() {
  gameOver = true;
  finalScoreSpan.textContent = score;
  gameOverDiv.style.display = 'flex';
  clearTimeout(targetSpawnTimeout);
}

function handleRestart() {
  gameOver = false;
  score = 0;
  scoreSpan.textContent = score;
  targets = [];
  gameOverDiv.style.display = 'none';
  spawnTarget();
}

function update() {
  if (!gameOver) {
    draw();
    if (Date.now() - lastTargetSpawnTime > targetSpawnInterval) {
      spawnTarget();
    }
  }
  requestAnimationFrame(update);
}

canvas.addEventListener('mousedown', handleMouseDown);
restartBtn.addEventListener('click', handleRestart);

update();
spawnTarget();
</script>
</body>
</html>
