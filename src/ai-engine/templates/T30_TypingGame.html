<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let gameOver = false;
let words = ['apple', 'banana', 'cherry', 'date', 'elderberry', 'fig', 'grape'];
let currentWord = '';
let typedWord = '';
let wordX = 0;
let wordY = 0;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function draw() {
  ctx.fillStyle = params.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (!gameOver) {
    ctx.font = '24px Arial';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(currentWord, wordX, wordY);

    if (wordY > canvas.height) {
      gameOver = true;
    } else {
      wordY += params.speed;
    }
  } else {
    finalScoreSpan.textContent = score;
    gameOverDiv.style.display = 'flex';
  }
}

function update() {
  if (!gameOver) {
    if (typedWord === currentWord) {
      score++;
      scoreSpan.textContent = score;
      typedWord = '';
      currentWord = words[Math.floor(Math.random() * words.length)];
      wordX = Math.random() * (canvas.width - 100);
      wordY = 0;
    }
  }
}

function handleInput(e) {
  if (!gameOver) {
    typedWord += e.key;
    if (typedWord.length > currentWord.length) {
      typedWord = typedWord.slice(0, currentWord.length);
    }
    if (e.key === 'Backspace') {
      typedWord = typedWord.slice(0, -1);
    }
  }
}

function handleRestart() {
  gameOver = false;
  score = 0;
  scoreSpan.textContent = score;
  typedWord = '';
  currentWord = words[Math.floor(Math.random() * words.length)];
  wordX = Math.random() * (canvas.width - 100);
  wordY = 0;
  gameOverDiv.style.display = 'none';
}

document.addEventListener('keydown', handleInput);
restartBtn.addEventListener('click', handleRestart);

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
