<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const gameParams = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let gameOver = false;
let triviaQuestions = [
  { question: 'What is the capital of France?', answers: ['Paris', 'London', 'Berlin', 'Rome'], correct: 0 },
  { question: 'What is the largest planet in our solar system?', answers: ['Earth', 'Saturn', 'Jupiter', 'Uranus'], correct: 2 },
  { question: 'Who painted the Mona Lisa?', answers: ['Leonardo da Vinci', 'Michelangelo', 'Raphael', 'Caravaggio'], correct: 0 },
  // Add more questions here...
];
let currentQuestion = 0;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function draw() {
  ctx.fillStyle = gameParams.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (!gameOver) {
    ctx.font = '24px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText(triviaQuestions[currentQuestion].question, canvas.width / 2, canvas.height / 2 - 50);

    for (let i = 0; i < triviaQuestions[currentQuestion].answers.length; i++) {
      ctx.fillText(triviaQuestions[currentQuestion].answers[i], canvas.width / 2, canvas.height / 2 + i * 30);
    }
  } else {
    finalScoreSpan.textContent = score;
    gameOverDiv.style.display = 'flex';
  }
}

function update() {
  if (!gameOver) {
    // Check for user input (e.g., mouse click or keyboard press)
    // For simplicity, let's assume the user can only answer by clicking on the correct answer
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      // Check if the user clicked on the correct answer
      if (y > canvas.height / 2 - 50 && y < canvas.height / 2 + 50) {
        const answerIndex = Math.floor((y - (canvas.height / 2 - 50)) / 30);
        if (answerIndex === triviaQuestions[currentQuestion].correct) {
          score++;
          scoreSpan.textContent = score;
        } else {
          gameOver = true;
        }

        // Move to the next question
        currentQuestion = (currentQuestion + 1) % triviaQuestions.length;
      }
    });
  } else {
    restartBtn.addEventListener('click', () => {
      gameOver = false;
      score = 0;
      scoreSpan.textContent = score;
      currentQuestion = 0;
      gameOverDiv.style.display = 'none';
    });
  }
}

function loop() {
  draw();
  update();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
