<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let gameOver = false;
let player = { x: canvas.width / 2, y: canvas.height / 2, radius: 20 };
let spikes = [];

function init() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  ctx.fillStyle = params.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  player.x = canvas.width / 2;
  player.y = canvas.height / 2;
  score = 0;
  spikes = [];
  gameOver = false;
  scoreSpan.textContent = score;
  gameOverDiv.style.display = 'none';
}

function update() {
  if (!gameOver) {
    score++;
    scoreSpan.textContent = score;
    ctx.fillStyle = params.bgColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, 2 * Math.PI);
    ctx.fill();
    if (Math.random() < 0.05) {
      spikes.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, radius: 10 });
    }
    for (let i = 0; i < spikes.length; i++) {
      ctx.fillStyle = '#f00';
      ctx.beginPath();
      ctx.arc(spikes[i].x, spikes[i].y, spikes[i].radius, 0, 2 * Math.PI);
      ctx.fill();
      if (Math.hypot(player.x - spikes[i].x, player.y - spikes[i].y) < player.radius + spikes[i].radius) {
        gameOver = true;
      }
    }
    if (gameOver) {
      finalScoreSpan.textContent = score;
      gameOverDiv.style.display = 'flex';
    }
  }
}

function handleInput(event) {
  if (event.type === 'touchmove' || event.type === 'mousemove') {
    player.x = event.clientX || event.touches[0].clientX;
    player.y = event.clientY || event.touches[0].clientY;
  }
}

document.addEventListener('mousemove', handleInput);
document.addEventListener('touchmove', handleInput);
restartBtn.addEventListener('click', init);

init();
function loop() {
  update();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
