<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let gameOver = false;
let playerX = canvas.width / 2;
let playerY = canvas.height - 50;
let playerWidth = 50;
let playerHeight = 50;
let playerSpeed = 5;
let obstacleSpeed = params.speed;
let obstacleWidth = 50;
let obstacleHeight = 50;
let obstacles = [];
let lanes = [canvas.width / 3, canvas.width / 3 * 2];

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function drawBackground() {
  ctx.fillStyle = params.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawPlayer() {
  ctx.fillStyle = '#fff';
  ctx.fillRect(playerX, playerY, playerWidth, playerHeight);
}

function drawObstacles() {
  obstacles.forEach((obstacle, index) => {
    ctx.fillStyle = '#fff';
    ctx.fillRect(obstacle.x, obstacle.y, obstacleWidth, obstacleHeight);
    obstacle.y += obstacleSpeed;
    if (obstacle.y > canvas.height) {
      obstacles.splice(index, 1);
    }
  });
}

function updateObstacles() {
  if (Math.random() < 0.05) {
    const lane = lanes[Math.floor(Math.random() * lanes.length)];
    obstacles.push({ x: lane - obstacleWidth / 2, y: -obstacleHeight });
  }
}

function checkCollisions() {
  obstacles.forEach((obstacle) => {
    if (checkCollision(playerX, playerY, playerWidth, playerHeight, obstacle.x, obstacle.y, obstacleWidth, obstacleHeight)) {
      gameOver = true;
    }
  });
}

function checkCollision(x1, y1, w1, h1, x2, y2, w2, h2) {
  if (x1 + w1 > x2 && x1 < x2 + w2 && y1 + h1 > y2 && y1 < y2 + h2) {
    return true;
  }
  return false;
}

function updateScore() {
  score++;
  scoreSpan.textContent = score;
}

function drawGameOver() {
  gameOverDiv.style.display = 'flex';
  finalScoreSpan.textContent = score;
}

function handleRestart() {
  gameOver = false;
  score = 0;
  scoreSpan.textContent = score;
  obstacles = [];
  playerX = canvas.width / 2;
  playerY = canvas.height - 50;
  gameOverDiv.style.display = 'none';
}

function handleKeyDown(event) {
  if (event.key === 'ArrowLeft' && playerX > 0) {
    playerX -= playerSpeed;
  } else if (event.key === 'ArrowRight' && playerX < canvas.width - playerWidth) {
    playerX += playerSpeed;
  }
}

document.addEventListener('keydown', handleKeyDown);
restartBtn.addEventListener('click', handleRestart);

function loop() {
  if (!gameOver) {
    drawBackground();
    drawPlayer();
    drawObstacles();
    updateObstacles();
    checkCollisions();
    updateScore();
  } else {
    drawGameOver();
  }
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
