<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let playerX = canvas.width / 2;
let playerY = canvas.height / 2;
let playerSpeedX = 0;
let playerSpeedY = 0;
let gravity = 0.1;
let jumpSpeed = -5;
let platforms = [];
let platformWidth = 100;
let platformHeight = 20;
let platformGap = 100;
let platformSpeed = params.speed;

function createPlatform() {
  const platformX = Math.random() * (canvas.width - platformWidth);
  const platformY = canvas.height - platformHeight - Math.random() * platformGap;
  platforms.push({ x: platformX, y: platformY });
}

function drawPlatform(platform) {
  ctx.fillStyle = '#fff';
  ctx.fillRect(platform.x, platform.y, platformWidth, platformHeight);
}

function updatePlatform(platform) {
  platform.y += platformSpeed;
  if (platform.y > canvas.height) {
    platforms.splice(platforms.indexOf(platform), 1);
    createPlatform();
  }
}

function drawPlayer() {
  ctx.fillStyle = '#fff';
  ctx.fillRect(playerX, playerY, 20, 20);
}

function updatePlayer() {
  playerX += playerSpeedX;
  playerY += playerSpeedY;
  playerSpeedY += gravity;
  if (playerY + 20 > canvas.height) {
    playerY = canvas.height - 20;
    playerSpeedY = 0;
  }
  if (playerX < 0) {
    playerX = 0;
  } else if (playerX + 20 > canvas.width) {
    playerX = canvas.width - 20;
  }
}

function checkCollision(platform) {
  if (playerX + 20 > platform.x && playerX < platform.x + platformWidth && playerY + 20 > platform.y && playerY < platform.y + platformHeight) {
    playerY = platform.y - 20;
    playerSpeedY = 0;
  }
}

function draw() {
  ctx.fillStyle = params.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawPlayer();
  platforms.forEach(drawPlatform);
  ctx.font = '24px Arial';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(`Score: ${score}`, 10, 10);
}

function update() {
  updatePlayer();
  platforms.forEach(updatePlatform);
  platforms.forEach(checkCollision);
  score++;
}

function handleInput(event) {
  if (event.key === 'ArrowLeft') {
    playerSpeedX = -5;
  } else if (event.key === 'ArrowRight') {
    playerSpeedX = 5;
  } else if (event.key === 'ArrowUp' && playerSpeedY === 0) {
    playerSpeedY = jumpSpeed;
  }
}

function handleInputRelease(event) {
  if (event.key === 'ArrowLeft' || event.key === 'ArrowRight') {
    playerSpeedX = 0;
  }
}

function gameOver() {
  gameOverDiv.style.display = 'flex';
  finalScoreSpan.textContent = score;
  score = 0;
  playerX = canvas.width / 2;
  playerY = canvas.height / 2;
  playerSpeedX = 0;
  playerSpeedY = 0;
  platforms = [];
  createPlatform();
}

function restart() {
  gameOverDiv.style.display = 'none';
}

document.addEventListener('keydown', handleInput);
document.addEventListener('keyup', handleInputRelease);
restartBtn.addEventListener('click', restart);

createPlatform();

function loop() {
  update();
  draw();
  if (playerY > canvas.height) {
    gameOver();
  }
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
