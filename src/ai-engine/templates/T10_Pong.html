<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let gameOver = false;
let ball = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  vx: params.speed,
  vy: params.speed,
  radius: 10
};
let paddle = {
  x: canvas.width - 20,
  y: canvas.height / 2,
  width: 10,
  height: 100,
  speed: params.speed * 2
};
let opponentPaddle = {
  x: 10,
  y: canvas.height / 2,
  width: 10,
  height: 100,
  speed: params.speed * 2
};

function draw() {
  ctx.fillStyle = params.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
  ctx.fillRect(opponentPaddle.x, opponentPaddle.y, opponentPaddle.width, opponentPaddle.height);
  ctx.font = '24px Arial';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(`Score: ${score}`, 10, 10);
}

function update() {
  if (!gameOver) {
    // Move the ball
    ball.x += ball.vx;
    ball.y += ball.vy;

    // Collision with top and bottom
    if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
      ball.vy = -ball.vy;
    }

    // Collision with paddles
    if (ball.x + ball.radius > paddle.x && ball.y > paddle.y && ball.y < paddle.y + paddle.height) {
      ball.vx = -ball.vx;
      score++;
      scoreSpan.textContent = score;
    } else if (ball.x - ball.radius < opponentPaddle.x + opponentPaddle.width && ball.y > opponentPaddle.y && ball.y < opponentPaddle.y + opponentPaddle.height) {
      ball.vx = -ball.vx;
      score++;
      scoreSpan.textContent = score;
    }

    // Collision with left and right
    if (ball.x + ball.radius > canvas.width) {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
      ball.vx = -ball.vx;
    } else if (ball.x - ball.radius < 0) {
      gameOver = true;
      finalScoreSpan.textContent = score;
      gameOverDiv.style.display = 'flex';
    }

    // Move the paddles
    if (ball.y > paddle.y + paddle.height / 2) {
      paddle.y += paddle.speed;
    } else if (ball.y < paddle.y + paddle.height / 2) {
      paddle.y -= paddle.speed;
    }

    if (ball.y > opponentPaddle.y + opponentPaddle.height / 2) {
      opponentPaddle.y += opponentPaddle.speed;
    } else if (ball.y < opponentPaddle.y + opponentPaddle.height / 2) {
      opponentPaddle.y -= opponentPaddle.speed;
    }

    // Boundary checking for paddles
    if (paddle.y < 0) {
      paddle.y = 0;
    } else if (paddle.y + paddle.height > canvas.height) {
      paddle.y = canvas.height - paddle.height;
    }

    if (opponentPaddle.y < 0) {
      opponentPaddle.y = 0;
    } else if (opponentPaddle.y + opponentPaddle.height > canvas.height) {
      opponentPaddle.y = canvas.height - opponentPaddle.height;
    }
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

restartBtn.addEventListener('click', () => {
  gameOver = false;
  gameOverDiv.style.display = 'none';
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;
  ball.vx = params.speed;
  ball.vy = params.speed;
  paddle.y = canvas.height / 2;
  opponentPaddle.y = canvas.height / 2;
  score = 0;
  scoreSpan.textContent = score;
});

loop();
</script>
</body>
</html>
