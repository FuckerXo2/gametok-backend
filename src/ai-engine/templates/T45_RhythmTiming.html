<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let lastTime = 0;
let rhythmInterval = 1000; // initial interval in ms
let rhythmTimeout = null;
let isGameOver = false;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function draw() {
  ctx.fillStyle = params.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';
  ctx.font = '24px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Tap when the circle is in the middle', canvas.width / 2, canvas.height / 2 - 50);
  ctx.beginPath();
  ctx.arc(canvas.width / 2, canvas.height / 2, 20, 0, 2 * Math.PI);
  ctx.fillStyle = '#fff';
  ctx.fill();
}

function update(time) {
  if (isGameOver) return;
  const dt = time - lastTime;
  lastTime = time;
  if (rhythmTimeout === null) {
    rhythmTimeout = setTimeout(() => {
      const circleX = canvas.width / 2 + Math.sin(time / 1000) * canvas.width / 2;
      ctx.fillStyle = params.bgColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = '24px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Tap when the circle is in the middle', canvas.width / 2, canvas.height / 2 - 50);
      ctx.beginPath();
      ctx.arc(circleX, canvas.height / 2, 20, 0, 2 * Math.PI);
      ctx.fillStyle = '#fff';
      ctx.fill();
      rhythmTimeout = null;
      if (Math.abs(circleX - canvas.width / 2) < 10) {
        score++;
        scoreSpan.textContent = score;
      }
    }, rhythmInterval);
  }
}

function handleTap(event) {
  if (isGameOver) return;
  const tapX = event.clientX;
  const circleX = canvas.width / 2 + Math.sin(Date.now() / 1000) * canvas.width / 2;
  if (Math.abs(tapX - circleX) < 10) {
    score++;
    scoreSpan.textContent = score;
  } else {
    isGameOver = true;
    gameOverDiv.style.display = 'flex';
    finalScoreSpan.textContent = score;
  }
}

function handleRestart() {
  isGameOver = false;
  score = 0;
  scoreSpan.textContent = score;
  gameOverDiv.style.display = 'none';
  lastTime = 0;
  rhythmTimeout = null;
}

canvas.addEventListener('click', handleTap);
restartBtn.addEventListener('click', handleRestart);

function loop(time) {
  draw();
  update(time);
  requestAnimationFrame(loop);
}

loop(0);
</script>
</body>
</html>
