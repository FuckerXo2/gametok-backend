<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let gameOver = false;
let frogger = { x: canvas.width / 2, y: canvas.height - 50, width: 50, height: 50, speed: 5 };
let cars = [];
let logs = [];

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function draw() {
  ctx.fillStyle = params.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = 'green';
  ctx.fillRect(frogger.x, frogger.y, frogger.width, frogger.height);

  for (let i = 0; i < cars.length; i++) {
    ctx.fillStyle = 'red';
    ctx.fillRect(cars[i].x, cars[i].y, cars[i].width, cars[i].height);
  }

  for (let i = 0; i < logs.length; i++) {
    ctx.fillStyle = 'brown';
    ctx.fillRect(logs[i].x, logs[i].y, logs[i].width, logs[i].height);
  }

  scoreSpan.textContent = score;
}

function update() {
  if (!gameOver) {
    if (Math.random() < 0.05) {
      cars.push({ x: 0, y: Math.random() * (canvas.height - 50), width: 50, height: 50, speed: params.speed });
    }

    if (Math.random() < 0.05) {
      logs.push({ x: 0, y: Math.random() * (canvas.height - 50), width: 50, height: 50, speed: params.speed / 2 });
    }

    for (let i = 0; i < cars.length; i++) {
      cars[i].x += cars[i].speed;

      if (cars[i].x > canvas.width) {
        cars.splice(i, 1);
      }

      if (checkCollision(frogger, cars[i])) {
        gameOver = true;
      }
    }

    for (let i = 0; i < logs.length; i++) {
      logs[i].x += logs[i].speed;

      if (logs[i].x > canvas.width) {
        logs.splice(i, 1);
      }

      if (checkCollision(frogger, logs[i])) {
        score++;
        logs.splice(i, 1);
      }
    }

    if (frogger.y < 0) {
      gameOver = true;
    }
  }
}

function checkCollision(rect1, rect2) {
  return rect1.x < rect2.x + rect2.width &&
         rect1.x + rect1.width > rect2.x &&
         rect1.y < rect2.y + rect2.height &&
         rect1.y + rect1.height > rect2.y;
}

function handleInput(event) {
  if (event.key === 'ArrowUp') {
    frogger.y -= frogger.speed;
  }

  if (event.key === 'ArrowDown') {
    frogger.y += frogger.speed;
  }

  if (event.key === 'ArrowLeft') {
    frogger.x -= frogger.speed;
  }

  if (event.key === 'ArrowRight') {
    frogger.x += frogger.speed;
  }
}

function restart() {
  gameOver = false;
  score = 0;
  frogger.x = canvas.width / 2;
  frogger.y = canvas.height - 50;
  cars = [];
  logs = [];
  gameOverDiv.style.display = 'none';
}

document.addEventListener('keydown', handleInput);
restartBtn.addEventListener('click', restart);

function loop() {
  if (gameOver) {
    finalScoreSpan.textContent = score;
    gameOverDiv.style.display = 'flex';
  }

  draw();
  update();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
