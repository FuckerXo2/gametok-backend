<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let gameOver = false;
let ball = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  vx: 0,
  vy: 0,
  radius: 10,
  color: getRandomColor()
};
let obstacles = [];
let obstacleSpeed = params.speed;

function init() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;
  ball.vx = Math.random() * 2 - 1;
  ball.vy = Math.random() * 2 - 1;
  obstacles = [];
  score = 0;
  gameOver = false;
  scoreSpan.textContent = score;
  gameOverDiv.style.display = 'none';
  requestAnimationFrame(update);
}

function update() {
  if (!gameOver) {
    ctx.fillStyle = params.bgColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    updateBall();
    updateObstacles();
    drawBall();
    drawObstacles();
    score++;
    scoreSpan.textContent = score;
  }
  requestAnimationFrame(update);
}

function updateBall() {
  ball.x += ball.vx;
  ball.y += ball.vy;
  if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
    ball.vx *= -1;
  }
  if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
    ball.vy *= -1;
  }
}

function updateObstacles() {
  if (Math.random() < 0.05) {
    obstacles.push({
      x: Math.random() * canvas.width,
      y: 0,
      vx: 0,
      vy: obstacleSpeed,
      radius: 20,
      color: getRandomColor()
    });
  }
  for (let i = 0; i < obstacles.length; i++) {
    obstacles[i].y += obstacles[i].vy;
    if (obstacles[i].y > canvas.height) {
      obstacles.splice(i, 1);
    }
    if (checkCollision(ball, obstacles[i])) {
      gameOver = true;
    }
  }
}

function drawBall() {
  ctx.fillStyle = ball.color;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, 2 * Math.PI);
  ctx.fill();
}

function drawObstacles() {
  for (let i = 0; i < obstacles.length; i++) {
    ctx.fillStyle = obstacles[i].color;
    ctx.beginPath();
    ctx.arc(obstacles[i].x, obstacles[i].y, obstacles[i].radius, 0, 2 * Math.PI);
    ctx.fill();
  }
}

function checkCollision(ball, obstacle) {
  const distance = Math.sqrt((ball.x - obstacle.x) ** 2 + (ball.y - obstacle.y) ** 2);
  return distance < ball.radius + obstacle.radius;
}

function getRandomColor() {
  const colors = ['#FF69B4', '#33CC33', '#6666CC', '#CC6666', '#66CCCC'];
  return colors[Math.floor(Math.random() * colors.length)];
}

init();
restartBtn.addEventListener('click', init);
</script>
</body>
</html>
