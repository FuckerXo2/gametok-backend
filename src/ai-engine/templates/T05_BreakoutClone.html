<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let ball = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  vx: params.speed,
  vy: params.speed,
  radius: 10
};
let paddle = {
  x: canvas.width / 2,
  y: canvas.height - 20,
  width: 100,
  height: 20,
  speed: params.speed
};
let bricks = [];
for (let i = 0; i < 5; i++) {
  for (let j = 0; j < 10; j++) {
    bricks.push({
      x: j * 60 + 10,
      y: i * 30 + 10,
      width: 50,
      height: 20
    });
  }
}

function draw() {
  ctx.fillStyle = params.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
  for (let brick of bricks) {
    ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
  }
  scoreSpan.textContent = score;
}

function update() {
  ball.x += ball.vx;
  ball.y += ball.vy;
  if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
    ball.vx = -ball.vx;
  }
  if (ball.y - ball.radius < 0) {
    ball.vy = -ball.vy;
  }
  if (ball.y + ball.radius > canvas.height) {
    gameOver();
  }
  if (ball.y + ball.radius > paddle.y && ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
    ball.vy = -ball.vy;
  }
  for (let brick of bricks) {
    if (ball.x + ball.radius > brick.x && ball.x - ball.radius < brick.x + brick.width && ball.y + ball.radius > brick.y && ball.y - ball.radius < brick.y + brick.height) {
      bricks.splice(bricks.indexOf(brick), 1);
      ball.vy = -ball.vy;
      score++;
    }
  }
  if (bricks.length === 0) {
    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
    bricks = [];
    for (let i = 0; i < 5; i++) {
      for (let j = 0; j < 10; j++) {
        bricks.push({
          x: j * 60 + 10,
          y: i * 30 + 10,
          width: 50,
          height: 20
        });
      }
    }
  }
}

function gameOver() {
  gameOverDiv.style.display = 'flex';
  finalScoreSpan.textContent = score;
}

function restart() {
  gameOverDiv.style.display = 'none';
  score = 0;
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;
  paddle.x = canvas.width / 2;
  bricks = [];
  for (let i = 0; i < 5; i++) {
    for (let j = 0; j < 10; j++) {
      bricks.push({
        x: j * 60 + 10,
        y: i * 30 + 10,
        width: 50,
        height: 20
      });
    }
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') {
    paddle.x -= paddle.speed;
  }
  if (e.key === 'ArrowRight') {
    paddle.x += paddle.speed;
  }
  if (paddle.x < 0) {
    paddle.x = 0;
  }
  if (paddle.x + paddle.width > canvas.width) {
    paddle.x = canvas.width - paddle.width;
  }
});

restartBtn.addEventListener('click', restart);

function loop() {
  draw();
  update();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
