<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let gameOver = false;
let skierX = canvas.width / 2;
let skierY = canvas.height - 50;
let gates = [];
let gateWidth = 50;
let gateHeight = 50;
let gateGap = 200;
let gateSpeed = params.speed;

function createGate() {
  const gateX = Math.random() * (canvas.width - gateWidth);
  const gateY = -gateHeight;
  gates.push({ x: gateX, y: gateY });
}

function update() {
  if (!gameOver) {
    score++;
    scoreSpan.textContent = score;

    skierX += (canvas.width / 2 - skierX) / 10;

    gates.forEach((gate, index) => {
      gate.y += gateSpeed;
      if (gate.y > canvas.height) {
        gates.splice(index, 1);
      }
      if (gate.y + gateHeight > skierY && gate.y < skierY + 50 && gate.x < skierX + 50 && gate.x + gateWidth > skierX) {
        gameOver = true;
      }
    });

    if (Math.random() < 0.05) {
      createGate();
    }
  }
}

function render() {
  ctx.fillStyle = params.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#fff';
  ctx.fillRect(skierX, skierY, 50, 50);

  gates.forEach(gate => {
    ctx.fillStyle = '#fff';
    ctx.fillRect(gate.x, gate.y, gateWidth, gateHeight);
  });

  if (gameOver) {
    gameOverDiv.style.display = 'flex';
    finalScoreSpan.textContent = score;
  }
}

function handleMouseMove(event) {
  if (!gameOver) {
    skierX = event.clientX;
  }
}

function handleRestartClick() {
  gameOver = false;
  score = 0;
  scoreSpan.textContent = score;
  skierX = canvas.width / 2;
  skierY = canvas.height - 50;
  gates = [];
  gameOverDiv.style.display = 'none';
}

canvas.addEventListener('mousemove', handleMouseMove);
restartBtn.addEventListener('click', handleRestartClick);

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
