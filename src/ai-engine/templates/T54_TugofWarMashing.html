<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let ropeLength = 100;
let ropeSpeed = params.speed;
let ropeDirection = 1;
let gameOver = false;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function drawRope() {
  ctx.beginPath();
  ctx.moveTo(canvas.width / 2, canvas.height / 2);
  ctx.lineTo(canvas.width / 2, canvas.height / 2 + ropeLength);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 10;
  ctx.stroke();
}

function updateRope() {
  ropeLength += ropeSpeed * ropeDirection;
  if (ropeLength > canvas.height / 2 || ropeLength < 0) {
    ropeDirection *= -1;
  }
}

function drawScore() {
  scoreSpan.textContent = score;
}

function updateScore() {
  score++;
}

function drawGameOver() {
  gameOverDiv.style.display = 'flex';
  finalScoreSpan.textContent = score;
}

function handleRestart() {
  gameOver = false;
  score = 0;
  ropeLength = 100;
  ropeDirection = 1;
  gameOverDiv.style.display = 'none';
}

function handleMouseDown(event) {
  if (!gameOver) {
    const rect = canvas.getBoundingClientRect();
    const x = event.clientX - rect.left;
    const y = event.clientY - rect.top;
    if (y > canvas.height / 2 + ropeLength && y < canvas.height / 2 + ropeLength + 50) {
      ropeSpeed += 1;
      score += 10;
    } else if (y < canvas.height / 2 + ropeLength && y > canvas.height / 2 + ropeLength - 50) {
      ropeSpeed -= 1;
      score += 10;
    }
  }
}

function handleTouchStart(event) {
  if (!gameOver) {
    const rect = canvas.getBoundingClientRect();
    const x = event.touches[0].clientX - rect.left;
    const y = event.touches[0].clientY - rect.top;
    if (y > canvas.height / 2 + ropeLength && y < canvas.height / 2 + ropeLength + 50) {
      ropeSpeed += 1;
      score += 10;
    } else if (y < canvas.height / 2 + ropeLength && y > canvas.height / 2 + ropeLength - 50) {
      ropeSpeed -= 1;
      score += 10;
    }
  }
}

function animate() {
  if (!gameOver) {
    ctx.fillStyle = params.bgColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    updateRope();
    drawRope();
    updateScore();
    drawScore();
    if (ropeSpeed > 10) {
      gameOver = true;
      drawGameOver();
    }
  }
  requestAnimationFrame(animate);
}

animate();
canvas.addEventListener('mousedown', handleMouseDown);
canvas.addEventListener('touchstart', handleTouchStart);
restartBtn.addEventListener('click', handleRestart);
</script>
</body>
</html>
