<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let gameOver = false;
let playerX = canvas.width / 2;
let playerY = canvas.height / 2;
let playerSpeed = params.speed;
let playerRadius = 20;
let enemyRadius = 20;
let enemies = [];
let enemySpeed = 2;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function draw() {
  ctx.fillStyle = params.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(playerX, playerY, playerRadius, 0, Math.PI * 2);
  ctx.fill();

  for (let i = 0; i < enemies.length; i++) {
    ctx.fillStyle = '#f00';
    ctx.beginPath();
    ctx.arc(enemies[i].x, enemies[i].y, enemyRadius, 0, Math.PI * 2);
    ctx.fill();
  }
}

function update() {
  if (!gameOver) {
    if (Math.random() < 0.05) {
      enemies.push({
        x: Math.random() * canvas.width,
        y: 0,
      });
    }

    for (let i = 0; i < enemies.length; i++) {
      enemies[i].y += enemySpeed;

      if (enemies[i].y > canvas.height) {
        enemies.splice(i, 1);
        score++;
        scoreSpan.textContent = score;
      }

      if (Math.hypot(playerX - enemies[i].x, playerY - enemies[i].y) < playerRadius + enemyRadius) {
        gameOver = true;
      }
    }

    if (Math.random() < 0.05) {
      playerX += Math.random() * playerSpeed * 2 - playerSpeed;
      playerY += Math.random() * playerSpeed * 2 - playerSpeed;

      if (playerX < playerRadius) {
        playerX = playerRadius;
      } else if (playerX > canvas.width - playerRadius) {
        playerX = canvas.width - playerRadius;
      }

      if (playerY < playerRadius) {
        playerY = playerRadius;
      } else if (playerY > canvas.height - playerRadius) {
        playerY = canvas.height - playerRadius;
      }
    }
  }
}

function handleInput(event) {
  if (event.key === 'ArrowUp') {
    playerY -= playerSpeed;
  } else if (event.key === 'ArrowDown') {
    playerY += playerSpeed;
  } else if (event.key === 'ArrowLeft') {
    playerX -= playerSpeed;
  } else if (event.key === 'ArrowRight') {
    playerX += playerSpeed;
  }

  if (playerX < playerRadius) {
    playerX = playerRadius;
  } else if (playerX > canvas.width - playerRadius) {
    playerX = canvas.width - playerRadius;
  }

  if (playerY < playerRadius) {
    playerY = playerRadius;
  } else if (playerY > canvas.height - playerRadius) {
    playerY = canvas.height - playerRadius;
  }
}

function handleRestart() {
  gameOver = false;
  score = 0;
  scoreSpan.textContent = score;
  playerX = canvas.width / 2;
  playerY = canvas.height / 2;
  enemies = [];
  gameOverDiv.style.display = 'none';
}

document.addEventListener('keydown', handleInput);
restartBtn.addEventListener('click', handleRestart);

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

if (!gameOver) {
  loop();
}

gameOverDiv.style.display = 'none';
</script>
</body>
</html>
