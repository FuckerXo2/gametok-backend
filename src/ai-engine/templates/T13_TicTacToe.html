<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let gameOver = false;
let board = Array(9).fill(null);
let currentPlayer = 'X';

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function drawBoard() {
  ctx.fillStyle = params.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 10;
  ctx.beginPath();
  ctx.moveTo(canvas.width / 3, 0);
  ctx.lineTo(canvas.width / 3, canvas.height);
  ctx.moveTo(canvas.width * 2 / 3, 0);
  ctx.lineTo(canvas.width * 2 / 3, canvas.height);
  ctx.moveTo(0, canvas.height / 3);
  ctx.lineTo(canvas.width, canvas.height / 3);
  ctx.moveTo(0, canvas.height * 2 / 3);
  ctx.lineTo(canvas.width, canvas.height * 2 / 3);
  ctx.stroke();
}

function drawPiece(index) {
  const x = (index % 3) * canvas.width / 3 + canvas.width / 6;
  const y = Math.floor(index / 3) * canvas.height / 3 + canvas.height / 6;
  ctx.font = '48px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText(board[index], x, y);
}

function checkWin() {
  const winConditions = [
    [0, 1, 2],
    [3, 4, 5],
    [6, 7, 8],
    [0, 3, 6],
    [1, 4, 7],
    [2, 5, 8],
    [0, 4, 8],
    [2, 4, 6],
  ];
  for (const condition of winConditions) {
    if (board[condition[0]] === board[condition[1]] && board[condition[1]] === board[condition[2]] && board[condition[0]] !== null) {
      return true;
    }
  }
  return false;
}

function checkDraw() {
  return !board.includes(null);
}

function handlePlayerMove(index) {
  if (board[index] === null) {
    board[index] = currentPlayer;
    if (checkWin()) {
      gameOver = true;
      finalScoreSpan.textContent = score;
      gameOverDiv.style.display = 'flex';
    } else if (checkDraw()) {
      gameOver = true;
      finalScoreSpan.textContent = score;
      gameOverDiv.style.display = 'flex';
    } else {
      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    }
  }
}

function handleRestart() {
  gameOver = false;
  board = Array(9).fill(null);
  currentPlayer = 'X';
  score = 0;
  scoreSpan.textContent = score;
  gameOverDiv.style.display = 'none';
}

function update() {
  if (!gameOver) {
    drawBoard();
    for (let i = 0; i < 9; i++) {
      if (board[i] !== null) {
        drawPiece(i);
      }
    }
  }
}

function handleMouseDown(event) {
  if (!gameOver) {
    const x = event.clientX;
    const y = event.clientY;
    const index = Math.floor(x / (canvas.width / 3)) + Math.floor(y / (canvas.height / 3)) * 3;
    handlePlayerMove(index);
  }
}

canvas.addEventListener('mousedown', handleMouseDown);
restartBtn.addEventListener('click', handleRestart);

function loop() {
  update();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
