<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let gameOver = false;
let playerX = canvas.width / 2;
let playerY = canvas.height - 50;
let playerWidth = 50;
let playerHeight = 50;
let playerSpeed = params.speed;
let dirtBlocks = [];
let dirtBlockSize = 50;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function createDirtBlock() {
  const dirtBlock = {
    x: Math.random() * (canvas.width - dirtBlockSize),
    y: -dirtBlockSize,
    width: dirtBlockSize,
    height: dirtBlockSize,
  };
  dirtBlocks.push(dirtBlock);
}

function update() {
  if (!gameOver) {
    // Update player position
    if (playerX < 0) {
      playerX = 0;
    } else if (playerX > canvas.width - playerWidth) {
      playerX = canvas.width - playerWidth;
    }

    // Update dirt blocks
    for (let i = 0; i < dirtBlocks.length; i++) {
      dirtBlocks[i].y += playerSpeed;
      if (dirtBlocks[i].y > canvas.height) {
        dirtBlocks.splice(i, 1);
        score++;
        scoreSpan.textContent = score;
        createDirtBlock();
      }
    }

    // Check collision with dirt blocks
    for (let i = 0; i < dirtBlocks.length; i++) {
      if (checkCollision(playerX, playerY, playerWidth, playerHeight, dirtBlocks[i].x, dirtBlocks[i].y, dirtBlocks[i].width, dirtBlocks[i].height)) {
        gameOver = true;
      }
    }
  }
}

function render() {
  ctx.fillStyle = params.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw player
  ctx.fillStyle = '#fff';
  ctx.fillRect(playerX, playerY, playerWidth, playerHeight);

  // Draw dirt blocks
  for (let i = 0; i < dirtBlocks.length; i++) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(dirtBlocks[i].x, dirtBlocks[i].y, dirtBlocks[i].width, dirtBlocks[i].height);
  }
}

function checkCollision(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax + aw > bx && ax < bx + bw && ay + ah > by && ay < by + bh;
}

function handleInput(event) {
  if (event.key === 'ArrowLeft') {
    playerX -= playerSpeed;
  } else if (event.key === 'ArrowRight') {
    playerX += playerSpeed;
  }
}

function handleRestart() {
  gameOver = false;
  score = 0;
  scoreSpan.textContent = score;
  playerX = canvas.width / 2;
  playerY = canvas.height - 50;
  dirtBlocks = [];
  createDirtBlock();
  gameOverDiv.style.display = 'none';
}

document.addEventListener('keydown', handleInput);
restartBtn.addEventListener('click', handleRestart);

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

createDirtBlock();
loop();
</script>
</body>
</html>
