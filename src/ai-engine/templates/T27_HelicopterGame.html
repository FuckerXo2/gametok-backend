<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let helicopterY = canvas.height / 2;
let helicopterSpeed = 0;
let obstacleX = canvas.width;
let obstacleY = Math.random() * (canvas.height - 100);
let obstacleGap = 150;
let obstacleSpeed = params.speed;
let gravity = 0.2;
let isGameOver = false;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function draw() {
  ctx.fillStyle = params.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#fff';
  ctx.fillRect(50, helicopterY, 50, 50);

  ctx.fillStyle = '#fff';
  ctx.fillRect(obstacleX, 0, 50, obstacleY);
  ctx.fillRect(obstacleX, obstacleY + obstacleGap, 50, canvas.height - obstacleY - obstacleGap);
}

function update() {
  if (!isGameOver) {
    helicopterSpeed += gravity;
    helicopterY += helicopterSpeed;

    if (helicopterY + 50 > canvas.height) {
      helicopterY = canvas.height - 50;
      helicopterSpeed = 0;
    }

    if (helicopterY < 0) {
      helicopterY = 0;
      helicopterSpeed = 0;
    }

    obstacleX -= obstacleSpeed;

    if (obstacleX + 50 < 0) {
      obstacleX = canvas.width;
      obstacleY = Math.random() * (canvas.height - 100);
      score++;
      scoreSpan.textContent = score;
    }

    if (obstacleX < 50 + 50 && obstacleX + 50 > 50) {
      if (helicopterY < obstacleY || helicopterY + 50 > obstacleY + obstacleGap) {
        isGameOver = true;
      }
    }
  }
}

function handleInput(event) {
  if (event.key === ' ') {
    helicopterSpeed = -5;
  }
}

function handleRestart() {
  isGameOver = false;
  score = 0;
  scoreSpan.textContent = score;
  helicopterY = canvas.height / 2;
  helicopterSpeed = 0;
  obstacleX = canvas.width;
  obstacleY = Math.random() * (canvas.height - 100);
  gameOverDiv.style.display = 'none';
}

document.addEventListener('keydown', handleInput);
restartBtn.addEventListener('click', handleRestart);

function loop() {
  if (!isGameOver) {
    draw();
    update();
  } else {
    gameOverDiv.style.display = 'flex';
    finalScoreSpan.textContent = score;
  }
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
