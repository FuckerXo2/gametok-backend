<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let gameOver = false;
let pieces = [];
let pieceSize = 50;
let gridSize = 5;
let grid = [];
let selectedPiece = null;
let targetPiece = null;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function init() {
  for (let i = 0; i < gridSize; i++) {
    grid[i] = [];
    for (let j = 0; j < gridSize; j++) {
      grid[i][j] = {
        x: j * pieceSize,
        y: i * pieceSize,
        value: Math.floor(Math.random() * 2),
      };
    }
  }

  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      if (grid[i][j].value === 1) {
        pieces.push({
          x: grid[i][j].x,
          y: grid[i][j].y,
          value: grid[i][j].value,
        });
      }
    }
  }
}

function draw() {
  ctx.fillStyle = params.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < pieces.length; i++) {
    ctx.fillStyle = pieces[i].value === 1 ? '#fff' : '#000';
    ctx.fillRect(pieces[i].x, pieces[i].y, pieceSize, pieceSize);
  }

  if (selectedPiece) {
    ctx.strokeStyle = '#f00';
    ctx.lineWidth = 2;
    ctx.strokeRect(selectedPiece.x, selectedPiece.y, pieceSize, pieceSize);
  }

  if (targetPiece) {
    ctx.strokeStyle = '#0f0';
    ctx.lineWidth = 2;
    ctx.strokeRect(targetPiece.x, targetPiece.y, pieceSize, pieceSize);
  }
}

function update() {
  if (gameOver) return;

  if (selectedPiece && targetPiece) {
    const dx = targetPiece.x - selectedPiece.x;
    const dy = targetPiece.y - selectedPiece.y;

    if (Math.abs(dx) < params.speed && Math.abs(dy) < params.speed) {
      selectedPiece.x = targetPiece.x;
      selectedPiece.y = targetPiece.y;

      const index = pieces.indexOf(selectedPiece);
      if (index !== -1) {
        pieces.splice(index, 1);
      }

      score++;
      scoreSpan.textContent = score;

      if (pieces.length === 0) {
        gameOver = true;
        finalScoreSpan.textContent = score;
        gameOverDiv.style.display = 'flex';
      }

      selectedPiece = null;
      targetPiece = null;
    } else {
      selectedPiece.x += dx > 0 ? params.speed : -params.speed;
      selectedPiece.y += dy > 0 ? params.speed : -params.speed;
    }
  }
}

function handleMouseDown(e) {
  if (gameOver) return;

  const x = e.clientX;
  const y = e.clientY;

  for (let i = 0; i < pieces.length; i++) {
    if (x > pieces[i].x && x < pieces[i].x + pieceSize && y > pieces[i].y && y < pieces[i].y + pieceSize) {
      selectedPiece = pieces[i];
      targetPiece = null;
      return;
    }
  }

  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      if (x > grid[i][j].x && x < grid[i][j].x + pieceSize && y > grid[i][j].y && y < grid[i][j].y + pieceSize) {
        targetPiece = {
          x: grid[i][j].x,
          y: grid[i][j].y,
        };
        return;
      }
    }
  }
}

function handleRestart() {
  gameOver = false;
  score = 0;
  scoreSpan.textContent = score;
  gameOverDiv.style.display = 'none';
  pieces = [];
  grid = [];
  selectedPiece = null;
  targetPiece = null;
  init();
}

init();
draw();

canvas.addEventListener('mousedown', handleMouseDown);
restartBtn.addEventListener('click', handleRestart);

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
