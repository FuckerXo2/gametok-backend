<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let gameOver = false;
let tiles = [];
let tileWidth = 100;
let tileHeight = 100;
let tileGap = 10;
let tileSpeed = params.speed;
let tileColor = '#fff';
let bgColor = params.bgColor;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function createTile() {
  const tile = {
    x: Math.floor(Math.random() * (canvas.width / tileWidth)) * tileWidth,
    y: -tileHeight,
    width: tileWidth,
    height: tileHeight,
    speed: tileSpeed,
  };
  tiles.push(tile);
}

function update() {
  if (!gameOver) {
    scoreSpan.textContent = score;
    for (let i = tiles.length - 1; i >= 0; i--) {
      tiles[i].y += tiles[i].speed;
      if (tiles[i].y > canvas.height) {
        tiles.splice(i, 1);
      }
    }
    if (Math.random() < 0.05) {
      createTile();
    }
  }
}

function render() {
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < tiles.length; i++) {
    ctx.fillStyle = tileColor;
    ctx.fillRect(tiles[i].x, tiles[i].y, tiles[i].width, tiles[i].height);
  }
}

function handleMouseDown(event) {
  if (!gameOver) {
    const rect = canvas.getBoundingClientRect();
    const x = event.clientX - rect.left;
    const y = event.clientY - rect.top;
    for (let i = 0; i < tiles.length; i++) {
      if (x > tiles[i].x && x < tiles[i].x + tiles[i].width && y > tiles[i].y && y < tiles[i].y + tiles[i].height) {
        tiles.splice(i, 1);
        score++;
      }
    }
  }
}

function handleGameOver() {
  gameOver = true;
  finalScoreSpan.textContent = score;
  gameOverDiv.style.display = 'flex';
}

function handleRestart() {
  gameOver = false;
  score = 0;
  tiles = [];
  gameOverDiv.style.display = 'none';
}

canvas.addEventListener('mousedown', handleMouseDown);
restartBtn.addEventListener('click', handleRestart);

function loop() {
  update();
  render();
  if (!gameOver && tiles.length > 0 && tiles[0].y > canvas.height / 2) {
    handleGameOver();
  }
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
