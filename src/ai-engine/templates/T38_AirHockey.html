<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;overflow:hidden;background:#222;color:#fff}
canvas{display:block;width:100vw;height:100vh;}
#hud{position:absolute;top:10px;left:10px;}
#game-over{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;}
</style>
<script id="game-params" type="application/json">{"speed": 5, "bgColor": "#222"}</script>
</head>
<body>
<div style="display:none;" id="assets-container"></div>
<div id="hud">Score: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<div id="game-over"><h1 id="finalScore">0</h1><button id="restart-btn">Retry</button></div>
<script>
const params = JSON.parse(document.getElementById('game-params').textContent);
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const scoreSpan = document.getElementById('score');
const gameOverDiv = document.getElementById('game-over');
const finalScoreSpan = document.getElementById('finalScore');
const restartBtn = document.getElementById('restart-btn');

let score = 0;
let gameOver = false;
let paddleWidth = 100;
let paddleHeight = 20;
let paddleSpeed = 10;
let ballSize = 20;
let ballSpeedX = params.speed;
let ballSpeedY = params.speed;
let ballX = canvas.width / 2;
let ballY = canvas.height / 2;
let paddleX = (canvas.width - paddleWidth) / 2;
let paddleY = canvas.height - paddleHeight - 20;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function draw() {
  ctx.fillStyle = params.bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#fff';
  ctx.fillRect(paddleX, paddleY, paddleWidth, paddleHeight);

  ctx.beginPath();
  ctx.arc(ballX, ballY, ballSize / 2, 0, Math.PI * 2);
  ctx.fill();
}

function update() {
  if (!gameOver) {
    if (ballX + ballSize / 2 > canvas.width || ballX - ballSize / 2 < 0) {
      ballSpeedX = -ballSpeedX;
    }

    if (ballY - ballSize / 2 < 0) {
      ballSpeedY = -ballSpeedY;
    }

    if (ballY + ballSize / 2 > canvas.height) {
      gameOver = true;
    }

    if (ballX + ballSize / 2 > paddleX && ballX - ballSize / 2 < paddleX + paddleWidth && ballY + ballSize / 2 > paddleY && ballY - ballSize / 2 < paddleY + paddleHeight) {
      ballSpeedY = -ballSpeedY;
      score++;
      scoreSpan.textContent = score;
    }

    ballX += ballSpeedX;
    ballY += ballSpeedY;
  }
}

function handleInput(event) {
  if (event.key === 'ArrowLeft' && paddleX > 0) {
    paddleX -= paddleSpeed;
  }

  if (event.key === 'ArrowRight' && paddleX < canvas.width - paddleWidth) {
    paddleX += paddleSpeed;
  }
}

document.addEventListener('keydown', handleInput);
restartBtn.addEventListener('click', () => {
  gameOver = false;
  ballX = canvas.width / 2;
  ballY = canvas.height / 2;
  paddleX = (canvas.width - paddleWidth) / 2;
  score = 0;
  scoreSpan.textContent = score;
  gameOverDiv.style.display = 'none';
});

function loop() {
  if (gameOver) {
    finalScoreSpan.textContent = score;
    gameOverDiv.style.display = 'flex';
  }

  draw();
  update();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
