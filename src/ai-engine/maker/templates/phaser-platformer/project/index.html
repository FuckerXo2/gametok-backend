<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Skybound Run</title>
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <main id="game-shell" aria-label="GameTok platformer game">
    <canvas id="game-canvas"></canvas>
    <section id="hud" data-hud>
      <div class="hud-card">
        <span>Score</span>
        <strong id="score-readout">0</strong>
      </div>
      <div class="hud-card">
        <span>Health</span>
        <strong id="health-readout">3</strong>
      </div>
      <div class="hud-card">
        <span>Goal</span>
        <strong id="goal-readout">Run</strong>
      </div>
    </section>
    <div id="status-line" role="status">Reach the gate</div>
    <section id="controls" data-control>
      <button id="left-button" type="button">Left</button>
      <button id="jump-button" type="button">Jump</button>
      <button id="right-button" type="button">Right</button>
    </section>
    <button id="restart-button" type="button" hidden>Again</button>
  </main>
  <script type="module" src="./src/game.js"></script>
</body>
</html>
