<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Rune Grid</title>
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <main id="game-shell" aria-label="GameTok grid puzzle game">
    <section id="hud" data-hud>
      <div class="hud-card">
        <span>Score</span>
        <strong id="score-readout">0</strong>
      </div>
      <div class="hud-card">
        <span>Moves</span>
        <strong id="moves-readout">18</strong>
      </div>
      <div class="hud-card">
        <span>Goal</span>
        <strong id="goal-readout">0/6</strong>
      </div>
    </section>
    <canvas id="game-canvas"></canvas>
    <p id="status-line" role="status">Match three bright runes</p>
    <section id="controls" data-control>
      <button id="up-button" type="button" aria-label="Move selected tile up">Up</button>
      <div class="control-row">
        <button id="left-button" type="button" aria-label="Move selected tile left">Left</button>
        <button id="resolve-button" type="button">Resolve</button>
        <button id="right-button" type="button" aria-label="Move selected tile right">Right</button>
      </div>
      <button id="down-button" type="button" aria-label="Move selected tile down">Down</button>
    </section>
    <button id="restart-button" type="button" hidden>Again</button>
  </main>
  <script type="module" src="./src/game.js"></script>
</body>
</html>
