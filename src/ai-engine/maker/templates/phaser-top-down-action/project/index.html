<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Arcane Rush</title>
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <main id="game-shell" aria-label="GameTok top-down action game">
    <canvas id="game-canvas"></canvas>
    <section id="hud" data-hud>
      <div class="hud-card">
        <span>Health</span>
        <strong id="health-readout">100</strong>
      </div>
      <div class="hud-card">
        <span>Score</span>
        <strong id="score-readout">0</strong>
      </div>
      <div class="hud-card">
        <span>Wave</span>
        <strong id="wave-readout">1</strong>
      </div>
    </section>
    <div id="status-line" role="status">Survive the rush</div>
    <section id="controls" data-control>
      <div id="move-pad" class="touch-pad" aria-label="Move">
        <div id="move-stick"></div>
      </div>
      <button id="attack-button" type="button">Cast</button>
    </section>
    <button id="restart-button" type="button" hidden>Try Again</button>
  </main>
  <script type="module" src="./src/game.js"></script>
</body>
</html>
