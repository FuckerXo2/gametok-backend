layerColor : aiColor;\n                    const opponentPiecesRemaining = pieces.filter(p =\u003e p.type === opponentColor \u0026\u0026 !p.pocketed).length;\n                    const pocketedOpponentPieces = turnState.opponentPiecesPocketedList;\n                    \n                    // Issue 3: Pocketed opponent's last remaining piece - serious foul\n                    // The piece must be returned AND current player pays penalty\n                    if (opponentPiecesRemaining === 0 \u0026\u0026 pocketedOpponentPieces.length \u003e 0) {\n                        // Return opponent's last piece(s) to center\n                        for (const piece of pocketedOpponentPieces) {\n                            startPieceReturn(piece);\n                        }\n                        // Apply foul penalty (return one of current player's pieces or add debt)\n                        handleFoul('opponent_last_piece');\n                        // Zoom back and switch turn\n                        setCameraState('WIDE');\n                        updateScoreDisplay();\n                        if (checkWinCondition()) return;\n                        resetTurnState();\n                        currentPlayer = opponent;\n                        startTurn(currentPlayer);\n                        return;\n                    }\n                    // Issue 2: Own piece AND opponent piece in same shot\n                    // Own piece stays, turn continues, but opponent piece must be returned\n                    else if (turnState.ownPiecesPocketedThisTurn \u003e 0) {\n                        // Return opponent pieces to center (they don't count for anyone)\n                        for (const piece of pocketedOpponentPieces) {\n                            startPieceReturn(piece);\n                        }\n                        // Not a foul - fall through to normal flow\n                        // Turn will continue since lastPocketedOwnPiece is true\n                    }\n                    // Issue 1: Only opponent piece(s), no own pieces - foul\n                    // Opponent pieces stay pocketed but current player pays penalty\n                    else {\n                        // Credit opponent pieces to opponent (they stay pocketed)\n                        for (const piece of pocketedOpponentPieces) {\n                            pocketedPieces[opponent].push(piece);\n                        }\n                        // Apply foul penalty (return one of current player's pieces or add debt)\n                        handleFoul('opponent_piece_only');\n                        // Zoom back and switch turn\n                        setCameraState('WIDE');\n                        updateScoreDisplay();\n                        if (checkWinCondition()) return;\n                        resetTurnState();\n                        currentPlayer = opponent;\n                        startTurn(currentPlayer);\n                        return;\n                    }\n                }\n                \n                // No foul - reset consecutive foul counter\n                consecutiveFouls[currentPlayer] = 0;\n\n                // Zoom back to wide view\n                setCameraState('WIDE');\n\n                // Check win condition\n                if (checkWinCondition()) {\n                    return;\n                }\n\n                // Determine next turn based on turnState counters (single source of truth)\n                // Player keeps turn if they pocketed own piece(s) OR pocketed the queen\n                const shouldContinueTurn = turnState.ownPiecesPocketedThisTurn \u003e 0 || turnState.queenPocketedThisTurn;\n                if (shouldContinueTurn) {\n                    // Same player continues - reset turn state for next strike\n                    resetTurnState();\n                    startTurn(currentPlayer);\n                } else {\n                    // Switch player - reset turn state for new turn\n                    resetTurnState();\n                    currentPlayer = currentPlayer === 1 ? 2 : 1;\n                    startTurn(currentPlayer);\n                }\n            }\n\n            function resetTurnState() {\n                turnState.queenPocketedThisTurn = false;\n                turnState.ownPiecesPocketedThisTurn = 0;\n                turnState.opponentPiecesPocketedThisTurn = 0;\n                turnState.opponentPiecesPocketedList = [];\n            }\n\n            function startTurn(player) {\n                strikerPlaced = false;\n                \n                // Detect player switch in 2P mode and trigger slow camera transition\n                if (isTwoPlayerMode \u0026\u0026 player !== lastActivePlayer) {\n                    cameraTransitionMode = 'player_switch';\n                }\n                lastActivePlayer = player;\n                \n                // Determine which baseline this player uses\n                const playerBaseline = player === 1 ? BASELINE_OFFSET : -BASELINE_OFFSET;\n                \n                // Reset striker (but keep it visible if returning from foul)\n                if (!striker.returning \u0026\u0026 gamePhase !== 'RETURNING_STRIKER') {\n                    striker.pocketed = false;\n                    striker.x = 0; // Center X position\n                    striker.vx = 0;\n                    striker.vz = 0;\n                    striker.mesh.visible = true;\n                    striker.floating = false;\n                    striker.placementAnimating = false;\n                    striker.placementProgress = 0;\n                    \n                    // In 2P mode, both players are human and use their respective baselines\n                    if (isTwoPlayerMode || player === 1) {\n                        // Position striker below the baseline, waiting for player tap\n                        const offsetDir = player === 1 ? 1 : -1;\n                        striker.z = playerBaseline + (120 * offsetDir); // Below/above the baseline\n                        striker.mesh.position.x = 0; // Centered\n                        striker.mesh.position.y = 35; // Hovering height\n                        striker.mesh.position.z = striker.z;\n                        striker.hovering = false; // No oscillation\n                    } else {\n                        // AI in 1P mode\n                        striker.z = -BASELINE_OFFSET;\n                        striker.mesh.position.x = 0;\n                        striker.mesh.position.y = 7; // Board level for AI\n                        striker.mesh.position.z = striker.z;\n                        striker.hovering = false;\n                    }\n                }\n\n                // Reset camera to wide view (will be flipped for player 2 in 2P mode)\n                setCameraState('WIDE');\n\n                updateScoreDisplay();\n\n                // Determine if this player is human-controlled\n                const isHumanPlayer = (player === 1) || isTwoPlayerMode;\n\n                if (isHumanPlayer) {\n                    gamePhase = 'POSITIONING';\n                    \n                    // Show appropriate turn indicator\n                    if (isTwoPlayerMode) {\n                        const turnText = player === 1 ? t('p1Turn') : t('p2Turn');\n                        showTurnIndicator(turnText, t('placeStriker'));\n                    } else {\n                        showTurnIndicator(t('yourTurn'), t('placeStriker'));\n                    }\n                    updateInstructions(t('tapBaseline'));\n                    \n                    // Show tutorial baseline animation if not completed (only for player 1 in first game)\n                    if (!tutorialCompleted \u0026\u0026 player === 1) {\n                        showTutorialBaseline();\n                    }\n                } else {\n                    // AI turn (only in 1P mode)\n                    gamePhase = 'AI_TURN';\n                    striker.mesh.visible = false; // Hide striker until AI finds valid placement\n                    showTurnIndicator(t('aiTurn'), t('thinking'));\n                    updateInstructions(t('aiTakingShot'));\n                    setTimeout(() =\u003e aiTakeTurn(), 1500);\n                }\n            }\n\n            function showTurnIndicator(title, subtitle) {\n                document.getElementById('turn-text').textContent = title;\n                document.getElementById('turn-instruction').textContent = subtitle;\n                document.getElementById('turn-indicator').classList.add('visible');\n                playSound('turn_start_sound', 0.4);\n                setTimeout(() =\u003e {\n                    document.getElementById('turn-indicator').classList.remove('visible');\n                }, 2000);\n            }\n\n            function updateInstructions(text) {\n                document.getElementById('instruction-text').textContent = text;\n            }\n\n            // ==================== AI ====================\n            \n            // Check if path from point A to point B is clear of other pieces\n            function isPathClear(startX, startZ, endX, endZ, ignorePiece = null, pathRadius = STRIKER_RADIUS) {\n                const dx = endX - startX;\n                const dz = endZ - startZ;\n                const dist = Math.sqrt(dx * dx + dz * dz);\n                if (dist \u003c 1) return true;\n                \n                const dirX = dx / dist;\n                const dirZ = dz / dist;\n                \n                for (const piece of pieces) {\n                    if (piece.pocketed || piece === ignorePiece) continue;\n                    \n                    // Ray-circle intersection test\n                    const px = piece.x - startX;\n                    const pz = piece.z - startZ;\n                    const effectiveRadius = piece.radius + pathRadius * 0.8;\n                    \n                    // Project piece center onto ray\n                    const projection = px * dirX + pz * dirZ;\n                    \n                    // Skip if piece is behind start or beyond end\n                    if (projection \u003c 0 || projection \u003e dist) continue;\n                    \n                    // Calculate perpendicular distance from ray to piece center\n                    const closestX = startX + dirX * projection;\n                    const closestZ = startZ + dirZ * projection;\n                    const perpDist = Math.sqrt((piece.x - closestX) ** 2 + (piece.z - closestZ) ** 2);\n                    \n                    if (perpDist \u003c effectiveRadius) {\n                        return false; // Path is blocked\n                    }\n                }\n                return true;\n            }\n            \n            // Check if baseline position is valid (not overlapping pieces)\n            function isValidBaselinePosition(x, z) {\n                const minClearance = STRIKER_RADIUS + PIECE_RADIUS + 5;\n                for (const piece of pieces) {\n                    if (piece.pocketed) continue;\n                    const dx = x - piece.x;\n                    const dz = z - piece.z;\n                    const dist = Math.sqrt(dx * dx + dz * dz);\n                    if (dist \u003c minClearance) return false;\n                }\n                return true;\n            }\n            \n            // Evaluate a potential shot and return a score\n            function evaluateShot(strikerX, strikerZ, targetPiece, pocketX, pocketZ) {\n                let score = 0;\n                \n                // Distance from striker to target piece\n                const toTargetDx = targetPiece.x - strikerX;\n                const toTargetDz = targetPiece.z - strikerZ;\n                const strikerToTarget = Math.sqrt(toTargetDx * toTargetDx + toTargetDz * toTargetDz);\n                \n                // Distance from target piece to pocket\n                const toPocketDx = pocketX - targetPiece.x;\n                const toPocketDz = pocketZ - targetPiece.z;\n                const targetToPocket = Math.sqrt(toPocketDx * toPocketDx + toPocketDz * toPocketDz);\n                \n                // Normalize directions\n                const strikerDirX = toTargetDx / strikerToTarget;\n                const strikerDirZ = toTargetDz / strikerToTarget;\n                const pocketDirX = toPocketDx / targetToPocket;\n                const pocketDirZ = toPocketDz / targetToPocket;\n                \n                // Calculate angle alignment (how well striker-\u003epiece-\u003epocket aligns)\n                // Dot product of striker direction and pocket direction\n                const alignment = strikerDirX * pocketDirX + strikerDirZ * pocketDirZ;\n                \n                // Score components:\n                // 1. Alignment bonus (most important - straight shots are easier)\n                //    alignment ranges from -1 (opposite) to 1 (perfectly aligned)\n                score += alignment * 500;\n                \n                // 2. Closer to pocket is better (but alignment matters more)\n                score += (300 - targetToPocket) * 0.8;\n                \n                // 3. Shorter striker distance is slightly preferred\n                score += (400 - strikerToTarget) * 0.3;\n                \n                // 4. Path clearance bonus - check if path to target is clear\n                if (isPathClear(strikerX, strikerZ, targetPiece.x, targetPiece.z, targetPiece, STRIKER_RADIUS)) {\n                    score += 200;\n                } else {\n                    score -= 300; // Heavy penalty for blocked shots\n                }\n                \n                // 5. Check if piece-\u003epocket path is clear\n                if (isPathClear(targetPiece.x, targetPiece.z, pocketX, pocketZ, targetPiece, PIECE_RADIUS)) {\n                    score += 150;\n                } else {\n                    score -= 200; // Penalty for blocked pocket path\n                }\n                \n                // 6. Bonus for pieces near pockets (high probability shots)\n                if (targetToPocket \u003c 100) {\n                    score += 250;\n                }\n                \n                // 7. Penalty for very oblique angles (hard to pocket)\n                if (alignment \u003c 0.3) {\n                    score -= 200;\n                }\n                \n                return score;\n            }\n            \n            function calculateAIShot() {\n                const targetPieces = pieces.filter(p =\u003e p.type === aiColor \u0026\u0026 !p.pocketed);\n                \n                if (!queenPocketed \u0026\u0026 targetPieces.length \u003c= 3) {\n                    const queen = pieces.find(p =\u003e p.type === 'queen');\n                    if (queen \u0026\u0026 !queen.pocketed) {\n                        targetPieces.push(queen);\n                    }\n                }\n                \n                if (targetPieces.length === 0) {\n                    return null;\n                }\n\n                const pocketPositions = [\n                    { x: -POCKET_OFFSET, z: POCKET_OFFSET, name: 'BL' },\n                    { x: POCKET_OFFSET, z: POCKET_OFFSET, name: 'BR' },\n                    { x: -POCKET_OFFSET, z: -POCKET_OFFSET, name: 'TL' },\n                    { x: POCKET_OFFSET, z: -POCKET_OFFSET, name: 'TR' }\n                ];\n                \n                const baselineZ = -BASELINE_OFFSET;\n                const baselineMinX = -BOARD_HALF + 80;\n                const baselineMaxX = BOARD_HALF - 80;\n                \n                // Evaluate all possible shots\n                let bestShot = null;\n                let bestScore = -Infinity;\n                \n                // For each target piece\n                for (const targetPiece of targetPieces) {\n                    // For each pocket\n                    for (const pocket of pocketPositions) {\n                        // Calculate ideal striker position for this shot\n                        // The ideal position is along the line from pocket through piece, extended to baseline\n                        const pieceToPocketX = pocket.x - targetPiece.x;\n                        const pieceToPocketZ = pocket.z - targetPiece.z;\n                        const pieceToPocketDist = Math.sqrt(pieceToPocketX * pieceToPocketX + pieceToPocketZ * pieceToPocketZ);\n                        \n                        // Direction from piece toward pocket\n                        const dirX = pieceToPocketX / pieceToPocketDist;\n                        const dirZ = pieceToPocketZ / pieceToPocketDist;\n                        \n                        // Extend line backwards from piece to find where it intersects baseline\n                        // We want striker position such that striker -\u003e piece -\u003e pocket is aligned\n                        // So we go backwards from piece (opposite of pocket direction)\n                        \n                        if (Math.abs(dirZ) \u003c 0.01) {\n                            // Nearly horizontal shot - check several positions\n                            for (let testX = baselineMinX; testX \u003c= baselineMaxX; testX += 40) {\n                                if (!isValidBaselinePosition(testX, baselineZ)) continue;\n                                \n                                const baseScore = evaluateShot(testX, baselineZ, targetPiece, pocket.x, pocket.z);\n                                let score = baseScore;\n                                if (targetPiece.type === 'queen') {\n                                    score += 800; // Bonus for queen\n                                } else if (queenAwaitingCover \u0026\u0026 queenPocketedBy === 2) {\n                                    score += 600; // Bonus for covering piece\n                                }\n                                \n                                if (score \u003e bestScore) {\n                                    bestScore = score;\n                                    bestShot = {\n                                        position: { x: testX, z: baselineZ },\n                                        targetPiece: targetPiece,\n                                        pocket: pocket,\n                                        score: score\n                                    };\n                                }\n                            }\n                        } else {\n                            // Calculate where the line from piece (going opposite pocket direction) hits baseline\n                            const t = (baselineZ - targetPiece.z) / (-dirZ);\n                            let idealX = targetPiece.x + (-dirX) * t;\n                            \n                            // Clamp to valid baseline range\n                            idealX = Math.max(baselineMinX, Math.min(baselineMaxX, idealX));\n                            \n                            // Try ideal position and nearby positions\n                            const testPositions = [\n                                idealX,\n                                idealX - 30,\n                                idealX + 30,\n                                idealX - 60,\n                                idealX + 60\n                            ];\n                            \n                            for (const testX of testPositions) {\n                                const clampedX = Math.max(baselineMinX, Math.min(baselineMaxX, testX));\n                                if (!isValidBaselinePosition(clampedX, baselineZ)) continue;\n                                \n                                const baseScore = evaluateShot(clampedX, baselineZ, targetPiece, pocket.x, pocket.z);\n                                let score = baseScore;\n                                if (targetPiece.type === 'queen') {\n                                    score += 800; // Bonus for queen\n                                } else if (queenAwaitingCover \u0026\u0026 queenPocketedBy === 2) {\n                                    score += 600; // Bonus for covering piece\n                                }\n                                \n                                if (score \u003e bestScore) {\n                                    bestScore = score;\n                                    bestShot = {\n                                        position: { x: clampedX, z: baselineZ },\n                                        targetPiece: targetPiece,\n                                        pocket: pocket,\n                                        score: score\n                                    };\n                                }\n                            }\n                        }\n                    }\n                }\n                \n                // Fallback if no good shot found\n                if (!bestShot) {\n                    // Just aim at the closest piece\n                    let fallbackPos = { x: 0, z: baselineZ };\n                    for (let attempt = 0; attempt \u003c 20; attempt++) {\n                        const testX = (Math.random() - 0.5) * (baselineMaxX - baselineMinX) + (baselineMaxX + baselineMinX) / 2;\n                        if (isValidBaselinePosition(testX, baselineZ)) {\n                            fallbackPos = { x: testX, z: baselineZ };\n                            break;\n                        }\n                    }\n                    \n                    const closestPiece = targetPieces.reduce((closest, p) =\u003e {\n                        const d1 = Math.sqrt((p.x - fallbackPos.x) ** 2 + (p.z - fallbackPos.z) ** 2);\n                        const d2 = Math.sqrt((closest.x - fallbackPos.x) ** 2 + (closest.z - fallbackPos.z) ** 2);\n                        return d1 \u003c d2 ? p : closest;\n                    });\n                    \n                    bestShot = {\n                        position: fallbackPos,\n                        targetPiece: closestPiece,\n                        pocket: pocketPositions[0],\n                        score: 0\n                    };\n                }\n                \n                // Calculate shot direction toward target piece\n                const dx = bestShot.targetPiece.x - bestShot.position.x;\n                const dz = bestShot.targetPiece.z - bestShot.position.z;\n                const dist = Math.sqrt(dx * dx + dz * dz);\n                let dirX = dx / dist;\n                let dirZ = dz / dist;\n                \n                // Add accuracy variance based on difficulty\n                let accuracy;\n                if (aiDifficulty === 'easy') accuracy = 0.7;\n                else if (aiDifficulty === 'hard') accuracy = 0.95;\n                else accuracy = 0.85; // medium\n                \n                const angleOffset = (Math.random() - 0.5) * (1 - accuracy) * 0.4;\n                const cos = Math.cos(angleOffset);\n                const sin = Math.sin(angleOffset);\n                const finalDirX = dirX * cos - dirZ * sin;\n                const finalDirZ = dirX * sin + dirZ * cos;\n                \n                // Calculate power based on distance (smarter power control)\n                const targetDist = Math.sqrt(dx * dx + dz * dz);\n                const basePower = 400 + targetDist * 1.5; // Scale with distance\n                const powerVariance = (Math.random() - 0.5) * 150;\n                const power = Math.min(1100, Math.max(500, basePower + powerVariance));\n\n                return {\n                    position: bestShot.position,\n                    direction: { x: finalDirX, z: finalDirZ },\n                    power: power\n                };\n            }\n            \n            function aiTakeTurn() {\n                // Calculate the shot\n                aiPlannedShot = calculateAIShot();\n                \n                if (!aiPlannedShot) {\n                    // No valid shot (should not happen)\n                    return;\n                }\n\n                // Store start position for animation\n                aiPlacementStartPos = { x: striker.x, z: striker.z };\n                aiPlacementAnimProgress = 0;\n                \n                // Make striker visible\n                striker.mesh.visible = true;\n                \n                updateInstructions(t('aiPositioning'));\n            }\n\n            // ==================== INPUT HANDLING ====================\n            function screenToBoard(screenX, screenY) {\n                const rect = canvas.getBoundingClientRect();\n                const x = ((screenX - rect.left) / rect.width) * 2 - 1;\n                const y = -((screenY - rect.top) / rect.height) * 2 + 1;\n\n                const raycaster = new THREE.Raycaster();\n                raycaster.setFromCamera(new THREE.Vector2(x, y), camera);\n\n                const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);\n                const intersection = new THREE.Vector3();\n                raycaster.ray.intersectPlane(plane, intersection);\n\n                return { x: intersection.x, z: intersection.z };\n            }\n\n            function handlePointerDown(e) {\n                if (mode === 'edit') return;\n                \n                // Handle title screen tap - now handled by click events on title-screen element\n                // This prevents duplicate handling on canvas\n                if (gamePhase === 'TITLE_SCREEN') {\n                    return;\n                }\n                \n                if (gamePhase === 'GAME_OVER' || gamePhase === 'AI_TURN' || gamePhase === 'AI_AIMING' || gamePhase === 'SHOOTING' || gamePhase === 'RETURNING_STRIKER' || gamePhase === 'COLOR_SELECTION' || gamePhase === 'COUNTRY_SELECTION' || gamePhase === 'LANGUAGE_SELECTION') return;\n\n                const clientX = e.touches ? e.touches[0].clientX : e.clientX;\n                const clientY = e.touches ? e.touches[0].clientY : e.clientY;\n                const boardPos = screenToBoard(clientX, clientY);\n\n                if (gamePhase === 'POSITIONING') {\n                    // Determine which baseline the current player uses\n                    const baselineZ = currentPlayer === 1 ? BASELINE_OFFSET : -BASELINE_OFFSET;\n                    \n                    // In 2P mode with flipped camera for player 2, adjust hit detection\n                    // The boardPos is already in world coordinates, so baseline check works the same\n                    if (Math.abs(boardPos.z - baselineZ) \u003c 30 \u0026\u0026 \n                        Math.abs(boardPos.x) \u003c BOARD_HALF - 50) {\n                        // Start placement animation from central position below baseline to tapped position\n                        const targetX = Math.max(-BOARD_HALF + 80, Math.min(BOARD_HALF - 80, boardPos.x));\n                        const targetZ = baselineZ;\n                        \n                        striker.placementAnimating = true;\n                        striker.placementProgress = 0;\n                        striker.placementStartX = striker.mesh.position.x;\n                        striker.placementStartY = striker.mesh.position.y;\n                        striker.placementStartZ = striker.mesh.position.z;\n                        striker.placementTargetX = targetX;\n                        striker.placementTargetY = 7;\n                        striker.placementTargetZ = targetZ;\n                        \n                        // Set final logical position\n                        striker.x = targetX;\n                        striker.z = targetZ;\n                        \n                        updateInstructions(t('placingStriker'));\n                    }\n                } else if (gamePhase === 'AIMING') {\n                    // Check if clicking on striker\n                    const dx = boardPos.x - striker.x;\n                    const dz = boardPos.z - striker.z;\n                    const dist = Math.sqrt(dx * dx + dz * dz);\n\n                    if (dist \u003c STRIKER_RADIUS * 2) {\n                        isDragging = true;\n                        dragStart = { x: clientX, y: clientY };\n                        dragCurrent = { x: clientX, y: clientY };\n                        dragStartTime = performance.now();\n                        // Keep camera in WIDE view initially - will switch after delay\n                        \n                        // Hide tutorial and save completion on first drag\n                        if (!tutorialCompleted) {\n                            hideTutorial();\n                            tutorialCompleted = true;\n                            showTutorial = false;\n                            saveTutorialCompleted(); // Async save\n                        }\n                    }\n                }\n            }\n\n            function handlePointerMove(e) {\n                if (!isDragging || mode === 'edit') return;\n\n                const clientX = e.touches ? e.touches[0].clientX : e.clientX;\n                const clientY = e.touches ? e.touches[0].clientY : e.clientY;\n                dragCurrent = { x: clientX, y: clientY };\n\n                // Calculate drag vector (where you pulled FROM the striker)\n                let dragX = dragCurrent.x - dragStart.x;\n                let dragY = dragCurrent.y - dragStart.y;\n                \n                if (isTwoPlayerMode \u0026\u0026 currentPlayer === 2) {\n                    dragX = -dragX;\n                    dragY = -dragY;\n                }\n                \n                const dragDist = Math.sqrt(dragX * dragX + dragY * dragY);\n\n                if (dragDist \u003e MIN_DRAG) {\n                    // Calculate power\n                    const power = Math.min(dragDist / MAX_DRAG, 1);\n                    document.getElementById('power-fill').style.height = (power * 100) + '%';\n                    document.getElementById('power-meter').classList.add('visible');\n\n                    // Slingshot: shoot in OPPOSITE direction of drag\n                    // Drag right → shoot left, Drag down → shoot up\n                    const angle = Math.atan2(dragY, dragX);\n                    currentAimDirX = -Math.cos(angle);\n                    currentAimDirZ = -Math.sin(angle);\n                    isAiming = true;\n                } else {\n                    isAiming = false;\n                }\n            }\n\n            function handlePointerUp(e) {\n                if (!isDragging || mode === 'edit') return;\n\n                // Calculate drag vector (where you pulled FROM the striker)\n                let dragX = dragCurrent.x - dragStart.x;\n                let dragY = dragCurrent.y - dragStart.y;\n                \n                if (isTwoPlayerMode \u0026\u0026 currentPlayer === 2) {\n                    dragX = -dragX;\n                    dragY = -dragY;\n                }\n                \n                const dragDist = Math.sqrt(dragX * dragX + dragY * dragY);\n\n                if (dragDist \u003e MIN_DRAG) {\n                    // Calculate shot power\n                    const power = Math.min(dragDist / MAX_DRAG, 1);\n                    const velocity = power * MAX_VELOCITY * powerMultiplier;\n                    \n                    // Slingshot: shoot in OPPOSITE direction of drag\n                    // Drag right → shoot left, Drag down → shoot up\n                    const angle = Math.atan2(dragY, dragX);\n                    striker.vx = -Math.cos(angle) * velocity;\n                    striker.vz = -Math.sin(angle) * velocity;\n                    \n                    gamePhase = 'SHOOTING';\n                    setCameraState('FOLLOWING');\n                    updateInstructions('');\n                }\n\n                isDragging = false;\n                isAiming = false;\n                document.getElementById('power-meter').classList.remove('visible');\n            }\n\n            // ==================== EDIT MODE ====================\n            function setupEditMode() {\n                // Disable gameplay\n                gamePhase = 'EDIT';\n                \n                // Show all pieces\n                pieces.forEach(p =\u003e {\n                    p.mesh.visible = true;\n                    p.pocketed = false;\n                });\n                striker.mesh.visible = true;\n\n                updateInstructions(t('editMode'));\n            }\n\n            // ==================== INITIALIZATION ====================\n            async function init() {\n                // Load tutorial state from persistent storage\n                tutorialCompleted = await loadTutorialState();\n                showTutorial = !tutorialCompleted;\n                \n                if (showTutorial) {\n                    lib.log('Tutorial will be shown for this player');\n                } else {\n                    lib.log('Tutorial already completed, skipping');\n                }\n\n                // Set total asset count for progress tracking\n                totalAssets = 11;\n                loadedAssets = 0;\n                updateLoadingProgress();\n\n                // Load assets\n                await Promise.all([\n                    loadImage('carrom_board_texture'),\n                    loadImage('black_piece'),\n                    loadImage('white_piece'),\n                    loadImage('queen_piece'),\n                    loadImage('striker_piece'),\n                    loadAudio('striker_hit_sound'),\n                    loadAudio('piece_pocket_sound'),\n                    loadAudio('striker_slide_sound'),\n                    loadAudio('turn_start_sound'),\n                    loadAudio('foul_sound'),\n                    loadAudio('background_music')\n                ]);\n\n                // Initialize Three.js\n                initThreeJS();\n                initAimCanvas();\n                createBoard();\n                setupPieces();\n\n                // Setup input handlers\n                canvas.addEventListener('mousedown', handlePointerDown);\n                canvas.addEventListener('mousemove', handlePointerMove);\n                canvas.addEventListener('mouseup', handlePointerUp);\n                canvas.addEventListener('touchstart', handlePointerDown, { passive: false });\n                canvas.addEventListener('touchmove', handlePointerMove, { passive: false });\n                canvas.addEventListener('touchend', handlePointerUp);\n\n                // Restart button\n                document.getElementById('restart-btn').addEventListener('click', () =\u003e {\n                    document.getElementById('game-over').classList.remove('visible');\n                    resetGame();\n                });\n\n                // Title screen tap handler (for the background/logo area)\n                document.getElementById('title-screen').addEventListener('click', (e) =\u003e {\n                    if (gamePhase === 'TITLE_SCREEN') {\n                        // Don't trigger on button clicks\n                        if (e.target.closest('.mode-btn')) return;\n                        \n                        if (titleScreenState === 'initial') {\n                            // Show mode selection buttons\n                            showModeSelection();\n                        }\n                    }\n                });\n                \n                // Single Match button - now shows player mode selection\n                document.getElementById('single-match-btn').addEventListener('click', () =\u003e {\n                    if (gamePhase === 'TITLE_SCREEN') {\n                        tournamentMode = false;\n                        showPlayerModeSelection();\n                    }\n                });\n                \n                // 1P vs AI button\n                document.getElementById('vs-ai-btn').addEventListener('click', () =\u003e {\n                    if (gamePhase === 'TITLE_SCREEN') {\n                        isTwoPlayerMode = false;\n                        hideTitleScreen();\n                    }\n                });\n                \n                // 2P Pass \u0026 Play button\n                document.getElementById('vs-player-btn').addEventListener('click', () =\u003e {\n                    if (gamePhase === 'TITLE_SCREEN') {\n                        isTwoPlayerMode = true;\n                        countrySelectionPhase = 1;\n                        hideTitleScreen();\n                    }\n                });\n                \n                // Tournament button\n                document.getElementById('tournament-btn').addEventListener('click', () =\u003e {\n                    if (gamePhase === 'TITLE_SCREEN') {\n                        tournamentMode = true;\n                        hideTitleScreen();\n                    }\n                });\n                \n                // Continue Tournament button\n                document.getElementById('continue-tournament-btn').addEventListener('click', async () =\u003e {\n                    if (gamePhase === 'TITLE_SCREEN' \u0026\u0026 tournamentInProgress) {\n                        tournamentMode = true;\n                        const loaded = await loadTournamentState();\n                        if (loaded) {\n                            document.getElementById('title-screen').classList.remove('visible');\n                            document.getElementById('mode-selection').classList.remove('visible');\n                            \n                            // Show bracket then continue match\n                            showTournamentBracket(() =\u003e {\n                                startTournamentMatch();\n                            }, true);\n                        }\n                    }\n                });\n\n                // Language selection buttons\n                document.getElementById('lang-english').addEventListener('click', () =\u003e {\n                    setLanguage('en');\n                    document.getElementById('language-selection').classList.remove('visible');\n                    showTitleScreen();\n                });\n                \n                document.getElementById('lang-arabic').addEventListener('click', () =\u003e {\n                    setLanguage('ar');\n                    document.getElementById('language-selection').classList.remove('visible');\n                    showTitleScreen();\n                });\n\n                // Color selection buttons - removed, now using auto color selection\n                \n                // Build country selection buttons\n                buildCountryButtons();\n\n                // Show game parameters\n                lib.showGameParameters({\n                    name: 'Game Settings',\n                    params: {\n                        'Friction': {\n                            key: 'physics.friction',\n                            type: 'slider',\n                            min: 0.5,\n                            max: 2.0,\n                            step: 0.1\n                        },\n                        'Power': {\n                            key: 'physics.powerMultiplier',\n                            type: 'slider',\n                            min: 0.5,\n                            max: 2.0,\n                            step: 0.1\n                        },\n                        'AI Difficulty': {\n                            key: 'aiDifficulty',\n                            type: 'dropdown',\n                            options: [\n                                { label: 'Easy', value: 'easy' },\n                                { label: 'Medium', value: 'medium' },\n                                { label: 'Hard', value: 'hard' }\n                            ]\n                        }\n                    }\n                });\n\n                if (mode === 'edit') {\n                    setupEditMode();\n                } else {\n                    showLanguageSelection();\n                }\n\n                // Hide loading screen with smooth transition\n                setTimeout(() =\u003e {\n                    const loadingScreen = document.getElementById('loading-screen');\n                    if (loadingScreen) {\n                        loadingScreen.classList.add('hidden');\n                        // Remove from DOM after transition\n                        setTimeout(() =\u003e {\n                            loadingScreen.style.display = 'none';\n                        }, 500);\n                    }\n                }, 300);\n            }\n\n            function showLanguageSelection() {\n                gamePhase = 'LANGUAGE_SELECTION';\n                document.getElementById('language-selection').classList.add('visible');\n            }\n\n            function showTitleScreen() {\n                gamePhase = 'TITLE_SCREEN';\n                const titleScreen = document.getElementById('title-screen');\n                const titleLogo = document.getElementById('title-logo');\n                const tapToStart = document.getElementById('tap-to-start');\n                const modeSelection = document.getElementById('mode-selection');\n                \n                // Reset title screen state\n                titleScreenState = 'initial';\n                tapToStart.style.display = 'block';\n                tapToStart.style.opacity = '1';\n                modeSelection.classList.remove('visible');\n                \n                // Load the logo image\n                const logoAsset = lib.getAsset('ultimate_carrom_logo');\n                if (logoAsset) {\n                    titleLogo.src = logoAsset.url;\n                }\n                \n                titleScreen.classList.add('visible');\n            }\n\n            function hideTitleScreen() {\n                const titleScreen = document.getElementById('title-screen');\n                const modeSelection = document.getElementById('mode-selection');\n                const playerModeSelection = document.getElementById('player-mode-selection');\n                \n                // Show country selection instead of color selection\n                gamePhase = 'COUNTRY_SELECTION';\n                showCountrySelection();\n                \n                // Wait for country selection to start fading in before hiding title screen\n                setTimeout(() =\u003e {\n                    titleScreen.classList.remove('visible');\n                    modeSelection.classList.remove('visible');\n                    playerModeSelection.classList.remove('visible');\n                    playerModeSelection.style.display = 'none';\n                    // Reset title screen state for next time\n                    titleScreenState = 'initial';\n                }, 50);\n            }\n            \n            function showModeSelection() {\n                titleScreenState = 'mode_selection';\n                const tapToStart = document.getElementById('tap-to-start');\n                const modeSelection = document.getElementById('mode-selection');\n                const playerModeSelection = document.getElementById('player-mode-selection');\n                const continueTournamentBtn = document.getElementById('continue-tournament-btn');\n                const tournamentBtn = document.getElementById('tournament-btn');\n                \n                // Hide player mode selection if visible\n                playerModeSelection.style.display = 'none';\n                playerModeSelection.classList.remove('visible');\n                \n                // Continue Tournament replaces Tournament button when in progress\n                if (tournamentInProgress) {\n                    continueTournamentBtn.style.display = 'block';\n                    tournamentBtn.style.display = 'none';\n                } else {\n                    continueTournamentBtn.style.display = 'none';\n                    tournamentBtn.style.display = 'block';\n                }\n                \n                // Fade out \"Tap to Start\" and show mode buttons\n                tapToStart.style.opacity = '0';\n                setTimeout(() =\u003e {\n                    tapToStart.style.display = 'none';\n                }, 300);\n                modeSelection.classList.add('visible');\n            }\n            \n            function showPlayerModeSelection() {\n                const modeSelection = document.getElementById('mode-selection');\n                const playerModeSelection = document.getElementById('player-mode-selection');\n                \n                // Hide main mode selection\n                modeSelection.classList.remove('visible');\n                \n                // Show player mode selection\n                playerModeSelection.style.display = 'flex';\n                setTimeout(() =\u003e {\n                    playerModeSelection.classList.add('visible');\n                }, 50);\n            }\n\n            function showColorSelection() {\n                document.getElementById('color-selection').classList.add('visible');\n            }\n\n            function selectColor(color) {\n                playerColor = color;\n                aiColor = color === 'black' ? 'white' : 'black';\n                \n                // Update color indicators\n                const p1ColorIndicator = document.getElementById('p1-color');\n                const p2ColorIndicator = document.getElementById('p2-color');\n                \n                p1ColorIndicator.className = `player-color-indicator visible ${playerColor}`;\n                p2ColorIndicator.className = `player-color-indicator visible ${aiColor}`;\n                \n                document.getElementById('color-selection').classList.remove('visible');\n                \n                // Start the game\n                gamePhase = 'POSITIONING';\n                startTurn(1);\n            }\n            \n            function buildCountryButtons() {\n                const asianGrid = document.getElementById('asian-countries');\n                const europeanGrid = document.getElementById('european-countries');\n                const naGrid = document.getElementById('na-countries');\n                \n                // Build Asian countries\n                COUNTRIES.asia.forEach(country =\u003e {\n                    const btn = createCountryButton(country);\n                    asianGrid.appendChild(btn);\n                });\n                \n                // Build European countries\n                COUNTRIES.europe.forEach(country =\u003e {\n                    const btn = createCountryButton(country);\n                    europeanGrid.appendChild(btn);\n                });\n                \n                // Build North American countries\n                COUNTRIES.northAmerica.forEach(country =\u003e {\n                    const btn = createCountryButton(country);\n                    naGrid.appendChild(btn);\n                });\n            }\n            \n            function createCountryButton(country) {\n                const btn = document.createElement('button');\n                btn.className = 'country-btn';\n                btn.innerHTML = `\u003cspan class=\"flag\"\u003e${country.flag}\u003c/span\u003e\u003cspan class=\"name\"\u003e${country.name}\u003c/span\u003e`;\n                btn.addEventListener('click', () =\u003e selectCountry(country));\n                return btn;\n            }\n            \n            function showCountrySelection() {\n                const countrySelection = document.getElementById('country-selection');\n                const titleEl = countrySelection.querySelector('h1');\n                const subtitleEl = countrySelection.querySelector('p');\n                \n                // Update title based on mode and phase\n                if (isTwoPlayerMode) {\n                    if (countrySelectionPhase === 1) {\n                        titleEl.textContent = t('selectP1Country');\n                        subtitleEl.textContent = t('selectCountryDesc');\n                    } else {\n                        titleEl.textContent = t('selectP2Country');\n                        subtitleEl.textContent = t('selectCountryDesc');\n                    }\n                } else {\n                    titleEl.textContent = t('selectCountry');\n                    subtitleEl.textContent = t('selectCountryDesc');\n                }\n                \n                countrySelection.classList.add('visible');\n            }\n            \n            function selectCountry(country) {\n                if (tournamentMode) {\n                    // Hide country selection for tournament mode\n                    document.getElementById('country-selection').classList.remove('visible');\n                    \n                    // Tournament mode - generate bracket and show it\n                    playerCountry = country;\n                    generateTournamentBracket(country);\n                    simulateAIMatches(); // Simulate first round AI matches\n                    \n                    // Show bracket, then zoom to player's match\n                    showTournamentBracket(() =\u003e {\n                        startTournamentMatch();\n                    }, true);\n                } else if (isTwoPlayerMode) {\n                    // Two-player pass and play mode\n                    if (countrySelectionPhase === 1) {\n                        // Player 1 selected their country\n                        player1Country = country;\n                        playerCountry = country; // For backwards compatibility\n                        countrySelectionPhase = 2;\n                        \n                        // Update the country selection screen for player 2 WITHOUT hiding it\n                        // This prevents the flash to the game board\n                        const countrySelection = document.getElementById('country-selection');\n                        const titleEl = countrySelection.querySelector('h1');\n                        const subtitleEl = countrySelection.querySelector('p');\n                        titleEl.textContent = t('selectP2Country');\n                        subtitleEl.textContent = t('selectCountryDesc');\n                        // Screen stays visible - no transition needed\n                    } else {\n                        // Hide country selection when player 2 is done\n                        document.getElementById('country-selection').classList.remove('visible');\n                        // Player 2 selected their country\n                        player2Country = country;\n                        aiCountry = country; // Use aiCountry for player 2 for compatibility\n                        \n                        // Show matchup screen with color flickering\n                        showMatchupAndColorFlicker();\n                    }\n                } else {\n                    // Hide country selection for single match vs AI mode\n                    document.getElementById('country-selection').classList.remove('visible');\n                    \n                    // Single match vs AI mode - select random AI country (different from player's)\n                    playerCountry = country;\n                    const allCountries = getAllCountries();\n                    const availableCountries = allCountries.filter(c =\u003e c.code !== country.code);\n                    aiCountry = availableCountries[Math.floor(Math.random() * availableCountries.length)];\n                    \n                    // Show matchup screen with color flickering\n                    showMatchupAndColorFlicker();\n                }\n            }\n            \n            function showMatchupAndColorFlicker() {\n                const display = document.getElementById('ai-country-display');\n                \n                // Set player 1 info\n                document.getElementById('matchup-player-flag').textContent = playerCountry.flag;\n                document.getElementById('matchup-player-name').textContent = playerCountry.name;\n                \n                // Set player 2 / AI info\n                document.getElementById('matchup-ai-flag').textContent = aiCountry.flag;\n                document.getElementById('matchup-ai-name').textContent = aiCountry.name;\n                \n                // Update labels for 2P mode\n                const matchupLabels = document.querySelectorAll('.matchup-label');\n                if (isTwoPlayerMode) {\n                    matchupLabels[0].textContent = t('player1');\n                    matchupLabels[1].textContent = t('player2');\n                } else {\n                    matchupLabels[0].textContent = t('you');\n                    matchupLabels[1].textContent = t('ai');\n                }\n                \n                // Reset color flicker state\n                document.getElementById('color-flicker-text').textContent = t('selectingColor');\n                document.getElementById('flicker-black').classList.remove('selected');\n                document.getElementById('flicker-white').classList.remove('selected');\n                \n                display.classList.add('visible');\n                \n                // Start color flickering animation\n                runColorFlicker(0, 15);\n            }\n            \n            function runColorFlicker(count, maxCount) {\n                const flickerBlack = document.getElementById('flicker-black');\n                const flickerWhite = document.getElementById('flicker-white');\n                const flickerText = document.getElementById('color-flicker-text');\n                \n                if (count \u003e= maxCount) {\n                    // Final random selection\n                    const finalColor = Math.random() \u003c 0.5 ? 'black' : 'white';\n                    \n                    flickerBlack.classList.remove('selected');\n                    flickerWhite.classList.remove('selected');\n                    \n                    if (finalColor === 'black') {\n                        flickerBlack.classList.add('selected');\n                    } else {\n                        flickerWhite.classList.add('selected');\n                    }\n                    \n                    let colorText;\n                    if (isTwoPlayerMode) {\n                        colorText = finalColor === 'black' ? t('player1PlaysBlack') : t('player1PlaysWhite');\n                    } else {\n                        colorText = finalColor === 'black' ? t('youPlayBlack') : t('youPlayWhite');\n                    }\n                    flickerText.textContent = colorText;\n                    \n                    // Wait a moment then start the game\n                    setTimeout(() =\u003e {\n                        document.getElementById('ai-country-display').classList.remove('visible');\n                        finishSetupAndStartGame(finalColor);\n                    }, 1500);\n                    return;\n                }\n                \n                // Toggle highlight\n                const isBlackHighlighted = flickerBlack.classList.contains('selected');\n                flickerBlack.classList.toggle('selected', !isBlackHighlighted);\n                flickerWhite.classList.toggle('selected', isBlackHighlighted);\n                \n                // Calculate delay - starts fast, slows down\n                const baseDelay = 100;\n                const slowdownFactor = count \u003e 10 ? (count - 10) * 40 : 0;\n                const delay = baseDelay + slowdownFactor;\n                \n                setTimeout(() =\u003e runColorFlicker(count + 1, maxCount), delay);\n            }\n            \n            function finishSetupAndStartGame(color) {\n                playerColor = color;\n                aiColor = color === 'black' ? 'white' : 'black';\n                \n                // Update color indicators\n                const p1ColorIndicator = document.getElementById('p1-color');\n                const p2ColorIndicator = document.getElementById('p2-color');\n                \n                p1ColorIndicator.className = `player-color-indicator visible ${playerColor}`;\n                p2ColorIndicator.className = `player-color-indicator visible ${aiColor}`;\n                \n                // Update flags in score panel\n                const p1Flag = document.getElementById('p1-flag');\n                const p2Flag = document.getElementById('p2-flag');\n                \n                p1Flag.textContent = playerCountry.flag;\n                p2Flag.textContent = aiCountry.flag;\n                p1Flag.classList.add('visible');\n                p2Flag.classList.add('visible');\n                \n                // Update names based on game mode\n                if (isTwoPlayerMode) {\n                    document.getElementById('p1-name').textContent = playerCountry.name;\n                    document.getElementById('p2-name').textContent = aiCountry.name;\n                } else {\n                    document.getElementById('p1-name').textContent = playerCountry.name;\n                    document.getElementById('p2-name').textContent = aiCountry.name;\n                }\n                \n                // White color goes first - determine starting player\n                const startingPlayer = playerColor === 'white' ? 1 : 2;\n                currentPlayer = startingPlayer;\n                \n                // Set initial camera perspective based on starting player\n                if (isTwoPlayerMode) {\n                    setCameraForPlayer(startingPlayer);\n                    // Directly set camera position to starting player's perspective (no transition at game start)\n                    camera.position.set(cameraTarget.x, cameraTarget.y, cameraTarget.z);\n                    camera.lookAt(cameraLookAt.x, cameraLookAt.y, cameraLookAt.z);\n                }\n                \n                // Start the game with the player who has white pieces\n                gamePhase = 'POSITIONING';\n                startTurn(startingPlayer);\n            }\n\n            function resetGame() {\n                // Clear all PiP windows first\n                clearAllPiPWindows();\n                \n\n                \n                // Reset state\n                pocketedPieces = { 1: [], 2: [] };\n                foulDebt = { 1: 0, 2: 0 }; // Reset foul debt\n                consecutiveFouls = { 1: 0, 2: 0 }; // Reset consecutive foul counter\n                queenPocketed = false;\n                queenCovered = false;\n                queenPocketedBy = null;\n                queenAwaitingCover = false;\n                currentPlayer = 1;\n                isInitialBreak = true; // Reset for new game\n                playerColor = null;\n                aiColor = null;\n                playerCountry = null;\n                aiCountry = null;\n                resetTurnState();\n                returningPieces = []; // Clear any returning pieces\n                \n                // Reset tournament state\n                tournamentMode = false;\n                tournamentBracket = [];\n                tournamentRound = 0;\n                playerBracketPosition = { round: 0, match: 0 };\n                currentOpponentCountry = null;\n                \n                // Reset 2P mode state\n                isTwoPlayerMode = false;\n                player1Country = null;\n                player2Country = null;\n                countrySelectionPhase = 1;\n                \n                // Clear position history to free memory\n                positionHistory.clear();\n                \n                // Reset flag displays\n                const p1Flag = document.getElementById('p1-flag');\n                const p2Flag = document.getElementById('p2-flag');\n                p1Flag.classList.remove('visible');\n                p2Flag.classList.remove('visible');\n                \n                // Reset player names\n                document.getElementById('p1-name').textContent = t('you');\n                document.getElementById('p2-name').textContent = t('ai');\n                \n                // Reset color indicators\n                document.getElementById('p1-color').className = 'player-color-indicator';\n                document.getElementById('p2-color').className = 'player-color-indicator';\n\n                // Reset pieces (also disposes old geometries/materials)\n                setupPieces();\n                \n                // Show language selection again\n                gamePhase = 'LANGUAGE_SELECTION';\n                showLanguageSelection();\n            }\n\n            // ==================== GAME LOOP ====================\n            let lastTime = 0;\n            let resolvingTimer = 0;\n            let baselineFlashTime = 0;\n\n            function gameLoop(timestamp) {\n                const deltaTime = (timestamp - lastTime) / 1000;\n                lastTime = timestamp;\n\n                if (mode === 'play') {\n                    // Update returning pieces animation\n                    updateReturningPieces(deltaTime);\n                    \n                    // Check if waiting for pieces to return before switching turns\n                    if (waitingForPiecesReturn \u0026\u0026 returningPieces.length === 0) {\n                        // Also wait for foul message to clear before switching\n                        if (foulMessageVisible) {\n                            // Keep waiting - don't clear waitingForPiecesReturn yet\n                            // The foul message will clear on its own timeout\n                        } else {\n                            waitingForPiecesReturn = false;\n                            \n                            if (pendingTurnSwitch) {\n                                resetTurnState();\n                                currentPlayer = pendingTurnSwitch.nextPlayer;\n                                \n                                // Small delay before starting the turn for smooth transition\n                                setTimeout(() =\u003e {\n                                    if (currentPlayer === 2 \u0026\u0026 !isTwoPlayerMode) {\n                                        // AI turn after foul\n                                        aiPlannedShot = calculateAIShot();\n                                        aiPlacementStartPos = { x: striker.x, z: striker.z };\n                                        aiPlacementAnimProgress = 0;\n                                        gamePhase = 'AI_TURN';\n                                        showTurnIndicator(t('aiTurn'), t('positioning'));\n                                        updateInstructions(t('aiPositioning'));\n                                    } else {\n                                        striker.floating = true;\n                                        striker.floatStartTime = performance.now();\n                                        startTurn(currentPlayer);\n                                    }\n                                }, 400); // Brief pause after pieces settle\n                                \n                                pendingTurnSwitch = null;\n                            }\n                        }\n                    }\n                    \n                    // Handle striker placement animation\n                    if (striker.placementAnimating) {\n                        const animationSpeed = 3.5; // Progress per second\n                        striker.placementProgress += animationSpeed * deltaTime;\n                        \n                        if (striker.placementProgress \u003e= 1.0) {\n                            // Animation complete\n                            striker.placementProgress = 1.0;\n                            striker.placementAnimating = false;\n                            striker.mesh.position.x = striker.x;\n                            striker.mesh.position.y = 7;\n                            striker.mesh.position.z = striker.z;\n                            striker.floating = false;\n                            strikerPlaced = true;\n                            gamePhase = 'AIMING';\n                            setCameraState('WIDE');\n                            updateInstructions(t('dragToAim'));\n                            \n                            // Hide baseline tutorial and show drag tutorial\n                            if (!tutorialCompleted \u0026\u0026 tutorialPhase === 'baseline') {\n                                hideTutorial();\n                                setTimeout(() =\u003e showTutorialDrag(), 300);\n                            }\n                        } else {\n                            // Smooth ease-out animation\n                            const t = striker.placementProgress;\n                            const eased = 1 - Math.pow(1 - t, 3); // Cubic ease-out\n                            \n                            // Animate from starting position below baseline to placement position on baseline\n                            striker.mesh.position.x = striker.placementStartX + (striker.placementTargetX - striker.placementStartX) * eased;\n                            striker.mesh.position.y = striker.placementStartY + (striker.placementTargetY - striker.placementStartY) * eased;\n                            striker.mesh.position.z = striker.placementStartZ + (striker.placementTargetZ - striker.placementStartZ) * eased;\n                        }\n                    }\n                    \n                    // Handle AI placement animation\n                    if (gamePhase === 'AI_TURN' \u0026\u0026 aiPlannedShot \u0026\u0026 aiPlacementAnimProgress \u003c 1.0) {\n                        const animationSpeed = 2.0; // Progress per second\n                        aiPlacementAnimProgress += animationSpeed * deltaTime;\n                        \n                        if (aiPlacementAnimProgress \u003e= 1.0) {\n                            // Animation complete - move to aiming phase\n                            aiPlacementAnimProgress = 1.0;\n                            striker.x = aiPlannedShot.position.x;\n                            striker.z = aiPlannedShot.position.z;\n                            striker.mesh.position.x = striker.x;\n                            striker.mesh.position.y = 7;\n                            striker.mesh.position.z = striker.z;\n                            \n                            // Start aiming phase\n                            gamePhase = 'AI_AIMING';\n                            aiAimingTimer = 0;\n                            showTurnIndicator(t('aiTurn'), t('aiming'));\n                            updateInstructions(t('aiAiming'));\n                            \n                            // Set aim direction for frame-synced drawing\n                            currentAimDirX = aiPlannedShot.direction.x;\n                            currentAimDirZ = aiPlannedShot.direction.z;\n                            isAiming = true;\n                        } else {\n                            // Smooth ease-out animation\n                            const t = aiPlacementAnimProgress;\n                            const eased = 1 - Math.pow(1 - t, 3); // Cubic ease-out\n                            \n                            // Animate from start position to target position\n                            striker.x = aiPlacementStartPos.x + (aiPlannedShot.position.x - aiPlacementStartPos.x) * eased;\n                            striker.z = aiPlacementStartPos.z + (aiPlannedShot.position.z - aiPlacementStartPos.z) * eased;\n                            striker.mesh.position.x = striker.x;\n                            striker.mesh.position.y = 20 - (13 * eased); // Drop from 20 to 7\n                            striker.mesh.position.z = striker.z;\n                        }\n                    }\n                    \n                    // Handle AI aiming phase\n                    if (gamePhase === 'AI_AIMING') {\n                        aiAimingTimer += deltaTime;\n                        \n                        if (aiAimingTimer \u003e= 1.0) {\n                            // Aiming complete - execute shot\n                            striker.vx = aiPlannedShot.direction.x * aiPlannedShot.power * powerMultiplier;\n                            striker.vz = aiPlannedShot.direction.z * aiPlannedShot.power * powerMultiplier;\n                            \n                            gamePhase = 'SHOOTING';\n                            setCameraState('FOLLOWING');\n                            isAiming = false;\n                            updateInstructions('');\n                            \n                            aiPlannedShot = null;\n                            aiAimingTimer = 0;\n                        }\n                    }\n                    \n                    // Handle delayed camera transition during aiming\n                    if (gamePhase === 'AIMING' \u0026\u0026 isDragging \u0026\u0026 cameraState === 'WIDE') {\n                        const dragDuration = (performance.now() - dragStartTime) / 1000;\n                        if (dragDuration \u003e= 0.25) {\n                            setCameraState('BEHIND_STRIKER');\n                        }\n                    }\n                    \n                    if (gamePhase === 'SHOOTING') {\n                        updatePhysics(deltaTime);\n\n                        if (!isMoving()) {\n                            resolvingTimer += deltaTime;\n                            if (resolvingTimer \u003e 0.5) {\n                                resolvingTimer = 0;\n                                gamePhase = 'RESOLVING';\n                                resolveShot();\n                            }\n                        } else {\n                            resolvingTimer = 0;\n                        }\n                    } else if (gamePhase === 'RETURNING_STRIKER') {\n                        updateStrikerReturn(deltaTime);\n                    } else if (gamePhase === 'POSITIONING' \u0026\u0026 striker.floating) {\n                        // Animate floating striker with subtle bob\n                        const floatTime = (timestamp - striker.floatStartTime) / 1000;\n                        const floatOffset = Math.sin(floatTime * 2) * 5; // Oscillate 5 units up/down\n                        striker.mesh.position.y = 20 + floatOffset;\n                    }\n                    \n                    // Update camera with smooth transitions\n                    updateCamera(deltaTime);\n                    \n                    // Clear aim canvas every frame to prevent stale data\n                    clearAimCanvas();\n                    \n                    // Draw aim line if actively aiming (uses current frame's camera state)\n                    if (isAiming \u0026\u0026 striker) {\n                        updateAimLine(striker.x, striker.z, currentAimDirX, currentAimDirZ);\n                    }\n                    \n                    // Update all PiP windows\n                    updateAllPiPWindows(deltaTime, timestamp / 1000);\n                    \n                    // Update tutorial animations\n                    updateTutorialAnimations(deltaTime);\n                    \n                    // Update baseline visibility and flash animation\n                    if (baselineMesh) {\n                        // In 2P mode, show baseline for both players during their turn\n                        const isHumanPositioning = (gamePhase === 'POSITIONING' || gamePhase === 'AIMING');\n                        const shouldShowBaseline = isHumanPositioning \u0026\u0026 (currentPlayer === 1 || isTwoPlayerMode);\n                        \n                        if (shouldShowBaseline) {\n                            baselineMesh.visible = true;\n                            // Position baseline on current player's side\n                            const baselineZ = currentPlayer === 1 ? BASELINE_OFFSET : -BASELINE_OFFSET;\n                            baselineMesh.position.z = baselineZ;\n                            \n                            // Slow flash animation (1.5 second cycle)\n                            baselineFlashTime += deltaTime;\n                            const flashCycle = 1.5;\n                            const phase = (baselineFlashTime % flashCycle) / flashCycle;\n                            \n                            // Smooth sine wave oscillation between 0.3 and 0.8 opacity\n                            const minOpacity = 0.3;\n                            const maxOpacity = 0.8;\n                            const opacity = minOpacity + (maxOpacity - minOpacity) * (0.5 + 0.5 * Math.sin(phase * Math.PI * 2));\n                            \n                            baselineMesh.material.opacity = opacity;\n                        } else {\n                            baselineMesh.visible = false;\n                        }\n                    }\n                }\n\n                renderer.render(scene, camera);\n                requestAnimationFrame(gameLoop);\n            }\n\n            // Start\n            await init();\n            requestAnimationFrame(gameLoop);\n        }\n    \u003c/script\u003e\n\u003c/body\u003e\n\u003c/html\u003e"])</script><script>self.__next_f.push([1,"21:T3b32,"])</script><script>self.__next_f.push([1,"## Core Game Loop and Mechanics\n\n**3D Carrom Clash** brings the classic tabletop game of carrom to life in a fully 3D environment with realistic physics. Players experience the satisfying tactile feel of flicking a striker across a polished wooden board to pocket carrom men.\n\n### Moment-to-Moment Gameplay\n1. **Aim Phase**: Player positions the striker along their baseline and aims by dragging to set direction and power\n2. **Flick Phase**: Player releases to launch the striker with physics-based momentum\n3. **Resolution Phase**: Watch pieces collide, slide, and potentially fall into pockets\n4. **Turn Progression**: Turns alternate based on successful pocketing\n\n### Core Mechanics\n- **Striker Control**: Drag-based aiming system where pull distance determines power, angle determines direction\n- **Physics Simulation**: Realistic collision detection, friction, and momentum transfer between striker and carrom men\n- **Pocketing**: Pieces that fall into corner pockets are removed from play\n- **Fouls**: Striker pocketing or failing to hit any piece results in penalty (return one pocketed piece)\n\n### Win Conditions\n- **Victory**: First player to pocket all their assigned color pieces (after pocketing the queen and covering it)\n- **Queen Rule**: The red queen must be pocketed, then \"covered\" by pocketing one of your own pieces in the next turn\n- **Scoring**: Black pieces = 1 point each, White pieces = 1 point each, Queen = 3 points (if covered)\n\n### Engagement \u0026 Replayability\n- Satisfying physics feedback with realistic piece interactions\n- Strategic shot planning (defensive positioning, combination shots)\n- Skill-based progression as players master power and angle control\n- Quick rounds (5-10 minutes) perfect for casual play sessions\n\n---\n\n## Starting Scope\n\nThe first iteration focuses on delivering a polished, playable single-player experience against a basic AI opponent:\n\n### Must Have (First Iteration)\n- **3D Board \u0026 Pieces**: Fully rendered 3D carrom board with striker and 19 pieces (9 black, 9 white, 1 red queen)\n- **Core Physics**: Realistic sliding, collision, and pocketing mechanics\n- **Flick Controls**: Intuitive drag-to-aim, release-to-shoot striker control\n- **Basic AI Opponent**: Simple computer player that takes reasonable shots\n- **Turn System**: Proper turn alternation with foul detection\n- **Queen Rule**: Basic queen pocketing and covering mechanic\n- **Win Detection**: Game ends when one player pockets all their pieces\n- **Score Display**: Current score and piece count for both players\n- **Camera**: Fixed angled top-down view showing entire board\n\n### Future Enhancements (Later Iterations)\n- **Multiplayer**: Local pass-and-play or online multiplayer\n- **Advanced AI**: Multiple difficulty levels with strategic shot selection\n- **Shot Replay**: Slow-motion replay of spectacular shots\n- **Tournaments**: Multi-round tournament mode\n- **Customization**: Different board materials, striker designs\n- **Power-ups**: Optional arcade mode with special abilities\n- **Statistics**: Track win rate, best shots, accuracy over time\n\n---\n\n## Game Perspective\n\n**3D Third-Person (Fixed Angled Top-Down)**\n\nThe game uses a fixed camera positioned above and slightly behind one side of the board, providing a clear view of the entire playing surface. This perspective:\n- Shows all pieces and pockets clearly\n- Maintains consistent spatial awareness\n- Allows players to judge angles and distances accurately\n- Provides a natural view similar to standing over a real carrom board\n- Camera angle approximately 60-70 degrees from horizontal, positioned to show the full board\n\nThe 3D rendering adds depth and realism while maintaining the clarity needed for precise aiming. Pieces cast subtle shadows on the board surface to enhance depth perception.\n\n---\n\n## Game World and Level Design\n\n### The Carrom Board\nThe game takes place on a single, beautifully rendered 3D carrom board:\n\n**Board Specifications:**\n- Square playing surface (approximately 600x600 game units)\n- Polished wooden texture with natural grain\n- Four corner pockets (circular holes, ~80 unit diameter)\n- Boundary lines marking the play area\n- Four baseline positions (one per side) where striker can be placed\n- Center circle where pieces are initially arranged\n\n**Visual Environment:**\n- Board sits on a simple table or stand\n- Neutral background (soft gradient or subtle room environment)\n- Warm, even lighting to highlight the board without harsh shadows\n- Minimal distractions to keep focus on gameplay\n\n**Piece Layout (Starting Position):**\n- Center circle arrangement in a tight cluster:\n  - Queen (red) in the exact center\n  - Alternating black and white pieces in two concentric rings around queen\n  - Inner ring: 6 pieces alternating colors\n  - Outer ring: 12 pieces alternating colors\n- Striker starts off-board, player places it on their baseline\n\n**Physics Properties:**\n- Board surface: Low friction (smooth sliding)\n- Pieces: Medium friction, realistic weight distribution\n- Pockets: Pieces fall in when center point crosses pocket edge\n- Boundaries: Pieces bounce off edges with energy loss\n\n---\n\n## Edit Mode Design\n\nEdit mode allows players to customize their carrom experience while maintaining game balance and playability.\n\n### Editable Properties\n\n**Visual Customization:**\n- **Board Material**: Choose wood type (maple, mahogany, teak) affecting color and grain\n- **Piece Colors**: Customize the two player colors (default black/white, but allow any contrasting pair)\n- **Queen Color**: Change queen piece color (default red)\n- **Striker Design**: Select striker appearance (classic wooden, metallic, custom colors)\n\n**Gameplay Parameters:**\n- **Physics Settings**:\n  - Friction coefficient (0.5 - 2.0, de
