  }\n\n        /* Picture-in-Picture Windows Container */\n        .pip-container {\n            position: absolute;\n            top: 0;\n            left: 0;\n            width: 100%;\n            height: 100%;\n            pointer-events: none;\n            z-index: 50;\n        }\n\n        /* Picture-in-Picture Window */\n        .pip-window {\n            position: absolute;\n            width: 180px;\n            height: 180px;\n            background: rgba(0,0,0,0.9);\n            border-radius: 16px;\n            overflow: hidden;\n            opacity: 0;\n            pointer-events: none;\n            transition: opacity var(--transition-normal) var(--ease-out),\n                        transform var(--transition-normal) var(--ease-out);\n            box-shadow: 0 8px 32px rgba(0,0,0,0.6);\n            border: 3px solid rgba(255, 179, 0, 0.6);\n            transform: scale(0.9);\n        }\n\n        .pip-window.visible {\n            opacity: 1;\n            transform: scale(1);\n        }\n\n        .pip-window canvas {\n            width: 100%;\n            height: 100%;\n            display: block;\n        }\n\n        .pip-label {\n            position: absolute;\n            bottom: 8px;\n            left: 50%;\n            transform: translateX(-50%);\n            background: rgba(255, 179, 0, 0.9);\n            padding: 4px 12px;\n            border-radius: 8px;\n            font-size: 13px;\n            font-weight: bold;\n            color: #3E2723;\n            text-transform: uppercase;\n            letter-spacing: 1px;\n            white-space: nowrap;\n        }\n\n        /* Tutorial Elements */\n        .tutorial-finger {\n            position: absolute;\n            width: 60px;\n            height: 60px;\n            pointer-events: none;\n            opacity: 0;\n            transition: opacity var(--transition-normal) var(--ease-out);\n            z-index: 200;\n        }\n\n        .tutorial-finger.visible {\n            opacity: 0.9;\n        }\n\n        .tutorial-finger::before {\n            content: '☝️';\n            font-size: 48px;\n            position: absolute;\n            top: 50%;\n            left: 50%;\n            transform: translate(-50%, -50%);\n        }\n\n        .tutorial-highlight {\n            position: absolute;\n            width: 80px;\n            height: 80px;\n            border: 4px solid #FFB300;\n            border-radius: 50%;\n            pointer-events: none;\n            opacity: 0;\n            transition: opacity var(--transition-normal) var(--ease-out);\n            z-index: 199;\n            left: -200px;\n            top: -200px;\n        }\n\n        .tutorial-highlight.visible {\n            opacity: 0.8;\n            animation: pulse 1.5s ease-in-out infinite;\n        }\n\n        #aim-canvas {\n            position: absolute;\n            top: 0;\n            left: 0;\n            width: 100%;\n            height: 100%;\n            pointer-events: none;\n            z-index: 5;\n        }\n\n        @keyframes pulse {\n            0%, 100% {\n                transform: translate(-50%, -50%) scale(1);\n                opacity: 0.8;\n            }\n            50% {\n                transform: translate(-50%, -50%) scale(1.1);\n                opacity: 0.5;\n            }\n        }\n\n        /* Language Selection Screen */\n        .language-selection {\n            position: absolute;\n            top: 0;\n            left: 0;\n            width: 100%;\n            height: 100%;\n            background: rgba(0,0,0,0.95);\n            display: flex;\n            flex-direction: column;\n            justify-content: center;\n            align-items: center;\n            opacity: 0;\n            pointer-events: none;\n            transition: opacity var(--transition-normal) var(--ease-out);\n            z-index: 160;\n        }\n\n        .language-selection.visible {\n            opacity: 1;\n            pointer-events: auto;\n        }\n\n        .language-selection h1 {\n            font-size: 36px;\n            color: #FFB300;\n            margin-bottom: 16px;\n            font-family: 'Fredoka', sans-serif;\n            text-shadow: 0 4px 12px rgba(0,0,0,0.5);\n        }\n\n        .language-selection p {\n            font-size: 20px;\n            color: #F9F6F0;\n            margin-bottom: 48px;\n        }\n\n        .language-options {\n            display: flex;\n            gap: 24px;\n            flex-wrap: wrap;\n            justify-content: center;\n        }\n\n        .language-btn {\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            min-width: 180px;\n            min-height: 120px;\n            padding: 24px 32px;\n            font-size: 28px;\n            background: rgba(62, 39, 35, 0.95);\n            color: #F9F6F0;\n            border: 3px solid rgba(255, 179, 0, 0.3);\n            border-radius: 20px;\n            cursor: pointer;\n            font-weight: bold;\n            font-family: 'Fredoka', sans-serif;\n            transition: transform var(--transition-fast) var(--ease-out),\n                        box-shadow var(--transition-fast) var(--ease-out),\n                        border-color var(--transition-fast) var(--ease-out);\n            box-shadow: 0 4px 16px rgba(0,0,0,0.4);\n        }\n        .rtl .country-btn {\n            flex-direction: column;\n        }\n        .rtl .country-region h2 {\n            border-left: none;\n            border-right: none;\n        }\n\n        .rtl .matchup-container {\n            flex-direction: row-reverse;\n        }\n\n        /* Loading Screen */\n        .loading-screen {\n            position: fixed;\n            top: 0;\n            left: 0;\n            width: 100%;\n            height: 100%;\n            background: linear-gradient(135deg, #1a1a1a 0%, #2d1f1a 100%);\n            display: flex;\n            flex-direction: column;\n            justify-content: center;\n            align-items: center;\n            z-index: 9999;\n            opacity: 1;\n            transition: opacity 0.5s ease-out;\n        }\n\n        .loading-screen.hidden {\n            opacity: 0;\n            pointer-events: none;\n        }\n\n        .loading-logo {\n            font-size: 48px;\n            color: #FFB300;\n            font-family: 'Fredoka', sans-serif;\n            font-weight: 600;\n            margin-bottom: 40px;\n            text-shadow: 0 4px 12px rgba(255, 179, 0, 0.4);\n        }\n\n        .loading-bar-container {\n            width: 80%;\n            max-width: 400px;\n            height: 8px;\n            background: rgba(255, 255, 255, 0.1);\n            border-radius: 4px;\n            overflow: hidden;\n            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);\n        }\n\n        .loading-bar {\n            width: 0%;\n            height: 100%;\n            background: linear-gradient(90deg, #FFB300 0%, #FFC947 100%);\n            border-radius: 4px;\n            transition: width 0.3s ease-out;\n            box-shadow: 0 0 10px rgba(255, 179, 0, 0.5);\n        }\n\n        .loading-text {\n            margin-top: 20px;\n            font-size: 18px;\n            color: #F9F6F0;\n            font-family: 'Inter', sans-serif;\n        }\n\n        @keyframes shimmer {\n            0% {\n                background-position: -400px 0;\n            }\n            100% {\n                background-position: 400px 0;\n            }\n        }\n    \u003c/style\u003e\n    \u003clink href=\"https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700\u0026family=Fredoka:wght@600\u0026display=swap\" rel=\"stylesheet\"\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n    \u003cdiv class=\"loading-screen\" id=\"loading-screen\"\u003e\n        \u003cdiv class=\"loading-logo\"\u003eUltimate Carrom\u003c/div\u003e\n        \u003cdiv class=\"loading-bar-container\"\u003e\n            \u003cdiv class=\"loading-bar\" id=\"loading-bar\"\u003e\u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"loading-text\" id=\"loading-text\"\u003eLoading assets...\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv id=\"game-world\"\u003e\n        \u003ccanvas id=\"game-canvas\"\u003e\u003c/canvas\u003e\n        \u003cdiv class=\"ui-overlay\"\u003e\n            \u003cdiv class=\"score-panel\"\u003e\n                \u003cdiv class=\"player-score\" id=\"player1-score\"\u003e\n                    \u003cspan class=\"player-flag\" id=\"p1-flag\"\u003e\u003c/span\u003e\n                    \u003cdiv class=\"player-color-indicator\" id=\"p1-color\"\u003e\u003c/div\u003e\n                    \u003cspan class=\"player-name\" id=\"p1-name\"\u003eYou\u003c/span\u003e\n                    \u003cspan class=\"player-pieces\" id=\"p1-pieces\"\u003e9\u003c/span\u003e\n                    \u003cspan class=\"player-label\"\u003epieces left\u003c/span\u003e\n                \u003c/div\u003e\n                \u003cdiv class=\"player-score\" id=\"player2-score\"\u003e\n                    \u003cspan class=\"player-flag\" id=\"p2-flag\"\u003e\u003c/span\u003e\n                    \u003cdiv class=\"player-color-indicator\" id=\"p2-color\"\u003e\u003c/div\u003e\n                    \u003cspan class=\"player-name\" id=\"p2-name\"\u003eAI\u003c/span\u003e\n                    \u003cspan class=\"player-pieces\" id=\"p2-pieces\"\u003e9\u003c/span\u003e\n                    \u003cspan class=\"player-label\"\u003epieces left\u003c/span\u003e\n                \u003c/div\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"turn-indicator\" id=\"turn-indicator\"\u003e\n                \u003ch2 id=\"turn-text\"\u003eYour Turn\u003c/h2\u003e\n                \u003cp id=\"turn-instruction\"\u003ePlace striker on baseline\u003c/p\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"power-meter\" id=\"power-meter\"\u003e\n                \u003cdiv class=\"power-fill\" id=\"power-fill\"\u003e\u003c/div\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"instructions\" id=\"instructions\"\u003e\n                \u003cp id=\"instruction-text\"\u003eTap baseline to place striker\u003c/p\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"foul-message\" id=\"foul-message\"\u003e\n                \u003cp\u003eFOUL!\u003c/p\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"game-over\" id=\"game-over\"\u003e\n                \u003ch1 id=\"winner-text\"\u003eYou Win!\u003c/h1\u003e\n                \u003cp id=\"final-score\"\u003eFinal Score: 9 - 3\u003c/p\u003e\n                \u003cbutton class=\"restart-btn\" id=\"restart-btn\"\u003ePlay Again\u003c/button\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"language-selection\" id=\"language-selection\"\u003e\n                \u003ch1\u003eSelect Language\u003c/h1\u003e\n                \u003cp\u003eاختر اللغة\u003c/p\u003e\n                \u003cdiv class=\"language-options\"\u003e\n                    \u003cbutton class=\"language-btn\" id=\"lang-english\"\u003e\n                        \u003cspan class=\"lang-icon\"\u003e🇬🇧\u003c/span\u003e\n                        \u003cspan\u003eEnglish\u003c/span\u003e\n                    \u003c/button\u003e\n                    \u003cbutton class=\"language-btn\" id=\"lang-arabic\"\u003e\n                        \u003cspan class=\"lang-icon\"\u003e🇸🇦\u003c/span\u003e\n                        \u003cspan\u003eالعربية\u003c/span\u003e\n                    \u003c/button\u003e\n                \u003c/div\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"title-screen\" id=\"title-screen\"\u003e\n                \u003cimg class=\"title-logo\" id=\"title-logo\" src=\"\" alt=\"Ultimate Carrom\"\u003e\n                \u003cp class=\"tap-to-start\" id=\"tap-to-start\"\u003e- Tap to Start -\u003c/p\u003e\n                \u003cdiv class=\"mode-selection\" id=\"mode-selection\"\u003e\n                    \u003cbutton class=\"mode-btn continue\" id=\"continue-tournament-btn\" style=\"display: none;\"\u003eContinue Tournament\u003c/button\u003e\n                    \u003cbutton class=\"mode-btn\" id=\"single-match-btn\"\u003eSingle Match\u003c/button\u003e\n                    \u003cbutton class=\"mode-btn\" id=\"tournament-btn\"\u003eTournament\u003c/button\u003e\n                \u003c/div\u003e\n                \u003cdiv class=\"mode-selection\" id=\"player-mode-selection\" style=\"display: none;\"\u003e\n                    \u003cbutton class=\"mode-btn\" id=\"vs-ai-btn\"\u003e1P versus AI\u003c/button\u003e\n                    \u003cbutton class=\"mode-btn\" id=\"vs-player-btn\"\u003e2P Pass \u0026 Play\u003c/button\u003e\n                \u003c/div\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"country-selection\" id=\"country-selection\"\u003e\n                \u003ch1\u003eSelect Your Country\u003c/h1\u003e\n                \u003cp\u003eChoose the country you want to represent\u003c/p\u003e\n                \u003cdiv class=\"country-region\"\u003e\n                    \u003ch2\u003eAsia\u003c/h2\u003e\n                    \u003cdiv class=\"country-grid\" id=\"asian-countries\"\u003e\u003c/div\u003e\n                \u003c/div\u003e\n                \u003cdiv class=\"country-region\"\u003e\n                    \u003ch2\u003eEurope\u003c/h2\u003e\n                    \u003cdiv class=\"country-grid\" id=\"european-countries\"\u003e\u003c/div\u003e\n                \u003c/div\u003e\n                \u003cdiv class=\"country-region\"\u003e\n                    \u003ch2\u003eAmericas\u003c/h2\u003e\n                    \u003cdiv class=\"country-grid\" id=\"na-countries\"\u003e\u003c/div\u003e\n                \u003c/div\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"ai-country-display\" id=\"ai-country-display\"\u003e\n                \u003cdiv class=\"matchup-container\"\u003e\n                    \u003cdiv class=\"matchup-player\"\u003e\n                        \u003cspan class=\"matchup-flag\" id=\"matchup-player-flag\"\u003e\u003c/span\u003e\n                        \u003cspan class=\"matchup-name\" id=\"matchup-player-name\"\u003e\u003c/span\u003e\n                        \u003cspan class=\"matchup-label\"\u003eYou\u003c/span\u003e\n                    \u003c/div\u003e\n                    \u003cspan class=\"matchup-vs\"\u003eVS\u003c/span\u003e\n                    \u003cdiv class=\"matchup-player\"\u003e\n                        \u003cspan class=\"matchup-flag\" id=\"matchup-ai-flag\"\u003e\u003c/span\u003e\n                        \u003cspan class=\"matchup-name\" id=\"matchup-ai-name\"\u003e\u003c/span\u003e\n                        \u003cspan class=\"matchup-label\"\u003eAI\u003c/span\u003e\n                    \u003c/div\u003e\n                \u003c/div\u003e\n                \u003cdiv class=\"color-flicker-container\"\u003e\n                    \u003cspan class=\"color-flicker-text\" id=\"color-flicker-text\"\u003eSelecting color...\u003c/span\u003e\n                    \u003cdiv class=\"color-flicker-pieces\"\u003e\n                        \u003cdiv class=\"flicker-piece black\" id=\"flicker-black\"\u003e\u003c/div\u003e\n                        \u003cdiv class=\"flicker-piece white\" id=\"flicker-white\"\u003e\u003c/div\u003e\n                    \u003c/div\u003e\n                \u003c/div\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"pip-container\" id=\"pip-container\"\u003e\n                \u003c!-- PiP windows will be created dynamically here --\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"tutorial-finger\" id=\"tutorial-finger\"\u003e\u003c/div\u003e\n            \u003cdiv class=\"tutorial-highlight\" id=\"tutorial-highlight\"\u003e\u003c/div\u003e\n            \u003ccanvas id=\"aim-canvas\"\u003e\u003c/canvas\u003e\n            \u003cdiv class=\"tournament-bracket\" id=\"tournament-bracket\"\u003e\n                \u003ch1 id=\"bracket-title\"\u003eTournament Bracket\u003c/h1\u003e\n                \u003cdiv class=\"bracket-container\" id=\"bracket-container\"\u003e\u003c/div\u003e\n            \u003c/div\u003e\n\n        \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003cscript src=\"https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js\"\u003e\u003c/script\u003e\n    \u003cscript\u003e\n        /*\n         * 3D CARROM CLASH\n         * A realistic 3D carrom game with physics-based gameplay.\n         * Players flick a striker to pocket carrom men and the queen.\n         * Features drag-to-aim controls and turn-based play against AI.\n         */\n\n        async function run(mode) {\n            const gameWorld = document.getElementById('game-world');\n            const canvas = document.getElementById('game-canvas');\n\n            // ==================== CONSTANTS ====================\n            const BOARD_SIZE = 600;\n            const BOARD_HALF = BOARD_SIZE / 2;\n            const PIECE_RADIUS = 15;\n            const STRIKER_RADIUS = 20;\n            const POCKET_RADIUS = 30;\n            const POCKET_OFFSET = BOARD_HALF - 30;\n            const BASELINE_OFFSET = BOARD_HALF - 80;\n            const MIN_DRAG = 20;\n            const MAX_DRAG = 200;\n            const MAX_VELOCITY = 2160;\n\n            // ==================== GAME STATE ====================\n            let gamePhase = 'TITLE_SCREEN'; // TITLE_SCREEN, COLOR_SELECTION, POSITIONING, AIMING, SHOOTING, RESOLVING, AI_TURN, AI_AIMING, GAME_OVER, RETURNING_STRIKER, COUNTRY_SELECTION, TOURNAMENT_BRACKET\n            let currentPlayer = 1; // 1 = human, 2 = AI\n            let playerColor = null; // 'black' or 'white' - chosen by player\n            let aiColor = null; // 'black' or 'white' - opposite of player's choice\n            let striker = null;\n            let pieces = [];\n            let pocketedPieces = { 1: [], 2: [] };\n            let queenPocketed = false;\n            let queenCovered = false;\n            let queenPocketedBy = null;\n            let queenAwaitingCover = false; // Set when queen is pocketed, cleared when covered or returned\n            // Turn continuation is determined by turnState counters (ownPiecesPocketedThisTurn, queenPocketedThisTurn)\n            // Track what was pocketed during current turn\n            let turnState = {\n                queenPocketedThisTurn: false,\n                ownPiecesPocketedThisTurn: 0,\n                opponentPiecesPocketedThisTurn: 0,\n                opponentPiecesPocketedList: [] // Track actual pieces for processing in resolveShot\n            };\n            \n            // Foul debt tracking - if player fouls with no pieces sunk, they owe a piece\n            let foulDebt = { 1: 0, 2: 0 };\n            \n            // Consecutive foul tracking - 3 consecutive fouls = extra penalty\n            let consecutiveFouls = { 1: 0, 2: 0 };\n            \n            // Foul message visibility tracking\n            let foulMessageVisible = false;\n            let foulMessageClearTime = 0;\n            \n            // Tournament mode state\n            let tournamentMode = false;\n            let tournamentBracket = []; // Array of rounds, each round is array of matches\n            let tournamentRound = 0; // Current round (0 = round of 16, 1 = quarter, 2 = semi, 3 = final)\n            let playerBracketPosition = { round: 0, match: 0 }; // Player's position in bracket\n\n            let tournamentInProgress = false; // Is there a saved tournament?\n            let currentOpponentCountry = null; // Current tournament opponent\n            \n            // Two-player pass and play mode\n            let isTwoPlayerMode = false;\n            let player1Country = null;\n            let player2Country = null;\n            let countrySelectionPhase = 1; // 1 = selecting player 1's country, 2 = selecting player 2's country\n            \n            // Language support\n            let currentLanguage = 'en'; // 'en' or 'ar'\n            \n            // Translations\n            const translations = {\n                en: {\n                    // Title screen\n                    tapToStart: '- Tap to Start -',\n                    singleMatch: 'Single Match',\n                    tournament: 'Tournament',\n                    continueTournament: 'Continue Tournament',\n                    vsAI: '1P versus AI',\n                    vsPlayer: '2P Pass \u0026 Play',\n                    selectP1Country: 'Player 1: Select Country',\n                    selectP2Country: 'Player 2: Select Country',\n                    player1: 'Player 1',\n                    player2: 'Player 2',\n                    p1Turn: \"Player 1's Turn\",\n                    p2Turn: \"Player 2's Turn\",\n                    \n                    // Country selection\n                    selectCountry: 'Select Your Country',\n                    selectCountryDesc: 'Choose the country you want to represent',\n                    asia: 'Asia',\n                    europe: 'Europe',\n                    northAmerica: 'Americas',\n                    \n                    // Matchup\n                    vs: 'VS',\n                    you: 'You',\n                    ai: 'AI',\n                    selectingColor: 'Selecting color...',\n                    youPlayBlack: 'You play Black!',\n                    youPlayWhite: 'You play White!',\n                    player1PlaysBlack: 'Player 1 plays Black!',\n                    player1PlaysWhite: 'Player 1 plays White!',\n                    \n                    // Score panel\n                    piecesLeft: 'pieces left',\n                    \n                    // Turn indicator\n                    yourTurn: 'Your Turn',\n                    aiTurn: 'AI Turn',\n                    placeStriker: 'Place striker on baseline',\n                    thinking: 'Thinking...',\n                    positioning: 'Positio ment.body.classList.remove('rtl');\n                }\n                \n                // Update static UI text\n                updateUIText();\n            }\n            \n            function updateUIText() {\n                // Update all translatable text elements\n                document.getElementById('tap-to-start').textContent = t('tapToStart');\n                document.getElementById('single-match-btn').textContent = t('singleMatch');\n                document.getElementById('tournament-btn').textContent = t('tournament');\n                document.getElementById('continue-tournament-btn').textContent = t('continueTournament');\n                document.getElementById('vs-ai-btn').textContent = t('vsAI');\n                document.getElementById('vs-player-btn').textContent = t('vsPlayer');\n                document.getElementById('restart-btn').textContent = t('playAgain');\n                \n                // Update score panel labels\n                document.querySelectorAll('.player-label').forEach(el =\u003e {\n                    el.textContent = t('piecesLeft');\n                });\n                \n                // Update country selection\n                const countrySelectionH1 = document.querySelector('#country-selection h1');\n                const countrySelectionP = document.querySelector('#country-selection p');\n                if (countrySelectionH1) countrySelectionH1.textContent = t('selectCountry');\n                if (countrySelectionP) countrySelectionP.textContent = t('selectCountryDesc');\n                \n                // Update region headers\n                const regionHeaders = document.querySelectorAll('.country-region h2');\n                if (regionHeaders[0]) regionHeaders[0].textContent = t('asia');\n                if (regionHeaders[1]) regionHeaders[1].textContent = t('europe');\n                if (regionHeaders[2]) regionHeaders[2].textContent = t('northAmerica');\n                \n                // Update matchup labels\n                const matchupLabels = document.querySelectorAll('.matchup-label');\n                if (matchupLabels[0]) matchupLabels[0].textContent = t('you');\n                if (matchupLabels[1]) matchupLabels[1].textContent = t('ai');\n                document.querySelector('.matchup-vs').textContent = t('vs');\n                \n                // Update foul message\n                document.querySelector('#foul-message p').textContent = t('foul');\n                \n                // Update bracket title\n                document.getElementById('bracket-title').textContent = t('tournamentBracket');\n            }\n            let strikerReturnProgress = 0;\n            let strikerReturnStartPos = { x: 0, z: 0 };\n            let strikerReturnTargetBaseline = 0;\n            let strikerReturnDueToFoul = false;\n            let isInitialBreak = true; // Track if this is the first shot of the game\n            \n            // Piece return animation tracking\n            let returningPieces = []; // Array of pieces currently animating back to board\n            let waitingForPiecesReturn = false; // Wait for all pieces to return before camera switch\n            let pendingTurnSwitch = null; // Store pending turn info while waiting\n            let cameraTransitionDelay = 0; // Delay before camera starts moving\n            \n            // AI shot planning\n            let aiPlannedShot = null; // Stores AI's calculated position and shot direction\n            let aiAimingTimer = 0;\n            let aiPlacementAnimProgress = 0;\n            let aiPlacementStartPos = { x: 0, z: 0 };\n\n            // Title screen state\n            let titleScreenState = 'initial'; // 'initial' or 'mode_selection'\n            \n            // Country data\n            const COUNTRIES = {\n                asia: [\n                    { code: 'IN', name: 'India', flag: '🇮🇳' },\n                    { code: 'LK', name: 'Sri Lanka', flag: '🇱🇰' },\n                    { code: 'PK', name: 'Pakistan', flag: '🇵🇰' },\n                    { code: 'MV', name: 'Maldives', flag: '🇲🇻' },\n                    { code: 'BD', name: 'B.desh', flag: '🇧🇩' },\n                    { code: 'MY', name: 'Malaysia', flag: '🇲🇾' },\n                    { code: 'JP', name: 'Japan', flag: '🇯🇵' },\n                    { code: 'KR', name: 'S. Korea', flag: '🇰🇷' },\n                    { code: 'SG', name: 'S.pore', flag: '🇸🇬' },\n                    { code: 'NP', name: 'Nepal', flag: '🇳🇵' }\n                ],\n                europe: [\n                    { code: 'DE', name: 'Germany', flag: '🇩🇪' },\n                    { code: 'FR', name: 'France', flag: '🇫🇷' },\n                    { code: 'IT', name: 'Italy', flag: '🇮🇹' },\n                    { code: 'CH', name: 'Swiss', flag: '🇨🇭' },\n                    { code: 'PL', name: 'Poland', flag: '🇵🇱' },\n                    { code: 'ES', name: 'Spain', flag: '🇪🇸' },\n                    { code: 'GB', name: 'UK', flag: '🇬🇧' },\n                    { code: 'NL', name: 'Holland', flag: '🇳🇱' },\n                    { code: 'SE', name: 'Sweden', flag: '🇸🇪' },\n                    { code: 'AT', name: 'Austria', flag: '🇦🇹' }\n                ],\n                northAmerica: [\n                    { code: 'US', name: 'USA', flag: '🇺🇸' },\n                    { code: 'CA', name: 'Canada', flag: '🇨🇦' },\n                    { code: 'MX', name: 'Mexico', flag: '🇲🇽' },\n                    { code: 'BR', name: 'Brazil', flag: '🇧🇷' },\n                    { code: 'AR', name: 'Argentina', flag: '🇦🇷' }\n                ]\n            };\n            \n            // Get all countries as flat array\n            function getAllCountries() {\n                return [...COUNTRIES.asia, ...COUNTRIES.europe, ...COUNTRIES.northAmerica];\n            }\n            \n            // Generate tournament bracket with 16 teams\n            function generateTournamentBracket(playerCountryData) {\n                const allCountries = getAllCountries();\n                \n                // Remove player's country and shuffle remaining\n                const otherCountries = allCountries.filter(c =\u003e c.code !== playerCountryData.code);\n                shuffleArray(otherCountries);\n                \n                // Take 15 opponents (for 16-team bracket)\n                const opponents = otherCountries.slice(0, 15);\n                \n                // Insert player at random position in first round\n                const playerPosition = Math.floor(Math.random() * 8); // 0-7 for 8 matches\n                playerBracketPosition = { round: 0, match: playerPosition };\n                \n                // Build first round (8 matches, 16 teams)\n                const firstRound = [];\n                let opponentIndex = 0;\n                \n                for (let i = 0; i \u003c 8; i++) {\n                    if (i === playerPosition) {\n                        // Player's match\n                        firstRound.push({\n                            team1: { ...playerCountryData, isPlayer: true, score: 0 },\n                            team2: { ...opponents[opponentIndex++], isPlayer: false, score: 0 },\n                            winner: null,\n                            completed: false\n                        });\n                    } else {\n                        // AI vs AI match\n                        firstRound.push({\n                            team1: { ...opponents[opponentIndex++], isPlayer: false, score: 0 },\n                            team2: { ...opponents[opponentIndex++], isPlayer: false, score: 0 },\n                            winner: null,\n                            completed: false\n                        });\n                    }\n                }\n                \n                // Initialize empty rounds for quarters, semis, finals\n                const quarters = Array(4).fill(null).map(() =\u003e ({\n                    team1: null, team2: null, winner: null, completed: false\n                }));\n                const semis = Array(2).fill(null).map(() =\u003e ({\n                    team1: null, team2: null, winner: null, completed: false\n                }));\n                const finals = [{\n                    team1: null, team2: null, winner: null, completed: false\n                }];\n                \n                tournamentBracket = [firstRound, quarters, semis, finals];\n                tournamentRound = 0;\n            }\n            \n            function shuffleArray(array) {\n                for (let i = array.length - 1; i \u003e 0; i--) {\n                    const j = Math.floor(Math.random() * (i + 1));\n                    [array[i], array[j]] = [array[j], array[i]];\n                }\n            }\n            \n            // Simulate AI vs AI matches in the bracket\n            function simulateAIMatches() {\n                const currentRound = tournamentBracket[tournamentRound];\n                \n                for (let i = 0; i \u003c currentRound.length; i++) {\n                    const match = currentRound[i];\n                    if (!match.completed \u0026\u0026 !match.team1?.isPlayer \u0026\u0026 !match.team2?.isPlayer) {\n                        // Simulate this AI match\n                        const winner = Math.random() \u003c 0.5 ? match.team1 : match.team2;\n                        \n                        match.winner = winner;\n                        match.completed = true;\n                        \n                        // Advance winner to next round\n                        advanceWinnerToNextRound(i, winner);\n                    }\n                }\n            }\n            \n            function advanceWinnerToNextRound(matchIndex, winner) {\n                if (tournamentRound \u003e= 3) return; // Finals, no next round\n                \n                const nextRound = tournamentBracket[tournamentRound + 1];\n                const nextMatchIndex = Math.floor(matchIndex / 2);\n                const isTopTeam = matchIndex % 2 === 0;\n                \n                const winnerCopy = { ...winner };\n                \n                if (isTopTeam) {\n                    nextRound[nextMatchIndex].team1 = winnerCopy;\n                } else {\n                    nextRound[nextMatchIndex].team2 = winnerCopy;\n                }\n            }\n            \n            function renderTournamentBracket() {\n                const container = document.getElementById('bracket-container');\n                container.innerHTML = '';\n                container.style.transform = 'scale(1)';\n                \n                // Create rows for top and bottom halves (vertical hourglass)\n                const rows = {\n                    'r0-top': createRow(),\n                    'r1-top': createRow(),\n                    'r2-top': createRow(),\n                    'r3': createRow(),\n                    'r2-bottom': createRow(),\n                    'r1-bottom': createRow(),\n                    'r0-bottom': createRow()\n                };\n                \n                // Append rows to container in order\n                container.appendChild(rows['r0-top']);\n                container.appendChild(rows['r1-top']);\n                container.appendChild(rows['r2-top']);\n                container.appendChild(rows['r3']);\n                container.appendChild(rows['r2-bottom']);\n                container.appendChild(rows['r1-bottom']);\n                container.appendChild(rows['r0-bottom']);\n                \n                function createRow() {\n                    const row = document.createElement('div');\n                    row.className = 'bracket-row';\n                    return row;\n                }\n                \n                function createMatchDiv(match, roundIndex, matchIndex) {\n                    const matchDiv = document.createElement('div');\n                    matchDiv.className = 'bracket-match';\n                    matchDiv.id = `match-${roundIndex}-${matchIndex}`;\n                    \n                    if (roundIndex === tournamentRound \u0026\u0026 \n                        playerBracketPosition.round === roundIndex \u0026\u0026 \n                        playerBracketPosition.match === matchIndex) {\n                        matchDiv.classList.add('player-match');\n                    }\n                    \n                    matchDiv.appendChild(createTeamDiv(match.team1, match.winner));\n                    matchDiv.appendChild(createTeamDiv(match.team2, match.winner));\n                    return matchDiv;\n                }\n                \n                // Round 0 (8 matches: 4 top, 4 bottom)\n                if (tournamentBracket[0]) {\n                    tournamentBracket[0].forEach((match, i) =\u003e {\n                        const matchDiv = createMatchDiv(match, 0, i);\n                        if (i \u003c 4) rows['r0-top'].appendChild(matchDiv);\n                        else rows['r0-bottom'].appendChild(matchDiv);\n                    });\n                }\n                \n                // Round 1 (4 matches: 2 top, 2 bottom)\n                if (tournamentBracket[1]) {\n                    tournamentBracket[1].forEach((match, i) =\u003e {\n                        const matchDiv = createMatchDiv(match, 1, i);\n                        if (i \u003c 2) rows['r1-top'].appendChild(matchDiv);\n                        else rows['r1-bottom'].appendChild(matchDiv);\n                    });\n                }\n                \n                // Round 2 (2 matches: 1 top, 1 bottom)\n                if (tournamentBracket[2]) {\n                    tournamentBracket[2].forEach((match, i) =\u003e {\n                        const matchDiv = createMatchDiv(match, 2, i);\n                        if (i \u003c 1) rows['r2-top'].appendChild(matchDiv);\n                        else rows['r2-bottom'].appendChild(matchDiv);\n                    });\n                }\n                \n                // Round 3 (1 match: center)\n                if (tournamentBracket[3]) {\n                    tournamentBracket[3].forEach((match, i) =\u003e {\n                        const matchDiv = createMatchDiv(match, 3, i);\n                        rows['r3'].appendChild(matchDiv);\n                    });\n                }\n            }\n            \n            function createTeamDiv(team, matchWinner) {\n                const teamDiv = document.createElement('div');\n                teamDiv.className = 'bracket-team';\n                \n                if (!team) {\n                    teamDiv.innerHTML = '\u003cspan class=\"flag\"\u003e-\u003c/span\u003e\u003cspan class=\"name\"\u003eTBD\u003c/span\u003e\u003cspan class=\"score\"\u003e\u003c/span\u003e';\n                    return teamDiv;\n                }\n                \n                if (team.isPlayer) {\n                    teamDiv.classList.add('player');\n                }\n                \n                if (matchWinner) {\n                    if (matchWinner.code === team.code) {\n                        teamDiv.classList.add('winner');\n                    } else {\n                        teamDiv.classList.add('loser');\n                    }\n                }\n                \n                const scoreDisplay = matchWinner \u0026\u0026 matchWinner.code === team.code ? '✓' : '';\n                teamDiv.innerHTML = `\n                    \u003cspan class=\"flag\"\u003e${team.flag}\u003c/span\u003e\n                    \u003cspan class=\"name\"\u003e${team.name}\u003c/span\u003e\n                    \u003cspan class=\"score\"\u003e${scoreDisplay}\u003c/span\u003e\n                `;\n                \n                return teamDiv;\n            }\n            \n            function showTournamentBracket(callback, zoomToPlayerMatch = false) {\n                const bracketScreen = document.getElementById('tournament-bracket');\n                const title = document.getElementById('bracket-title');\n                \n                title.textContent = t('tournamentBracket');\n                \n                renderTournamentBracket();\n                bracketScreen.classList.add('visible');\n                gamePhase = 'TOURNAMENT_BRACKET';\n                \n                if (zoomToPlayerMatch) {\n                    // Show full bracket briefly, then zoom to player's match\n                    setTimeout(() =\u003e {\n                        zoomToMatch(playerBracketPosition.round, playerBracketPosition.match, () =\u003e {\n                            setTimeout(() =\u003e {\n                                bracketScreen.classList.remove('visible');\n                                if (callback) callback();\n                            }, 1500);\n                        });\n                    }, 2000);\n                } else {\n                    // Just show bracket for a moment\n                    setTimeout(() =\u003e {\n                        bracketScreen.classList.remove('visible');\n                        if (callback) callback();\n                    }, 3000);\n                }\n            }\n            \n            function zoomToMatch(roundIndex, matchIndex, callback) {\n                const container = document.getElementById('bracket-container');\n                const matchEl = document.getElementById(`match-${roundIndex}-${matchIndex}`);\n                \n                if (matchEl) {\n                    matchEl.classList.add('highlight');\n                    \n                    // Calculate zoom and position\n                    const scale = 2.5;\n                    \n                    // Get position relative to viewport\n                    const containerRect = container.getBoundingClientRect();\n                    const matchRect = matchEl.getBoundingClientRect();\n                    \n                    const originX = (matchRect.left - containerRect.left) + matchRect.width / 2;\n                    const originY = (matchRect.top - containerRect.top) + matchRect.height / 2;\n                    \n                    // Viewport center\n                    const cx = window.innerWidth / 2;\n                    const cy = window.innerHeight / 2;\n                    \n                    // Match center\n                    const mx = matchRect.left + matchRect.width / 2;\n                    const my = matchRect.top + matchRect.height / 2;\n                    \n                    // Translation needed to move match to center\n                    const tx = cx - mx;\n                    const ty = cy - my;\n                    \n                    container.style.transformOrigin = `${originX}px ${originY}px`;\n                    container.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;\n                    \n                    setTimeout(() =\u003e {\n                        if (callback) callback();\n                    }, 1500);\n                }\n            }\n            \n            function getPlayerCurrentOpponent() {\n                const currentRound = tournamentBracket[tournamentRound];\n                const playerMatch = currentRound[playerBracketPosition.match];\n                \n                if (playerMatch.team1?.isPlayer) {\n                    return playerMatch.team2;\n                } else {\n                    return playerMatch.team1;\n                }\n            }\n            \n            function handleTournamentRoundEnd(winner) {\n                const currentRound = tournamentBracket[tournamentRound];\n                const playerMatch = currentRound[playerBracketPosition.match];\n                \n                if (winner === 'player') {\n                    // Player won\n                    playerMatch.winner = playerMatch.team1?.isPlayer ? playerMatch.team1 : playerMatch.team2;\n                    playerMatch.completed = true;\n                    \n                    // Advance player to next round\n                    if (tournamentRound \u003c 3) {\n                        advanceWinnerToNextRound(playerBracketPosition.match, playerMatch.winner);\n                        \n                        // Calculate player's new position\n                        const nextMatchIndex = Math.floor(playerBracketPosition.match / 2);\n                        \n                        // Move to next round\n                        tournamentRound++;\n                        playerBracketPosition = { round: tournamentRound, match: nextMatchIndex };\n                        \n                        // Simulate any AI matches for this round\n                        simulateAIMatches();\n                        \n                        // Save progress\n                        saveTournamentState();\n                        \n                        // Show bracket with advancement, then continue\n                        showTournamentBracket(() =\u003e {\n                            startTournamentMatch();\n                        }, true);\n                    } else {\n                        // Won the finals - tournament complete!\n                        clearTournamentState();\n                        showTournamentVictory();\n                    }\n                } else {\n                    // Player lost - eliminated\n                    playerMatch.winner = playerMatch.team1?.isPlayer ? playerMatch.team2 : playerMatch.team1;\n                    playerMatch.completed = true;\n                    \n                    clearTournamentState();\n                    showTournamentElimination();\n                }\n            }\n            \n            function showTournamentVictory() {\n                document.getElementById('winner-text').textContent = t('tournamentChampion');\n                document.getElementById('final-score').textContent = t('winsTheTournament').replace('{country}', `${playerCountry.flag} ${playerCountry.name}`);\n                document.getElementById('game-over').classList.add('visible');\n                gamePhase = 'GAME_OVER';\n            }\n            \n            function showTournamentElimination() {\n                const roundNames = [t('roundOf16'), t('quarterFinals'), t('semiFinals'), t('finals')];\n                document.getElementById('winner-text').textContent = t('eliminated');\n                document.getElementById('final-score').textContent = t('knockedOut').replace('{round}', roundNames[tournamentRound]);\n                document.getElementById('game-over').classList.add('visible');\n                gamePhase = 'GAME_OVER';\n            }\n            \n            function startTournamentMatch() {\n                // Get opponent for this match\n                currentOpponentCountry = getPlayerCurrentOpponent();\n                aiCountry = currentOpponentCountry;\n                \n                // Show VS screen with color flicker\n                showMatchupAndColorFlicker();\n            }\n            \n\n            // Player and AI country selection\n            let playerCountry = null;\n            let aiCountry = null;\n\n            // Tutorial state\n            let showTutorial = true; // Will be set based on saved state\n            let tutorialCompleted = false;\n            let tutorialPhase = 'none'; // 'baseline', 'drag', 'none'\n            let tutorialFingerAnimTime = 0;\n            let tutorialDragPositioned = false; // Track if drag tutorial has been positioned\n\n            // Drag state\n            let isDragging = false;\n            let dragStart = { x: 0, y: 0 };\n            let dragCurrent = { x: 0, y: 0 };\n            let dragStartTime = 0;\n            let strikerPlaced = false;\n\n            // Aim state (for frame-synced drawing)\n            let isAiming = false;\n            let currentAimDirX = 0;\n            let currentAimDirZ = 0;\n            let scene, camera, renderer;\n            let boardMesh, strikerMesh, baselineMesh;\n            let pieceMeshes = [];\n            // 2D Aim Canvas\n            let aimCanvas = null;\n            let aimCtx = null;\n\n            // Picture-in-Picture\n            let pipWindows = []; // Array of active PiP windows with their state\n            let pipNextId = 0; // Counter for unique PiP IDs\n            const PIP_MIN_DISPLAY_TIME = 2.5; // Minimum seconds to display PiP (increased for replay)\n            const PIP_REWIND_TIME = 0.4; // How far back in time to rewind (seconds)\n            const PIP_MAX_WINDOWS = 6; // Maximum number of simultaneous PiP windows\n            \n            // Position history tracking\n            const positionHistory = new Map(); // pieceId -\u003e array of {x, z, time}\n            \n            // Track disposable Three.js objects for cleanup\n            const disposableObjects = {\n                geometries: [],\n                materials: [],\n                textures: []\n            };\n            \n            // Dispose piece geometries and materials to prevent memory leaks\n            function disposePieceResources() {\n                disposableObjects.geometries.forEach(geom =\u003e {\n                    if (geom \u0026\u0026 geom.dispose) geom.dispose();\n                });\n                disposableObjects.materials.forEach(mat =\u003e {\n                    if (mat \u0026\u0026 mat.dispose) mat.dispose();\n                });\n                disposableObjects.geometries = [];\n                disposableObjects.materials = [];\n            }\n            \n            // Clear all active PiP windows\n            function clearAllPiPWindows() {\n                for (const window of pipWindows) {\n                    removePiPWindow(window);\n                }\n                pipWindows = [];\n            }\n\n            // ==================== AUDIO ====================\n            let audioContext = null;\n            let audioBuffers = {};\n            let lastSoundPlayTime = {}; // Track when each sound was last played\n\n            // ==================== PERSISTENCE ====================\n            async function loadTutorialState() {\n                try {\n                    const response = await lib.getUserGameState();\n                    if (response \u0026\u0026 response.state) {\n                        // Check for tournament in progress\n                        if (response.state.tournamentData) {\n                            tournamentInProgress = true;\n                        }\n                        if (response.state.tutorialCompleted) {\n                            return true;\n                        }\n                    }\n                    return false;\n                } catch (error) {\n                    lib.log(`Failed to load tutorial state: ${error.message}`);\n                    return false; // Default to showing tutorial on error\n                }\n            }\n\n            async function saveTutorialCompleted() {\n                try {\n                    const currentState = await lib.getUserGameState();\n                    const existingState = (currentState \u0026\u0026 currentState.state) || {};\n                    await lib.saveUserGameState({\n                        ...existingState,\n                        tutorialCompleted: true\n                    });\n                    lib.log('Tutorial completion saved successfully');\n                } catch (error) {\n                    lib.log(`Failed to save tutorial completion: ${error.message}`);\n                }\n            }\n            \n            async function saveTournamentState() {\n                try {\n                    const currentState = await lib.getUserGameState();\n                    const existingState = (currentState \u0026\u0026 currentState.state) || {};\n                    await lib.saveUserGameState({\n                        ...existingState,\n                        tournamentData: {\n                            bracket: tournamentBracket,\n                            round: tournamentRound,\n                            playerPosition: playerBracketPosition,\n                            playerCountry: playerCountry\n                        }\n                    });\n                    tournamentInProgress = true;\n                    lib.log('Tournament state saved successfully');\n                } catch (error) {\n                    lib.log(`Failed to save tournament state: ${error.message}`);\n                }\n            }\n            \n            async function loadTournamentState() {\n                try {\n                    const response = await lib.getUserGameState();\n                    if (response \u0026\u0026 response.state \u0026\u0026 response.state.tournamentData) {\n                        const data = response.state.tournamentData;\n                        tournamentBracket = data.bracket;\n                        tournamentRound = data.round;\n                        playerBracketPosition = data.playerPosition;\n                        playerCountry = data.playerCountry;\n                        return true;\n                    }\n                    return false;\n                } catch (error) {\n                    lib.log(`Failed to load tournament state: ${error.message}`);\n                    return false;\n                }\n            }\n            \n            async function clearTournamentState() {\n                try {\n                    const currentState = await lib.getUserGameState();\n                    const existingState = (currentState \u0026\u0026 currentState.state) || {};\n                    delete existingState.tournamentData;\n                    await lib.saveUserGameState(existingState);\n                    tournamentInProgress = false;\n                    lib.log('Tournament state cleared');\n                } catch (error) {\n                    lib.log(`Failed to clear tournament state: ${error.message}`);\n                }\n            }\n\n            function showTutorialBaseline() {\n                if (tutorialCompleted) return;\n                tutorialPhase = 'baseline';\n                tutorialFingerAnimTime = 0;\n                const finger = document.getElementById('tutorial-finger');\n                finger.classList.add('visible');\n            }\n\n            function showTutorialDrag() {\n                if (tutorialCompleted) return;\n                tutorialPhase = 'drag';\n                tutorialFingerAnimTime = 0;\n                tutorialDragPositioned = false; // Reset positioning flag\n                const finger = document.getElementById('tutorial-finger');\n                const highlight = document.getElementById('tutorial-highlight');\n                // Don't show yet - will be shown after first positioning in updateTutorialAnimations\n                finger.classList.remove('visible');\n                highlight.classList.remove('visible');\n            }\n\n            function hideTutorial() {\n                tutorialPhase = 'none';\n                const finger = document.getElementById('tutorial-finger');\n                const highlight = document.getElementById('tutorial-highlight');\n                finger.classList.remove('visible');\n                highlight.classList.remove('visible');\n            }\n\n            function updateTutorialAnimations(deltaTime) {\n                if (tutorialCompleted || tutorialPhase === 'none') return;\n\n                const finger = document.getElementById('tutorial-finger');\n                const highlight = document.getElementById('tutorial-highlight');\n\n                if (tutorialPhase === 'baseline') {\n                    // Animate finger moving left and right along baseline\n                    tutorialFingerAnimTime += deltaTime;\n                    const cycle = 2.0; // 2 second cycle\n                    const phase = (tutorialFingerAnimTime % cycle) / cycle;\n                    \n                    // Smooth sine wave oscillation\n                    const xOffset = Math.sin(phase * Math.PI * 2) * 80; // ±80 pixels laterally\n                    \n                    // Position finger at center of baseline, moving left/right\n                    const baselineRect = canvas.getBoundingClientRect();\n                    const baselineWorldZ = BASELINE_OFFSET;\n                    \n                    // Project baseline position to screen\n                    const baselineWorld = new THREE.Vector3(0, 10, baselineWorldZ);\n                    baselineWorld.project(camera);\n                    \n                    const screenX = (baselineWorld.x * 0.5 + 0.5) * baselineRect.width + baselineRect.left;\n                    const screenY = (-baselineWorld.y * 0.5 + 0.5) * baselineRect.height + baselineRect.top;\n                    \n                    finger.style.left = `${screenX + xOffset - 30}px`; // Move laterally along baseline\n                    finger.style.top = `${screenY - 30}px`; // Keep Y position fixed\n                    \n                } else if (tutorialPhase === 'drag') {\n                    // Animate finger dragging back from striker\n                    tutorialFingerAnimTime += deltaTime;\n                    const cycle = 2.5; // 2.5 second cycle\n                    const phase = (tutorialFingerAnimTime % cycle) / cycle;\n                    \n                    // Drag animation: start at striker, move down and back, return\n                    let dragProgress = 0;\n                    if (phase \u003c 0.5) {\n                        // Dragging back phase (0 to 0.5)\n                        dragProgress = phase / 0.5;\n                    } else {\n                        // Return phase (0.5 to 1.0) - snap back\n                        dragProgress = 0;\n                    }\n                    \n                    // Ease out for smooth animation\n                    const eased = dragProgress \u003c 0.5 \n                        ? 2 * dragProgress * dragProgress \n                        : -1 + (4 - 2 * dragProgress) * dragProgress;\n                    \n                    // Project striker position to screen\n                    const strikerWorld = new THREE.Vector3(striker.x, 10, striker.z);\n                    strikerWorld.project(camera);\n                    \n                    const baselineRect = canvas.getBoundingClientRect();\n                    const strikerScreenX = (strikerWorld.x * 0.5 + 0.5) * baselineRect.width + baselineRect.left;\n                    const strikerScreenY = (-strikerWorld.y * 0.5 + 0.5) * baselineRect.height + baselineRect.top;\n                    \n                    // Drag back 120 pixels down and slightly right\n                    const dragOffsetX = 40 * eased;\n                    const dragOffsetY = 120 * eased;\n                    \n                    finger.style.left = `${strikerScreenX + dragOffsetX - 30}px`;\n                    finger.style.top = `${strikerScreenY + dragOffsetY - 30}px`;\n                    \n                    // Position highlight on striker\n                    highlight.style.left = `${strikerScreenX}px`;\n                    highlight.style.top = `${strikerScreenY}px`;\n                    \n                    // Show elements after first positioning to avoid flash in wrong location\n                    if (!tutorialDragPositioned) {\n                        tutorialDragPositioned = true;\n                        finger.classList.add('visible');\n                        highlight.classList.add('visible');\n                    }\n                }\n            }\n\n            // ==================== CONFIGURATION ====================\n            // Config\n            const config = window.gameConfig || {};\n            const friction = config.physics?.friction || 1.0;\n            const powerMultiplier = config.physics?.powerMultiplier || 1.0;\n            const aiDifficulty = config.aiDifficulty || 'medium';\n\n            // ==================== ASSET LOADING ====================\n            const assetCache = {};\n            let totalAssets = 0;\n            let loadedAssets = 0;\n\n            function updateLoadingProgress() {\n                const progress = totalAssets \u003e 0 ? (loadedAssets / totalAssets) * 100 : 0;\n                const loadingBar = document.getElementById('loading-bar');\n                const loadingText = document.getElementById('loading-text');\n                \n                if (loadingBar) {\n                    loadingBar.style.width = progress + '%';\n                }\n                if (loadingText) {\n                    const loadingMsg = currentLanguage === 'ar' ? 'جاري التحميل...' : 'Loading assets...';\n                    loadingText.textContent = `${loadingMsg} ${Math.round(progress)}%`;\n                }\n            }\n\n            async function loadImage(id) {\n                return new Promise((resolve) =\u003e {\n                    const assetInfo = lib.getAsset(id);\n                    if (!assetInfo) {\n                        loadedAssets++;\n                        updateLoadingProgress();\n                        resolve(null);\n                        return;\n                    }\n                    const img = new Image();\n                    img.crossOrigin = 'anonymous';\n                    img.onload = () =\u003e {\n                        assetCache[id] = img;\n                        loadedAssets++;\n                        updateLoadingProgress();\n                        resolve(img);\n                    };\n                    img.onerror = () =\u003e {\n                        loadedAssets++;\n                        updateLoadingProgress();\n                        resolve(null);\n                    };\n                    img.src = assetInfo.url;\n                });\n            }\n\n            async function loadAudio(id) {\n                if (!audioContext) {\n                    audioContext = new (window.AudioContext || window.webkitAudioContext)();\n                }\n                const assetInfo = lib.getAsset(id);\n                if (!assetInfo) {\n                    loadedAssets++;\n                    updateLoadingProgress();\n                    return null;\n                }\n\n                try {\n                    const response = await fetch(assetInfo.url);\n                    const arrayBuffer = await response.arrayBuffer();\n                    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);\n                    audioBuffers[id] = audioBuffer;\n                    loadedAssets++;\n                    updateLoadingProgress();\n                    return audioBuffer;\n                } catch (e) {\n                    loadedAssets++;\n                    updateLoadingProgress();\n                    return null;\n                }\n            }\n\n            function playSound(id, volume = 0.5, minDelay = 0) {\n                if (!audioContext || !audioBuffers[id]) return;\n                \n                // Check if enough time has passed since last play (throttling)\n                const now = performance.now();\n                if (lastSoundPlayTime[id] \u0026\u0026 (now - lastSoundPlayTime[id]) \u003c minDelay) {\n                    return; // Skip playing - too soon since last play\n                }\n                \n                try {\n                    if (audioContext.state === 'suspended') {\n                        audioContext.resume();\n                    }\n                    const source = audioContext.createBufferSource();\n                    const gainNode = audioContext.createGain();\n                    source.buffer = audioBuffers[id];\n                    gainNode.gain.value = volume;\n                    source.connect(gainNode);\n                    gainNode.connect(audioContext.destination);\n                    source.start(0);\n                    \n                    // Record when this sound was played\n                    lastSoundPlayTime[id] = now;\n                } catch (e) {}\n            }\n\n            // ==================== THREE.JS SETUP ====================\n            // Camera state management\n            let cameraState = 'WIDE'; // WIDE, BEHIND_STRIKER, FOLLOWING\n            let cameraTarget = { x: 0, y: 1150, z: 350 };\n            let cameraLookAt = { x: 0, y: 0, z: 0 };\n            const CAMERA_LERP_SPEED = 3.0;\n            let cameraTransitionMode = 'normal'; // 'normal' or 'player_switch'\n            let lastActivePlayer = 1; // Track last active player for detecting switches\n\n            function initThreeJS() {\n                scene = new THREE.Scene();\n                scene.background = new THREE.Color(0x2d1f1a);\n\n                // Camera - zoomed out top-down view to see entire board\n                camera = new THREE.PerspectiveCamera(55, canvas.clientWidth / canvas.clientHeight, 1, 2000);\n                camera.position.set(0, 1150, 350);\n                camera.lookAt(0, 0, 0);\n\n                renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });\n                renderer.setSize(canvas.clientWidth, canvas.clientHeight);\n                renderer.shadowMap.enabled = true;\n                renderer.shadowMap.type = THREE.PCFSoftShadowMap;\n\n                // Picture-in-Picture setup - no longer needed here\n                // PiP windows will be created dynamically\n\n                // Lighting\n                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);\n                scene.add(ambientLight);\n\n                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);\n                directionalLight.position.set(200, 500, 200);\n                directionalLight.castShadow = true;\n                directionalLight.shadow.mapSize.width = 2048;\n                directionalLight.shadow.mapSize.height = 2048;\n                directionalLight.shadow.camera.near = 100;\n                directionalLight.shadow.camera.far = 1200;\n                directionalLight.shadow.camera.left = -400;\n                directionalLight.shadow.camera.right = 400;\n                directionalLight.shadow.camera.top = 400;\n                directionalLight.shadow.camera.bottom = -400;\n                scene.add(directionalLight);\n\n                // Handle resize\n                window.addEventListener('resize', () =\u003e {\n                    camera.aspect = canvas.clientWidth / canvas.clientHeight;\n                    camera.updateProjectionMatrix();\n                    renderer.setSize(canvas.clientWidth, canvas.clientHeight);\n                    resizeAimCanvas();\n                });\n            }\n\n            function setCameraState(state) {\n                cameraState = state;\n                \n                switch(state) {\n                    case 'WIDE':\n                        // In 2P mode, flip camera for player 2\n                        if (isTwoPlayerMode \u0026\u0026 currentPlayer === 2) {\n                            cameraTarget = { x: 0, y: 1150, z: -350 };\n                        } else {\n                            cameraTarget = { x: 0, y: 1150, z: 350 };\n                        }\n                        cameraLookAt = { x: 0, y: 0, z: 0 };\n                        break;\n                    case 'BEHIND_STRIKER':\n                        updateBehindStrikerCamera();\n                        break;\n                    case 'FOLLOWING':\n                        updateFollowingCamera();\n                        break;\n                }\n            }\n            \n            // Set camera perspective for a specific player (used in 2P mode)\n            function setCameraForPlayer(player) {\n                if (player === 2) {\n                    cameraTarget = { x: 0, y: 1150, z: -350 };\n                } else {\n                    cameraTarget = { x: 0, y: 1150, z: 350 };\n                }\n                cameraLookAt = { x: 0, y: 0, z: 0 };\n            }\n\n            function updateBehindStrikerCamera() {\n                if (!striker) return;\n                \n                // Calculate aim direction\n                let aimAngle = 0;\n                if (isDragging) {\n                    let dragX = dragCurrent.x - dragStart.x;\n                    let dragY = dragCurrent.y - dragStart.y;\n                    \n                    if (isTwoPlayerMode \u0026\u0026 currentPlayer === 2) {\n                        dragX = -dragX;\n                        dragY = -dragY;\n                    }\n                    \n                    aimAngle = Math.atan2(dragY, dragX);\n                } else {\n                    aimAngle = (isTwoPlayerMode \u0026\u0026 currentPlayer === 2) ? -Math.PI / 2 : Math.PI / 2; // Default forward\n                }\n                \n                // Position camera behind striker relative to aim direction\n                // Use aimAngle directly - striker shoots opposite to drag direction,\n                // so camera should be on same side as drag direction (behind in shoot direction)\n                const behindAngle = aimAngle;\n                const distance = 250;\n                const height = 120;\n                \n                cameraTarget = {\n                    x: striker.x + Math.cos(behindAngle) * distance,\n                    y: height,\n                    z: striker.z + Math.sin(behindAngle) * distance\n                };\n                \n                // Look at point ahead of striker in shoot direction\n                const shootAngle = aimAngle + Math.PI;\n                cameraLookAt = {\n                    x: striker.x - Math.cos(aimAngle) * 100,\n                    y: 20,\n                    z: striker.z - Math.sin(aimAngle) * 100\n                };\n            }\n\n            function updateFollowingCamera() {\n                if (!striker) return;\n                \n                // Dynamic following camera that tracks striker movement\n                // Position adjusts based on striker velocity for better tracking\n                const speed = Math.sqrt(striker.vx * striker.vx + striker.vz * striker.vz);\n                \n                // Calculate offset based on velocity direction\n                let offsetX = 0;\n                let offsetZ = 200;\n                \n                if (speed \u003e 50) {\n                    const velAngle = Math.atan2(striker.vz, striker.vx);\n                    const followDistance = 250;\n                    offsetX = -Math.cos(velAngle) * followDistance * 0.3;\n                    offsetZ = -Math.sin(velAngle) * followDistance * 0.3 + 150;\n                }\n                \n                // Smooth overhead following\n                cameraTarget = {\n                    x: striker.x + offsetX,\n                    y: 400,\n                    z: striker.z + offsetZ\n                };\n                \n                // Look slightly ahead of striker in movement direction\n                let lookAheadX = striker.x;\n                let lookAheadZ = striker.z;\n                \n                if (speed \u003e 50) {\n                    const velAngle = Math.atan2(striker.vz, striker.vx);\n                    lookAheadX += Math.cos(velAngle) * 50;\n                    lookAheadZ += Math.sin(velAngle) * 50;\n                }\n                \n                cameraLookAt = {\n                    x: lookAheadX,\n                    y: 0,\n                    z: lookAheadZ\n                };\n            }\n\n            function updateCamera(deltaTime) {\n                const dt = Math.min(deltaTime, 0.11);\n                \n                // Adaptive lerp speed based on camera state\n                let lerpSpeed = CAMERA_LERP_SPEED;\n                \n                // Slower, deliberate camera movement during player switches in 2P mode\n                if (cameraTransitionMode === 'player_switch') {\n                    if (cameraState !== 'WIDE') {\n                        cameraTransitionMode = 'normal';\n                    } else {\n                        lerpSpeed = 0.5; // Very slow for smooth, deliberate transition\n                    }\n                } \n                if (cameraTransitionMode !== 'player_switch' \u0026\u0026 cameraState === 'FOLLOWING') {\n                    // Faster lerp during active gameplay for more responsive following\n                    lerpSpeed = 4.5; // Increased responsiveness when following\n                }\n                \n                const lerpFactor = 1 - Math.exp(-lerpSpeed * dt);\n                \n                // Update camera state based on game phase\n                if (cameraState === 'BEHIND_STRIKER' \u0026\u0026 (gamePhase === 'AIMING' || gamePhase === 'POSITIONING')) {\n                    updateBehindStrikerCamera();\n                } else if (cameraState === 'FOLLOWING' \u0026\u0026 gamePhase === 'SHOOTING') {\n                    updateFollowingCamera();\n                }\n                \n                // Smooth interpolation\n                camera.position.x += (cameraTarget.x - camera.position.x) * lerpFactor;\n                camera.position.y += (cameraTarget.y - camera.position.y) * lerpFactor;\n                camera.position.z += (cameraTarget.z - camera.position.z) * lerpFactor;\n                \n                // Smooth look-at with separate interpolation\n                const currentLookAt = new THREE.Vector3();\n                camera.getWorldDirection(currentLookAt);\n                currentLookAt.multiplyScalar(100).add(camera.position);\n                \n                const targetLookAt = new THREE.Vector3(cameraLookAt.x, cameraLookAt.y, cameraLookAt.z);\n                currentLookAt.lerp(targetLookAt, lerpFactor * 0.8);\n                \n                camera.lookAt(currentLookAt);\n                \n                // Check if player switch transition is complete (camera close to target)\n                if (cameraTransitionMode === 'player_switch') {\n                    const distToTarget = Math.sqrt(\n                        Math.pow(camera.position.x - cameraTarget.x, 2) +\n                        Math.pow(camera.position.y - cameraTarget.y, 2) +\n                        Math.pow(camera.position.z - cameraTarget.z, 2)\n                    );\n                    \n                    // Transition complete when camera is within 50 units of target\n                    if (distToTarget \u003c 50) {\n                        cameraTransitionMode = 'normal';\n                    }\n                }\n            }\n\n            function createBoard() {\n                // Board base\n                const boardGeometry = new THREE.BoxGeometry(BOARD_SIZE + 60, 20, BOARD_SIZE + 60);\n                const boardMaterial = new THREE.MeshStandardMaterial({ \n                    color: 0x8B6F47,\n                    roughness: 0.3\n                });\n                boardMesh = new THREE.Mesh(boardGeometry, boardMaterial);\n                boardMesh.position.y = -10;\n                boardMesh.receiveShadow = true;\n                scene.add(boardMesh);\n\n                // Playing surface\n                const surfaceGeometry = new THREE.PlaneGeometry(BOARD_SIZE, BOARD_SIZE);\n                let surfaceMaterial;\n                \n                if (assetCache['carrom_board_texture']) {\n                    const texture = new THREE.Texture(assetCache['carrom_board_texture']);\n                    texture.needsUpdate = true;\n                    // Increase texture size by 7% (scale factor of 1.07)\n                    const scaleAmount = 1 / 1.07;\n                    texture.repeat.set(scaleAmount, scaleAmount);\n                    texture.center.set(0.5, 0.5);\n                    texture.wrapS = THREE.RepeatWrapping;\n                    texture.wrapT = THREE.RepeatWrapping;\n                    surfaceMaterial = new THREE.MeshStandardMaterial({ \n                        map: texture,\n                        roughness: 0.2\n                    });\n                } else {\n                    surfaceMaterial = new THREE.MeshStandardMaterial({ \n                        color: 0xD4A574,\n                        roughness: 0.2\n                    });\n                }\n                \n                const surfaceMesh = new THREE.Mesh(surfaceGeometry, surfaceMaterial);\n                surfaceMesh.rotation.x = -Math.PI / 2;\n                surfaceMesh.position.y = 1;\n                surfaceMesh.receiveShadow = true;\n                scene.add(surfaceMesh);\n\n                // Board edges (rails)\n                const railMaterial = new THREE.MeshStandardMaterial({ color: 0x5D4037, roughness: 0.4 });\n                const railHeight = 15;\n                const railWidth = 20;\n\n                const topRail = new THREE.Mesh(\n                    new THREE.BoxGeometry(BOARD_SIZE + 40, railHeight, railWidth),\n                    railMaterial\n                );\n                topRail.position.set(0, railHeight/2, -BOARD_HALF - railWidth/2);\n                scene.add(topRail);\n\n                // Bottom rail\n                const bottomRail = new THREE.Mesh(\n                    new THREE.BoxGeometry(BOARD_SIZE + 40, railHeight, railWidth),\n                    railMaterial\n                );\n                bottomRail.position.set(0, railHeight/2, BOARD_HALF + railWidth/2);\n                scene.add(bottomRail);\n\n                // Left rail\n                const leftRail = new THREE.Mesh(\n                    new THREE.BoxGeometry(railWidth, railHeight, BOARD_SIZE + 40),\n                    railMaterial\n                );\n                leftRail.position.set(-BOARD_HALF - railWidth/2, railHeight/2, 0);\n                scene.add(leftRail);\n\n                // Right rail\n                const rightRail = new THREE.Mesh(\n                    new THREE.BoxGeometry(railWidth, railHeight, BOARD_SIZE + 40),\n                    railMaterial\n                );\n                rightRail.position.set(BOARD_HALF + railWidth/2, railHeight/2, 0);\n                scene.add(rightRail);\n\n                // Pockets (dark circles)\n                const pocketGeometry = new THREE.CircleGeometry(POCKET_RADIUS, 32);\n                const pocketMaterial = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });\n                \n                const pocketPositions = [\n                    [-POCKET_OFFSET, POCKET_OFFSET],\n                    [POCKET_OFFSET, POCKET_OFFSET],\n                    [-POCKET_OFFSET, -POCKET_OFFSET],\n                    [POCKET_OFFSET, -POCKET_OFFSET]\n                ];\n\n                pocketPositions.forEach(([x, z]) =\u003e {\n                    const pocket = new THREE.Mesh(pocketGeometry, pocketMaterial);\n                    pocket.rotation.x = -Math.PI / 2;\n                    pocket.position.set(x, 2, z);\n                    scene.add(pocket);\n                });\n\n                // Center circle\n                const centerGeometry = new THREE.RingGeometry(40, 45, 32);\n                const centerMaterial = new THREE.MeshStandardMaterial({ \n                    color: 0x3E2723, \n                    side: THREE.DoubleSide \n                });\n                const centerCircle = new THREE.Mesh(centerGeometry, centerMaterial);\n                centerCircle.rotation.x = -Math.PI / 2;\n                centerCircle.position.y = 2;\n                scene.add(centerCircle);\n\n                // Baseline indicator (player's side)\n                const baselineGeometry = new THREE.PlaneGeometry((BOARD_SIZE - 100) * 0.8, 4);\n                const baselineMaterial = new THREE.MeshStandardMaterial({ \n                    color: 0xFFFF00, \n                    transparent: true, \n                    opacity: 0.5 \n                });\n                baselineMesh = new THREE.Mesh(baselineGeometry, baselineMaterial);\n                baselineMesh.rotation.x = -Math.PI / 2;\n                baselineMesh.position.set(0, 3, BASELINE_OFFSET);\n                baselineMesh.name = 'baseline';\n                baselineMesh.visible = false;\n                scene.add(baselineMesh);\n            }\n\n            function createPieceMesh(type, x, z) {\n                const radius = type === 'striker' ? STRIKER_RADIUS : PIECE_RADIUS;\n                const height = type === 'striker' ? 10 : 8;\n                \n                const geometry = new THREE.CylinderGeometry(radius, radius, height, 32);\n                disposableObjects.geometries.push(geometry); // Track for disposal\n                \n                let material;\n                let color;\n                \n                switch(type) {\n                    case 'black':\n                        color = 0x1A1A1A;\n                        break;\n                    case 'white':\n                        color = 0xF5F5F5;\n                        break;\n                    case 'queen':\n                        color = 0xC41E3A;\n                        break;\n                    case 'striker':\n                        color = 0xE8C9A0;\n                        break;\n                }\n                \n                material = new THREE.MeshStandardMaterial({ \n                    color: color,\n                    roughness: 0.3,\n                    metalness: 0.1\n                });\n                disposableObjects.materials.push(material); // Track for disposal\n                \n                const mesh = new THREE.Mesh(geometry, material);\n                mesh.position.set(x, height/2 + 2, z);\n                mesh.castShadow = true;\n
