                        removePiPWindow(window);
                        pipWindows.splice(i, 1);
                        continue;
                    }
                    
                    // Advance replay animation
                    window.replayProgress += replaySpeed * deltaTime;
                    if (window.replayProgress &gt; 1.0) {
                        window.replayProgress = 1.0;
                    }
                    
                    // Get current replay position by interpolating through trajectory
                    const trajectory = window.trajectory;
                    if (trajectory.length &gt;= 2) {
                        const totalTime = trajectory[trajectory.length - 1].time - trajectory[0].time;
                        const targetTime = trajectory[0].time + (totalTime * window.replayProgress);
                        
                        // Find the two points to interpolate between
                        let startPoint = trajectory[0];
                        let endPoint = trajectory[1];
                        
                        for (let j = 0; j &lt; trajectory.length - 1; j++) {
                            if (trajectory[j].time &lt;= targetTime &amp;&amp; trajectory[j + 1].time &gt;= targetTime) {
                                startPoint = trajectory[j];
                                endPoint = trajectory[j + 1];
                                break;
                            }
                        }
                        
                        // Interpolate position
                        const segmentProgress = endPoint.time === startPoint.time ? 1 :
                            (targetTime - startPoint.time) / (endPoint.time - startPoint.time);
                        
                        const replayX = startPoint.x + (endPoint.x - startPoint.x) * segmentProgress;
                        const replayZ = startPoint.z + (endPoint.z - startPoint.z) * segmentProgress;
                        
                        // Temporarily move the piece to replay position for rendering
                        const piece = window.piece;
                        const originalX = piece.mesh.position.x;
                        const originalZ = piece.mesh.position.z;
                        const originalY = piece.mesh.position.y;
                        const originalVisible = piece.mesh.visible;
                        
                        // Set replay position
                        piece.mesh.position.x = replayX;
                        piece.mesh.position.z = replayZ;
                        
                        // Animate falling if near end of replay
                        if (window.replayProgress &gt; 0.85) {
                            const fallProgress = (window.replayProgress - 0.85) / 0.15;
                            piece.mesh.position.y = 6 - (fallProgress * 30); // Start falling
                        } else {
                            piece.mesh.position.y = 6;
                        }
                        
                        piece.mesh.visible = true;
                        
                        // Position camera above the pocket looking down
                        window.camera.position.set(
                            window.pocket.x,
                            200,
                            window.pocket.z + 50
                        );
                        window.camera.lookAt(window.pocket.x, 0, window.pocket.z);
                        
                        // Render the PiP view
                        window.renderer.render(scene, window.camera);
                        
                        // Restore original position
                        piece.mesh.position.x = originalX;
                        piece.mesh.position.z = originalZ;
                        piece.mesh.position.y = originalY;
                        piece.mesh.visible = originalVisible;
                    }
                }
                
                // Reposition remaining windows to fill gaps
                repositionPiPWindows();
            }
            
            function repositionPiPWindows() {
                // Group windows by corner
                const corners = {
                    topLeft: [],
                    topRight: [],
                    bottomLeft: [],
                    bottomRight: []
                };
                
                pipWindows.forEach(window =&gt; {
                    const pos = window.position;
                    const isTop = pos.top !== 'auto';
                    const isLeft = pos.left !== 'auto';
                    
                    if (isTop &amp;&amp; isLeft) corners.topLeft.push(window);
                    else if (isTop &amp;&amp; !isLeft) corners.topRight.push(window);
                    else if (!isTop &amp;&amp; isLeft) corners.bottomLeft.push(window);
                    else corners.bottomRight.push(window);
                });
                
                // Reposition each corner's windows
                const verticalSpacing = 190;
                
                Object.values(corners).forEach(cornerWindows =&gt; {
                    cornerWindows.forEach((window, index) =&gt; {
                        const pos = window.position;
                        if (pos.top !== 'auto') {
                            window.element.style.top = `${120 + (index * verticalSpacing)}px`;
                        }
                        if (pos.bottom !== 'auto') {
                            window.element.style.bottom = `${180 + (index * verticalSpacing)}px`;
                        }
                    });
                });
            }
            
            function removePiPWindow(window) {
                window.element.classList.remove('visible');
                
                // Remove DOM element after transition
                setTimeout(() =&gt; {
                    if (window.element.parentNode) {
                        window.element.parentNode.removeChild(window.element);
                    }
                    // Dispose Three.js resources properly
                    if (window.renderer) {
                        window.renderer.dispose();
                        window.renderer.forceContextLoss();
                        window.renderer = null;
                    }
                    // Clear references to help GC
                    window.camera = null;
                    window.canvas = null;
                    window.element = null;
                    window.piece = null;
                    window.trajectory = null;
                }, 300);
            }
            
            function showPiP(pocket, piece, pieceId, currentTime) {
                // Check if the pocket where this piece sank is offscreen
                if (!isPocketVisible(pocket.x, pocket.z)) {
                    // Create new PiP window
                    createPiPWindow(pocket, piece, pieceId, currentTime);
                }
            }

            function pocketPiece(piece, pieceIndex) {
                piece.falling = true;
                piece.vx = 0;
                piece.vz = 0;
                playSound('piece_pocket_sound', 0.6);
                
                // Clear position history for this piece to free memory
                const pieceId = `piece_${pieceIndex}`;
                positionHistory.delete(pieceId);

                // Check if the pocket where this piece sank is offscreen
                const { pocket } = findClosestPocket(piece);
                
                // Store the pocket location for potential return animation
                piece.pocketedAt = { x: pocket.x, z: pocket.z };
                
                if (pocket &amp;&amp; !isPocketVisible(pocket.x, pocket.z)) {
                    // Show PiP &quot;replay&quot; of the pocket as piece falls
                    const pieceId = `piece_${pieceIndex}`;
                    showPiP(pocket, piece, pieceId, performance.now() / 1000);
                }

                if (piece.type === 'queen') {
                    queenPocketed = true;
                    queenPocketedBy = currentPlayer;
                    queenAwaitingCover = true; // Queen stays pocketed, waiting for next turn to cover
                    turnState.queenPocketedThisTurn = true;
                } else if (piece.type === 'black' || piece.type === 'white') {
                    const currentColor = currentPlayer === 1 ? playerColor : aiColor;
                    if (piece.type === currentColor) {
                        // Check if player has foul debt - if so, this piece must be returned
                        if (foulDebt[currentPlayer] &gt; 0) {
                            foulDebt[currentPlayer]--;
                            lib.log(`Player ${currentPlayer} foul debt decreased to ${foulDebt[currentPlayer]} - piece will be returned`);
                            
                            // Mark piece for delayed return after it finishes falling animation
                            piece.returnAfterFall = true;
                        } else {
                            // Check if this would be the last piece and queen isn't covered
                            const remainingAfterThis = pieces.filter(p =&gt; p.type === currentColor &amp;&amp; !p.pocketed &amp;&amp; p !== piece).length;
                            const queenNotCovered = !queenCovered;
                            
                            if (remainingAfterThis === 0 &amp;&amp; queenNotCovered) {
                                // Cannot pocket last piece without queen being covered
                                // Mark piece for return
                                lib.log(`Player ${currentPlayer} cannot pocket last piece without queen covered - piece will be returned`);
                                piece.returnAfterFall = true;
                                // Don't add to pocketed pieces, don't set lastPocketedOwnPiece
                            } else {
                                // Normal pocketing - piece stays pocketed
                                pocketedPieces[currentPlayer].push(piece);
                                turnState.ownPiecesPocketedThisTurn++;
                                
                                // Cover the queen if awaiting cover and this player is the one who pocketed it
                                if (queenAwaitingCover &amp;&amp; queenPocketedBy === currentPlayer) {
                                    queenCovered = true;
                                    queenAwaitingCover = false;
                                }
                            }
                        }
                    } else {
                        // Pocketed opponent's piece - don't credit yet, will process in resolveShot
                        // based on foul rules (issues 1, 2, 3)
                        turnState.opponentPiecesPocketedThisTurn++;
                        turnState.opponentPiecesPocketedList.push(piece);
                    }
                }
            }

            function isMoving() {
                const threshold = 5;
                if (striker &amp;&amp; !striker.pocketed) {
                    if (striker.falling || Math.abs(striker.vx) &gt; threshold || Math.abs(striker.vz) &gt; threshold) {
                        return true;
                    }
                }
                for (const piece of pieces) {
                    if (!piece.pocketed &amp;&amp; (piece.falling || Math.abs(piece.vx) &gt; threshold || Math.abs(piece.vz) &gt; threshold)) {
                        return true;
                    }
                }
                return false;
            }

            // ==================== GAME LOGIC ====================
            function countRemainingPieces(player) {
                const color = player === 1 ? playerColor : aiColor;
                return pieces.filter(p =&gt; p.type === color &amp;&amp; !p.pocketed).length;
            }

            function updateScoreDisplay() {
                document.getElementById('p1-pieces').textContent = countRemainingPieces(1);
                document.getElementById('p2-pieces').textContent = countRemainingPieces(2);

                document.getElementById('player1-score').classList.toggle('active', currentPlayer === 1);
                document.getElementById('player2-score').classList.toggle('active', currentPlayer === 2);
            }

            function checkWinCondition() {
                const p1Remaining = countRemainingPieces(1);
                const p2Remaining = countRemainingPieces(2);

                if (p1Remaining === 0 &amp;&amp; queenPocketed &amp;&amp; queenCovered) {
                    endGame(1);
                    return true;
                }
                if (p2Remaining === 0 &amp;&amp; queenPocketed &amp;&amp; queenCovered) {
                    endGame(2);
                    return true;
                }
                return false;
            }

            function endGame(winner) {
                if (tournamentMode) {
                    // Tournament mode - single board knockout
                    // Show advancement message then handle round end
                    if (winner === 1) {
                        showTurnIndicator(t('youAdvance'), t('movingToNext'));
                        setTimeout(() =&gt; {
                            handleTournamentRoundEnd('player');
                        }, 2000);
                    } else {
                        showTurnIndicator(t('eliminated'), t('betterLuck'));
                        setTimeout(() =&gt; {
                            handleTournamentRoundEnd('opponent');
                        }, 2000);
                    }
                    return;
                }
                
                // Single match mode
                gamePhase = 'GAME_OVER';
                
                // Determine winner text based on mode
                let winnerText;
                if (isTwoPlayerMode) {
                    const winnerCountry = winner === 1 ? playerCountry : aiCountry;
                    winnerText = `${winnerCountry.flag} ${winnerCountry.name} Wins!`;
                } else {
                    winnerText = winner === 1 ? t('youWin') : t('aiWins');
                }
                
                document.getElementById('winner-text').textContent = winnerText;
                
                // Update final score text based on mode
                let scoreText;
                if (isTwoPlayerMode) {
                    const p1Score = 9 - countRemainingPieces(1);
                    const p2Score = 9 - countRemainingPieces(2);
                    scoreText = `${playerCountry.name}: ${p1Score} - ${aiCountry.name}: ${p2Score}`;
                } else {
                    scoreText = t('finalScore').replace('{p1}', 9 - countRemainingPieces(1)).replace('{p2}', 9 - countRemainingPieces(2));
                }
                document.getElementById('final-score').textContent = scoreText;
                document.getElementById('game-over').classList.add('visible');
                striker.mesh.visible = false;
            }

            function handleFoul(foulType) {
                playSound('foul_sound', 0.5);
                document.getElementById('foul-message').classList.add('visible');
                foulMessageVisible = true;
                foulMessageClearTime = performance.now() + 1500;
                setTimeout(() =&gt; {
                    document.getElementById('foul-message').classList.remove('visible');
                    foulMessageVisible = false;
                }, 1500);

                // Increment consecutive foul counter
                consecutiveFouls[currentPlayer]++;
                lib.log(`Player ${currentPlayer} consecutive fouls: ${consecutiveFouls[currentPlayer]} (${foulType})`);

                // Return a pocketed piece if available, otherwise add to foul debt
                const playerPocketed = pocketedPieces[currentPlayer];
                if (playerPocketed.length &gt; 0) {
                    const piece = playerPocketed.pop();
                    startPieceReturn(piece);
                    // Update score display immediately to show piece returned
                    updateScoreDisplay();
                } else {
                    // No pieces to return - player owes a piece (foul debt)
                    foulDebt[currentPlayer]++;
                    lib.log(`Player ${currentPlayer} foul debt increased to ${foulDebt[currentPlayer]}`);
                }

                // Three consecutive fouls = additional piece returned to center
                if (consecutiveFouls[currentPlayer] &gt;= 3) {
                    lib.log(`Player ${currentPlayer} committed 3 consecutive fouls - extra penalty!`);
                    consecutiveFouls[currentPlayer] = 0; // Reset counter
                    
                    // Return an additional piece
                    if (playerPocketed.length &gt; 0) {
                        const extraPiece = playerPocketed.pop();
                        // Delay the second piece return slightly so they don't overlap
                        setTimeout(() =&gt; {
                            startPieceReturn(extraPiece);
                            updateScoreDisplay();
                        }, 500);
                    } else {
                        // Add to foul debt if no pieces available
                        foulDebt[currentPlayer]++;
                        lib.log(`Player ${currentPlayer} foul debt increased to ${foulDebt[currentPlayer]} (triple foul penalty)`);
                    }
                }

                // If queen was pocketed this turn but not covered, return it
                if (turnState.queenPocketedThisTurn &amp;&amp; turnState.ownPiecesPocketedThisTurn === 0) {
                    const queen = pieces.find(p =&gt; p.type === 'queen');
                    if (queen &amp;&amp; queen.pocketed) {
                        startPieceReturn(queen);
                        queenPocketed = false;
                        queenPocketedBy = null;
                        queenAwaitingCover = false;
                    }
                }
            }

            function startStrikerReturn() {
                gamePhase = 'RETURNING_STRIKER';
                setCameraState('WIDE');
                strikerReturnDueToFoul = true; // Mark this return as due to a foul
                
                // Store starting position (current position in pocket)
                strikerReturnStartPos = { 
                    x: striker.mesh.position.x, 
                    z: striker.mesh.position.z 
                };
                
                // Determine target baseline based on who gets the foul shot (opponent)
                const nextPlayer = currentPlayer === 1 ? 2 : 1;
                strikerReturnTargetBaseline = nextPlayer === 1 ? BASELINE_OFFSET : -BASELINE_OFFSET;
                
                // Reset return progress
                strikerReturnProgress = 0;
                
                // Make sure striker is visible
                striker.mesh.visible = true;
                striker.returning = true;
                
                updateInstructions(t('strikerReturning'));
            }

            function updateStrikerReturn(deltaTime) {
                const returnSpeed = 0.8; // Progress per second (0 to 1)
                strikerReturnProgress += returnSpeed * deltaTime;
                
                if (strikerReturnProgress &gt;= 1.0) {
                    strikerReturnProgress = 1.0;
                    // Animation complete
                    completeStrikerReturn();
                    return;
                }
                
                // Ease-in-out function
                const t = strikerReturnProgress;
                const eased = t &lt; 0.5 
                    ? 2 * t * t 
                    : -1 + (4 - 2 * t) * t;
                
                // Phase 1 (0-0.4): Rise from pocket
                // Phase 2 (0.4-1.0): Move to baseline position
                
                if (strikerReturnProgress &lt; 0.4) {
                    // Rising phase
                    const riseProgress = strikerReturnProgress / 0.4;
                    const riseEased = riseProgress &lt; 0.5 
                        ? 2 * riseProgress * riseProgress 
                        : -1 + (4 - 2 * riseProgress) * riseProgress;
                    
                    striker.mesh.position.y = -50 + riseEased * 70; // Rise from -50 to 20
                } else {
                    // Moving to baseline phase
                    const moveProgress = (strikerReturnProgress - 0.4) / 0.6;
                    const moveEased = moveProgress &lt; 0.5 
                        ? 2 * moveProgress * moveProgress 
                        : -1 + (4 - 2 * moveProgress) * moveProgress;
                    
                    // Keep at floating height
                    striker.mesh.position.y = 20;
                    
                    // Move from starting position to center of baseline
                    const targetX = 0;
                    const targetZ = strikerReturnTargetBaseline;
                    
                    striker.mesh.position.x = strikerReturnStartPos.x + (targetX - strikerReturnStartPos.x) * moveEased;
                    striker.mesh.position.z = strikerReturnStartPos.z + (targetZ - strikerReturnStartPos.z) * moveEased;
                }
            }

            function completeStrikerReturn() {
                // Place striker at center of baseline
                striker.x = 0;
                striker.z = strikerReturnTargetBaseline;
                striker.mesh.position.set(0, 20, strikerReturnTargetBaseline);
                striker.vx = 0;
                striker.vz = 0;
                striker.pocketed = false;
                striker.returning = false;
                striker.falling = false;
                striker.mesh.visible = true;
                
                // Check win condition now
                if (checkWinCondition()) {
                    return;
                }
                
                // Check if pieces are still returning to center - wait for them before switching
                if (returningPieces.length &gt; 0) {
                    waitingForPiecesReturn = true;
                    pendingTurnSwitch = {
                        nextPlayer: currentPlayer === 1 ? 2 : 1,
                        dueToFoul: strikerReturnDueToFoul
                    };
                    strikerReturnDueToFoul = false;
                    gamePhase = 'RESOLVING'; // Wait in resolving phase
                    updateInstructions(''); // Clear instructions while waiting
                    return;
                }
                
                // Wait for foul message to clear before switching turns
                if (foulMessageVisible) {
                    const remainingTime = Math.max(0, foulMessageClearTime - performance.now()) + 100;
                    setTimeout(() =&gt; {
                        proceedWithTurnSwitch();
                    }, remainingTime);
                    return;
                }
                
                proceedWithTurnSwitch();
            }
            
            function proceedWithTurnSwitch() {
                // After a foul, ALWAYS switch to the opponent and reset turn state
                if (strikerReturnDueToFoul) {
                    strikerReturnDueToFoul = false; // Reset flag
                    resetTurnState(); // Reset turn state for new player
                    currentPlayer = currentPlayer === 1 ? 2 : 1;
                    
                    // If it's AI's turn after foul (only in 1P mode), plan the shot and animate to position
                    if (currentPlayer === 2 &amp;&amp; !isTwoPlayerMode) {
                        // Calculate AI's shot first
                        aiPlannedShot = calculateAIShot();
                        
                        // Start animation from baseline center to AI's chosen position
                        aiPlacementStartPos = { x: striker.x, z: striker.z };
                        aiPlacementAnimProgress = 0;
                        gamePhase = 'AI_TURN';
                        showTurnIndicator(t('aiTurn'), t('positioning'));
                        updateInstructions(t('aiPositioning'));
                    } else {
                        striker.floating = true;
                        striker.floatStartTime = performance.now();
                        startTurn(currentPlayer);
                    }
                } else {
                    // Normal turn logic (non-foul case) - use turnState counters
                    const shouldContinueTurn = turnState.ownPiecesPocketedThisTurn &gt; 0 || turnState.queenPocketedThisTurn;
                    if (shouldContinueTurn) {
                        // Same player continues - reset turn state for next strike
                        resetTurnState();
                        // In 2P mode or for player 1, float the striker
                        if (isTwoPlayerMode || currentPlayer === 1) {
                            striker.floating = true;
                            striker.floatStartTime = performance.now();
                        }
                        startTurn(currentPlayer);
                    } else {
                        // Switch player - reset turn state for new turn
                        resetTurnState();
                        currentPlayer = currentPlayer === 1 ? 2 : 1;
                        // In 2P mode or for player 1, float the striker
                        if (isTwoPlayerMode || currentPlayer === 1) {
                            striker.floating = true;
                            striker.floatStartTime = performance.now();
                        }
                        startTurn(currentPlayer);
                    }
                }
            }

            function resolveShot() {
                const strikerPocketed = striker.pocketed;
                const hitAnyPiece = pieces.some(p =&gt; Math.abs(p.vx) &gt; 1 || Math.abs(p.vz) &gt; 1 || p.pocketed);

                // Mark initial break as complete after first shot
                if (isInitialBreak) {
                    isInitialBreak = false;
                }

                // Check if queen needs to be returned (player who pocketed it failed to cover on next turn)
                // This check happens when:
                // 1. Queen is awaiting cover
                // 2. Current player is the one who pocketed the queen
                // 3. They did NOT pocket the queen this turn (it was pocketed on a previous turn)
                // 4. They did NOT pocket any of their own pieces this turn
                if (queenAwaitingCover &amp;&amp; 
                    queenPocketedBy === currentPlayer &amp;&amp; 
                    !turnState.queenPocketedThisTurn &amp;&amp; 
                    turnState.ownPiecesPocketedThisTurn === 0) {
                    // Return the queen to the board with animation
                    const queen = pieces.find(p =&gt; p.type === 'queen');
                    if (queen &amp;&amp; queen.pocketed) {
                        startPieceReturn(queen);
                        queenPocketed = false;
                        queenPocketedBy = null;
                        queenAwaitingCover = false;
                    }
                }

                let foul = false;
                let foulType = '';
                
                // Foul: Striker is pocketed
                if (strikerPocketed) {
                    foul = true;
                    foulType = 'striker_pocketed';
                }

                if (foul) {
                    handleFoul(foulType);
                    // Start striker return animation
                    startStrikerReturn();
                    return; // Don't continue to next turn yet
                }
                
                // Process opponent pieces pocketed this turn (foul rules issues 1, 2, 3)
                if (turnState.opponentPiecesPocketedThisTurn &gt; 0) {
                    const opponent = currentPlayer === 1 ? 2 : 1;
                    const opponentColor = opponent === 1 ? playerColor : aiColor;
                    const opponentPiecesRemaining = pieces.filter(p =&gt; p.type === opponentColor &amp;&amp; !p.pocketed).length;
                    const pocketedOpponentPieces = turnState.opponentPiecesPocketedList;
                    
                    // Issue 3: Pocketed opponent's last remaining piece - serious foul
                    // The piece must be returned AND current player pays penalty
                    if (opponentPiecesRemaining === 0 &amp;&amp; pocketedOpponentPieces.length &gt; 0) {
                        // Return opponent's last piece(s) to center
                        for (const piece of pocketedOpponentPieces) {
                            startPieceReturn(piece);
                        }
                        // Apply foul penalty (return one of current player's pieces or add debt)
                        handleFoul('opponent_last_piece');
                        // Zoom back and switch turn
                        setCameraState('WIDE');
                        updateScoreDisplay();
                        if (checkWinCondition()) return;
                        resetTurnState();
                        currentPlayer = opponent;
                        startTurn(currentPlayer);
                        return;
                    }
                    // Issue 2: Own piece AND opponent piece in same shot
                    // Own piece stays, turn continues, but opponent piece must be returned
                    else if (turnState.ownPiecesPocketedThisTurn &gt; 0) {
                        // Return opponent pieces to center (they don't count for anyone)
                        for (const piece of pocketedOpponentPieces) {
                            startPieceReturn(piece);
                        }
                        // Not a foul - fall through to normal flow
                        // Turn will continue since lastPocketedOwnPiece is true
                    }
                    // Issue 1: Only opponent piece(s), no own pieces - foul
                    // Opponent pieces stay pocketed but current player pays penalty
                    else {
                        // Credit opponent pieces to opponent (they stay pocketed)
                        for (const piece of pocketedOpponentPieces) {
                            pocketedPieces[opponent].push(piece);
                        }
                        // Apply foul penalty (return one of current player's pieces or add debt)
                        handleFoul('opponent_piece_only');
                        // Zoom back and switch turn
                        setCameraState('WIDE');
                        updateScoreDisplay();
                        if (checkWinCondition()) return;
                        resetTurnState();
                        currentPlayer = opponent;
                        startTurn(currentPlayer);
                        return;
                    }
                }
                
                // No foul - reset consecutive foul counter
                consecutiveFouls[currentPlayer] = 0;

                // Zoom back to wide view
                setCameraState('WIDE');

                // Check win condition
                if (checkWinCondition()) {
                    return;
                }

                // Determine next turn based on turnState counters (single source of truth)
                // Player keeps turn if they pocketed own piece(s) OR pocketed the queen
                const shouldContinueTurn = turnState.ownPiecesPocketedThisTurn &gt; 0 || turnState.queenPocketedThisTurn;
                if (shouldContinueTurn) {
                    // Same player continues - reset turn state for next strike
                    resetTurnState();
                    startTurn(currentPlayer);
                } else {
                    // Switch player - reset turn state for new turn
                    resetTurnState();
                    currentPlayer = currentPlayer === 1 ? 2 : 1;
                    startTurn(currentPlayer);
                }
            }

            function resetTurnState() {
                turnState.queenPocketedThisTurn = false;
                turnState.ownPiecesPocketedThisTurn = 0;
                turnState.opponentPiecesPocketedThisTurn = 0;
                turnState.opponentPiecesPocketedList = [];
            }

            function startTurn(player) {
                strikerPlaced = false;
                
                // Detect player switch in 2P mode and trigger slow camera transition
                if (isTwoPlayerMode &amp;&amp; player !== lastActivePlayer) {
                    cameraTransitionMode = 'player_switch';
                }
                lastActivePlayer = player;
                
                // Determine which baseline this player uses
                const playerBaseline = player === 1 ? BASELINE_OFFSET : -BASELINE_OFFSET;
                
                // Reset striker (but keep it visible if returning from foul)
                if (!striker.returning &amp;&amp; gamePhase !== 'RETURNING_STRIKER') {
                    striker.pocketed = false;
                    striker.x = 0; // Center X position
                    striker.vx = 0;
                    striker.vz = 0;
                    striker.mesh.visible = true;
                    striker.floating = false;
                    striker.placementAnimating = false;
                    striker.placementProgress = 0;
                    
                    // In 2P mode, both players are human and use their respective baselines
                    if (isTwoPlayerMode || player === 1) {
                        // Position striker below the baseline, waiting for player tap
                        const offsetDir = player === 1 ? 1 : -1;
                        striker.z = playerBaseline + (120 * offsetDir); // Below/above the baseline
                        striker.mesh.position.x = 0; // Centered
                        striker.mesh.position.y = 35; // Hovering height
                        striker.mesh.position.z = striker.z;
                        striker.hovering = false; // No oscillation
                    } else {
                        // AI in 1P mode
                        striker.z = -BASELINE_OFFSET;
                        striker.mesh.position.x = 0;
                        striker.mesh.position.y = 7; // Board level for AI
                        striker.mesh.position.z = striker.z;
                        striker.hovering = false;
                    }
                }

                // Reset camera to wide view (will be flipped for player 2 in 2P mode)
                setCameraState('WIDE');

                updateScoreDisplay();

                // Determine if this player is human-controlled
                const isHumanPlayer = (player === 1) || isTwoPlayerMode;

                if (isHumanPlayer) {
                    gamePhase = 'POSITIONING';
                    
                    // Show appropriate turn indicator
                    if (isTwoPlayerMode) {
                        const turnText = player === 1 ? t('p1Turn') : t('p2Turn');
                        showTurnIndicator(turnText, t('placeStriker'));
                    } else {
                        showTurnIndicator(t('yourTurn'), t('placeStriker'));
                    }
                    updateInstructions(t('tapBaseline'));
                    
                    // Show tutorial baseline animation if not completed (only for player 1 in first game)
                    if (!tutorialCompleted &amp;&amp; player === 1) {
                        showTutorialBaseline();
                    }
                } else {
                    // AI turn (only in 1P mode)
                    gamePhase = 'AI_TURN';
                    striker.mesh.visible = false; // Hide striker until AI finds valid placement
                    showTurnIndicator(t('aiTurn'), t('thinking'));
                    updateInstructions(t('aiTakingShot'));
                    setTimeout(() =&gt; aiTakeTurn(), 1500);
                }
            }

            function showTurnIndicator(title, subtitle) {
                document.getElementById('turn-text').textContent = title;
                document.getElementById('turn-instruction').textContent = subtitle;
                document.getElementById('turn-indicator').classList.add('visible');
                playSound('turn_start_sound', 0.4);
                setTimeout(() =&gt; {
                    document.getElementById('turn-indicator').classList.remove('visible');
                }, 2000);
            }

            function updateInstructions(text) {
                document.getElementById('instruction-text').textContent = text;
            }

            // ==================== AI ====================
            
            // Check if path from point A to point B is clear of other pieces
            function isPathClear(startX, startZ, endX, endZ, ignorePiece = null, pathRadius = STRIKER_RADIUS) {
                const dx = endX - startX;
                const dz = endZ - startZ;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist &lt; 1) return true;
                
                const dirX = dx / dist;
                const dirZ = dz / dist;
                
                for (const piece of pieces) {
                    if (piece.pocketed || piece === ignorePiece) continue;
                    
                    // Ray-circle intersection test
                    const px = piece.x - startX;
                    const pz = piece.z - startZ;
                    const effectiveRadius = piece.radius + pathRadius * 0.8;
                    
                    // Project piece center onto ray
                    const projection = px * dirX + pz * dirZ;
                    
                    // Skip if piece is behind start or beyond end
                    if (projection &lt; 0 || projection &gt; dist) continue;
                    
                    // Calculate perpendicular distance from ray to piece center
                    const closestX = startX + dirX * projection;
                    const closestZ = startZ + dirZ * projection;
                    const perpDist = Math.sqrt((piece.x - closestX) ** 2 + (piece.z - closestZ) ** 2);
                    
                    if (perpDist &lt; effectiveRadius) {
                        return false; // Path is blocked
                    }
                }
                return true;
            }
            
            // Check if baseline position is valid (not overlapping pieces)
            function isValidBaselinePosition(x, z) {
                const minClearance = STRIKER_RADIUS + PIECE_RADIUS + 5;
                for (const piece of pieces) {
                    if (piece.pocketed) continue;
                    const dx = x - piece.x;
                    const dz = z - piece.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    if (dist &lt; minClearance) return false;
                }
                return true;
            }
            
            // Evaluate a potential shot and return a score
            function evaluateShot(strikerX, strikerZ, targetPiece, pocketX, pocketZ) {
                let score = 0;
                
                // Distance from striker to target piece
                const toTargetDx = targetPiece.x - strikerX;
                const toTargetDz = targetPiece.z - strikerZ;
                const strikerToTarget = Math.sqrt(toTargetDx * toTargetDx + toTargetDz * toTargetDz);
                
                // Distance from target piece to pocket
                const toPocketDx = pocketX - targetPiece.x;
                const toPocketDz = pocketZ - targetPiece.z;
                const targetToPocket = Math.sqrt(toPocketDx * toPocketDx + toPocketDz * toPocketDz);
                
                // Normalize directions
                const strikerDirX = toTargetDx / strikerToTarget;
                const strikerDirZ = toTargetDz / strikerToTarget;
                const pocketDirX = toPocketDx / targetToPocket;
                const pocketDirZ = toPocketDz / targetToPocket;
                
                // Calculate angle alignment (how well striker-&gt;piece-&gt;pocket aligns)
                // Dot product of striker direction and pocket direction
                const alignment = strikerDirX * pocketDirX + strikerDirZ * pocketDirZ;
                
                // Score components:
                // 1. Alignment bonus (most important - straight shots are easier)
                //    alignment ranges from -1 (opposite) to 1 (perfectly aligned)
                score += alignment * 500;
                
                // 2. Closer to pocket is better (but alignment matters more)
                score += (300 - targetToPocket) * 0.8;
                
                // 3. Shorter striker distance is slightly preferred
                score += (400 - strikerToTarget) * 0.3;
                
                // 4. Path clearance bonus - check if path to target is clear
                if (isPathClear(strikerX, strikerZ, targetPiece.x, targetPiece.z, targetPiece, STRIKER_RADIUS)) {
                    score += 200;
                } else {
                    score -= 300; // Heavy penalty for blocked shots
                }
                
                // 5. Check if piece-&gt;pocket path is clear
                if (isPathClear(targetPiece.x, targetPiece.z, pocketX, pocketZ, targetPiece, PIECE_RADIUS)) {
                    score += 150;
                } else {
                    score -= 200; // Penalty for blocked pocket path
                }
                
                // 6. Bonus for pieces near pockets (high probability shots)
                if (targetToPocket &lt; 100) {
                    score += 250;
                }
                
                // 7. Penalty for very oblique angles (hard to pocket)
                if (alignment &lt; 0.3) {
                    score -= 200;
                }
                
                return score;
            }
            
            function calculateAIShot() {
                const targetPieces = pieces.filter(p =&gt; p.type === aiColor &amp;&amp; !p.pocketed);
                
                if (!queenPocketed &amp;&amp; targetPieces.length &lt;= 3) {
                    const queen = pieces.find(p =&gt; p.type === 'queen');
                    if (queen &amp;&amp; !queen.pocketed) {
                        targetPieces.push(queen);
                    }
                }
                
                if (targetPieces.length === 0) {
                    return null;
                }

                const pocketPositions = [
                    { x: -POCKET_OFFSET, z: POCKET_OFFSET, name: 'BL' },
                    { x: POCKET_OFFSET, z: POCKET_OFFSET, name: 'BR' },
                    { x: -POCKET_OFFSET, z: -POCKET_OFFSET, name: 'TL' },
                    { x: POCKET_OFFSET, z: -POCKET_OFFSET, name: 'TR' }
                ];
                
                const baselineZ = -BASELINE_OFFSET;
                const baselineMinX = -BOARD_HALF + 80;
                const baselineMaxX = BOARD_HALF - 80;
                
                // Evaluate all possible shots
                let bestShot = null;
                let bestScore = -Infinity;
                
                // For each target piece
                for (const targetPiece of targetPieces) {
                    // For each pocket
                    for (const pocket of pocketPositions) {
                        // Calculate ideal striker position for this shot
                        // The ideal position is along the line from pocket through piece, extended to baseline
                        const pieceToPocketX = pocket.x - targetPiece.x;
                        const pieceToPocketZ = pocket.z - targetPiece.z;
                        const pieceToPocketDist = Math.sqrt(pieceToPocketX * pieceToPocketX + pieceToPocketZ * pieceToPocketZ);
                        
                        // Direction from piece toward pocket
                        const dirX = pieceToPocketX / pieceToPocketDist;
                        const dirZ = pieceToPocketZ / pieceToPocketDist;
                        
                        // Extend line backwards from piece to find where it intersects baseline
                        // We want striker position such that striker -&gt; piece -&gt; pocket is aligned
                        // So we go backwards from piece (opposite of pocket direction)
                        
                        if (Math.abs(dirZ) &lt; 0.01) {
                            // Nearly horizontal shot - check several positions
                            for (let testX = baselineMinX; testX &lt;= baselineMaxX; testX += 40) {
                                if (!isValidBaselinePosition(testX, baselineZ)) continue;
                                
                                const baseScore = evaluateShot(testX, baselineZ, targetPiece, pocket.x, pocket.z);
                                let score = baseScore;
                                if (targetPiece.type === 'queen') {
                                    score += 800; // Bonus for queen
                                } else if (queenAwaitingCover &amp;&amp; queenPocketedBy === 2) {
                                    score += 600; // Bonus for covering piece
                                }
                                
                                if (score &gt; bestScore) {
                                    bestScore = score;
                                    bestShot = {
                                        position: { x: testX, z: baselineZ },
                                        targetPiece: targetPiece,
                                        pocket: pocket,
                                        score: score
                                    };
                                }
                            }
                        } else {
                            // Calculate where the line from piece (going opposite pocket direction) hits baseline
                            const t = (baselineZ - targetPiece.z) / (-dirZ);
                            let idealX = targetPiece.x + (-dirX) * t;
                            
                            // Clamp to valid baseline range
                            idealX = Math.max(baselineMinX, Math.min(baselineMaxX, idealX));
                            
                            // Try ideal position and nearby positions
                            const testPositions = [
                                idealX,
                                idealX - 30,
                                idealX + 30,
                                idealX - 60,
                                idealX + 60
                            ];
                            
                            for (const testX of testPositions) {
                                const clampedX = Math.max(baselineMinX, Math.min(baselineMaxX, testX));
                                if (!isValidBaselinePosition(clampedX, baselineZ)) continue;
                                
                                const baseScore = evaluateShot(clampedX, baselineZ, targetPiece, pocket.x, pocket.z);
                                let score = baseScore;
                                if (targetPiece.type === 'queen') {
                                    score += 800; // Bonus for queen
                                } else if (queenAwaitingCover &amp;&amp; queenPocketedBy === 2) {
                                    score += 600; // Bonus for covering piece
                                }
                                
                                if (score &gt; bestScore) {
                                    bestScore = score;
                                    bestShot = {
                                        position: { x: clampedX, z: baselineZ },
                                        targetPiece: targetPiece,
                                        pocket: pocket,
                                        score: score
                                    };
                                }
                            }
                        }
                    }
                }
                
                // Fallback if no good shot found
                if (!bestShot) {
                    // Just aim at the closest piece
                    let fallbackPos = { x: 0, z: baselineZ };
                    for (let attempt = 0; attempt &lt; 20; attempt++) {
                        const testX = (Math.random() - 0.5) * (baselineMaxX - baselineMinX) + (baselineMaxX + baselineMinX) / 2;
                        if (isValidBaselinePosition(testX, baselineZ)) {
                            fallbackPos = { x: testX, z: baselineZ };
                            break;
                        }
                    }
                    
                    const closestPiece = targetPieces.reduce((closest, p) =&gt; {
                        const d1 = Math.sqrt((p.x - fallbackPos.x) ** 2 + (p.z - fallbackPos.z) ** 2);
                        const d2 = Math.sqrt((closest.x - fallbackPos.x) ** 2 + (closest.z - fallbackPos.z) ** 2);
                        return d1 &lt; d2 ? p : closest;
                    });
                    
                    bestShot = {
                        position: fallbackPos,
                        targetPiece: closestPiece,
                        pocket: pocketPositions[0],
                        score: 0
                    };
                }
                
                // Calculate shot direction toward target piece
                const dx = bestShot.targetPiece.x - bestShot.position.x;
                const dz = bestShot.targetPiece.z - bestShot.position.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                let dirX = dx / dist;
                let dirZ = dz / dist;
                
                // Add accuracy variance based on difficulty
                let accuracy;
                if (aiDifficulty === 'easy') accuracy = 0.7;
                else if (aiDifficulty === 'hard') accuracy = 0.95;
                else accuracy = 0.85; // medium
                
                const angleOffset = (Math.random() - 0.5) * (1 - accuracy) * 0.4;
                const cos = Math.cos(angleOffset);
                const sin = Math.sin(angleOffset);
                const finalDirX = dirX * cos - dirZ * sin;
                const finalDirZ = dirX * sin + dirZ * cos;
                
                // Calculate power based on distance (smarter power control)
                const targetDist = Math.sqrt(dx * dx + dz * dz);
                const basePower = 400 + targetDist * 1.5; // Scale with distance
                const powerVariance = (Math.random() - 0.5) * 150;
                const power = Math.min(1100, Math.max(500, basePower + powerVariance));

                return {
                    position: bestShot.position,
                    direction: { x: finalDirX, z: finalDirZ },
                    power: power
                };
            }
            
            function aiTakeTurn() {
                // Calculate the shot
                aiPlannedShot = calculateAIShot();
                
                if (!aiPlannedShot) {
                    // No valid shot (should not happen)
                    return;
                }

                // Store start position for animation
                aiPlacementStartPos = { x: striker.x, z: striker.z };
                aiPlacementAnimProgress = 0;
                
                // Make striker visible
                striker.mesh.visible = true;
                
                updateInstructions(t('aiPositioning'));
            }

            // ==================== INPUT HANDLING ====================
            function screenToBoard(screenX, screenY) {
                const rect = canvas.getBoundingClientRect();
                const x = ((screenX - rect.left) / rect.width) * 2 - 1;
                const y = -((screenY - rect.top) / rect.height) * 2 + 1;

                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(new THREE.Vector2(x, y), camera);

                const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
                const intersection = new THREE.Vector3();
                raycaster.ray.intersectPlane(plane, intersection);

                return { x: intersection.x, z: intersection.z };
            }

            function handlePointerDown(e) {
                if (mode === 'edit') return;
                
                // Handle title screen tap - now handled by click events on title-screen element
                // This prevents duplicate handling on canvas
                if (gamePhase === 'TITLE_SCREEN') {
                    return;
                }
                
                if (gamePhase === 'GAME_OVER' || gamePhase === 'AI_TURN' || gamePhase === 'AI_AIMING' || gamePhase === 'SHOOTING' || gamePhase === 'RETURNING_STRIKER' || gamePhase === 'COLOR_SELECTION' || gamePhase === 'COUNTRY_SELECTION' || gamePhase === 'LANGUAGE_SELECTION') return;

                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const boardPos = screenToBoard(clientX, clientY);

                if (gamePhase === 'POSITIONING') {
                    // Determine which baseline the current player uses
                    const baselineZ = currentPlayer === 1 ? BASELINE_OFFSET : -BASELINE_OFFSET;
                    
                    // In 2P mode with flipped camera for player 2, adjust hit detection
                    // The boardPos is already in world coordinates, so baseline check works the same
                    if (Math.abs(boardPos.z - baselineZ) &lt; 30 &amp;&amp; 
                        Math.abs(boardPos.x) &lt; BOARD_HALF - 50) {
                        // Start placement animation from central position below baseline to tapped position
                        const targetX = Math.max(-BOARD_HALF + 80, Math.min(BOARD_HALF - 80, boardPos.x));
                        const targetZ = baselineZ;
                        
                        striker.placementAnimating = true;
                        striker.placementProgress = 0;
                        striker.placementStartX = striker.mesh.position.x;
                        striker.placementStartY = striker.mesh.position.y;
                        striker.placementStartZ = striker.mesh.position.z;
                        striker.placementTargetX = targetX;
                        striker.placementTargetY = 7;
                        striker.placementTargetZ = targetZ;
                        
                        // Set final logical position
                        striker.x = targetX;
                        striker.z = targetZ;
                        
                        updateInstructions(t('placingStriker'));
                    }
                } else if (gamePhase === 'AIMING') {
                    // Check if clicking on striker
                    const dx = boardPos.x - striker.x;
                    const dz = boardPos.z - striker.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);

                    if (dist &lt; STRIKER_RADIUS * 2) {
                        isDragging = true;
                        dragStart = { x: clientX, y: clientY };
                        dragCurrent = { x: clientX, y: clientY };
                        dragStartTime = performance.now();
                        // Keep camera in WIDE view initially - will switch after delay
                        
                        // Hide tutorial and save completion on first drag
                        if (!tutorialCompleted) {
                            hideTutorial();
                            tutorialCompleted = true;
                            showTutorial = false;
                            saveTutorialCompleted(); // Async save
                        }
                    }
                }
            }

            function handlePointerMove(e) {
                if (!isDragging || mode === 'edit') return;

                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                dragCurrent = { x: clientX, y: clientY };

                // Calculate drag vector (where you pulled FROM the striker)
                let dragX = dragCurrent.x - dragStart.x;
                let dragY = dragCurrent.y - dragStart.y;
                
                if (isTwoPlayerMode &amp;&amp; currentPlayer === 2) {
                    dragX = -dragX;
                    dragY = -dragY;
                }
                
                const dragDist = Math.sqrt(dragX * dragX + dragY * dragY);

                if (dragDist &gt; MIN_DRAG) {
                    // Calculate power
                    const power = Math.min(dragDist / MAX_DRAG, 1);
                    document.getElementById('power-fill').style.height = (power * 100) + '%';
                    document.getElementById('power-meter').classList.add('visible');

                    // Slingshot: shoot in OPPOSITE direction of drag
                    // Drag right → shoot left, Drag down → shoot up
                    const angle = Math.atan2(dragY, dragX);
                    currentAimDirX = -Math.cos(angle);
                    currentAimDirZ = -Math.sin(angle);
                    isAiming = true;
                } else {
                    isAiming = false;
                }
            }

            function handlePointerUp(e) {
                if (!isDragging || mode === 'edit') return;

                // Calculate drag vector (where you pulled FROM the striker)
                let dragX = dragCurrent.x - dragStart.x;
                let dragY = dragCurrent.y - dragStart.y;
                
                if (isTwoPlayerMode &amp;&amp; currentPlayer === 2) {
                    dragX = -dragX;
                    dragY = -dragY;
                }
                
                const dragDist = Math.sqrt(dragX * dragX + dragY * dragY);

                if (dragDist &gt; MIN_DRAG) {
                    // Calculate shot power
                    const power = Math.min(dragDist / MAX_DRAG, 1);
                    const velocity = power * MAX_VELOCITY * powerMultiplier;
                    
                    // Slingshot: shoot in OPPOSITE direction of drag
                    // Drag right → shoot left, Drag down → shoot up
                    const angle = Math.atan2(dragY, dragX);
                    striker.vx = -Math.cos(angle) * velocity;
                    striker.vz = -Math.sin(angle) * velocity;
                    
                    gamePhase = 'SHOOTING';
                    setCameraState('FOLLOWING');
                    updateInstructions('');
                }

                isDragging = false;
                isAiming = false;
                document.getElementById('power-meter').classList.remove('visible');
            }

            // ==================== EDIT MODE ====================
            function setupEditMode() {
                // Disable gameplay
                gamePhase = 'EDIT';
                
                // Show all pieces
                pieces.forEach(p =&gt; {
                    p.mesh.visible = true;
                    p.pocketed = false;
                });
                striker.mesh.visible = true;

                updateInstructions(t('editMode'));
            }

            // ==================== INITIALIZATION ====================
            async function init() {
                // Load tutorial state from persistent storage
                tutorialCompleted = await loadTutorialState();
                showTutorial = !tutorialCompleted;
                
                if (showTutorial) {
                    lib.log('Tutorial will be shown for this player');
                } else {
                    lib.log('Tutorial already completed, skipping');
                }

                // Set total asset count for progress tracking
                totalAssets = 11;
                loadedAssets = 0;
                updateLoadingProgress();

                // Load assets
                await Promise.all([
                    loadImage('carrom_board_texture'),
                    loadImage('black_piece'),
                    loadImage('white_piece'),
                    loadImage('queen_piece'),

            function runColorFlicker(count, maxCount) {
                const flickerBlack = document.getElementById('flicker-black');
                const flickerWhite = document.getElementById('flicker-white');
                const flickerText = document.getElementById('color-flicker-text');
                
                if (count &gt;= maxCount) {
                    // Final random selection
                    const finalColor = Math.random() &lt; 0.5 ? 'black' : 'white';
                    
                    flickerBlack.classList.remove('selected');
                    flickerWhite.classList.remove('selected');
                    
                    if (finalColor === 'black') {
                        flickerBlack.classList.add('selected');
                    } else {
                        flickerWhite.classList.add('selected');
                    }
                    
                    let colorText;
                    if (isTwoPlayerMode) {
                        colorText = finalColor === 'black' ? t('player1PlaysBlack') : t('player1PlaysWhite');
                    } else {
                        colorText = finalColor === 'black' ? t('youPlayBlack') : t('youPlayWhite');
                    }
                    flickerText.textContent = colorText;
                    
                    // Wait a moment then start the game
                    setTimeout(() =&gt; {
                        document.getElementById('ai-country-display').classList.remove('visible');
                        finishSetupAndStartGame(finalColor);
                    }, 1500);
                    return;
                }
                
                // Toggle highlight
                const isBlackHighlighted = flickerBlack.classList.contains('selected');
                flickerBlack.classList.toggle('selected', !isBlackHighlighted);
                flickerWhite.classList.toggle('selected', isBlackHighlighted);
                
                // Calculate delay - starts fast, slows down
                const baseDelay = 100;
                const slowdownFactor = count &gt; 10 ? (count - 10) * 40 : 0;
                const delay = baseDelay + slowdownFactor;
                
                setTimeout(() =&gt; runColorFlicker(count + 1, maxCount), delay);
            }

            // ==================== GAME LOOP ====================
            let lastTime = 0;
            let resolvingTimer = 0;
            let baselineFlashTime = 0;

            function gameLoop(timestamp) {
                const deltaTime = (timestamp - lastTime) / 1000;
                lastTime = timestamp;

                if (mode === 'play') {
                    // Update returning pieces animation
                    updateReturningPieces(deltaTime);
                    
                    // Check if waiting for pieces to return before switching turns
                    if (waitingForPiecesReturn &amp;&amp; returningPieces.length === 0) {
                        // Also wait for foul message to clear before switching
                        if (foulMessageVisible) {
                            // Keep waiting - don't clear waitingForPiecesReturn yet
                            // The foul message will clear on its own timeout
                        } else {
                            waitingForPiecesReturn = false;
                            
                            if (pendingTurnSwitch) {
                                resetTurnState();
                                currentPlayer = pendingTurnSwitch.nextPlayer;
                                
                                // Small delay before starting the turn for smooth transition
                                setTimeout(() =&gt; {
                                    if (currentPlayer === 2 &amp;&amp; !isTwoPlayerMode) {
                                        // AI turn after foul
                                        aiPlannedShot = calculateAIShot();
                                        aiPlacementStartPos = { x: striker.x, z: striker.z };
                                        aiPlacementAnimProgress = 0;
                                        gamePhase = 'AI_TURN';
                                        showTurnIndicator(t('aiTurn'), t('positioning'));
                                        updateInstructions(t('aiPositioning'));
                                    } else {
                                        striker.floating = true;
                                        striker.floatStartTime = performance.now();
                                        startTurn(currentPlayer);
                                    }
                                }, 400); // Brief pause after pieces settle
                                
                                pendingTurnSwitch = null;
                            }
                        }
                    }
                    
                    // Handle striker placement animation
                    if (striker.placementAnimating) {
                        const animationSpeed = 3.5; // Progress per second
                        striker.placementProgress += animationSpeed * deltaTime;
                        
                        if (striker.placementProgress &gt;= 1.0) {
                            // Animation complete
                            striker.placementProgress = 1.0;
                            striker.placementAnimating = false;
                            striker.mesh.position.x = striker.x;
                            striker.mesh.position.y = 7;
                            striker.mesh.position.z = striker.z;
                            striker.floating = false;
                            strikerPlaced = true;
                            gamePhase = 'AIMING';
                            setCameraState('WIDE');
                            updateInstructions(t('dragToAim'));
                            
                            // Hide baseline tutorial and show drag tutorial
                            if (!tutorialCompleted &amp;&amp; tutorialPhase === 'baseline') {
                                hideTutorial();
                                setTimeout(() =&gt; showTutorialDrag(), 300);
                            }
                        } else {
                            // Smooth ease-out animation
                            const t = striker.placementProgress;
                            const eased = 1 - Math.pow(1 - t, 3); // Cubic ease-out
                            
                            // Animate from starting position below baseline to placement position on baseline
                            striker.mesh.position.x = striker.placementStartX + (striker.placementTargetX - striker.placementStartX) * eased;
                            striker.mesh.position.y = striker.placementStartY + (striker.placementTargetY - striker.placementStartY) * eased;
                            striker.mesh.position.z = striker.placementStartZ + (striker.placementTargetZ - striker.placementStartZ) * eased;
                        }
                    }
                    
                    // Handle AI placement animation
                    if (gamePhase === 'AI_TURN' &amp;&amp; aiPlannedShot &amp;&amp; aiPlacementAnimProgress &lt; 1.0) {
                        const animationSpeed = 2.0; // Progress per second
                        aiPlacementAnimProgress += animationSpeed * deltaTime;
                        
                        if (aiPlacementAnimProgress &gt;= 1.0) {
                            // Animation complete - move to aiming phase
                            aiPlacementAnimProgress = 1.0;
                            striker.x = aiPlannedShot.position.x;
                            striker.z = aiPlannedShot.position.z;
                            striker.mesh.position.x = striker.x;
                            striker.mesh.position.y = 7;
                            striker.mesh.position.z = striker.z;
                            
                            // Start aiming phase
                            gamePhase = 'AI_AIMING';
                            aiAimingTimer = 0;
                            showTurnIndicator(t('aiTurn'), t('aiming'));
                            updateInstructions(t('aiAiming'));
                            
                            // Set aim direction for frame-synced drawing
                            currentAimDirX = aiPlannedShot.direction.x;
                            currentAimDirZ = aiPlannedShot.direction.z;
                            isAiming = true;
                        } else {
                            // Smooth ease-out animation
                            const t = aiPlacementAnimProgress;
                            const eased = 1 - Math.pow(1 - t, 3); // Cubic ease-out
                            
                            // Animate from start position to target position
                            striker.x = aiPlacementStartPos.x + (aiPlannedShot.position.x - aiPlacementStartPos.x) * eased;
                            striker.z = aiPlacementStartPos.z + (aiPlannedShot.position.z - aiPlacementStartPos.z) * eased;
                            striker.mesh.position.x = striker.x;
                            striker.mesh.position.y = 20 - (13 * eased); // Drop from 20 to 7
                            striker.mesh.position.z = striker.z;
                        }
                    }
                    
                    // Handle AI aiming phase
                    if (gamePhase === 'AI_AIMING') {
                        aiAimingTimer += deltaTime;
                        
                        if (aiAimingTimer &gt;= 1.0) {
                            // Aiming complete - execute shot
                            striker.vx = aiPlannedShot.direction.x * aiPlannedShot.power * powerMultiplier;
                            striker.vz = aiPlannedShot.direction.z * aiPlannedShot.power * powerMultiplier;
                            
                            gamePhase = 'SHOOTING';
                            setCameraState('FOLLOWING');
                            isAiming = false;
                            updateInstructions('');
                            
                            aiPlannedShot = null;
                            aiAimingTimer = 0;
                        }
                    }
                    
                    // Handle delayed camera transition during aiming
                    if (gamePhase === 'AIMING' &amp;&amp; isDragging &amp;&amp; cameraState === 'WIDE') {
                        const dragDuration = (performance.now() - dragStartTime) / 1000;
                        if (dragDuration &gt;= 0.25) {
                            setCameraState('BEHIND_STRIKER');
                        }
                    }
                    
                    if (gamePhase === 'SHOOTING') {
                        updatePhysics(deltaTime);

                        if (!isMoving()) {
                            resolvingTimer += deltaTime;
                            if (resolvingTimer &gt; 0.5) {
                                resolvingTimer = 0;
                                gamePhase = 'RESOLVING';
                                resolveShot();
                            }
                        } else {
                            resolvingTimer = 0;
                        }
                    } else if (gamePhase === 'RETURNING_STRIKER') {
                        updateStrikerReturn(deltaTime);
                    } else if (gamePhase === 'POSITIONING' &amp;&amp; striker.floating) {
                        // Animate floating striker with subtle bob
                        const floatTime = (timestamp - striker.floatStartTime) / 1000;
                        const floatOffset = Math.sin(floatTime * 2) * 5; // Oscillate 5 units up/down
                        striker.mesh.position.y = 20 + floatOffset;
                    }
                    
                    // Update camera with smooth transitions
                    updateCamera(deltaTime);
                    
                    // Clear aim canvas every frame to prevent stale data
                    clearAimCanvas();
                    
                    // Draw aim line if actively aiming (uses current frame's camera state)
                    if (isAiming &amp;&amp; striker) {
                        updateAimLine(striker.x, striker.z, currentAimDirX, currentAimDirZ);
                    }
                    
                    // Update all PiP windows
                    updateAllPiPWindows(deltaTime, timestamp / 1000);
                    
                    // Update tutorial animations
                    updateTutorialAnimations(deltaTime);
                    
                    // Update baseline visibility and flash animation
                    if (baselineMesh) {
                        // In 2P mode, show baseline for both players during their turn

                        } else {
