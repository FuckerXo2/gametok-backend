            // Generate tournament bracket with 16 teams
            function generateTournamentBracket(playerCountryData) {
                const allCountries = getAllCountries();
                
                // Remove player's country and shuffle remaining
                const otherCountries = allCountries.filter(c =&gt; c.code !== playerCountryData.code);
                shuffleArray(otherCountries);
                
                // Take 15 opponents (for 16-team bracket)
                const opponents = otherCountries.slice(0, 15);
                
                // Insert player at random position in first round
                const playerPosition = Math.floor(Math.random() * 8); // 0-7 for 8 matches
                playerBracketPosition = { round: 0, match: playerPosition };
                
                // Build first round (8 matches, 16 teams)
                const firstRound = [];
                let opponentIndex = 0;
                
                for (let i = 0; i &lt; 8; i++) {
                    if (i === playerPosition) {
                        // Player's match
                        firstRound.push({
                            team1: { ...playerCountryData, isPlayer: true, score: 0 },
                            team2: { ...opponents[opponentIndex++], isPlayer: false, score: 0 },
                            winner: null,
                            completed: false
                        });
                    } else {
                        // AI vs AI match
                        firstRound.push({
                            team1: { ...opponents[opponentIndex++], isPlayer: false, score: 0 },
                            team2: { ...opponents[opponentIndex++], isPlayer: false, score: 0 },
                            winner: null,
                            completed: false
                        });
                    }
                }
                
                // Initialize empty rounds for quarters, semis, finals
                const quarters = Array(4).fill(null).map(() =&gt; ({
                    team1: null, team2: null, winner: null, completed: false
                }));
                const semis = Array(2).fill(null).map(() =&gt; ({
                    team1: null, team2: null, winner: null, completed: false
                }));
                const finals = [{
                    team1: null, team2: null, winner: null, completed: false
                }];
                
                tournamentBracket = [firstRound, quarters, semis, finals];
                tournamentRound = 0;
            }
            
            function shuffleArray(array) {
                for (let i = array.length - 1; i &gt; 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
            }
            
            // Simulate AI vs AI matches in the bracket
            function simulateAIMatches() {
                const currentRound = tournamentBracket[tournamentRound];
                
                for (let i = 0; i &lt; currentRound.length; i++) {
                    const match = currentRound[i];
                    if (!match.completed &amp;&amp; !match.team1?.isPlayer &amp;&amp; !match.team2?.isPlayer) {
                        // Simulate this AI match
                        const winner = Math.random() &lt; 0.5 ? match.team1 : match.team2;
                        
                        match.winner = winner;
                        match.completed = true;
                        
                        // Advance winner to next round
                        advanceWinnerToNextRound(i, winner);
                    }
                }
            }
            
            function advanceWinnerToNextRound(matchIndex, winner) {
                if (tournamentRound &gt;= 3) return; // Finals, no next round
                
                const nextRound = tournamentBracket[tournamentRound + 1];
                const nextMatchIndex = Math.floor(matchIndex / 2);
                const isTopTeam = matchIndex % 2 === 0;
                
                const winnerCopy = { ...winner };
                
                if (isTopTeam) {
                    nextRound[nextMatchIndex].team1 = winnerCopy;
                } else {
                    nextRound[nextMatchIndex].team2 = winnerCopy;
                }
            }
            
            function renderTournamentBracket() {
                const container = document.getElementById('bracket-container');
                container.innerHTML = '';

                // Create rows for top and bottom halves (vertical hourglass)
                const rows = {

                    'r1-top': createRow(),
                    'r2-top': createRow(),
                    'r3': createRow(),
                    'r2-bottom': createRow(),
                    'r1-bottom': createRow(),
                    'r0-bottom': createRow()
                };
                
                // Append rows to container in order
                container.appendChild(rows['r0-top']);
                container.appendChild(rows['r1-top']);
                container.appendChild(rows['r2-top']);
                container.appendChild(rows['r3']);
                container.appendChild(rows['r2-bottom']);
                container.appendChild(rows['r1-bottom']);
                container.appendChild(rows['r0-bottom']);
                
                function createRow() {
                    const row = document.createElement('div');
                    row.className = 'bracket-row';
                    return row;
                }
                
                function createMatchDiv(match, roundIndex, matchIndex) {
                    const matchDiv = document.createElement('div');
                    matchDiv.className = 'bracket-match';
                    matchDiv.id = `match-${roundIndex}-${matchIndex}`;
                    
                    if (roundIndex === tournamentRound &amp;&amp; 
                        playerBracketPosition.round === roundIndex &amp;&amp; 
                        playerBracketPosition.match === matchIndex) {
                        matchDiv.classList.add('player-match');
                    }
                    
                    matchDiv.appendChild(createTeamDiv(match.team1, match.winner));
                    matchDiv.appendChild(createTeamDiv(match.team2, match.winner));
                    return matchDiv;
                }
                
                // Round 0 (8 matches: 4 top, 4 bottom)
                if (tournamentBracket[0]) {
                    tournamentBracket[0].forEach((match, i) =&gt; {
                        const matchDiv = createMatchDiv(match, 0, i);
                        if (i &lt; 4) rows['r0-top'].appendChild(matchDiv);
                        else rows['r0-bottom'].appendChild(matchDiv);
                    });
                }
                
                // Round 1 (4 matches: 2 top, 2 bottom)
                if (tournamentBracket[1]) {
                    tournamentBracket[1].forEach((match, i) =&gt; {
                        const matchDiv = createMatchDiv(match, 1, i);
                        if (i &lt; 2) rows['r1-top'].appendChild(matchDiv);
                        else rows['r1-bottom'].appendChild(matchDiv);
                    });

                // Round 2 (2 matches: 1 top, 1 bottom)
                if (tournamentBracket[2]) {

                        if (i &lt; 1) rows['r2-top'].appendChild(matchDiv);
                        else rows['r2-bottom'].appendChild(matchDiv);

                // Round 3 (1 match: center)

            function zoomToMatch(roundIndex, matchIndex, callback) {
                const container = document.getElementById('bracket-container');
                const matchEl = document.getElementById(`match-${roundIndex}-${matchIndex}`);
                
                if (matchEl) {
                    matchEl.classList.add('highlight');
                    
                    // Calculate zoom and position
                    const scale = 2.5;
                    
                    // Get position relative to viewport
                    const containerRect = container.getBoundingClientRect();
                    const matchRect = matchEl.getBoundingClientRect();
                    
                    const originX = (matchRect.left - containerRect.left) + matchRect.width / 2;
                    const originY = (matchRect.top - containerRect.top) + matchRect.height / 2;
                    
                    // Viewport center
                    const cx = window.innerWidth / 2;
                    const cy = window.innerHeight / 2;
                    
                    // Match center
                    const mx = matchRect.left + matchRect.width / 2;
                    const my = matchRect.top + matchRect.height / 2;
                    
                    // Translation needed to move match to center
                    const tx = cx - mx;
                    const ty = cy - my;
                    
                    container.style.transformOrigin = `${originX}px ${originY}px`;
                    container.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
                    
                    setTimeout(() =&gt; {
                        if (callback) callback();
                    }, 1500);
                }
            }

                const currentRound = tournamentBracket[tournamentRound];

            function handleTournamentRoundEnd(winner) {
                const currentRound = tournamentBracket[tournamentRound];
                const playerMatch = currentRound[playerBracketPosition.match];
                
                if (winner === 'player') {
                    // Player won
                    playerMatch.winner = playerMatch.team1?.isPlayer ? playerMatch.team1 : playerMatch.team2;
                    playerMatch.completed = true;
                    
                    // Advance player to next round
                    if (tournamentRound &lt; 3) {
                        advanceWinnerToNextRound(playerBracketPosition.match, playerMatch.winner);
                        
                        // Calculate player's new position
                        const nextMatchIndex = Math.floor(playerBracketPosition.match / 2);
                        
                        // Move to next round
                        tournamentRound++;
                        playerBracketPosition = { round: tournamentRound, match: nextMatchIndex };
                        
                        // Simulate any AI matches for this round
                        simulateAIMatches();
                        
                        // Save progress
                        saveTournamentState();
                        
                        // Show bracket with advancement, then continue
                        showTournamentBracket(() =&gt; {
                            startTournamentMatch();
                        }, true);
                    } else {
                        // Won the finals - tournament complete!
                        clearTournamentState();
                        showTournamentVictory();
                    }
                } else {
                    // Player lost - eliminated
                    playerMatch.winner = playerMatch.team1?.isPlayer ? playerMatch.team2 : playerMatch.team1;
                    playerMatch.completed = true;
                    
                    clearTournamentState();
                    showTournamentElimination();
                }

            function updateTutorialAnimations(deltaTime) {
                if (tutorialCompleted || tutorialPhase === 'none') return;

                const finger = document.getElementById('tutorial-finger');
                const highlight = document.getElementById('tutorial-highlight');

                if (tutorialPhase === 'baseline') {
                    // Animate finger moving left and right along baseline
                    tutorialFingerAnimTime += deltaTime;
                    const cycle = 2.0; // 2 second cycle
                    const phase = (tutorialFingerAnimTime % cycle) / cycle;
                    
                    // Smooth sine wave oscillation
                    const xOffset = Math.sin(phase * Math.PI * 2) * 80; // ±80 pixels laterally
                    
                    // Position finger at center of baseline, moving left/right
                    const baselineRect = canvas.getBoundingClientRect();
                    const baselineWorldZ = BASELINE_OFFSET;
                    
                    // Project baseline position to screen
                    const baselineWorld = new THREE.Vector3(0, 10, baselineWorldZ);
                    baselineWorld.project(camera);
                    
                    const screenX = (baselineWorld.x * 0.5 + 0.5) * baselineRect.width + baselineRect.left;
                    const screenY = (-baselineWorld.y * 0.5 + 0.5) * baselineRect.height + baselineRect.top;
                    
                    finger.style.left = `${screenX + xOffset - 30}px`; // Move laterally along baseline
                    finger.style.top = `${screenY - 30}px`; // Keep Y position fixed
                    
                } else if (tutorialPhase === 'drag') {
                    // Animate finger dragging back from striker
                    tutorialFingerAnimTime += deltaTime;
                    const cycle = 2.5; // 2.5 second cycle
                    const phase = (tutorialFingerAnimTime % cycle) / cycle;
                    
                    // Drag animation: start at striker, move down and back, return
                    let dragProgress = 0;
                    if (phase &lt; 0.5) {
                        // Dragging back phase (0 to 0.5)
                        dragProgress = phase / 0.5;
                    } else {
                        // Return phase (0.5 to 1.0) - snap back
                        dragProgress = 0;
                    }
                    
                    // Ease out for smooth animation
                    const eased = dragProgress &lt; 0.5 
                        ? 2 * dragProgress * dragProgress 
                        : -1 + (4 - 2 * dragProgress) * dragProgress;
                    
                    // Project striker position to screen
                    const strikerWorld = new THREE.Vector3(striker.x, 10, striker.z);
                    strikerWorld.project(camera);
                    
                    const baselineRect = canvas.getBoundingClientRect();
                    const strikerScreenX = (strikerWorld.x * 0.5 + 0.5) * baselineRect.width + baselineRect.left;
                    const strikerScreenY = (-strikerWorld.y * 0.5 + 0.5) * baselineRect.height + baselineRect.top;
                    
                    // Drag back 120 pixels down and slightly right
                    const dragOffsetX = 40 * eased;
                    const dragOffsetY = 120 * eased;
                    
                    finger.style.left = `${strikerScreenX + dragOffsetX - 30}px`;
                    finger.style.top = `${strikerScreenY + dragOffsetY - 30}px`;
                    
                    // Position highlight on striker
                    highlight.style.left = `${strikerScreenX}px`;
                    highlight.style.top = `${strikerScreenY}px`;
                    
                    // Show elements after first positioning to avoid flash in wrong location
                    if (!tutorialDragPositioned) {
                        tutorialDragPositioned = true;
                        finger.classList.add('visible');
                        highlight.classList.add('visible');
                    }
                }
            }

            // ==================== CONFIGURATION ====================

            function updateLoadingProgress() {

                const loadingBar = document.getElementById('loading-bar');

            async function loadImage(id) {
                return new Promise((resolve) =&gt; {
                    const assetInfo = lib.getAsset(id);
                    if (!assetInfo) {
                        loadedAssets++;
                        updateLoadingProgress();
                        resolve(null);
                        return;
                    }
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.onload = () =&gt; {
                        assetCache[id] = img;
                        loadedAssets++;
                        updateLoadingProgress();
                        resolve(img);
                    };
                    img.onerror = () =&gt; {
                        loadedAssets++;
                        updateLoadingProgress();
                        resolve(null);
                    };
                    img.src = assetInfo.url;
                });
            }

            async function loadAudio(id) {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                const assetInfo = lib.getAsset(id);
                if (!assetInfo) {
                    loadedAssets++;
                    updateLoadingProgress();
                    return null;
                }

                try {
                    const response = await fetch(assetInfo.url);
                    const arrayBuffer = await response.arrayBuffer();
                    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    audioBuffers[id] = audioBuffer;
                    loadedAssets++;
                    updateLoadingProgress();
                    return audioBuffer;
                } catch (e) {
                    loadedAssets++;
                    updateLoadingProgress();
                    return null;
                }
            }

            function playSound(id, volume = 0.5, minDelay = 0) {
                if (!audioContext || !audioBuffers[id]) return;
                
                // Check if enough time has passed since last play (throttling)
                const now = performance.now();
                if (lastSoundPlayTime[id] &amp;&amp; (now - lastSoundPlayTime[id]) &lt; minDelay) {
                    return; // Skip playing - too soon since last play
                }
                
                try {
                    if (audioContext.state === 'suspended') {
                        audioContext.resume();
                    }
                    const source = audioContext.createBufferSource();
                    const gainNode = audioContext.createGain();
                    source.buffer = audioBuffers[id];
                    gainNode.gain.value = volume;
                    source.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    source.start(0);
                    
                    // Record when this sound was played
                    lastSoundPlayTime[id] = now;
                } catch (e) {}
            }

            // ==================== THREE.JS SETUP ====================
            // Camera state management

            let cameraTarget = { x: 0, y: 1150, z: 350 };

            const CAMERA_LERP_SPEED = 3.0;

            function setCameraState(state) {
                cameraState = state;
                
                switch(state) {
                    case 'WIDE':
                        // In 2P mode, flip camera for player 2
                        if (isTwoPlayerMode &amp;&amp; currentPlayer === 2) {
                            cameraTarget = { x: 0, y: 1150, z: -350 };
                        } else {
                            cameraTarget = { x: 0, y: 1150, z: 350 };
                        }
                        cameraLookAt = { x: 0, y: 0, z: 0 };
                        break;
                    case 'BEHIND_STRIKER':

            }
            
            // Set camera perspective for a specific player (used in 2P mode)
            function setCameraForPlayer(player) {
                if (player === 2) {
                    cameraTarget = { x: 0, y: 1150, z: -350 };
                } else {
                    cameraTarget = { x: 0, y: 1150, z: 350 };
                }
                cameraLookAt = { x: 0, y: 0, z: 0 };
            }

            function updateBehindStrikerCamera() {
                if (!striker) return;
                
                // Calculate aim direction
                let aimAngle = 0;
                if (isDragging) {
                    let dragX = dragCurrent.x - dragStart.x;
                    let dragY = dragCurrent.y - dragStart.y;
                    
                    if (isTwoPlayerMode &amp;&amp; currentPlayer === 2) {
                        dragX = -dragX;
                        dragY = -dragY;
                    }
                    
                    aimAngle = Math.atan2(dragY, dragX);
                } else {
                    aimAngle = (isTwoPlayerMode &amp;&amp; currentPlayer === 2) ? -Math.PI / 2 : Math.PI / 2; // Default forward
                }
                
                // Position camera behind striker relative to aim direction
                // Use aimAngle directly - striker shoots opposite to drag direction,
                // so camera should be on same side as drag direction (behind in shoot direction)
                const behindAngle = aimAngle;
                const distance = 250;
                const height = 120;
                
                cameraTarget = {
                    x: striker.x + Math.cos(behindAngle) * distance,
                    y: height,
                    z: striker.z + Math.sin(behindAngle) * distance
                };
                
                // Look at point ahead of striker in shoot direction
                const shootAngle = aimAngle + Math.PI;
                cameraLookAt = {
                    x: striker.x - Math.cos(aimAngle) * 100,
                    y: 20,
                    z: striker.z - Math.sin(aimAngle) * 100
                };
            }

            function updateFollowingCamera() {
                if (!striker) return;
                
                // Dynamic following camera that tracks striker movement
                // Position adjusts based on striker velocity for better tracking
                const speed = Math.sqrt(striker.vx * striker.vx + striker.vz * striker.vz);
                
                // Calculate offset based on velocity direction
                let offsetX = 0;
                let offsetZ = 200;
                
                if (speed &gt; 50) {
                    const velAngle = Math.atan2(striker.vz, striker.vx);
                    const followDistance = 250;
                    offsetX = -Math.cos(velAngle) * followDistance * 0.3;
                    offsetZ = -Math.sin(velAngle) * followDistance * 0.3 + 150;
                }
                
                // Smooth overhead following
                cameraTarget = {
                    x: striker.x + offsetX,
                    y: 400,
                    z: striker.z + offsetZ
                };
                
                // Look slightly ahead of striker in movement direction
                let lookAheadX = striker.x;
                let lookAheadZ = striker.z;
                
                if (speed &gt; 50) {
                    const velAngle = Math.atan2(striker.vz, striker.vx);
                    lookAheadX += Math.cos(velAngle) * 50;
                    lookAheadZ += Math.sin(velAngle) * 50;
                }
                
                cameraLookAt = {
                    x: lookAheadX,
                    y: 0,
                    z: lookAheadZ
                };
            }

            function updateCamera(deltaTime) {
                const dt = Math.min(deltaTime, 0.11);
                
                // Adaptive lerp speed based on camera state
                let lerpSpeed = CAMERA_LERP_SPEED;
                
                // Slower, deliberate camera movement during player switches in 2P mode
                if (cameraTransitionMode === 'player_switch') {
                    if (cameraState !== 'WIDE') {
                        cameraTransitionMode = 'normal';
                    } else {
                        lerpSpeed = 0.5; // Very slow for smooth, deliberate transition
                    }
                } 
                if (cameraTransitionMode !== 'player_switch' &amp;&amp; cameraState === 'FOLLOWING') {
                    // Faster lerp during active gameplay for more responsive following
                    lerpSpeed = 4.5; // Increased responsiveness when following
                }
                
                const lerpFactor = 1 - Math.exp(-lerpSpeed * dt);
                
                // Update camera state based on game phase
                if (cameraState === 'BEHIND_STRIKER' &amp;&amp; (gamePhase === 'AIMING' || gamePhase === 'POSITIONING')) {
                    updateBehindStrikerCamera();
                } else if (cameraState === 'FOLLOWING' &amp;&amp; gamePhase === 'SHOOTING') {
                    updateFollowingCamera();
                }
                
                // Smooth interpolation
                camera.position.x += (cameraTarget.x - camera.position.x) * lerpFactor;
                camera.position.y += (cameraTarget.y - camera.position.y) * lerpFactor;
                camera.position.z += (cameraTarget.z - camera.position.z) * lerpFactor;
                
                // Smooth look-at with separate interpolation
                const currentLookAt = new THREE.Vector3();
                camera.getWorldDirection(currentLookAt);
                currentLookAt.multiplyScalar(100).add(camera.position);
                
                const targetLookAt = new THREE.Vector3(cameraLookAt.x, cameraLookAt.y, cameraLookAt.z);
                currentLookAt.lerp(targetLookAt, lerpFactor * 0.8);
                
                camera.lookAt(currentLookAt);
                
                // Check if player switch transition is complete (camera close to target)
                if (cameraTransitionMode === 'player_switch') {
                    const distToTarget = Math.sqrt(
                        Math.pow(camera.position.x - cameraTarget.x, 2) +
                        Math.pow(camera.position.y - cameraTarget.y, 2) +
                        Math.pow(camera.position.z - cameraTarget.z, 2)
                    );
                    
                    // Transition complete when camera is within 50 units of target
                    if (distToTarget &lt; 50) {
                        cameraTransitionMode = 'normal';
                    }
                }
            }

            function createPieceMesh(type, x, z) {
                const radius = type === 'striker' ? STRIKER_RADIUS : PIECE_RADIUS;
                const height = type === 'striker' ? 10 : 8;
                
                const geometry = new THREE.CylinderGeometry(radius, radius, height, 32);
                disposableObjects.geometries.push(geometry); // Track for disposal
                
                let material;
                let color;
                
                switch(type) {
                    case 'black':
                        color = 0x1A1A1A;
                        break;
                    case 'white':
                        color = 0xF5F5F5;
                        break;
                    case 'queen':
                        color = 0xC41E3A;
                        break;
                    case 'striker':
                        color = 0xE8C9A0;
                        break;
                }
                
                material = new THREE.MeshStandardMaterial({ 
                    color: color,
                    roughness: 0.3,
                    metalness: 0.1
                });
                disposableObjects.materials.push(material); // Track for disposal
                
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(x, height/2 + 2, z);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                
                return mesh;
            }

            function setupPieces() {
                // Dispose existing piece geometries and materials
                disposePieceResources();
                
                // Clear existing pieces
                pieceMeshes.forEach(m =&gt; scene.remove(m));
                pieceMeshes = [];
                pieces = [];
                
                // Remove old striker mesh if it exists
                if (strikerMesh) {
                    scene.remove(strikerMesh);
                    strikerMesh = null;
                }
                
                // Clear position history to prevent memory buildup
                positionHistory.clear();

                // Queen at center
                const queenMesh = createPieceMesh('queen', 0, 0);
                scene.add(queenMesh);
                pieceMeshes.push(queenMesh);
                pieces.push({
                    type: 'queen',
                    mesh: queenMesh,
                    x: 0,
                    z: 0,
                    vx: 0,
                    vz: 0,
                    radius: PIECE_RADIUS,
                    pocketed: false,
                    falling: false
                });

                // Inner ring - 6 pieces
                const innerRadius = 28;
                for (let i = 0; i &lt; 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    const x = Math.cos(angle) * innerRadius;
                    const z = Math.sin(angle) * innerRadius;
                    const type = i % 2 === 0 ? 'black' : 'white';
                    
                    const mesh = createPieceMesh(type, x, z);
                    scene.add(mesh);
                    pieceMeshes.push(mesh);
                    pieces.push({
                        type: type,
                        mesh: mesh,
                        x: x,
                        z: z,
                        vx: 0,
                        vz: 0,
                        radius: PIECE_RADIUS,
                        pocketed: false,
                        falling: false
                    });
                }

                // Outer ring - 12 pieces
                const outerRadius = 56;
                for (let i = 0; i &lt; 12; i++) {
                    const angle = (i / 12) * Math.PI * 2 + Math.PI / 12;
                    const x = Math.cos(angle) * outerRadius;
                    const z = Math.sin(angle) * outerRadius;
                    const type = i % 2 === 0 ? 'white' : 'black';
                    
                    const mesh = createPieceMesh(type, x, z);
                    scene.add(mesh);
                    pieceMeshes.push(mesh);
                    pieces.push({
                        type: type,
                        mesh: mesh,
                        x: x,
                        z: z,
                        vx: 0,
                        vz: 0,
                        radius: PIECE_RADIUS,
                        pocketed: false,
                        falling: false
                    });
                }

                // Striker (starts off-board)
                strikerMesh = createPieceMesh('striker', 0, BASELINE_OFFSET);
                strikerMesh.visible = false;
                scene.add(strikerMesh);
                striker = {
                    type: 'striker',
                    mesh: strikerMesh,
                    x: 0,
                    z: BASELINE_OFFSET,
                    vx: 0,
                    vz: 0,
                    radius: STRIKER_RADIUS,
                    pocketed: false,
                    falling: false
                };

            function initAimCanvas() {
                aimCanvas = document.getElementById('aim-canvas');
                aimCtx = aimCanvas.getContext('2d');
                resizeAimCanvas();
            }

            function resizeAimCanvas() {
                if (aimCanvas) {
                    aimCanvas.width = canvas.clientWidth;
                    aimCanvas.height = canvas.clientHeight;
                }
            }

            function worldToScreen(x, y, z) {
                const vector = new THREE.Vector3(x, y, z);
                vector.project(camera);
                return {
                    x: (vector.x * 0.5 + 0.5) * aimCanvas.width,
                    y: (-vector.y * 0.5 + 0.5) * aimCanvas.height
                };
            }

            function clearAimCanvas() {
                if (aimCtx &amp;&amp; aimCanvas) {
                    aimCtx.clearRect(0, 0, aimCanvas.width, aimCanvas.height);
                }
            }

            function updateAimLine(startX, startZ, dirX, dirZ) {
                if (!aimCtx || !aimCanvas) return;
                
                // Clear the canvas at the start
                clearAimCanvas();
                
                const bound = BOARD_HALF - STRIKER_RADIUS - 10;
                const maxDist = 800; // Maximum distance to trace
                const boardY = 6; // Board surface height for projection
                
                // First, check if aim line hits any pieces using ray-circle intersection
                let closestPieceHit = null;
                let closestPieceDist = maxDist;
                let closestHitPoint = null;
                
                for (const piece of pieces) {
                    if (piece.pocketed) continue;
                    
                    // Ray-circle intersection
                    // Ray: P = start + t * dir
                    // Circle: (x - cx)^2 + (z - cz)^2 = r^2
                    const dx = startX - piece.x;
                    const dz = startZ - piece.z;
                    const effectiveRadius = piece.radius + STRIKER_RADIUS * 0.5;
                    
                    // Quadratic formula coefficients for intersection
                    const a = dirX * dirX + dirZ * dirZ; // Should be 1 if dir is normalized
                    const b = 2 * (dx * dirX + dz * dirZ);
                    const c = dx * dx + dz * dz - effectiveRadius * effectiveRadius;
                    
                    const discriminant = b * b - 4 * a * c;
                    
                    // If discriminant &gt;= 0, ray intersects circle
                    if (discriminant &gt;= 0) {
                        const sqrtDisc = Math.sqrt(discriminant);
                        const t1 = (-b - sqrtDisc) / (2 * a); // First intersection (entry point)
                        const t2 = (-b + sqrtDisc) / (2 * a); // Second intersection (exit point)
                        
                        // We want the first intersection in front of the striker
                        const t = t1 &gt; 0 ? t1 : t2;
                        
                        if (t &gt; 0 &amp;&amp; t &lt; closestPieceDist) {
                            closestPieceDist = t;
                            closestPieceHit = piece;
                            // Calculate the actual hit point on the ray
                            closestHitPoint = {
                                x: startX + dirX * t,
                                z: startZ + dirZ * t
                            };
                        }
                    }
                }
                
                // Project start point to screen
                const startScreen = worldToScreen(startX, boardY, startZ);
                
                // If we hit a piece before any wall
                if (closestPieceHit) {
                    // Project hit point to screen
                    const hitScreen = worldToScreen(closestHitPoint.x, boardY, closestHitPoint.z);
                    
                    // Draw dashed line from striker to hit point
                    aimCtx.strokeStyle = 'yellow';
                    aimCtx.lineWidth = 2;
                    aimCtx.setLineDash([10, 5]);
                    aimCtx.beginPath();
                    aimCtx.moveTo(startScreen.x, startScreen.y);
                    aimCtx.lineTo(hitScreen.x, hitScreen.y);
                    aimCtx.stroke();
                    
                    // Draw circle marker at hit point
                    aimCtx.setLineDash([]); // Solid line for circle
                    aimCtx.strokeStyle = 'yellow';
                    aimCtx.lineWidth = 2.5;
                    aimCtx.fillStyle = 'rgba(255, 255, 0, 0.2)';
                    aimCtx.beginPath();
                    aimCtx.arc(hitScreen.x, hitScreen.y, 12, 0, Math.PI * 2);
                    aimCtx.fill();
                    aimCtx.stroke();
                    
                    return;
                }
                
                // No piece hit - show wall bounce
                // Calculate where the line hits a wall
                // Use extended bounds for checking to catch corner cases
                const extendedBound = bound + 50; // More lenient bounds
                let hitX = startX + dirX * maxDist;
                let hitZ = startZ + dirZ * maxDist;
                let hitWall = null;
                let hitDist = maxDist;
                
                // Check all four walls - find the closest intersection
                // Left wall
                if (dirX &lt; 0) {
                    const t = (-bound - startX) / dirX;
                    if (t &gt; 0 &amp;&amp; t &lt; hitDist) {
                        const z = startZ + dirZ * t;
                        // Use extended bounds to catch corner edge cases
                        if (Math.abs(z) &lt;= extendedBound) {
                            hitDist = t;
                            hitX = -bound;
                            // Clamp z to valid board range
                            hitZ = Math.max(-bound, Math.min(bound, z));
                            hitWall = 'left';
                        }
                    }
                }
                // Right wall
                if (dirX &gt; 0) {
                    const t = (bound - startX) / dirX;
                    if (t &gt; 0 &amp;&amp; t &lt; hitDist) {
                        const z = startZ + dirZ * t;
                        if (Math.abs(z) &lt;= extendedBound) {
                            hitDist = t;
                            hitX = bound;
                            hitZ = Math.max(-bound, Math.min(bound, z));
                            hitWall = 'right';
                        }
                    }
                }
                // Top wall
                if (dirZ &lt; 0) {
                    const t = (-bound - startZ) / dirZ;
                    if (t &gt; 0 &amp;&amp; t &lt; hitDist) {
                        const x = startX + dirX * t;
                        if (Math.abs(x) &lt;= extendedBound) {
                            hitDist = t;
                            hitX = Math.max(-bound, Math.min(bound, x));
                            hitZ = -bound;
                            hitWall = 'top';
                        }
                    }
                }
                // Bottom wall
                if (dirZ &gt; 0) {
                    const t = (bound - startZ) / dirZ;
                    if (t &gt; 0 &amp;&amp; t &lt; hitDist) {
                        const x = startX + dirX * t;
                        if (Math.abs(x) &lt;= extendedBound) {
                            hitDist = t;
                            hitX = Math.max(-bound, Math.min(bound, x));
                            hitZ = bound;
                            hitWall = 'bottom';
                        }
                    }
                }
                
                // Fallback: if no wall was found (shouldn't happen with extended bounds),
                // just use a short line in the aim direction
                if (hitWall === null) {
                    hitX = startX + dirX * 200;
                    hitZ = startZ + dirZ * 200;
                    // Clamp to board bounds
                    hitX = Math.max(-bound, Math.min(bound, hitX));
                    hitZ = Math.max(-bound, Math.min(bound, hitZ));
                }
                
                // Project wall hit point to screen
                const hitScreen = worldToScreen(hitX, boardY, hitZ);
                
                // Draw first segment: striker to wall
                aimCtx.strokeStyle = 'yellow';
                aimCtx.lineWidth = 2;
                aimCtx.setLineDash([10, 5]);
                aimCtx.beginPath();
                aimCtx.moveTo(startScreen.x, startScreen.y);
                aimCtx.lineTo(hitScreen.x, hitScreen.y);
                aimCtx.stroke();
                
                // Calculate ricochet direction
                let bounceX = dirX;
                let bounceZ = dirZ;
                if (hitWall === 'left' || hitWall === 'right') {
                    bounceX = -dirX; // Reflect X
                } else if (hitWall === 'top' || hitWall === 'bottom') {
                    bounceZ = -dirZ; // Reflect Z
                }
                
                // Second segment: ricochet
                const ricochetLength = 200;
                const endX = hitX + bounceX * ricochetLength;
                const endZ = hitZ + bounceZ * ricochetLength;
                
                // Project ricochet end point to screen
                const endScreen = worldToScreen(endX, boardY, endZ);
                
                // Draw second segment: ricochet
                aimCtx.beginPath();
                aimCtx.moveTo(hitScreen.x, hitScreen.y);
                aimCtx.lineTo(endScreen.x, endScreen.y);
                aimCtx.stroke();
            }

            // ==================== PHYSICS ====================
            function updatePhysics(deltaTime) {
                const dt = Math.min(deltaTime, 0.11);
                const frictionCoeff = 0.98 * (1 / friction);
                const fallSpeed = 300; // Units per second
                const currentTime = performance.now() / 1000;

                // Update striker
                if (striker &amp;&amp; !striker.pocketed) {
                    if (striker.falling) {
                        // Animate falling
                        striker.mesh.position.y -= fallSpeed * dt;
                        if (striker.mesh.position.y &lt; -50) {
                            // Mark as pocketed but don't hide yet - will be handled in foul resolution
                            striker.pocketed = true;
                            striker.falling = false;
                        }
                    } else if (striker.returning) {
                        // Animate returning from pocket to baseline
                        // This is handled in the game loop separately
                    } else {
                        striker.x += striker.vx * dt;
                        striker.z += striker.vz * dt;
                        striker.vx *= frictionCoeff;
                        striker.vz *= frictionCoeff;

                        // Boundary collision
                        const bound = BOARD_HALF - striker.radius - 10;
                        if (striker.x &lt; -bound) { striker.x = -bound; striker.vx *= -0.7; }
                        if (striker.x &gt; bound) { striker.x = bound; striker.vx *= -0.7; }
                        if (striker.z &lt; -bound) { striker.z = -bound; striker.vz *= -0.7; }
                        if (striker.z &gt; bound) { striker.z = bound; striker.vz *= -0.7; }

                        striker.mesh.position.x = striker.x;
                        striker.mesh.position.z = striker.z;

                        // Check pocket
                        if (checkPocket(striker)) {
                            striker.falling = true;
                        }
                    }
                }

                // Update pieces
                pieces.forEach((piece, index) =&gt; {
                    if (piece.pocketed) return;

                    if (piece.falling) {
                        // Animate falling into pocket
                        piece.mesh.position.y -= fallSpeed * dt;
                        if (piece.mesh.position.y &lt; -50) {
                            piece.pocketed = true;
                            piece.mesh.visible = false;
                            piece.falling = false;
                            
                            // Check if this piece needs to be returned due to foul debt
                            if (piece.returnAfterFall) {
                                piece.returnAfterFall = false;
                                // Delay the return slightly so player sees it pocket first
                                setTimeout(() =&gt; {
                                    startPieceReturn(piece);
                                    updateScoreDisplay();
                                }, 300);
                            }
                        }
                    } else if (piece.stackFalling) {
                        // Animate falling from stacked position to board
                        const targetY = 6; // Board level
                        const fallRate = 200; // Units per second
                        
                        piece.mesh.position.y -= fallRate * dt;
                        
                        if (piece.mesh.position.y &lt;= targetY) {
                            piece.mesh.position.y = targetY;
                            piece.stackFalling = false;
                            piece.stacked = false;
                        }
                        
                        // Continue applying physics while falling
                        piece.x += piece.vx * dt;
                        piece.z += piece.vz * dt;
                        piece.vx *= frictionCoeff;
                        piece.vz *= frictionCoeff;
                        
                        // Boundary collision
                        const bound = BOARD_HALF - piece.radius - 10;
                        if (piece.x &lt; -bound) { piece.x = -bound; piece.vx *= -0.7; }
                        if (piece.x &gt; bound) { piece.x = bound; piece.vx *= -0.7; }
                        if (piece.z &lt; -bound) { piece.z = -bound; piece.vz *= -0.7; }
                        if (piece.z &gt; bound) { piece.z = bound; piece.vz *= -0.7; }

                        piece.mesh.position.x = piece.x;
                        piece.mesh.position.z = piece.z;
                    } else {
                        // Check if stacked piece should fall
                        if (piece.stacked &amp;&amp; !piece.stackFalling) {
                            // Check for support
                            let supported = false;
                            
                            // Check pieces
                            for (const other of pieces) {
                                if (other === piece || other.pocketed || other.falling || other.returning || other.stackFalling) continue;
                                const dx = piece.x - other.x;
                                const dz = piece.z - other.z;
                                const distSq = dx*dx + dz*dz;
                                if (distSq &lt; PIECE_RADIUS * PIECE_RADIUS &amp;&amp; other.mesh.position.y &lt; piece.mesh.position.y - 1) {
                                    supported = true;
                                    break;
                                }
                            }
                            
                            // Check striker
                            if (!supported &amp;&amp; striker &amp;&amp; !striker.pocketed &amp;&amp; !striker.falling &amp;&amp; !striker.returning) {
                                const dx = piece.x - striker.x;
                                const dz = piece.z - striker.z;
                                const distSq = dx*dx + dz*dz;
                                if (distSq &lt; STRIKER_RADIUS * STRIKER_RADIUS &amp;&amp; striker.mesh.position.y &lt; piece.mesh.position.y - 1) {
                                    supported = true;
                                }
                            }
                            
                            if (!supported) {
                                // Piece has no support - start falling from stack
                                piece.stackFalling = true;
                                piece.stacked = false;
                            }
                        }
                        
                        piece.x += piece.vx * dt;
                        piece.z += piece.vz * dt;
                        piece.vx *= frictionCoeff;
                        piece.vz *= frictionCoeff;

                        // Track position history for moving pieces
                        const speed = Math.sqrt(piece.vx * piece.vx + piece.vz * piece.vz);
                        if (speed &gt; 10) {
                            const pieceId = `piece_${index}`;
                            if (!positionHistory.has(pieceId)) {
                                positionHistory.set(pieceId, []);
                            }
                            const history = positionHistory.get(pieceId);
                            
                            // Throttle history recording to every 50ms to reduce memory usage
                            const shouldRecord = history.length === 0 || 
                                (currentTime - history[history.length - 1].time) &gt;= 0.05;
                            
                            if (shouldRecord) {
                                history.push({ x: piece.x, z: piece.z, time: currentTime });
                            }
                            
                            // Keep only last 1 second of history
                            while (history.length &gt; 0 &amp;&amp; currentTime - history[0].time &gt; 1.0) {
                                history.shift();
                            }
                            
                            // Limit max entries to prevent unbounded growth
                            while (history.length &gt; 30) {
                                history.shift();
                            }
                        }

                        // Boundary collision
                        const bound = BOARD_HALF - piece.radius - 10;
                        if (piece.x &lt; -bound) { piece.x = -bound; piece.vx *= -0.7; }
                        if (piece.x &gt; bound) { piece.x = bound; piece.vx *= -0.7; }
                        if (piece.z &lt; -bound) { piece.z = -bound; piece.vz *= -0.7; }
                        if (piece.z &gt; bound) { piece.z = bound; piece.vz *= -0.7; }

                        piece.mesh.position.x = piece.x;
                        piece.mesh.position.z = piece.z;
                        
                        // Update Y position for stacked pieces that aren't falling
                        if (!piece.stackFalling) {
                            if (piece.stacked) {
                                // Keep at stacked height until knocked
                                piece.mesh.position.y = piece.stackHeight;
                            } else {
                                // Normal board level
                                piece.mesh.position.y = 6;
                            }
                        }

                        // Check pocket
                        if (checkPocket(piece)) {
                            pocketPiece(piece, index);
                        }
                    }
                });

                // Collision detection (pass deltaTime for swept detection)
                checkCollisions(dt);
            }

            function checkCollisions(deltaTime) {
                const allPieces = [striker, ...pieces].filter(p =&gt; p &amp;&amp; !p.pocketed &amp;&amp; !p.falling);
                const dt = Math.min(deltaTime, 0.11);

                // Swept collision detection - check along movement path
                for (let i = 0; i &lt; allPieces.length; i++) {
                    for (let j = i + 1; j &lt; allPieces.length; j++) {
                        const a = allPieces[i];
                        const b = allPieces[j];

                        // Skip collision if pieces are at significantly different heights
                        if (Math.abs(a.mesh.position.y - b.mesh.position.y) &gt; 5) {
                            continue;
                        }

                        // Current positions
                        const dx = b.x - a.x;
                        const dz = b.z - a.z;
                        const dist = Math.sqrt(dx * dx + dz * dz);
                        const minDist = a.radius + b.radius;

                        // Relative velocity
                        const rvx = a.vx - b.vx;
                        const rvz = a.vz - b.vz;
                        const relSpeed = Math.sqrt(rvx * rvx + rvz * rvz);

                        // Skip if not moving relative to each other
                        if (relSpeed &lt; 0.1) continue;

                        // Swept sphere collision detection
                        // Check if spheres will collide during this frame
                        // Using quadratic formula to find time of impact
                        
                        // Vector from a to b
                        const w_x = dx;
                        const w_z = dz;
                        
                        // Relative velocity (a moving toward b)
                        const v_x = rvx * dt;
                        const v_z = rvz * dt;
                        
                        // Quadratic coefficients for swept sphere test
                        const a_coef = v_x * v_x + v_z * v_z;
                        const b_coef = -2 * (w_x * v_x + w_z * v_z);
                        const c_coef = w_x * w_x + w_z * w_z - minDist * minDist;
                        
                        // Check if collision occurs during this frame
                        let willCollide = false;
                        let collisionTime = 0;
                        
                        if (a_coef &gt; 0.0001) {
                            const discriminant = b_coef * b_coef - 4 * a_coef * c_coef;
                            
                            if (discriminant &gt;= 0) {
                                const sqrtDisc = Math.sqrt(discriminant);
                                const t1 = (-b_coef - sqrtDisc) / (2 * a_coef);
                                const t2 = (-b_coef + sqrtDisc) / (2 * a_coef);
                                
                                // We want the first intersection time in range [0, 1]
                                if (t1 &gt;= 0 &amp;&amp; t1 &lt;= 1) {
                                    willCollide = true;
                                    collisionTime = t1;
                                } else if (t2 &gt;= 0 &amp;&amp; t2 &lt;= 1) {
                                    willCollide = true;
                                    collisionTime = t2;
                                }
                            }
                        }
                        
                        // Also check if already overlapping (static collision)
                        if (dist &lt; minDist) {
                            willCollide = true;
                            collisionTime = 0;
                        }

                        if (willCollide) {
                            // Move objects to exact collision point
                            if (collisionTime &gt; 0) {
                                a.x -= rvx * dt * collisionTime;
                                a.z -= rvz * dt * collisionTime;
                                b.x += (b.vx * dt * collisionTime);
                                b.z += (b.vz * dt * collisionTime);
                            }
                            
                            // Recalculate collision normal at impact point
                            const col_dx = b.x - a.x;
                            const col_dz = b.z - a.z;
                            const col_dist = Math.sqrt(col_dx * col_dx + col_dz * col_dz);
                            
                            if (col_dist &gt; 0.001) {
                                // Normalize collision vector
                                const nx = col_dx / col_dist;
                                const nz = col_dz / col_dist;

                                // Add larger randomness to collision angle for more scatter
                                const scatterAngle = (Math.random() - 0.5) * 0.15; // ±4.3 degrees, enough to feel organic without fighting the player's aim
                                const cos = Math.cos(scatterAngle);
                                const sin = Math.sin(scatterAngle);
                                const scattered_nx = nx * cos - nz * sin;
                                const scattered_nz = nx * sin + nz * cos;

                                // Relative velocity along collision normal
                                const dvx = a.vx - b.vx;
                                const dvz = a.vz - b.vz;
                                const dvn = dvx * scattered_nx + dvz * scattered_nz;

                                // Check if both pieces are moving slowly
                                const aSpeed = Math.sqrt(a.vx * a.vx + a.vz * a.vz);
                                const bSpeed = Math.sqrt(b.vx * b.vx + b.vz * b.vz);
                                const slowCollisionThreshold = 30; // Speed threshold for &quot;settling&quot; collisions
                                const bothSlow = aSpeed &lt; slowCollisionThreshold &amp;&amp; bSpeed &lt; slowCollisionThreshold;

                                // Only resolve if moving toward each other with meaningful velocity
                                if (dvn &gt; 0.1) {
                                    // Play hit sound with throttling - max once per 500ms (only for significant collisions)
                                    if (relSpeed &gt; 50) {
                                        playSound('striker_hit_sound', 0.4, 500);
                                    }
                                    // Check if piece b is stationary
                                    const bStationary = bSpeed &lt; 10;
                                    
                                    // Apply explosive physics ONLY during initial break
                                    let restitution, breakBonus, massA, massB;
                                    
                                    if (isInitialBreak) {
                                        // INITIAL BREAK: Explosive physics
                                        restitution = 1.25;
                                        breakBonus = bStationary ? 1.65 : 1.0;
                                        massA = a.type === 'striker' ? 4 : 1;
                                        massB = b.type === 'striker' ? 4 : 1;
                                    } else if (bothSlow) {
                                        // SETTLING COLLISION: Very low restitution for slow pieces
                                        restitution = 0.1; // Almost no bounce - pieces should settle
                                        breakBonus = 1.0;
                                        massA = a.type === 'striker' ? 2 : 1;
                                        massB = b.type === 'striker' ? 2 : 1;
                                    } else {
                                        // NORMAL PLAY: Standard physics
                                        restitution = 0.9;
                                        breakBonus = 1.0;
                                        massA = a.type === 'striker' ? 2 : 1;
                                        massB = b.type === 'striker' ? 2 : 1;
                                    }
                                    
                                    const impulse = dvn * restitution * breakBonus;
                                    const totalMass = massA + massB;

                                    // Apply impulse with scattered normal
                                    a.vx -= (impulse * scattered_nx * massB) / totalMass;
                                    a.vz -= (impulse * scattered_nz * massB) / totalMass;
                                    b.vx += (impulse * scattered_nx * massA) / totalMass;
                                    b.vz += (impulse * scattered_nz * massA) / totalMass;
                                    
                                    // Add explosive scatter effects ONLY during initial break
                                    if (isInitialBreak &amp;&amp; bStationary &amp;&amp; b.type !== 'striker') {
                                        // Tangential spin-like effect
                                        const tangent_x = -scattered_nz;
                                        const tangent_z = scattered_nx;
                                        const tangentialBoost = (Math.random() - 0.5) * 150;
                                        b.vx += tangent_x * tangentialBoost;
                                        b.vz += tangent_z * tangentialBoost;
                                        
                                        // Radial explosion from center of formation
                                        const centerX = 0;
                                        const centerZ = 0;
                                        const radialDx = b.x - centerX;
                                        const radialDz = b.z - centerZ;
                                        const radialDist = Math.sqrt(radialDx * radialDx + radialDz * radialDz);
                                        if (radialDist &gt; 1) {
                                            const radialNx = radialDx / radialDist;
                                            const radialNz = radialDz / radialDist;
                                            // Push pieces away from center with strong force
                                            const radialForce = 180 + Math.random() * 120;
                                            b.vx += radialNx * radialForce;
                                            b.vz += radialNz * radialForce;
                                        }
                                    }
                                }
                                
                                // Striker deflection boost - amplifies sideways kick on angled hits
                                if (a.type === 'striker' || b.type === 'striker') {
                                    const s = a.type === 'striker' ? a : b;
                                    const tangentX = -scattered_nz;
                                    const tangentZ = scattered_nx;
                                    const tangentDot = s.vx * tangentX + s.vz * tangentZ;
                                    s.vx += tangentX * tangentDot * 0.3;
                                    s.vz += tangentZ * tangentDot * 0.3;
                                    s.vx *= 0.85;
                                    s.vz *= 0.85;
                                }

                                // Separate pieces to prevent overlap
                                const overlap = minDist - col_dist;
                                if (overlap &gt; 0) {
                                    const massA = a.type === 'striker' ? 2 : 1;
                                    const massB = b.type === 'striker' ? 2 : 1;
                                    const totalMass = massA + massB;
                                    
                                    // Separate based on mass ratio
                                    const sepA = (overlap * massB) / totalMass;
                                    const sepB = (overlap * massA) / totalMass;
                                    
                                    a.x -= nx * sepA;
                                    a.z -= nz * sepA;
                                    b.x += nx * sepB;
                                    b.z += nz * sepB;
                                }
                            }
                        }
                    }
                }
            }

            // ==================== PIECE RETURN ANIMATION ====================
            function calculateStackHeight(targetX, targetZ) {
                // Count how many non-pocketed pieces are at the target position
                let stackCount = 0;
                const stackRadius = PIECE_RADIUS * 2; // Pieces within this radius are considered &quot;at&quot; the position
                
                for (const piece of pieces) {
                    if (piece.pocketed) continue;
                    
                    let px = piece.x;
                    let pz = piece.z;
                    
                    if (piece.returning) {
                        if (!piece.returnTargetPos) continue;
                        px = piece.returnTargetPos.x;
                        pz = piece.returnTargetPos.z;
                    }
                    
                    const dx = px - targetX;
                    const dz = pz - targetZ;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    
                    if (dist &lt; stackRadius) {
                        stackCount++;
                    }
                }
                
                // Base height is 6, stack each additional piece 8 units higher
                return 6 + (stackCount * 8);
            }
            
            function startPieceReturn(piece) {
                // Mark piece as returning
                piece.returning = true;
                piece.returnProgress = 0;
                piece.returnStartPos = piece.pocketedAt || { x: 0, z: 0 };
                piece.returnTargetPos = { x: 0, z: 0 }; // Center of board
                piece.returnTargetHeight = calculateStackHeight(0, 0);
                
                // Make visible and reset state
                piece.mesh.visible = true;
                piece.pocketed = false;
                piece.falling = false;
                piece.vx = 0;
                piece.vz = 0;
                
                // Add to returning pieces array
                returningPieces.push(piece);
            }
            
            function updateReturningPieces(deltaTime) {
                const returnSpeed = 1.2; // Progress per second (0 to 1)
                
                for (let i = returningPieces.length - 1; i &gt;= 0; i--) {
                    const piece = returningPieces[i];
                    
                    piece.returnProgress += returnSpeed * deltaTime;
                    
                    if (piece.returnProgress &gt;= 1.0) {
                        // Animation complete
                        piece.returnProgress = 1.0;
                        piece.returning = false;
                        piece.x = 0;
                        piece.z = 0;
                        piece.mesh.position.set(0, piece.returnTargetHeight, 0);
                        
                        // If piece landed at elevated position, mark as stacked
                        if (piece.returnTargetHeight &gt; 7) {
                            piece.stacked = true;
                            piece.stackHeight = piece.returnTargetHeight;
                        }
                        
                        // Remove from returning array
                        returningPieces.splice(i, 1);
                        continue;
                    }
                    
                    // Ease-in-out animation
                    const t = piece.returnProgress;
                    const eased = t &lt; 0.5 
                        ? 2 * t * t 
                        : -1 + (4 - 2 * t) * t;
                    
                    // Phase 1 (0-0.3): Rise from pocket
                    // Phase 2 (0.3-1.0): Move to center position
                    
                    if (piece.returnProgress &lt; 0.3) {
                        // Rising phase
                        const riseProgress = piece.returnProgress / 0.3;
                        const riseEased = riseProgress &lt; 0.5 
                            ? 2 * riseProgress * riseProgress 
                            : -1 + (4 - 2 * riseProgress) * riseProgress;
                        
                        piece.mesh.position.y = -50 + riseEased * 100; // Rise from -50 to 50
                        piece.mesh.position.x = piece.returnStartPos.x;
                        piece.mesh.position.z = piece.returnStartPos.z;
                    } else {
                        // Moving to center phase
                        const moveProgress = (piece.returnProgress - 0.3) / 0.7;
                        const moveEased = moveProgress &lt; 0.5 
                            ? 2 * moveProgress * moveProgress 
                            : -1 + (4 - 2 * moveProgress) * moveProgress;
                        
                        // Interpolate position from pocket to center
                        const currentX = piece.returnStartPos.x + (piece.returnTargetPos.x - piece.returnStartPos.x) * moveEased;
                        const currentZ = piece.returnStartPos.z + (piece.returnTargetPos.z - piece.returnStartPos.z) * moveEased;
                        
                        // Arc motion - go up then come down to target height
                        const arcHeight = 50 + Math.sin(moveProgress * Math.PI) * 40;
                        const targetY = piece.returnTargetHeight;
                        const currentY = arcHeight + (targetY - arcHeight) * moveProgress;
                        
                        piece.mesh.position.x = currentX;
                        piece.mesh.position.y = currentY;
                        piece.mesh.position.z = currentZ;
                        
                        // Update logical position for collision/stacking detection
                        piece.x = currentX;
                        piece.z = currentZ;
                    }
                }
            }

            function checkPocket(piece) {
                const pocketPositions = [
                    [-POCKET_OFFSET, POCKET_OFFSET],
                    [POCKET_OFFSET, POCKET_OFFSET],
                    [-POCKET_OFFSET, -POCKET_OFFSET],
                    [POCKET_OFFSET, -POCKET_OFFSET]
                ];

                for (const [px, pz] of pocketPositions) {
                    const dx = piece.x - px;
                    const dz = piece.z - pz;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    if (dist &lt; POCKET_RADIUS - piece.radius * 0.5) {
                        return true;
                    }
                }
                return false;
            }

            function isPocketVisible(pocketX, pocketZ) {
                // Check if a pocket position is visible in the current camera frustum
                const pocketPos = new THREE.Vector3(pocketX, 0, pocketZ);
                const frustum = new THREE.Frustum();
                const projScreenMatrix = new THREE.Matrix4();
                projScreenMatrix.multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse);
                frustum.setFromProjectionMatrix(projScreenMatrix);
                
                // Expand the check area around the pocket
                const checkRadius = 80;
                const points = [
                    new THREE.Vector3(pocketX, 0, pocketZ),
                    new THREE.Vector3(pocketX + checkRadius, 0, pocketZ),
                    new THREE.Vector3(pocketX - checkRadius, 0, pocketZ),
                    new THREE.Vector3(pocketX, 0, pocketZ + checkRadius),
                    new THREE.Vector3(pocketX, 0, pocketZ - checkRadius)
                ];
                
                // If any point around the pocket is visible, consider it visible
                return points.some(point =&gt; frustum.containsPoint(point));
            }

            function findClosestPocket(piece) {
                const pocketPositions = [
                    { x: -POCKET_OFFSET, z: POCKET_OFFSET, name: 'Bottom-Left' },
                    { x: POCKET_OFFSET, z: POCKET_OFFSET, name: 'Bottom-Right' },
                    { x: -POCKET_OFFSET, z: -POCKET_OFFSET, name: 'Top-Left' },
                    { x: POCKET_OFFSET, z: -POCKET_OFFSET, name: 'Top-Right' }
                ];

                let closestPocket = null;
                let minDist = Infinity;

                for (const pocket of pocketPositions) {
                    const dx = piece.x - pocket.x;
                    const dz = piece.z - pocket.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    if (dist &lt; minDist) {
                        minDist = dist;
                        closestPocket = pocket;
                    }
                }

                return { pocket: closestPocket, distance: minDist };
            }

            // ==================== PICTURE-IN-PICTURE SYSTEM ====================
            
            function createPiPWindow(pocket, piece, pieceId, currentTime) {
                // Don't create more than max windows
                if (pipWindows.length &gt;= PIP_MAX_WINDOWS) {
                    return null;
                }
                
                // Get position history for this piece
                const history = positionHistory.get(pieceId) || [];
                
                // Find starting point for replay (rewind by PIP_REWIND_TIME seconds)
                const rewindStartTime = currentTime - PIP_REWIND_TIME;
                const trajectory = history.filter(pos =&gt; pos.time &gt;= rewindStartTime);
                
                // Add current position as end of trajectory
                trajectory.push({ x: piece.x, z: piece.z, time: currentTime });
                
                // If trajectory is too short, create a simple one
                if (trajectory.length &lt; 2) {
                    const startX = piece.x - (piece.vx * PIP_REWIND_TIME);
                    const startZ = piece.z - (piece.vz * PIP_REWIND_TIME);
                    trajectory.unshift({ x: startX, z: startZ, time: rewindStartTime });
                }
                
                // Create DOM elements
                const container = document.getElementById('pip-container');
                const pipDiv = document.createElement('div');
                pipDiv.className = 'pip-window';
                pipDiv.id = `pip-window-${pipNextId}`;
                
                const pipCanvas = document.createElement('canvas');
                pipDiv.appendChild(pipCanvas);
                
                const pipLabel = document.createElement('div');
                pipLabel.className = 'pip-label';
                pipLabel.textContent = pocket.name;
                pipDiv.appendChild(pipLabel);
                
                container.appendChild(pipDiv);
                
                // Create Three.js renderer and camera for this window
                const pipCamera = new THREE.PerspectiveCamera(45, 1, 1, 2000);
                const pipRenderer = new THREE.WebGLRenderer({ canvas: pipCanvas, antialias: true });
                pipRenderer.setSize(180, 180);
                pipRenderer.shadowMap.enabled = true;
                pipRenderer.shadowMap.type = THREE.PCFSoftShadowMap;
                
                // Calculate position for this window
                const position = calculatePiPPosition(pipWindows.length, pocket);
                pipDiv.style.left = position.left;
                pipDiv.style.right = position.right;
                pipDiv.style.top = position.top;
                pipDiv.style.bottom = position.bottom;
                
                // Create window state object
                const windowState = {
                    id: pipNextId++,
                    element: pipDiv,
                    canvas: pipCanvas,
                    camera: pipCamera,
                    renderer: pipRenderer,
                    pocket: pocket,
                    piece: piece,
                    trajectory: trajectory,
                    replayProgress: 0,
                    showTime: currentTime,
                    position: position
                };
                
                // Add to active windows
                pipWindows.push(windowState);
                
                // Make visible with slight delay for transition
                setTimeout(() =&gt; {
                    pipDiv.classList.add('visible');
                }, 50);
                
                return windowState;
            }
            
            function calculatePiPPosition(windowIndex, pocket) {
                // Position windows based on which pocket they're showing
                // Calculate how many windows are already in this corner
                
                const margin = 16;
                const verticalSpacing = 190; // Window height + small gap
                
                // Count how many windows are already in the same corner
                let cornerIndex = 0;
                for (const existingWindow of pipWindows) {
                    const ep = existingWindow.pocket;
                    // Check if in same corner
                    if ((pocket.z &lt; 0) === (ep.z &lt; 0) &amp;&amp; (pocket.x &lt; 0) === (ep.x &lt; 0)) {
                        cornerIndex++;
                    }
                }
                
                // Determine base corner from pocket position
                let position = { left: 'auto', right: 'auto', top: 'auto', bottom: 'auto' };
                
                // From player's view: positive Z = bottom (near player), negative Z = top (far from player)
                if (pocket.z &lt; 0) {
                    // Top of board = show at top of screen
                    position.top = `${120 + (cornerIndex * verticalSpacing)}px`;
                } else {
                    // Bottom of board = show at bottom of screen
                    position.bottom = `${180 + (cornerIndex * verticalSpacing)}px`;
                }
                
                if (pocket.x &lt; 0) {
                    position.left = `${margin}px`;
                } else {
                    position.right = `${margin}px`;
                }
                
                return position;
            }
            
            function updateAllPiPWindows(deltaTime, currentTime) {
                const replaySpeed = 1.0 / 0.6; // Complete replay in 0.6 seconds
                
                // Update each active window
                for (let i = pipWindows.length - 1; i &gt;= 0; i--) {
                    const window = pipWindows[i];
                    
                    // Check if window should be removed
                    if (currentTime - window.showTime &gt;= PIP_MIN_DISPLAY_TIME) {
