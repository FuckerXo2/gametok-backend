        function handleEditClick(x, y) {
            const timelineY = 100;
            const timelineHeight = 60;
            
            // Check wave markers
            window.gameConfig.waves.forEach(wave =&gt; {
                const markerX = 50 + (GAME_WIDTH - 100) * wave.position;
                const markerY = timelineY + timelineHeight/2;
                const dist = Math.sqrt((x - markerX) ** 2 + (y - markerY) ** 2);
                
                if (dist &lt; 20) {
                    editState.selectedWave = wave.id;
                    showWaveEditMenu(wave);
                }
            });
        }
        
        function showWaveEditMenu(wave) {
            lib.editMenu.open({
                name: `Wave at ${Math.round(wave.position * 100)}%`,
                params: {
                    'Position': {
                        key: `gameConfig.waves.${window.gameConfig.waves.indexOf(wave)}.position`,
                        type: 'slider',
                        min: 0.1,
                        max: 0.85,
                        step: 0.05,
                        onChange: (value) =&gt; {
                            wave.position = value;
                        }
                    },
                    'Enemy Count': {
                        key: `gameConfig.waves.${window.gameConfig.waves.indexOf(wave)}.enemies.length`,
                        type: 'number',
                        min: 1,
                        max: 6,
                        step: 1,
                        onChange: (value) =&gt; {
                            const currentCount = wave.enemies.length;
                            if (value &gt; currentCount) {
                                for (let i = currentCount; i &lt; value; i++) {
                                    wave.enemies.push({ type: 'basic', health: 30 });
                                }
                            } else if (value &lt; currentCount) {
                                wave.enemies.splice(value);
                            }
                        }
                    }
                },
                onDelete: () =&gt; {
                    const index = window.gameConfig.waves.indexOf(wave);
                    if (index &gt; -1 &amp;&amp; window.gameConfig.waves.length &gt; 1) {
                        window.gameConfig.waves.splice(index, 1);
                        editState.selectedWave = null;
                        lib.editMenu.close();
                    }
                }
            });
        }
        
        // Input setup
        function setupInput() {
            // Touch controls - always set up for both mobile and desktop
            const buttons = {
                leftBtn: 'left',
                rightBtn: 'right',
                punchBtn: 'punch',
                kickBtn: 'kick'
            };
            
            Object.keys(buttons).forEach(btnId =&gt; {
                const btn = document.getElementById(btnId);
                if (!btn) return;
                
                const action = buttons[btnId];
                
                // Touch events
                btn.addEventListener('touchstart', (e) =&gt; {
                    e.preventDefault();
                    e.stopPropagation();
                    input[action] = true;
                    if (action === 'punch') input.punchPressed = true;
                    if (action === 'kick') input.kickPressed = true;
                    btn.classList.add('pressed');
                    
                    // Haptic feedback
                    if (navigator.vibrate) {
                        navigator.vibrate(10);
                    }
                }, { passive: false });
                
                btn.addEventListener('touchend', (e) =&gt; {
                    e.preventDefault();
                    e.stopPropagation();
                    input[action] = false;
                    btn.classList.remove('pressed');
                }, { passive: false });
                
                btn.addEventListener('touchcancel', (e) =&gt; {
                    e.preventDefault();
                    e.stopPropagation();
                    input[action] = false;
                    btn.classList.remove('pressed');
                }, { passive: false });
                
                // Mouse events for desktop
                btn.addEventListener('mousedown', (e) =&gt; {
                    e.preventDefault();
                    e.stopPropagation();
                    input[action] = true;
                    if (action === 'punch') input.punchPressed = true;
                    if (action === 'kick') input.kickPressed = true;
                    btn.classList.add('pressed');
                });
                
                btn.addEventListener('mouseup', (e) =&gt; {
                    e.preventDefault();
                    e.stopPropagation();
                    input[action] = false;
                    btn.classList.remove('pressed');
                });
                
                btn.addEventListener('mouseleave', (e) =&gt; {
                    e.preventDefault();
                    e.stopPropagation();
                    input[action] = false;
                    btn.classList.remove('pressed');
                });
                
                // Pointer events for better cross-platform support
                btn.addEventListener('pointerdown', (e) =&gt; {
                    e.preventDefault();
                    e.stopPropagation();
                    input[action] = true;
                    if (action === 'punch') input.punchPressed = true;
                    if (action === 'kick') input.kickPressed = true;
                    btn.classList.add('pressed');
                });
                
                btn.addEventListener('pointerup', (e) =&gt; {
                    e.preventDefault();
                    e.stopPropagation();
                    input[action] = false;
                    btn.classList.remove('pressed');
                });
                
                btn.addEventListener('pointercancel', (e) =&gt; {
                    e.preventDefault();
                    e.stopPropagation();
                    input[action] = false;
                    btn.classList.remove('pressed');
                });
            });
            
            // Keyboard controls
            document.addEventListener('keydown', (e) =&gt; {
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                    input.left = true;
                }
                if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                    input.right = true;
                }
                if (e.key === 'z' || e.key === 'Z' || e.key === 'j' || e.key === 'J') {
                    input.punch = true;
                    input.punchPressed = true;
                }
                if (e.key === 'x' || e.key === 'X' || e.key === 'k' || e.key === 'K') {
                    input.kick = true;
                    input.kickPressed = true;
                }
            });
            
            document.addEventListener('keyup', (e) =&gt; {
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                    input.left = false;
                }
                if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                    input.right = false;
                }
                if (e.key === 'z' || e.key === 'Z' || e.key === 'j' || e.key === 'J') {
                    input.punch = false;
                }
                if (e.key === 'x' || e.key === 'X' || e.key === 'k' || e.key === 'K') {
                    input.kick = false;
                }
            });
            
            // Canvas click/tap
            canvas.addEventListener('click', (e) =&gt; {
                if (currentMode === 'edit') {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    const x = (e.clientX - rect.left) * scaleX;
                    const y = (e.clientY - rect.top) * scaleY;
                    handleEditClick(x, y);
                } else if (currentMode === 'play' &amp;&amp; gameState.gamePhase === 'title') {
                    // Start game from title screen
                    gameState.gamePhase = 'cutscene';
                    gameState.cutsceneTimer = 0;
                }
            });
            
            // Touch support for title screen
            canvas.addEventListener('touchstart', (e) =&gt; {
                if (currentMode === 'play' &amp;&amp; gameState.gamePhase === 'title') {
                    e.preventDefault();
                    gameState.gamePhase = 'cutscene';
                    gameState.cutsceneTimer = 0;
                }
            }, { passive: false });
        }
        
        // Game loop
        let lastTime = 0;
        function gameLoop(timestamp) {
            const dt = Math.min((timestamp - lastTime) / 1000, 0.11);
            lastTime = timestamp;
            
            // Clear
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            if (currentMode === 'play') {
                // Update timers
                if (gameState.gamePhase === 'title' || gameState.gamePhase === 'cutscene' || gameState.gamePhase === 'victory_pose' || gameState.gamePhase === 'ending_cutscene') {
                    gameState.cutsceneTimer += dt;
                }
                
                // Handle title screen
                if (gameState.gamePhase === 'title') {
                    drawTitleScreen();
                    requestAnimationFrame(gameLoop);
                    return;
                }
                
                // Handle cutscene
                if (gameState.gamePhase === 'cutscene') {
                    drawCutscene();
                    if (gameState.cutsceneTimer &gt; 3) {
                        gameState.gamePhase = 'playing';
                        gameState.cutsceneTimer = 0;
                        playMusic('music_gameplay');
                    }
                    requestAnimationFrame(gameLoop);
                    return;
                }
                
                // Handle victory pose
                if (gameState.gamePhase === 'victory_pose') {
                    drawVictoryPose();
                    if (gameState.cutsceneTimer &gt; 3) {
                        // Move to next phase
                        gameState.currentPhaseIndex++;
                        if (gameState.currentPhaseIndex &lt; window.gameConfig.phases.length) {
                            gameState.gamePhase = 'cutscene';
                            gameState.cutsceneTimer = 0;
                            gameState.currentWaveIndex = 0;
                            gameState.levelProgress = 0;
                            gameState.player.x = 200;
                            gameState.player.health = gameState.player.maxHealth;
                            gameState.enemies = [];
                            gameState.boss = null;
                            gameState.pickups = [];
                        }
                    }
                    requestAnimationFrame(gameLoop);
                    return;
                }
                
                // Handle ending cutscene
                if (gameState.gamePhase === 'ending_cutscene') {
                    drawEndingCutscene();
                    if (gameState.cutsceneTimer &gt; 5) {
                        gameState.gamePhase = 'victory';
                        UIController.showVictory(gameState.score);
                    }
                    requestAnimationFrame(gameLoop);
                    return;
                }
                
                // Update
                if (gameState.gamePhase === 'playing') {
                    gameState.player.update(dt);
                    
                    // Update enemies
                    gameState.enemies.forEach(enemy =&gt; enemy.update(dt));
                    
                    // Update boss
                    if (gameState.boss) {
                        gameState.boss.update(dt);
                    }
                    
                    // Update pickups
                    updatePickups(dt);
                    
                    // Update effects
                    updateImpactEffects(dt);
                    
                    // Update camera
                    updateCamera();
                    
                    // Wave spawning
                    gameState.levelProgress = gameState.player.x / LEVEL_LENGTH;
                    
                    const currentPhase = getCurrentPhase();
                    if (currentPhase) {
                        if (gameState.currentWaveIndex &lt; currentPhase.waves.length) {
                            const nextWave = currentPhase.waves[gameState.currentWaveIndex];
                            if (gameState.levelProgress &gt;= nextWave.position) {
                                spawnWave(nextWave);
                                gameState.currentWaveIndex++;
                            }
                        }
                        
                        // Boss spawn
                        if (!gameState.boss &amp;&amp; gameState.currentWaveIndex &gt;= currentPhase.waves.length &amp;&amp;
                            gameState.levelProgress &gt; 0.9) {
                            gameState.boss = new Boss(currentPhase.boss);
                            playMusic('music_boss_fight');
                        }
                    }
                }
                
                // Draw
                drawBackground();
                drawGround();
                
                gameState.player.draw();
                gameState.enemies.forEach(enemy =&gt; enemy.draw());
                if (gameState.boss) gameState.boss.draw();
                drawPickups();
                drawImpactEffects();
                
            } else if (currentMode === 'edit') {
                // Edit mode rendering
                drawBackground();
                drawGround();
                drawEditMode();
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        // Main run function
        async function run(mode) {
            lib.log('run() called. Mode: ' + mode);
            currentMode = mode;
            
            // Initialize UI Controller
            UIController.init();
            
            // Preload assets
            await preloadAssets();
            
            // Setup input
            setupInput();
            
            // Show game parameters
            lib.showGameParameters({
                name: 'Game Settings',
                params: {
                    'Player Health': {
                        key: 'gameConfig.player.startHealth',
                        type: 'slider',
                        min: 50,
                        max: 200,
                        step: 10,
                        onChange: (value) =&gt; {
                            window.gameConfig.player.startHealth = value;
                            if (gameState.player) {
                                gameState.player.maxHealth = value;
                                gameState.player.health = Math.min(gameState.player.health, value);
                            }
                        }
                    },
                    'Punch Damage': {
                        key: 'gameConfig.player.punchDamage',
                        type: 'slider',
                        min: 5,
                        max: 20,
                        step: 1,
                        onChange: (value) =&gt; {
                            window.gameConfig.player.punchDamage = value;
                        }
                    },
                    'Kick Damage': {
                        key: 'gameConfig.player.kickDamage',
                        type: 'slider',
                        min: 10,
                        max: 30,
                        step: 1,
                        onChange: (value) =&gt; {
                            window.gameConfig.player.kickDamage = value;
                        }
                    },
                    'Boss Health': {
                        key: 'gameConfig.boss.health',
                        type: 'slider',
                        min: 100,
                        max: 500,
                        step: 50,
                        onChange: (value) =&gt; {
                            window.gameConfig.boss.health = value;
                            if (gameState.boss) {
                                gameState.boss.maxHealth = value;
                            }
                        }
                    },
                    'Background Theme': {
                        key: 'gameConfig.stage.backgroundTheme',
                        type: 'dropdown',
                        options: [
                            { label: 'City Street', value: 'street' },
                            { label: 'Dark Alley', value: 'alley' },
                            { label: 'Industrial Zone', value: 'industrial' }
                        ],
                        onChange: (value) =&gt; {
                            window.gameConfig.stage.backgroundTheme = value;
                        }
                    },
                    'Health Pickups': {
                        key: 'gameConfig.stage.healthPickupFrequency',
                        type: 'dropdown',
                        options: [
                            { label: 'None', value: 'none' },
                            { label: 'Rare', value: 'rare' },
                            { label: 'Common', value: 'common' }
                        ],
                        onChange: (value) =&gt; {
                            window.gameConfig.stage.healthPickupFrequency = value;
                        }
                    }
                }
            });
            
            if (mode === 'play') {
                // Initialize game state
                gameState.player = new Player();
                gameState.enemies = [];
                gameState.boss = null;
                gameState.pickups = [];
                gameState.score = 0;
                gameState.combo = 0;
                gameState.currentWaveIndex = 0;
                gameState.currentPhaseIndex = 0;
                gameState.gamePhase = 'title';
                gameState.levelProgress = 0;
                gameState.cutsceneTimer = 0;
                
                // Initialize UI
                UIController.updateHealth(gameState.player.health, gameState.player.maxHealth);
                UIController.updateScore(0);
            }
            
            // Start game loop
            requestAnimationFrame(gameLoop);
        }
    &lt;/script&gt;

  min-width: 200px;\n            text-align: right;\n        }\n        \n        .score-label {\n            font-family: 'Bebas Neue', sans-serif;\n            font-size: 20px;\n            color: var(--color-accent-gold);\n            text-shadow: 2px 2px 0 var(--color-shadow);\n            margin-bottom: var(--space-xs);\n            letter-spacing: 1px;\n        }\n        \n        .score-value {\n            font-family: 'Bebas Neue', sans-serif;\n            font-size: 36px;\n            color: var(--color-text-light);\n            text-shadow: \n                2px 2px 0 var(--color-shadow),\n                0 0 12px var(--color-accent-gold);\n            letter-spacing: 2px;\n            line-height: 1;\n        }\n        \n        .combo-display {\n            position: absolute;\n            top: 140px;\n            left: 50%;\n            transform: translateX(-50%) scale(0);\n            font-family: 'Bangers', cursive;\n            font-size: 48px;\n            color: var(--color-accent-gold);\n            text-shadow: \n                3px 3px 0 var(--color-shadow),\n                0 0 20px var(--color-accent-gold);\n            letter-spacing: 2px;\n            opacity: 0;\n            transition: all var(--transition-normal) var(--ease-bounce);\n            pointer-events: none;\n        }\n        \n        .combo-display.active {\n            transform: translateX(-50%) scale(1);\n            opacity: 1;\n        }\n        \n        /* ============================================\n           VIRTUAL CONTROLS\n           ============================================ */\n        .control-panel {\n            position: absolute;\n            bottom: 0;\n            left: 0;\n            width: 100%;\n            height: 260px;\n            pointer-events: none;\n            z-index: 20;\n        }\n        \n        .virtual-button {\n            position: absolute;\n            width: var(--button-size);\n            height: var(--button-size);\n            border-radius: 50%;\n            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.1));\n            border: 4px solid var(--color-text-light);\n            box-shadow: \n                0 0 0 2px var(--color-shadow),\n                var(--shadow-lg);\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            font-family: 'Bebas Neue', sans-serif;\n            font-size: 18px;\n            font-weight: bold;\n            color: var(--color-text-light);\n            text-shadow: \n                2px 2px 0 var(--color-shadow),\n                -1px -1px 0 var(--color-shadow),\n                1px -1px 0 var(--color-shadow),\n                -1px 1px 0 var(--color-shadow);\n            pointer-events: auto;\n            touch-action: none;\n            transition: all var(--transition-fast) var(--ease-out);\n            letter-spacing: 1px;\n        }\n        \n        .virtual-button::before {\n            content: '';\n            position: absolute;\n            top: -4px;\n            left: -4px;\n            right: -4px;\n            bottom: -4px;\n            border-radius: 50%;\n            background: radial-gradient(circle at center, transparent 0%, rgba(255, 255, 255, 0.2) 100%);\n            opacity: 0;\n            transition: opacity var(--transition-fast);\n        }\n        \n        .virtual-button:active::before,\n        .virtual-button.pressed::before {\n            opacity: 1;\n        }\n        \n        .virtual-button:active,\n        .virtual-button.pressed {\n            transform: scale(0.92);\n        }\n        \n        /* Movement Buttons */\n        .virtual-button.move {\n            background: radial-gradient(circle at 30% 30%, rgba(0, 212, 255, 0.6), rgba(0, 168, 204, 0.4));\n        }\n        \n        .virtual-button.move:active,\n        .virtual-button.move.pressed {\n            background: radial-gradient(circle at 30% 30%, rgba(0, 212, 255, 0.8), rgba(0, 168, 204, 0.6));\n            box-shadow: \n                0 0 0 2px var(--color-shadow),\n                var(--shadow-lg),\n                var(--glow-primary);\n        }\n        \n        /* Punch Button */\n        .virtual-button.punch {\n            background: radial-gradient(circle at 30% 30%, rgba(255, 51, 102, 0.6), rgba(204, 41, 82, 0.4));\n        }\n        \n        .virtual-button.punch:active,\n        .virtual-button.punch.pressed {\n            background: radial-gradient(circle at 30% 30%, rgba(255, 51, 102, 0.8), rgba(204, 41, 82, 0.6));\n            box-shadow: \n                0 0 0 2px var(--color-shadow),\n                var(--shadow-lg),\n                0 0 20px rgba(255, 51, 102, 0.8);\n        }\n        \n        /* Kick Button */\n        .virtual-button.kick {\n            background: radial-gradient(circle at 30% 30%, rgba(0, 255, 136, 0.6), rgba(0, 204, 109, 0.4));\n        }\n        \n        .virtual-button.kick:active,\n        .virtual-button.kick.pressed {\n            background: radial-gradient(circle at 30% 30%, rgba(0, 255, 136, 0.8), rgba(0, 204, 109, 0.6));\n            box-shadow: \n                0 0 0 2px var(--color-shadow),\n                var(--shadow-lg),\n                0 0 20px rgba(0, 255, 136, 0.8);\n        }\n        \n        /* Button Positioning */\n        #leftBtn { \n            bottom: var(--space-lg); \n            left: var(--space-sm); \n        }\n        \n        #rightBtn { \n            bottom: var(--space-lg); \n            left: calc(var(--space-sm) + var(--button-size) + var(--button-gap)); \n        }\n        \n        #punchBtn { \n            bottom: var(--space-lg); \n            right: calc(var(--space-sm) + var(--button-size) + var(--button-gap)); \n        }\n        \n        #kickBtn { \n            bottom: var(--space-lg); \n            right: var(--space-sm); \n        }\n        \n        /* ============================================\n           LOADING SCREEN\n           ============================================ */\n        #loadingScreen {\n            position: absolute;\n            top: 0;\n            left: 0;\n            width: 100%;\n            height: 100%;\n            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            z-index: 100;\n            transition: opacity var(--transition-slow) var(--ease-out);\n        }\n        \n        #loadingScreen.hidden {\n            opacity: 0;\n            pointer-events: none;\n        }\n        \n        .loading-title {\n            font-family: 'Bangers', cursive;\n            font-size: 56px;\n            color: var(--color-primary);\n            text-shadow: \n                4px 4px 0 var(--color-shadow),\n                0 0 30px var(--color-primary);\n            margin-bottom: var(--space-lg);\n            letter-spacing: 3px;\n            animation: pulse-glow 2s ease-in-out infinite;\n        }\n        \n        .loading-subtitle {\n            font-family: 'Bebas Neue', sans-serif;\n            font-size: 24px;\n            color: var(--color-text-light);\n            text-shadow: 2px 2px 0 var(--color-shadow);\n            margin-bottom: var(--space-xl);\n            letter-spacing: 2px;\n        }\n        \n        #loadingBar {\n            width: 400px;\n            max-width: 80%;\n            height: 40px;\n            background: rgba(0, 0, 0, 0.6);\n            border: 3px solid var(--color-text-light);\n            box-shadow: \n                0 0 0 6px var(--color-shadow),\n                var(--shadow-lg);\n            border-radius: 4px;\n            overflow: hidden;\n            position: relative;\n        }\n        \n        #loadingProgress {\n            height: 100%;\n            background: linear-gradient(90deg, var(--color-primary) 0%, var(--color-accent-gold) 100%);\n            width: 0%;\n            transition: width var(--transition-normal) var(--ease-out);\n            box-shadow: \n                inset 0 2px 8px rgba(255, 255, 255, 0.3),\n                0 0 20px var(--color-primary);\n            position: relative;\n        }\n        \n        #loadingProgress::after {\n            content: '';\n            position: absolute;\n            top: 0;\n            left: 0;\n            right: 0;\n            bottom: 0;\n            background: linear-gradient(90deg, \n                transparent 0%, \n                rgba(255, 255, 255, 0.3) 50%, \n                transparent 100%);\n            animation: shimmer 1.5s infinite;\n        }\n        \n        .loading-percentage {\n            position: absolute;\n            top: 50%;\n            left: 50%;\n            transform: translate(-50%, -50%);\n            font-family: 'Bebas Neue', sans-serif;\n            font-size: 20px;\n            color: var(--color-text-light);\n            text-shadow: \n                1px 1px 0 var(--color-shadow),\n                0 0 8px var(--color-shadow);\n            font-weight: bold;\n            letter-spacing: 1px;\n            z-index: 1;\n        }\n        \n        /* ============================================\n           GAME STATE MODALS (Victory/Game Over)\n           ============================================ */\n        .game-state-modal {\n            position: absolute;\n            top: 0;\n            left: 0;\n            width: 100%;\n            height: 100%;\n            background: rgba(0, 0, 0, 0.9);\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            z-index: 50;\n            opacity: 0;\n            pointer-events: none;\n            transition: opacity var(--transition-slow) var(--ease-out);\n        }\n        \n        .game-state-modal.active {\n            opacity: 1;\n            pointer-events: auto;\n        }\n        \n        .modal-content {\n            text-align: center;\n            transform: scale(0.8);\n            transition: transform var(--transition-slow) var(--ease-bounce);\n        }\n        \n        .game-state-modal.active .modal-content {\n            transform: scale(1);\n        }\n        \n        .modal-title {\n            font-family: 'Bangers', cursive;\n            font-size: 72px;\n            margin-bottom: var(--space-md);\n            letter-spacing: 4px;\n            text-shadow: \n                5px 5px 0 var(--color-shadow),\n                0 0 40px currentColor;\n        }\n        \n        .modal-title.victory {\n            color: var(--color-accent-gold);\n            animation: pulse-glow 1.5s ease-in-out infinite;\n        }\n        \n        .modal-title.defeat {\n            color: var(--color-danger);\n        }\n        \n        .modal-score {\n            font-family: 'Bebas Neue', sans-serif;\n            font-size: 36px;\n            color: var(--color-text-light);\n            text-shadow: 2px 2px 0 var(--color-shadow);\n            margin-bottom: var(--space-lg);\n            letter-spacing: 2px;\n        }\n        \n        .modal-message {\n            font-family: 'Inter', sans-serif;\n            font-size: 20px;\n            color: rgba(255, 255, 255, 0.8);\n            margin-bottom: var(--space-xl);\n            font-weight: 600;\n        }\n        \n        .restart-button {\n            font-family: 'Bebas Neue', sans-serif;\n            font-size: 24px;\n            color: var(--color-text-light);\n            background: var(--color-primary);\n            border: 4px solid var(--color-text-light);\n            box-shadow: \n                0 0 0 2px var(--color-shadow),\n                var(--shadow-lg);\n            padding: var(--space-sm) var(--space-xl);\n            border-radius: 4px;\n            cursor: pointer;\n            transition: all var(--transition-fast) var(--ease-out);\n            letter-spacing: 2px;\n            text-shadow: 2px 2px 0 var(--color-shadow);\n        }\n        \n        .restart-button:hover {\n            background: var(--color-primary-hover);\n            transform: translateY(-2px);\n            box-shadow: \n                0 0 0 2px var(--color-shadow),\n                var(--shadow-lg),\n                var(--glow-primary);\n        }\n        \n        .restart-button:active {\n            transform: translateY(0);\n        }\n        \n        /* ============================================\n           KEYBOARD HINT (Desktop Only)\n           ============================================ */\n        .keyboard-hint {\n            position: absolute;\n            bottom: var(--space-sm);\n            left: 50%;\n            transform: translateX(-50%);\n            background: var(--color-panel-bg);\n            border: 2px solid rgba(255, 255, 255, 0.3);\n            border-radius: 4px;\n            padding: var(--space-xs) var(--space-sm);\n            font-family: 'Inter', sans-serif;\n            font-size: 14px;\n            color: rgba(255, 255, 255, 0.7);\n            text-align: center;\n            z-index: 5;\n            opacity: 0;\n            pointer-events: none;\n            transition: opacity var(--transition-normal);\n        }\n        \n        .keyboard-hint.visible {\n            opacity: 1;\n        }\n        \n        /* ============================================\n           UTILITY CLASSES\n           ============================================ */\n        .hidden { \n            display: none !important; \n        }\n        \n        /* ============================================\n           ANIMATIONS\n           ============================================ */\n        @keyframes pulse-danger {\n            0%, 100% { opacity: 1; }\n            50% { opacity: 0.7; }\n        }\n        \n        @keyframes pulse-glow {\n            0%, 100% { \n                text-shadow: \n                    4px 4px 0 var(--color-shadow),\n                    0 0 30px currentColor;\n            }\n            50% { \n                text-shadow: \n                    4px 4px 0 var(--color-shadow),\n                    0 0 50px currentColor;\n            }\n        }\n        \n        @keyframes shimmer {\n            0% { transform: translateX(-100%); }\n            100% { transform: translateX(100%); }\n        }\n        \n        /* ============================================\n           REDUCED MOTION PREFERENCES\n           ============================================ */\n        @media (prefers-reduced-motion: reduce) {\n            *,\n            *::before,\n            *::after {\n                animation-duration: 0.01ms !important;\n                animation-iteration-count: 1 !important;\n                transition-duration: 0.01ms !important;\n            }\n        }\n    \u003c/style\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n    \u003ccanvas id=\"gameCanvas\"\u003e\u003c/canvas\u003e\n    \n    \u003c!-- HUD Overlay --\u003e\n    \u003cdiv class=\"hud-overlay\"\u003e\n        \u003cdiv class=\"health-panel hud-panel\"\u003e\n            \u003cdiv class=\"health-label\"\u003eHERO HEALTH\u003c/div\u003e\n            \u003cdiv class=\"health-bar-container\"\u003e\n                \u003cdiv class=\"health-bar-fill\" id=\"healthBarFill\"\u003e\u003c/div\u003e\n                \u003cdiv class=\"health-text\" id=\"healthText\"\u003e100/100\u003c/div\u003e\n            \u003c/div\u003e\n        \u003c/div\u003e\n        \n        \u003cdiv class=\"score-panel hud-panel\"\u003e\n            \u003cdiv class=\"score-label\"\u003eSCORE\u003c/div\u003e\n            \u003cdiv class=\"score-value\" id=\"scoreValue\"\u003e0\u003c/div\u003e\n        \u003c/div\u003e\n        \n        \u003cdiv class=\"combo-display\" id=\"comboDisplay\"\u003e0x COMBO!\u003c/div\u003e\n    \u003c/div\u003e\n    \n    \u003c!-- Virtual Controls --\u003e\n    \u003cdiv class=\"control-panel\" id=\"virtualControls\"\u003e\n        \u003cdiv id=\"leftBtn\" class=\"virtual-button move\"\u003e◄\u003c/div\u003e\n        \u003cdiv id=\"rightBtn\" class=\"virtual-button move\"\u003e►\u003c/div\u003e\n        \u003cdiv id=\"punchBtn\" class=\"virtual-button punch\"\u003ePUNCH\u003c/div\u003e\n        \u003cdiv id=\"kickBtn\" class=\"virtual-button kick\"\u003eKICK\u003c/div\u003e\n    \u003c/div\u003e\n    \n    \u003c!-- Keyboard Hint (Desktop) --\u003e\n    \u003cdiv class=\"keyboard-hint\" id=\"keyboardHint\"\u003e\n        Arrow Keys: Move • Z: Punch • X: Kick\n    \u003c/div\u003e\n    \n    \u003c!-- Loading Screen --\u003e\n    \u003cdiv id=\"loadingScreen\"\u003e\n        \u003cdiv class=\"loading-title\"\u003eHIGH-POWER\u003c/div\u003e\n        \u003cdiv class=\"loading-subtitle\"\u003eStreet Justice\u003c/div\u003e\n        \u003cdiv id=\"loadingBar\"\u003e\n            \u003cdiv id=\"loadingProgress\"\u003e\u003c/div\u003e\n            \u003cdiv class=\"loading-percentage\" id=\"loadingPercentage\"\u003e0%\u003c/div\u003e\n        \u003c/div\u003e\n    \u003c/div\u003e\n    \n    \u003c!-- Game State Modals --\u003e\n    \u003cdiv class=\"game-state-modal\" id=\"victoryModal\"\u003e\n        \u003cdiv class=\"modal-content\"\u003e\n            \u003cdiv class=\"modal-title victory\"\u003eVICTORY!\u003c/div\u003e\n            \u003cdiv class=\"modal-score\"\u003eFinal Score: \u003cspan id=\"victoryScore\"\u003e0\u003c/span\u003e\u003c/div\u003e\n            \u003cdiv class=\"modal-message\"\u003eJustice has been served!\u003c/div\u003e\n            \u003cbutton class=\"restart-button\" onclick=\"location.reload()\"\u003ePlay Again\u003c/button\u003e\n            \u003cbutton class=\"restart-button\" style=\"margin-top: 16px; background: #666;\" onclick=\"window.location.href='/'\"\u003eReturn to Start\u003c/button\u003e\n        \u003c/div\u003e\n    \u003c/div\u003e\n    \n    \u003cdiv class=\"game-state-modal\" id=\"gameOverModal\"\u003e\n        \u003cdiv class=\"modal-content\"\u003e\n            \u003cdiv class=\"modal-title defeat\"\u003eDEFEATED\u003c/div\u003e\n            \u003cdiv class=\"modal-score\"\u003eFinal Score: \u003cspan id=\"gameOverScore\"\u003e0\u003c/span\u003e\u003c/div\u003e\n            \u003cdiv class=\"modal-message\"\u003eThe city needs you. Try again!\u003c/div\u003e\n            \u003cbutton class=\"restart-button\" onclick=\"location.reload()\"\u003eRetry\u003c/button\u003e\n            \u003cbutton class=\"restart-button\" style=\"margin-top: 16px; background: #666;\" onclick=\"window.location.href='/'\"\u003eReturn to Start\u003c/button\u003e\n        \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003cscript\u003e\n        /* ==================================================\n         * GAME OVERVIEW: High-Power: Street Justice\n         * A side-scrolling beat 'em up where players control superhero High-Power\n         * fighting through waves of street thugs to defeat a boss villain.\n         * \n         * FEATURES:\n         * - Punch and kick combat with combo system\n         * - Multiple enemy waves with increasing difficulty\n         * - Boss fight with unique mechanics\n         * - Health system and pickups\n         * - Score tracking\n         * - Edit mode for customizing waves, enemies, and difficulty\n         * \n         * GAME STATE SHAPE: window.gameConfig = {\n         *   waves: [{ id, position, enemies: [{ type, health }] }],\n         *   boss: { health, attackSpeed, damage },\n         *   player: { startHealth, punchDamage, kickDamage, moveSpeed },\n         *   stage: { backgroundTheme, healthPickupFrequency }\n         * }\n         * ==================================================\n         */\n\n        // ============================================\n        // UI CONTROLLER - Manages all UI interactions\n        // ============================================\n        const UIController = {\n            elements: {\n                healthBarFill: null,\n                healthText: null,\n                scoreValue: null,\n                comboDisplay: null,\n                victoryModal: null,\n                gameOverModal: null,\n                victoryScore: null,\n                gameOverScore: null,\n                loadingProgress: null,\n                loadingPercentage: null,\n                keyboardHint: null\n            },\n            \n            comboTimer: null,\n            \n            init() {\n                // Cache DOM elements\n                this.elements.healthBarFill = document.getElementById('healthBarFill');\n                this.elements.healthText = document.getElementById('healthText');\n                this.elements.scoreValue = document.getElementById('scoreValue');\n                this.elements.comboDisplay = document.getElementById('comboDisplay');\n                this.elements.victoryModal = document.getElementById('victoryModal');\n                this.elements.gameOverModal = document.getElementById('gameOverModal');\n                this.elements.victoryScore = document.getElementById('victoryScore');\n                this.elements.gameOverScore = document.getElementById('gameOverScore');\n                this.elements.loadingProgress = document.getElementById('loadingProgress');\n                this.elements.loadingPercentage = document.getElementById('loadingPercentage');\n                this.elements.keyboardHint = document.getElementById('keyboardHint');\n                \n                // Show keyboard hint on desktop\n                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);\n                if (!isMobile) {\n                    setTimeout(() =\u003e {\n                        this.elements.keyboardHint.classList.add('visible');\n                    }, 1000);\n                }\n            },\n            \n            updateHealth(current, max) {\n                const percentage = (current / max) * 100;\n                this.elements.healthBarFill.style.width = percentage + '%';\n                this.elements.healthText.textContent = `${Math.ceil(current)}/${max}`;\n                \n                // Add low health warning\n                if (percentage \u003c 30) {\n                    this.elements.healthBarFill.classList.add('low');\n                } else {\n                    this.elements.healthBarFill.classList.remove('low');\n                }\n            },\n            \n            updateScore(score) {\n                this.elements.scoreValue.textContent = score;\n            },\n            \n            showCombo(combo) {\n                if (combo \u003c= 1) {\n                    this.elements.comboDisplay.classList.remove('active');\n                    return;\n                }\n                \n                this.elements.comboDisplay.textContent = `${combo}x COMBO!`;\n                this.elements.comboDisplay.classList.add('active');\n                \n                // Clear existing timer\n                if (this.comboTimer) {\n                    clearTimeout(this.comboTimer);\n                }\n                \n                // Hide after 2 seconds\n                this.comboTimer = setTimeout(() =\u003e {\n                    this.elements.comboDisplay.classList.remove('active');\n                }, 2000);\n            },\n            \n            showVictory(score) {\n                this.elements.victoryScore.textContent = score;\n                this.elements.victoryModal.classList.add('active');\n            },\n            \n            showGameOver(score) {\n                this.elements.gameOverScore.textContent = score;\n                this.elements.gameOverModal.classList.add('active');\n            },\n            \n            updateLoadingProgress(percentage) {\n                this.elements.loadingProgress.style.width = percentage + '%';\n                this.elements.loadingPercentage.textContent = Math.round(percentage) + '%';\n            },\n            \n            hideLoading() {\n                document.getElementById('loadingScreen').classList.add('hidden');\n            }\n        };\n\n        // Global game state\n        const canvas = document.getElementById('gameCanvas');\n        const ctx = canvas.getContext('2d');\n        const GAME_WIDTH = 720;\n        const GAME_HEIGHT = 1280;\n        \n        // Set canvas size\n        canvas.width = GAME_WIDTH;\n        canvas.height = GAME_HEIGHT;\n        \n        // Asset cache\n        const assets = {\n            images: {},\n            audio: {},\n            audioContext: null,\n            audioBuffers: {}\n        };\n        \n        // Game state\n        let currentMode = 'play';\n        let gameState = {\n            player: null,\n            enemies: [],\n            boss: null,\n            pickups: [],\n            camera: { x: 0, targetX: 0 },\n            score: 0,\n            combo: 0,\n            lastAttackType: null,\n            currentWaveIndex: 0,\n            currentPhaseIndex: 0,\n            gamePhase: 'title', // title, cutscene, playing, victory_pose, phase_complete, ending_cutscene, victory, gameover\n            levelProgress: 0,\n            cutsceneTimer: 0,\n            victoryPoseTimer: 0\n        };\n        \n        // Input state\n        const input = {\n            left: false,\n            right: false,\n            punch: false,\n            kick: false,\n            punchPressed: false,\n            kickPressed: false\n        };\n        \n        // Edit mode state\n        let editState = {\n            selectedWave: null,\n            draggingWave: null,\n            dragOffset: 0\n        };\n        \n        // Constants\n        const PLAYER_Y = 900; // Ground level for characters\n        const GROUND_Y = 1000;\n        const LEVEL_LENGTH = 3000; // Total level width\n        const ENEMY_TYPES = {\n            basic: { health: 30, speed: 1, damage: 5, color: '#666' },\n            fighter: { health: 50, speed: 1.5, damage: 8, color: '#944' },\n            bruiser: { health: 80, speed: 0.8, damage: 12, color: '#449' }\n        };\n        \n        // Asset loading\n        async function preloadAssets() {\n            const assetIds = [\n                'highpower_idle', 'highpower_walk', 'highpower_punch', 'highpower_kick', 'highpower_hurt',\n                'highpower_title_action',\n                'thug_basic_idle', 'thug_basic_walk', 'thug_basic_attack', 'thug_basic_hurt',\n                'boss_villain_idle', 'boss_villain_attack', 'boss_villain_hurt',\n                'boss_alley_enforcer_idle', 'boss_alley_enforcer_attack', 'boss_alley_enforcer_hurt',\n                'boss_industrial_overlord_idle', 'boss_industrial_overlord_attack', 'boss_industrial_overlord_hurt',\n                'boss_crime_lord_idle', 'boss_crime_lord_attack', 'boss_crime_lord_hurt',\n                'background_city_street', 'background_city_alley', 'background_industrial', 'background_industrial_zone', 'background_crime_lords_lair',\n                'ground_street', 'impact_effect_punch', 'impact_effect_kick',\n                'ui_button_punch', 'ui_button_kick', 'ui_button_left', 'ui_button_right',\n                'health_pickup',\n                'sfx_punch_hit', 'sfx_kick_hit', 'sfx_player_hurt', 'sfx_enemy_hurt',\n                'sfx_enemy_defeat', 'sfx_boss_hit', 'sfx_boss_attack', 'sfx_health_pickup',\n                'sfx_victory', 'sfx_game_over', 'music_gameplay', 'music_boss_fight'\n            ];\n            \n            let loaded = 0;\n            \n            // Initialize audio context\n            assets.audioContext = new (window.AudioContext || window.webkitAudioContext)();\n            \n            const promises = assetIds.map(id =\u003e {\n                return new Promise((resolve) =\u003e {\n
