    &lt;title&gt;High-Power: Street Justice&lt;/title&gt;
    
    &lt;style&gt;
        /* ============================================
           CSS RESET &amp; BASE STYLES
           ============================================ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
            background: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            touch-action: none;
            user-select: none;
        }
        
        /* ============================================
           FONT IMPORTS
           ============================================ */
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Inter:wght@400;600;700&amp;family=Bangers&amp;display=swap');
        
        /* ============================================
           CSS CUSTOM PROPERTIES
           ============================================ */
        :root {
            /* Colors */
            --color-primary: #00D4FF;
            --color-primary-hover: #00A8CC;
            --color-accent-gold: #FFD700;
            --color-danger: #FF3366;
            --color-success: #00FF88;
            --color-panel-bg: rgba(0, 0, 0, 0.85);
            --color-text-light: #FFFFFF;
            --color-shadow: #000000;
            
            /* Spacing (8px grid) */
            --space-xs: 8px;
            --space-sm: 16px;
            --space-md: 24px;
            --space-lg: 32px;
            --space-xl: 48px;
            
            /* Animation Timings */
            --transition-fast: 150ms;
            --transition-normal: 300ms;
            --transition-slow: 500ms;
            
            /* Easing Functions */
            --ease-out: cubic-bezier(0.0, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.68, -0.6, 0.32, 1.6);
            
            /* Shadows &amp; Effects */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 6px 24px rgba(0, 0, 0, 0.5);
            --glow-primary: 0 0 20px rgba(0, 212, 255, 0.6);
            --glow-gold: 0 0 24px rgba(255, 215, 0, 0.8);
            
            /* Button Sizes */
            --button-size: 110px;
            --button-gap: 20px;
        }
        
        /* ============================================
           GAME CANVAS
           ============================================ */
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        /* ============================================
           HUD OVERLAY (Health, Score, Combo)
           ============================================ */
        .hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .hud-panel {
            background: var(--color-panel-bg);
            border: 3px solid var(--color-text-light);
            box-shadow: 
                0 0 0 6px var(--color-shadow),
                var(--shadow-md);
            padding: var(--space-sm);
            border-radius: 4px;
        }
        
        .health-panel {
            position: absolute;
            top: var(--space-sm);
            left: var(--space-sm);
            min-width: 240px;
        }
        
        .health-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            color: var(--color-text-light);
            text-shadow: 2px 2px 0 var(--color-shadow);
            margin-bottom: var(--space-xs);
            letter-spacing: 1px;
        }
        
        .health-bar-container {
            position: relative;
            width: 100%;
            height: 28px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--color-text-light);
            box-shadow: 
                inset 0 2px 4px rgba(0, 0, 0, 0.5),
                0 0 0 2px var(--color-shadow);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .health-bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--color-success) 0%, #FFD700 50%, var(--color-danger) 100%);
            background-size: 300% 100%;
            background-position: 0% 0%;
            transition: width var(--transition-normal) var(--ease-out),
                        background-position var(--transition-normal) var(--ease-out);
            box-shadow: inset 0 2px 8px rgba(255, 255, 255, 0.3);
        }
        
        .health-bar-fill.low {
            background-position: 100% 0%;
            animation: pulse-danger 1s ease-in-out infinite;
        }
        
        .health-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            color: var(--color-text-light);
            text-shadow: 
                1px 1px 0 var(--color-shadow),
                -1px -1px 0 var(--color-shadow),
                1px -1px 0 var(--color-shadow),
                -1px 1px 0 var(--color-shadow),
                0 0 8px var(--color-shadow);
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .score-panel {
            position: absolute;
            top: var(--space-sm);
            right: var(--space-sm);
            min-width: 200px;
            text-align: right;
        }
        
        .score-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            color: var(--color-accent-gold);
            text-shadow: 2px 2px 0 var(--color-shadow);
            margin-bottom: var(--space-xs);
            letter-spacing: 1px;
        }
        
        .score-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            color: var(--color-text-light);
            text-shadow: 
                2px 2px 0 var(--color-shadow),
                0 0 12px var(--color-accent-gold);
            letter-spacing: 2px;
            line-height: 1;
        }
        
        .combo-display {
            position: absolute;
            top: 140px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            font-family: 'Bangers', cursive;
            font-size: 48px;
            color: var(--color-accent-gold);
            text-shadow: 
                3px 3px 0 var(--color-shadow),
                0 0 20px var(--color-accent-gold);
            letter-spacing: 2px;
            opacity: 0;
            transition: all var(--transition-normal) var(--ease-bounce);
            pointer-events: none;
        }
        
        .combo-display.active {
            transform: translateX(-50%) scale(1);
            opacity: 1;
        }
        
        /* ============================================
           VIRTUAL CONTROLS
           ============================================ */
        .control-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 260px;
            pointer-events: none;
            z-index: 20;
        }
        
        .virtual-button {
            position: absolute;
            width: var(--button-size);
            height: var(--button-size);
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.1));
            border: 4px solid var(--color-text-light);
            box-shadow: 
                0 0 0 2px var(--color-shadow),
                var(--shadow-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            font-weight: bold;
            color: var(--color-text-light);
            text-shadow: 
                2px 2px 0 var(--color-shadow),
                -1px -1px 0 var(--color-shadow),
                1px -1px 0 var(--color-shadow),
                -1px 1px 0 var(--color-shadow);
            pointer-events: auto;
            touch-action: none;
            transition: all var(--transition-fast) var(--ease-out);
            letter-spacing: 1px;
        }
        
        .virtual-button::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            background: radial-gradient(circle at center, transparent 0%, rgba(255, 255, 255, 0.2) 100%);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        
        .virtual-button:active::before,
        .virtual-button.pressed::before {
            opacity: 1;
        }
        
        .virtual-button:active,
        .virtual-button.pressed {
            transform: scale(0.92);
        }
        
        /* Movement Buttons */
        .virtual-button.move {
            background: radial-gradient(circle at 30% 30%, rgba(0, 212, 255, 0.6), rgba(0, 168, 204, 0.4));
        }
        
        .virtual-button.move:active,
        .virtual-button.move.pressed {
            background: radial-gradient(circle at 30% 30%, rgba(0, 212, 255, 0.8), rgba(0, 168, 204, 0.6));
            box-shadow: 
                0 0 0 2px var(--color-shadow),
                var(--shadow-lg),
                var(--glow-primary);
        }
        
        /* Punch Button */
        .virtual-button.punch {
            background: radial-gradient(circle at 30% 30%, rgba(255, 51, 102, 0.6), rgba(204, 41, 82, 0.4));
        }
        
        .virtual-button.punch:active,
        .virtual-button.punch.pressed {
            background: radial-gradient(circle at 30% 30%, rgba(255, 51, 102, 0.8), rgba(204, 41, 82, 0.6));
            box-shadow: 
                0 0 0 2px var(--color-shadow),
                var(--shadow-lg),
                0 0 20px rgba(255, 51, 102, 0.8);
        }
        
        /* Kick Button */
        .virtual-button.kick {
            background: radial-gradient(circle at 30% 30%, rgba(0, 255, 136, 0.6), rgba(0, 204, 109, 0.4));
        }
        
        .virtual-button.kick:active,
        .virtual-button.kick.pressed {
            background: radial-gradient(circle at 30% 30%, rgba(0, 255, 136, 0.8), rgba(0, 204, 109, 0.6));
            box-shadow: 
                0 0 0 2px var(--color-shadow),
                var(--shadow-lg),
                0 0 20px rgba(0, 255, 136, 0.8);
        }
        
        /* Button Positioning */
        #leftBtn { 
            bottom: var(--space-lg); 
            left: var(--space-sm); 
        }
        
        #rightBtn { 
            bottom: var(--space-lg); 
            left: calc(var(--space-sm) + var(--button-size) + var(--button-gap)); 
        }
        
        #punchBtn { 
            bottom: var(--space-lg); 
            right: calc(var(--space-sm) + var(--button-size) + var(--button-gap)); 
        }
        
        #kickBtn { 
            bottom: var(--space-lg); 
            right: var(--space-sm); 
        }
        
        /* ============================================
           LOADING SCREEN
           ============================================ */
        #loadingScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity var(--transition-slow) var(--ease-out);
        }
        
        #loadingScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-title {
            font-family: 'Bangers', cursive;
            font-size: 56px;
            color: var(--color-primary);
            text-shadow: 
                4px 4px 0 var(--color-shadow),
                0 0 30px var(--color-primary);
            margin-bottom: var(--space-lg);
            letter-spacing: 3px;
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        .loading-subtitle {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: var(--color-text-light);
            text-shadow: 2px 2px 0 var(--color-shadow);
            margin-bottom: var(--space-xl);
            letter-spacing: 2px;
        }
        
        #loadingBar {
            width: 400px;
            max-width: 80%;
            height: 40px;
            background: rgba(0, 0, 0, 0.6);
            border: 3px solid var(--color-text-light);
            box-shadow: 
                0 0 0 6px var(--color-shadow),
                var(--shadow-lg);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        
        #loadingProgress {
            height: 100%;
            background: linear-gradient(90deg, var(--color-primary) 0%, var(--color-accent-gold) 100%);
            width: 0%;
            transition: width var(--transition-normal) var(--ease-out);
            box-shadow: 
                inset 0 2px 8px rgba(255, 255, 255, 0.3),
                0 0 20px var(--color-primary);
            position: relative;
        }
        
        #loadingProgress::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.3) 50%, 
                transparent 100%);
            animation: shimmer 1.5s infinite;
        }
        
        .loading-percentage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            color: var(--color-text-light);
            text-shadow: 
                1px 1px 0 var(--color-shadow),
                0 0 8px var(--color-shadow);
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 1;
        }
        
        /* ============================================
           GAME STATE MODALS (Victory/Game Over)
           ============================================ */
        .game-state-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-slow) var(--ease-out);
        }
        
        .game-state-modal.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .modal-content {
            text-align: center;
            transform: scale(0.8);
            transition: transform var(--transition-slow) var(--ease-bounce);
        }
        
        .game-state-modal.active .modal-content {
            transform: scale(1);
        }
        
        .modal-title {
            font-family: 'Bangers', cursive;
            font-size: 72px;
            margin-bottom: var(--space-md);
            letter-spacing: 4px;
            text-shadow: 
                5px 5px 0 var(--color-shadow),
                0 0 40px currentColor;
        }
        
        .modal-title.victory {
            color: var(--color-accent-gold);
            animation: pulse-glow 1.5s ease-in-out infinite;
        }
        
        .modal-title.defeat {
            color: var(--color-danger);
        }
        
        .modal-score {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            color: var(--color-text-light);
            text-shadow: 2px 2px 0 var(--color-shadow);
            margin-bottom: var(--space-lg);
            letter-spacing: 2px;
        }
        
        .modal-message {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: var(--space-xl);
            font-weight: 600;
        }
        
        .restart-button {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: var(--color-text-light);
            background: var(--color-primary);
            border: 4px solid var(--color-text-light);
            box-shadow: 
                0 0 0 2px var(--color-shadow),
                var(--shadow-lg);
            padding: var(--space-sm) var(--space-xl);
            border-radius: 4px;
            cursor: pointer;
            transition: all var(--transition-fast) var(--ease-out);
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 var(--color-shadow);
        }
        
        .restart-button:hover {
            background: var(--color-primary-hover);
            transform: translateY(-2px);
            box-shadow: 
                0 0 0 2px var(--color-shadow),
                var(--shadow-lg),
                var(--glow-primary);
        }
        
        .restart-button:active {
            transform: translateY(0);
        }
        
        /* ============================================
           KEYBOARD HINT (Desktop Only)
           ============================================ */
        .keyboard-hint {
            position: absolute;
            bottom: var(--space-sm);
            left: 50%;
            transform: translateX(-50%);
            background: var(--color-panel-bg);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            padding: var(--space-xs) var(--space-sm);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-normal);
        }
        
        .keyboard-hint.visible {
            opacity: 1;
        }
        
        /* ============================================
           UTILITY CLASSES
           ============================================ */
        .hidden { 
            display: none !important; 
        }
        
        /* ============================================
           ANIMATIONS
           ============================================ */
        @keyframes pulse-danger {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        @keyframes pulse-glow {
            0%, 100% { 
                text-shadow: 
                    4px 4px 0 var(--color-shadow),
                    0 0 30px currentColor;
            }
            50% { 
                text-shadow: 
                    4px 4px 0 var(--color-shadow),
                    0 0 50px currentColor;
            }
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        /* ============================================
           REDUCED MOTION PREFERENCES
           ============================================ */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;

            lastFpsReportTime = currentTime;
        }
        const trackFps = (currentTime) =&gt; {
            const dt = currentTime - lastFpsUpdateTime;
            lastFpsUpdateTime = currentTime;
            // Only track FPS in play mode and after initial delay
            const shouldTrack = currentMode === 'play' &amp;&amp;
                gameLoadStartTime !== null &amp;&amp;
                currentTime - gameLoadStartTime &gt;= FPS_INITIAL_DELAY;
            if (shouldTrack) {
                const frameTimeStats = frameTimeUpdate(dt);
                // Report FPS at intervals
                const timeSinceLastReport = currentTime - lastFpsReportTime;
                if (shouldTrack &amp;&amp; timeSinceLastReport &gt;= FPS_REPORT_INTERVAL) {
                    // Send FPS to parent
                    const fps = 1000 / frameTimeStats.mean;
                    // Delta method: σ_FPS ≈ |d(FPS)/d(T)| × σ_T = fps²/1000 × σ_T
                    const fpsStd = fps * fps * frameTimeStats.stdDev / 1000;
                    window.parent.postMessage({
                        type: 'GAME_FPS_UPDATE',
                        fps: fps.toFixed(0),
                        fpsStd: fpsStd.toFixed(2),
                        fpsSamples: frameTimeStats.n,
                        timestamp: currentTime,
                    }, '*');
                    // Reset counters
                    resetFpsTracking(currentTime);
                }
            }
            else {
                lastFpsReportTime = currentTime;
            }
            requestAnimationFrame(trackFps);
        };
        // reset fps counting when we return from focus/visibility change:
        window.addEventListener('focus', () =&gt; {
            resetFpsTracking(performance.now());
        });
        document.addEventListener('visibilitychange', () =&gt; {
            if (document.visibilityState === 'visible') {
                resetFpsTracking(performance.now());
            }
        });
        // Start FPS tracking
        requestAnimationFrame(trackFps);
        // The internal message listener that drives the game.
        window.addEventListener('message', async (event) =&gt; {
            if (!event.data || !event.data.type)
                return;
            const message = event.data;
            let ackMessage;
            try {
                switch (message.type) {
                    case 'PREPARE_FOR_RELOAD': {
                        // Flush any pending commits before switching modes/reloading
                        flushPendingCommits();
                        break;
                    }
                    case 'RUN_WITH_CONFIG': {
                        // Clear callbacks when reloading
                        callbackManager.clear();
                        const { gameConfig, mode, gameMetadata: metadata, hideClickToPlayOverlay, runId, } = message;
                        // Store game metadata for overlay and leaderboard
                        gameMetadata = metadata || null;
                        // Capture game ID for asset download tracking
                        currentGameId = metadata?.gameId ?? null;
                        // Update current mode
                        currentMode = mode || 'play';
                        // Set game load start time for FPS tracking (only in play mode)
                        if (currentMode === 'play') {
                            gameLoadStartTime = performance.now();
                        }
                        else {
                            gameLoadStartTime = null;
                        }
                        // Create proxied config for automatic change detection
                        window.gameConfig =
                            createProxiedConfig(gameConfig);
                        window.mode = mode;
                        // Send initial state if in edit mode (live update only, no commit)
                        if (currentMode === 'edit' &amp;&amp; gameConfig) {
                            // Send live update immediately to sync UI
                            // Use sendLiveUpdate which handles serialization
                            sendLiveUpdate();
                            // DO NOT send commit - the parent already has the committed state
                            // This prevents duplicate commits during undo/redo operations
                        }
                        // Check if run function exists
                        // eslint-disable-next-line @typescript-eslint/no-explicit-any
                        const windowWithRun = window;
                        // Function to actually run the game
                        const executeRun = async () =&gt; {
                            if (typeof windowWithRun.run === 'function') {
                                try {
                                    // IMPORTANT: run() only takes mode. window.gameConfig is already set up!
                                    // IMPORTANT: we await run() to ensure that all initial assets have been loaded
                                    // and that setup is complete
                                    await windowWithRun.run(mode || 'play');
                                    window.parent.postMessage({
                                        type: 'RUN_COMPLETED',
                                        messageId: message.messageId,
                                        runId: runId,
                                    }, '*');
                                }
                                catch (error) {
                                    // Send GAME_ERROR to parent for proper error tracking
                                    const errorMessage = error instanceof Error ? error.message : String(error);
                                    const errorStack = error instanceof Error ? error.stack : undefined;
                                    window.parent.postMessage({
                                        type: 'GAME_ERROR',
                                        error: {
                                            message: `Game run() function threw an error: ${errorMessage}`,
                                            stack: errorStack,
                                            timestamp: Date.now(),
                                        },
                                    }, '*');
                                }
                            }
                            else {
                                _lib.log(&quot;ERROR: 'run(mode)' function is not defined by the game script.&quot;);
                                // Send analytics for missing run function
                                window.parent.postMessage({
                                    type: 'ANALYTICS_MESSAGE',
                                    eventName: 'run_function_missing',
                                    eventData: {
                                        gameId: gameMetadata?.gameId || '',
                                        mode: mode,
                                    },
                                }, '*');
                                _lib.log(`Available global functions: ${Object.keys(window)
                                    .filter((k) =&gt; typeof window[k] === 'function' &amp;&amp; !k.startsWith('__'))
                                    .join(', ')}`);
                                // Try to find any script tags in the document
                                const scripts = Array.from(document.getElementsByTagName('script'));
                                _lib.log(`Found ${scripts.length} script tags in the document`);
                                scripts.forEach((script, index) =&gt; {
                                    _lib.log(`Script ${index}: ${script.src || 'inline'}, data-astrocade: ${script.getAttribute('data-astrocade-injected') || 'none'}`);
                                });
                            }
                        };
                        // Show click-to-play overlay in play mode unless explicitly hidden
                        if (mode === 'play' &amp;&amp; !hideClickToPlayOverlay) {
                            // Use requestAnimationFrame to ensure DOM has been painted
                            requestAnimationFrame(() =&gt; {
                                // Double RAF to ensure layout is complete
                                requestAnimationFrame(() =&gt; {
                                    createClickToPlayOverlay(executeRun);
                                });
                            });
                        }
                        else {
                            // No overlay, run immediately
                            await executeRun();
                        }
                        break;
                    }
                    case 'INVOKE_CALLBACK': {
                        callbackManager.invoke(message.callbackId, ...(message.args || []));
                        break;
                    }
                    default:
                        // Response messages (e.g. LLM_RESPONSE, LEADERBOARD_RESPONSE) are handled
                        // by sendMessageToParentWithResponse listeners, not this switch
                        if (!message.type.endsWith('_RESPONSE')) {
                            _lib.log(`[lib.ts] Unknown message type: ${message}`);
                        }
                }
                // If message processing succeeded, prepare success ack
                if (message.messageId) {
                    ackMessage = {
                        type: 'IFRAME_ACK',
                        messageId: message.messageId,
                        status: 'success',
                    };
                }
            }
            catch (error) {
                // If message processing failed, prepare error ack
                if (message.messageId) {
                    ackMessage = {
                        type: 'IFRAME_ACK',
                        messageId: message.messageId,
                        status: 'error',
                        error: {
                            message: error instanceof Error ? error.message : 'Unknown error',
                            stack: error instanceof Error ? error.stack : undefined,
                        },
                    };
                }
                // Also log the error
                _lib.log(`[lib.ts] Error processing message ${message.type}: ${error}`);
            }
            // Send acknowledgment if messageId was provided
            if (ackMessage) {
                window.parent.postMessage(ackMessage, '*');
            }
        });
        return _lib;
    })();
    // We attach it to the window so it's globally accessible in the iframe's script.
    window.lib = lib;

            updateHealth(current, max) {

                this.elements.healthBarFill.style.width = percentage + '%';
                this.elements.healthText.textContent = `${Math.ceil(current)}/${max}`;

                    this.elements.healthBarFill.classList.remove('low');

            updateScore(score) {

            showCombo(combo) {

            ];

            const promises = assetIds.map(id =&gt; {
                return new Promise((resolve) =&gt; {
                    const assetInfo = lib.getAsset(id);
                    if (!assetInfo) {
                        lib.log(`Asset ${id} not found`);
                        resolve();
                        return;
                    }
                    
                    if (assetInfo.type === 'image') {
                        const img = new Image();
                        img.onload = () =&gt; {
                            assets.images[id] = {
                                img: img,
                                aspectRatio: assetInfo.aspect_ratio || [1, 1]
                            };
                            loaded++;
                            UIController.updateLoadingProgress((loaded / assetIds.length) * 100);
                            resolve();
                        };
                        img.onerror = () =&gt; {
                            lib.log(`Failed to load image: ${id}`);
                            loaded++;
                            UIController.updateLoadingProgress((loaded / assetIds.length) * 100);
                            resolve();
                        };
                        img.src = assetInfo.url;
                    } else if (assetInfo.type === 'audio') {
                        fetch(assetInfo.url)
                            .then(response =&gt; response.arrayBuffer())
                            .then(arrayBuffer =&gt; assets.audioContext.decodeAudioData(arrayBuffer))
                            .then(audioBuffer =&gt; {
                                assets.audioBuffers[id] = audioBuffer;
                                loaded++;
                                UIController.updateLoadingProgress((loaded / assetIds.length) * 100);
                                resolve();
                            })
                            .catch(err =&gt; {
                                lib.log(`Failed to load audio: ${id} - ${err}`);
                                loaded++;
                                UIController.updateLoadingProgress((loaded / assetIds.length) * 100);
                                resolve();
                            });
                    }
                });
            });
            
            await Promise.all(promises);
            UIController.hideLoading();
        }
        
        // Audio playback
        function playSound(soundId, volume = 1.0) {
            if (!assets.audioBuffers[soundId]) return;
            
            const source = assets.audioContext.createBufferSource();
            const gainNode = assets.audioContext.createGain();
            
            source.buffer = assets.audioBuffers[soundId];
            gainNode.gain.value = volume;
            
            source.connect(gainNode);
            gainNode.connect(assets.audioContext.destination);
            
            source.start(0);
        }
        
        let currentMusic = null;
        function playMusic(musicId, loop = true) {
            if (currentMusic) {

            }
            
            if (!assets.audioBuffers[musicId]) return;
            
            const source = assets.audioContext.createBufferSource();
            const gainNode = assets.audioContext.createGain();
            
            source.buffer = assets.audioBuffers[musicId];
            source.loop = loop;
            gainNode.gain.value = 0.3;
            
            source.connect(gainNode);
            gainNode.connect(assets.audioContext.destination);
            
            source.start(0);
            currentMusic = source;

                            { id: 'wave2', position: 0.4, enemies: [{ type: 'bruiser', health: 80 }, { type: 'bruiser', health: 80 }, { type: 'bruiser', health: 80 }, { type: 'bruiser', health: 80 }] },
                            { id: 'wave3', position: 0.6, enemies: [{ type: 'bruiser', health: 80 }, { type: 'bruiser', health: 80 }, { type: 'bruiser', health: 80 }, { type: 'bruiser', health: 80 }] },
                            { id: 'wave4', position: 0.8, enemies: [{ type: 'bruiser', health: 80 }, { type: 'bruiser', health: 80 }, { type: 'bruiser', health: 80 }, { type: 'bruiser', health: 80 }, { type: 'bruiser', health: 80 }] }
                        ]
                    }
                ],
                player: {

                }
            };
        }
        
        // Initialize game config
        if (!window.gameConfig) {
            window.gameConfig = getDefaultConfig();
        }
        
        // Player class
        class Player {
            constructor() {
                this.x = 200;
                this.y = PLAYER_Y;
                this.width = 120;
                this.height = 150;
                this.vx = 0;
                this.health = window.gameConfig.player.startHealth;
                this.maxHealth = window.gameConfig.player.startHealth;
                this.facing = 1; // 1 = right, -1 = left
                this.state = 'idle'; // idle, walk, punch, kick, hurt
                this.animTimer = 0;
                this.animFrame = 0;
                this.attackCooldown = 0;
                this.hurtTimer = 0;
                this.invulnerable = false;
                this.invulnerableTimer = 0;
                
                // Animation configuration
                this.animConfig = {
                    idle: { frames: 4, speed: 0.15 },
                    walk: { frames: 6, speed: 0.12 },
                    punch: { frames: 5, speed: 0.1 },
                    kick: { frames: 6, speed: 0.11 },
                    hurt: { frames: 3, speed: 0.1 }
                };
            }
            
            update(dt) {
                // Cap delta time
                dt = Math.min(dt, 0.11);
                
                // Update timers
                this.animTimer += dt;
                if (this.attackCooldown &gt; 0) this.attackCooldown -= dt;
                if (this.hurtTimer &gt; 0) this.hurtTimer -= dt;
                if (this.invulnerableTimer &gt; 0) {
                    this.invulnerableTimer -= dt;
                    if (this.invulnerableTimer &lt;= 0) {
                        this.invulnerable = false;
                    }
                }
                
                // Update animation frame
                this.updateAnimationFrame();
                
                // Update UI
                UIController.updateHealth(this.health, this.maxHealth);
                
                // Handle hurt state
                if (this.state === 'hurt') {
                    if (this.hurtTimer &lt;= 0) {
                        this.state = 'idle';
                        this.animTimer = 0;
                        this.animFrame = 0;
                    }
                    return;
                }
                
                // Handle attack animation completion - return to idle pose
                if (this.state === 'punch' || this.state === 'kick') {
                    const attackConfig = this.animConfig[this.state];
                    if (this.animFrame &gt;= attackConfig.frames - 1) {
                        // Attack animation is complete, return to idle
                        this.state = 'idle';
                        this.animTimer = 0;
                        this.animFrame = 0;
                    }
                }
                
                // Movement (allowed even during attacks)
                this.vx = 0;
                if (input.left) {
                    this.vx = -window.gameConfig.player.moveSpeed;
                    this.facing = -1;
                    // Only change state to walk if not attacking
                    if (this.state !== 'punch' &amp;&amp; this.state !== 'kick') {
                        this.state = 'walk';
                    }
                } else if (input.right) {
                    this.vx = window.gameConfig.player.moveSpeed;
                    this.facing = 1;
                    // Only change state to walk if not attacking
                    if (this.state !== 'punch' &amp;&amp; this.state !== 'kick') {
                        this.state = 'walk';
                    }
                } else {
                    // Only change state to idle if not attacking
                    if (this.state !== 'punch' &amp;&amp; this.state !== 'kick') {
                        this.state = 'idle';
                    }
                }
                
                this.x += this.vx;
                
                // Clamp to level bounds
                this.x = Math.max(60, Math.min(LEVEL_LENGTH - 60, this.x));
                
                // Attack input
                if (input.punchPressed &amp;&amp; this.attackCooldown &lt;= 0) {
                    this.attack('punch');
                    input.punchPressed = false;
                } else if (input.kickPressed &amp;&amp; this.attackCooldown &lt;= 0) {
                    this.attack('kick');
                    input.kickPressed = false;
                }
            }
            
            updateAnimationFrame() {
                const config = this.animConfig[this.state];
                if (!config) return;
                
                // Advance animation frame
                if (this.animTimer &gt;= config.speed) {
                    this.animFrame++;
                    this.animTimer = 0;
                    
                    // Loop animation
                    if (this.animFrame &gt;= config.frames) {
                        this.animFrame = 0;
                    }
                }
            }
            
            attack(type) {
                this.state = type;
                this.animTimer = 0;
                this.animFrame = 0;
                this.attackCooldown = 0.5;
                
                // Check for hits
                const attackRange = type === 'punch' ? 80 : 100;
                const damage = type === 'punch' ? 
                    window.gameConfig.player.punchDamage : 
                    window.gameConfig.player.kickDamage;
                
                const attackX = this.x + (this.facing * attackRange);
                
                // Check enemies
                gameState.enemies.forEach(enemy =&gt; {
                    if (enemy.state === 'defeated') return;
                    
                    const dist = Math.abs(enemy.x - attackX);
                    if (dist &lt; 60 &amp;&amp; Math.abs(enemy.y - this.y) &lt; 50) {
                        enemy.takeDamage(damage);
                        
                        // Combo system
                        if (gameState.lastAttackType &amp;&amp; gameState.lastAttackType !== type) {
                            gameState.combo++;
                        } else {
                            gameState.combo = 1;
                        }
                        gameState.lastAttackType = type;
                        
                        // Score
                        gameState.score += 10 * gameState.combo;
                        UIController.updateScore(gameState.score);
                        UIController.showCombo(gameState.combo);
                        
                        // Sound and effect
                        playSound(type === 'punch' ? 'sfx_punch_hit' : 'sfx_kick_hit');
                        createImpactEffect(enemy.x, enemy.y - 50, type);
                    }
                });
                
                // Check boss
                if (gameState.boss &amp;&amp; gameState.boss.state !== 'defeated') {
                    const dist = Math.abs(gameState.boss.x - attackX);
                    if (dist &lt; 100 &amp;&amp; Math.abs(gameState.boss.y - this.y) &lt; 50) {
                        gameState.boss.takeDamage(damage);
                        
                        // Combo
                        if (gameState.lastAttackType &amp;&amp; gameState.lastAttackType !== type) {
                            gameState.combo++;
                        } else {
                            gameState.combo = 1;
                        }
                        gameState.lastAttackType = type;
                        
                        gameState.score += 20 * gameState.combo;
                        UIController.updateScore(gameState.score);
                        UIController.showCombo(gameState.combo);
                        
                        playSound('sfx_boss_hit');
                        createImpactEffect(gameState.boss.x, gameState.boss.y - 100, type);
                    }
                }
            }
            
            takeDamage(damage) {
                if (this.invulnerable) return;
                
                this.health -= damage;
                this.state = 'hurt';
                this.hurtTimer = 0.5;
                this.invulnerable = true;
                this.invulnerableTimer = 1.0;
                
                UIController.updateHealth(this.health, this.maxHealth);
                playSound('sfx_player_hurt');
                
                if (this.health &lt;= 0) {
                    this.health = 0;
                    gameState.gamePhase = 'gameover';
                    playSound('sfx_game_over');
                    UIController.showGameOver(gameState.score);
                }
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x - gameState.camera.x, this.y);
                
                // Flip for facing direction
                if (this.facing === -1) {
                    ctx.scale(-1, 1);
                }
                
                // Invulnerability flicker
                if (this.invulnerable &amp;&amp; Math.floor(this.animTimer * 10) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }
                
                // Draw sprite based on state
                let spriteId = 'highpower_idle';
                if (this.state === 'walk') spriteId = 'highpower_walk';
                else if (this.state === 'punch') spriteId = 'highpower_punch';
                else if (this.state === 'kick') spriteId = 'highpower_kick';
                else if (this.state === 'hurt') spriteId = 'highpower_hurt';
                
                const asset = assets.images[spriteId];
                if (asset) {
                    const aspectRatio = asset.aspectRatio[0] / asset.aspectRatio[1];
                    const drawHeight = this.height;
                    const drawWidth = drawHeight * aspectRatio;
                    
                    // Apply animation frame offset for subtle animation
                    const frameOffset = this.animFrame * 1.5;
                    
                    ctx.drawImage(asset.img, -drawWidth/2 + frameOffset, -drawHeight, drawWidth, drawHeight);
                }
                
                ctx.restore();
            }
        }
        
        // Enemy class
        class Enemy {
            constructor(x, type, health) {
                this.x = x;
                this.y = PLAYER_Y;
                this.type = type;
                this.width = 100;
                this.height = 120;
                this.health = health;
                this.maxHealth = health;
                this.state = 'idle'; // idle, walk, attack, hurt, defeated
                this.animTimer = 0;
                this.animFrame = 0;
                this.attackCooldown = 0;
                this.hurtTimer = 0;
                this.aiTimer = 0;
                this.facing = 1;
                this.vx = 0;
                
                // Animation configuration
                this.animConfig = {
                    idle: { frames: 4, speed: 0.15 },
                    walk: { frames: 6, speed: 0.12 },
                    attack: { frames: 5, speed: 0.13 },
                    hurt: { frames: 3, speed: 0.1 }
                };
            }
            
            update(dt) {
                dt = Math.min(dt, 0.11);
                
                this.animTimer += dt;
                this.aiTimer += dt;
                if (this.attackCooldown &gt; 0) this.attackCooldown -= dt;
                if (this.hurtTimer &gt; 0) this.hurtTimer -= dt;
                
                if (this.state === 'defeated') return;
                
                // Update animation frame
                this.updateAnimationFrame();
                
                if (this.state === 'hurt') {
                    if (this.hurtTimer &lt;= 0) {
                        this.state = 'idle';
                        this.animTimer = 0;
                        this.animFrame = 0;
                    }
                    return;
                }
                
                if (this.state === 'attack') {
                    const attackConfig = this.animConfig.attack;
                    if (this.animFrame &gt;= attackConfig.frames - 1 &amp;&amp; this.animTimer &gt; attackConfig.speed) {
                        this.state = 'idle';
                        this.animTimer = 0;
                        this.animFrame = 0;
                    }
                    return;
                }
                
                // AI behavior
                if (this.aiTimer &gt; 0.5) {
                    this.aiTimer = 0;
                    
                    const distToPlayer = gameState.player.x - this.x;
                    this.facing = distToPlayer &gt; 0 ? 1 : -1;
                    
                    if (Math.abs(distToPlayer) &lt; 70) {
                        // Attack range
                        if (this.attackCooldown &lt;= 0) {
                            this.state = 'attack';
                            this.animTimer = 0;
                            this.animFrame = 0;
                            this.attackCooldown = 2.0;
                            
                            // Deal damage to player at mid-animation
                            const attackConfig = this.animConfig.attack;
                            const midFrame = Math.floor(attackConfig.frames / 2);
                            setTimeout(() =&gt; {
                                if (this.state === 'attack' &amp;&amp; this.animFrame &gt;= midFrame &amp;&amp; Math.abs(gameState.player.x - this.x) &lt; 70) {
                                    gameState.player.takeDamage(ENEMY_TYPES[this.type].damage);
                                }
                            }, (attackConfig.speed * midFrame * 1000));
                        }
                        this.vx = 0;
                    } else {
                        // Move toward player
                        this.state = 'walk';
                        this.vx = this.facing * ENEMY_TYPES[this.type].speed;
                    }
                }
                
                this.x += this.vx;
            }
            
            updateAnimationFrame() {
                const config = this.animConfig[this.state];
                if (!config) return;
                
                // Advance animation frame
                if (this.animTimer &gt;= config.speed) {
                    this.animFrame++;
                    this.animTimer = 0;
                    
                    // Loop animation
                    if (this.animFrame &gt;= config.frames) {
                        this.animFrame = 0;
                    }
                }
            }
            
            takeDamage(damage) {
                if (this.state === 'defeated') return;
                
                this.health -= damage;
                this.state = 'hurt';
                this.hurtTimer = 0.4;
                this.animTimer = 0;
                this.animFrame = 0;
                
                // Knockback
                this.x -= this.facing * 20;
                
                playSound('sfx_enemy_hurt');
                
                if (this.health &lt;= 0) {
                    this.health = 0;
                    this.state = 'defeated';
                    playSound('sfx_enemy_defeat');
                    gameState.score += 50;
                    UIController.updateScore(gameState.score);
                    
                    // Chance to drop health
                    const dropChance = window.gameConfig.stage.healthPickupFrequency === 'common' ? 0.4 :
                                      window.gameConfig.stage.healthPickupFrequency === 'rare' ? 0.15 : 0;
                    if (Math.random() &lt; dropChance) {
                        gameState.pickups.push({
                            x: this.x,
                            y: this.y,
                            type: 'health',
                            animTimer: 0
                        });
                    }
                }
            }
            
            draw() {
                if (this.state === 'defeated') return;
                
                ctx.save();
                ctx.translate(this.x - gameState.camera.x, this.y);
                
                // Enemies face left (toward player typically)
                if (this.facing === 1) {
                    ctx.scale(-1, 1);
                }
                
                let spriteId = 'thug_basic_idle';
                if (this.state === 'walk') spriteId = 'thug_basic_walk';
                else if (this.state === 'attack') spriteId = 'thug_basic_attack';
                else if (this.state === 'hurt') spriteId = 'thug_basic_hurt';
                
                const asset = assets.images[spriteId];
                if (asset) {
                    const aspectRatio = asset.aspectRatio[0] / asset.aspectRatio[1];
                    const drawHeight = this.height;
                    const drawWidth = drawHeight * aspectRatio;
                    
                    // Apply animation frame offset for subtle animation
                    const frameOffset = this.animFrame * 1.5;
                    
                    ctx.drawImage(asset.img, -drawWidth/2 + frameOffset, -drawHeight, drawWidth, drawHeight);
                }
                
                // Health bar
                ctx.scale(this.facing === 1 ? -1 : 1, 1);
                const barWidth = 60;
                const barHeight = 6;
                ctx.fillStyle = '#333';
                ctx.fillRect(-barWidth/2, -this.height - 20, barWidth, barHeight);
                ctx.fillStyle = '#f44';
                ctx.fillRect(-barWidth/2, -this.height - 20, barWidth * (this.health / this.maxHealth), barHeight);
                
                ctx.restore();
            }
        }
        
        // Boss class
        class Boss {
            constructor(bossConfig) {
                this.x = LEVEL_LENGTH - 300;
                this.y = PLAYER_Y;
                this.width = 180;
                this.height = 220;
                this.health = bossConfig.health;
                this.maxHealth = bossConfig.health;
                this.attackSpeed = bossConfig.attackSpeed || 1.0;
                this.damage = bossConfig.damage || 15;
                this.state = 'idle'; // idle, attack, hurt, defeated
                this.animTimer = 0;
                this.animFrame = 0;
                this.attackCooldown = 0;
                this.hurtTimer = 0;
                this.aiTimer = 0;
                this.facing = -1;
                this.attackPattern = 0;
                
                // Animation configuration per boss
                this.animConfig = this.getAnimConfig();
            }
            
            getAnimConfig() {
                // Different animation speeds and frame counts for each boss
                const configs = {
                    0: { // Street Thug Boss
                        idle: { frames: 4, speed: 0.15 },
                        attack: { frames: 6, speed: 0.12 },
                        hurt: { frames: 3, speed: 0.1 }
                    },
                    1: { // Alley Enforcer
                        idle: { frames: 4, speed: 0.12 },
                        attack: { frames: 7, speed: 0.11 },
                        hurt: { frames: 3, speed: 0.1 }
                    },
                    2: { // Industrial Overlord
                        idle: { frames: 3, speed: 0.18 },
                        attack: { frames: 8, speed: 0.1 },
                        hurt: { frames: 4, speed: 0.12 }
                    },
                    3: { // Crime Lord
                        idle: { frames: 5, speed: 0.14 },
                        attack: { frames: 9, speed: 0.09 },
                        hurt: { frames: 4, speed: 0.11 }
                    }
                };
                
                return configs[gameState.currentPhaseIndex] || configs[0];
            }
            
            update(dt) {
                dt = Math.min(dt, 0.11);
                
                this.animTimer += dt;
                this.aiTimer += dt;
                if (this.attackCooldown &gt; 0) this.attackCooldown -= dt;
                if (this.hurtTimer &gt; 0) this.hurtTimer -= dt;
                
                if (this.state === 'defeated') return;
                
                // Update animation frame based on state
                this.updateAnimationFrame();
                
                if (this.state === 'hurt') {
                    if (this.hurtTimer &lt;= 0) {
                        this.state = 'idle';
                        this.animTimer = 0;
                        this.animFrame = 0;
                    }
                    return;
                }
                
                if (this.state === 'attack') {
                    // Check if attack animation is complete
                    const attackConfig = this.animConfig.attack;
                    if (this.animFrame &gt;= attackConfig.frames - 1 &amp;&amp; this.animTimer &gt; attackConfig.speed) {
                        this.state = 'idle';
                        this.animTimer = 0;
                        this.animFrame = 0;
                    }
                    return;
                }
                
                // Boss AI
                if (this.aiTimer &gt; 1.0 / this.attackSpeed) {
                    this.aiTimer = 0;
                    
                    const distToPlayer = gameState.player.x - this.x;
                    this.facing = distToPlayer &gt; 0 ? 1 : -1;
                    
                    if (Math.abs(distToPlayer) &lt; 150 &amp;&amp; this.attackCooldown &lt;= 0) {
                        this.state = 'attack';
                        this.animTimer = 0;
                        this.animFrame = 0;
                        this.attackCooldown = 2.5;
                        
                        playSound('sfx_boss_attack');
                        
                        // Deal damage at mid-animation
                        const attackConfig = this.animConfig.attack;
                        const midFrame = Math.floor(attackConfig.frames / 2);
                        setTimeout(() =&gt; {
                            if (this.state === 'attack' &amp;&amp; this.animFrame &gt;= midFrame &amp;&amp; Math.abs(gameState.player.x - this.x) &lt; 150) {
                                gameState.player.takeDamage(this.damage);
                            }
                        }, (attackConfig.speed * midFrame * 1000));
                    }
                }
            }
            
            updateAnimationFrame() {
                const config = this.animConfig[this.state];
                if (!config) return;
                
                // Advance animation frame
                if (this.animTimer &gt;= config.speed) {
                    this.animFrame++;
                    this.animTimer = 0;
                    
                    // Loop animation
                    if (this.animFrame &gt;= config.frames) {
                        this.animFrame = 0;
                    }
                }
            }
            
            takeDamage(damage) {
                if (this.state === 'defeated') return;
                
                this.health -= damage;
                this.state = 'hurt';
                this.hurtTimer = 0.3;
                this.animTimer = 0;
                this.animFrame = 0;
                
                if (this.health &lt;= 0) {
                    this.health = 0;
                    this.state = 'defeated';
                    
                    // Check if this is the final boss
                    if (gameState.currentPhaseIndex &gt;= window.gameConfig.phases.length - 1) {
                        gameState.gamePhase = 'ending_cutscene';
                    } else {
                        gameState.gamePhase = 'victory_pose';
                    }
                    
                    gameState.cutsceneTimer = 0;
                    playSound('sfx_victory');
                    gameState.score += 1000;
                    UIController.updateScore(gameState.score);
                }
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x - gameState.camera.x, this.y);
                
                if (this.facing === 1) {
                    ctx.scale(-1, 1);
                }
                
                // Select sprite based on phase and state
                let spriteId = 'boss_villain_idle';
                
                // Map phase index to boss sprite
                const bossSprites = {
                    0: 'boss_villain', // Phase 1: Street Thug Boss (generic)
                    1: 'boss_alley_enforcer', // Phase 2: Alley Enforcer
                    2: 'boss_industrial_overlord', // Phase 3: Industrial Overlord
                    3: 'boss_crime_lord' // Phase 4: Crime Lord
                };
                
                const baseSpriteId = bossSprites[gameState.currentPhaseIndex] || 'boss_villain';
                
                // Modify sprite ID based on state
                if (this.state === 'attack') {
                    spriteId = baseSpriteId + '_attack';
                } else if (this.state === 'hurt') {
                    spriteId = baseSpriteId + '_hurt';
                } else {
                    spriteId = baseSpriteId + '_idle';
                }
                
                // Try to get the specific sprite, fallback to generic boss
                let asset = assets.images[spriteId];
                if (!asset) {
                    const fallbackId = this.state === 'attack' ? 'boss_villain_attack' :

                if (asset) {

                    const drawHeight = this.height;

                ctx.restore();

        // Impact effect
        const impactEffects = [];
        function createImpactEffect(x, y, type) {
            impactEffects.push({
                x: x,
                y: y,
                type: type,
                timer: 0,
                duration: 0.2
            });
        }
        
        function updateImpactEffects(dt) {
            for (let i = impactEffects.length - 1; i &gt;= 0; i--) {
                impactEffects[i].timer += dt;
                if (impactEffects[i].timer &gt;= impactEffects[i].duration) {
                    impactEffects.splice(i, 1);
                }
            }
        }
        
        function drawImpactEffects() {
            impactEffects.forEach(effect =&gt; {
                const spriteId = effect.type === 'punch' ? 'impact_effect_punch' : 'impact_effect_kick';
                const asset = assets.images[spriteId];
                if (asset) {
                    const size = effect.type === 'punch' ? 70 : 90;
                    const alpha = 1 - (effect.timer / effect.duration);
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.drawImage(asset.img, 
                        effect.x - gameState.camera.x - size/2, 
                        effect.y - size/2, 
                        size, size);
                    ctx.restore();
                }
            });
        }
        
        // Wave spawning
        function spawnWave(waveConfig) {
            const baseX = gameState.player.x + 400;
            waveConfig.enemies.forEach((enemyConfig, index) =&gt; {
                const enemy = new Enemy(
                    baseX + (index * 100),
                    enemyConfig.type,
                    enemyConfig.health
                );
                gameState.enemies.push(enemy);
            });
        }
        
        // Get current phase config
        function getCurrentPhase() {
            return window.gameConfig.phases[gameState.currentPhaseIndex];
        }
        
        // Update pickups
        function updatePickups(dt) {
            gameState.pickups.forEach((pickup, index) =&gt; {
                pickup.animTimer += dt;
                
                // Check collection
                const dist = Math.abs(pickup.x - gameState.player.x);
                if (dist &lt; 50 &amp;&amp; Math.abs(pickup.y - gameState.player.y) &lt; 50) {
                    if (pickup.type === 'health') {
                        gameState.player.health = Math.min(
                            gameState.player.maxHealth,
                            gameState.player.health + 30
                        );
                        UIController.updateHealth(gameState.player.health, gameState.player.maxHealth);
                        playSound('sfx_health_pickup');
                    }
                    gameState.pickups.splice(index, 1);
                }
            });
        }
        
        function drawPickups() {
            gameState.pickups.forEach(pickup =&gt; {
                const asset = assets.images['health_pickup'];
                if (asset) {
                    const size = 40;
                    const bobOffset = Math.sin(pickup.animTimer * 3) * 5;
                    ctx.drawImage(asset.img,
                        pickup.x - gameState.camera.x - size/2,
                        pickup.y - size/2 + bobOffset,
                        size, size);
                }
            });

        // Camera update
        function updateCamera() {
            // Follow player
            gameState.camera.targetX = gameState.player.x - GAME_WIDTH / 2;
            
            // Clamp to level bounds
            gameState.camera.targetX = Math.max(0, Math.min(LEVEL_LENGTH - GAME_WIDTH, gameState.camera.targetX));
            
            // Smooth follow
            gameState.camera.x += (gameState.camera.targetX - gameState.camera.x) * 0.1;
        }

        // Draw cutscene
        function drawCutscene() {
            // Background
            const bgAsset = assets.images['background_city_street'];
            if (bgAsset) {
                ctx.drawImage(bgAsset.img, 0, 0, GAME_WIDTH, 400);
            } else {

        // Draw background
        function drawBackground() {
            const themeMap = {
                'street': 'background_city_street',
                'alley': 'background_city_alley',
                'industrial': 'background_industrial',
                'crime_lair': 'background_crime_lords_lair'
            };
            
            const currentPhase = getCurrentPhase();
            const themeName = currentPhase ? currentPhase.backgroundTheme : 'street';
            const bgId = themeMap[themeName] || 'background_city_street';
            const bgAsset = assets.images[bgId];
            
            if (bgAsset) {
                // Parallax scrolling - background moves slower than camera
                const parallaxFactor = 0.5;
                const bgX = -(gameState.camera.x * parallaxFactor) % GAME_WIDTH;
                
                // Draw background extended downward to fill more of screen
                const bgHeight = 600; // Extended from 400 to 600
                ctx.drawImage(bgAsset.img, bgX, 0, GAME_WIDTH, bgHeight);
                ctx.drawImage(bgAsset.img, bgX + GAME_WIDTH, 0, GAME_WIDTH, bgHeight);
            } else {
                // Fallback gradient
                const gradient = ctx.createLinearGradient(0, 0, 0, 600);
                gradient.addColorStop(0, '#1a1a2e');
                gradient.addColorStop(1, '#16213e');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, GAME_WIDTH, 600);
            }
        }
        
        // Draw ground
        function drawGround() {
            const groundAsset = assets.images['ground_street'];
            if (groundAsset) {
                const tileWidth = 200;
                const tileHeight = 200;
                const startTile = Math.floor(gameState.camera.x / tileWidth);
                const endTile = Math.ceil((gameState.camera.x + GAME_WIDTH) / tileWidth);
                
                // Fill from y=600 (below extended background) to bottom of screen
                for (let row = 3; row &lt;= 6; row++) {
                    for (let i = startTile; i &lt;= endTile; i++) {
                        const x = (i * tileWidth) - gameState.camera.x;
                        const y = row * tileHeight;
                        ctx.drawImage(groundAsset.img, x, y, tileWidth, tileHeight);
                    }
                }
            } else {
                // Fallback - fill entire lower area with street color
                ctx.fillStyle = '#444';
                ctx.fillRect(0, 600, GAME_WIDTH, GAME_HEIGHT - 600);
            }
        }

                ctx.font = 'bold 12px Inter';
                ctx.textAlign = 'center';
                ctx.fillText(wave.enemies.length.toString(), x, timelineY + timelineHeight/2 + 5);
