n- **Round Structure**: Best of 3 rounds creates natural tension and comeback opportunities\n- **Combo System**: Chaining attacks together deals increased damage and feels satisfying\n- **Special Meter**: Builds through combat, encouraging aggressive play to unlock ultimate moves\n- **Power-ups**: Random spawns create dynamic moments and strategic decisions\n- **Visual Feedback**: Screen shake, slow-motion on critical hits, blood effects, and arena damage make every impact feel powerful\n\n### Win/Loss Conditions\n- **Round Win**: Deplete opponent's health bar to zero\n- **Match Win**: Win 2 out of 3 rounds\n- **Victory Screen**: Displays winner with character-specific victory pose and quote\n\n### Replayability Factors\n- Two distinct characters with completely different playstyles\n- Mastery of combos and timing\n- Strategic use of ultimate abilities\n- Power-up management\n- Multiple AI difficulty levels for single-player\n- The visceral, satisfying combat with dramatic visual effects\n\n## Starting Scope\n\nFor the initial implementation, we'll focus on creating a polished, fully functional 1v1 fighting experience with the following features:\n\n**Must Have (First Iteration):**\n- Two playable characters: Baki Hanma and Miyamoto Musashi\n- Character selection screen\n- Single arena environment (underground fighting pit)\n- Complete combat system:\n  - Movement (left/right, jump)\n  - Light attacks\n  - Heavy attacks\n  - Blocking\n  - Special meter building\n  - Ultimate abilities (one per character)\n- Health bars and special meter UI\n- Best of 3 rounds structure\n- Basic combo system (3-hit chains)\n- 2-3 power-up types (health restore, speed boost)\n- Victory/defeat screens with character quotes\n- Single player vs AI (medium difficulty)\n- Core visual effects: screen shake, blood splatters, hit sparks\n- Background music and essential sound effects\n\n**Future Iterations:**\n- Additional difficulty levels (easy/hard AI)\n- Survival mode with waves of enemies\n- More power-up varieties (temporary weapons, invincibility)\n- Advanced combo system with longer chains\n- Slow-motion finishers\n- Dynamic arena destruction (cracks, fire)\n- Additional characters\n- Local multiplayer (2-player mode)\n- More arenas with different themes\n- Character-specific special moves beyond ultimates\n- Stamina system for special moves\n- Counter-attack mechanics\n- Tutorial mode\n\n## Game Perspective\n\n**Side-scrolling 2D fighting game perspective**\n\nThe game uses a classic 2D fighting game view where:\n- Both characters face each other on a horizontal plane\n- Camera is fixed, showing the full arena width\n- Characters are rendered in profile view (side-facing)\n- The arena has depth implied through background layers but gameplay is strictly 2D\n- All movement and combat occurs on a single horizontal axis with vertical jumping\n- This perspective is ideal for precise hitbox detection and traditional fighting game mechanics\n\n## Game World and Level Design\n\n### Arena Layout\nThe underground fighting arena is a single, contained battlefield designed for intense 1v1 combat:\n\n**Dimensions:**\n- Arena floor spans approximately 600 pixels wide\n- Characters can move freely left and right within this space\n- Vertical space allows for jumping (approximately 150 pixels jump height)\n- No platforms or elevation changes - pure ground-level combat\n\n**Visual Zones (Background Layers):**\n1. **Far Background**: Shadowy crowd silhouettes with animated cheering motions, creating depth\n2. **Mid Background**: Concrete walls with blood stains, cracks, and graffiti. Weapon racks mounted on walls (decorative)\n3. **Arena Floor**: Worn concrete with blood stains, scuff marks, and battle damage\n4. **Foreground Elements**: Dramatic spotlights casting dynamic shadows, occasional steam/smoke effects\n\n**Interactive Elements:**\n- Power-ups spawn at random positions on the arena floor (3 potential spawn points: left, center, right)\n- No environmental hazards or obstacles - focus is purely on character combat\n- Arena boundaries prevent characters from moving off-screen\n\n**Atmosphere:**\n- Dark, gritty underground setting\n- High contrast lighting from spotlights\n- Particle effects: dust, blood splatters, impact sparks\n- Background crowd reacts to big hits with increased animation intensity\n\n## Edit Mode Design\n\nEdit mode allows players to customize their fighting experience and arena aesthetics while maintaining balanced gameplay.\n\n### Customizable Properties\n\n**Character Customization:**\n- **Character Colors**: Adjust primary and secondary colors for both Baki and Musashi\n  - Baki: Skin tone, shorts color, hair color\n  - Musashi: Kimono color, hakama color, hair color\n- **Health Values**: Adjust starting health (Range: 80-120, Default: 100)\n- **Special Meter Fill Rate**: How quickly ultimate abilities charge (Range: 0.8x-1.5x, Default: 1.0x)\n\n**Arena Customization:**\n- **Background Color Tint**: Apply color filter to arena (warm/cool/neutral tones)\n- **Spotlight Colors**: Change the color of dramatic spotlights (red, blue, white, purple, green)\n- **Blood Effects Toggle**: Enable/disable blood splatters for younger audiences\n- **Crowd Intensity**: Adjust background crowd animation speed (calm/normal/hyped)\n\n**Gameplay Tweaks:**\n- **Round Count**: Best of 1, 3, or 5 rounds\n- **Power-up Frequency**: How often power-ups spawn (Range: 5-15 seconds, Default: 8 seconds)\n- **Damage Multiplier**: Overall damage scaling (Range: 0.7x-1.3x, Default: 1.0x)\n- **Movement Speed**: Character movement speed modifier (Range: 0.8x-1.2x, Default: 1.0x)\n\n**Audio Customization:**\n- **Music Volume**: Background music level (0-100%)\n- **SFX Volume**: Sound effects level (0-100%)\n- **Announcer Toggle**: Enable/disable fight announcements\n\n### Constraints\n\n**Balance Preservation:**\n- Health values capped to prevent one-hit kills or unkillable characters\n- Damage multiplier limited to maintain competitive balance\n- Speed modifications kept within reasonable range to preserve hitbox accuracy\n- Special meter rates bounded to ensure ultimates remain special moments\n\n**Visual Consistency:**\n- Color customization maintains character silhouette recognition\n- Blood toggle is binary (on/off) to maintain rating appropriateness\n- Spotlight colors limited to predefined palette for visual harmony\n\n**Technical Limits:**\n- Maximum 3 power-ups on screen simultaneously\n- Power-up spawn frequency has minimum cooldown to prevent spam\n- Round count limited to 1, 3, or 5 to maintain match pacing\n\n## Control Design\n\n**Baki-Dou Arena Clash** uses a **2D fighting game control scheme** optimized for both mobile touch and desktop keyboard/mouse input.\n\n### Desktop Controls (Keyboard)\n\n**Movement:**\n- **A / Left Arrow**: Move left\n- **D / Right Arrow**: Move right\n- **W / Up Arrow / Space**: Jump\n\n**Combat:**\n- **J**: Light Attack (Baki: punch/kick, Musashi: quick slash)\n- **K**: Heavy Attack (Baki: grapple, Musashi: powerful sword strike)\n- **L**: Ultimate Ability (when special meter is full)\n- **S / Down Arrow**: Block (hold to reduce incoming damage)\n\n**System:**\n- **ESC**: Pause menu\n- **Enter**: Confirm selections in menus\n\nAll keyboard inputs are captured and default browser behaviors prevented for used keys. Input state is cleared on window blur to prevent stuck keys.\n\n### Mobile Controls (Touch)\n\n**Left Side - Movement Virtual D-Pad:**\n- Appears in bottom-left corner (fixed position)\n- 8-directional input for left/right movement and jump\n- Visual feedback shows active direction\n- Dead zone in center for neutral position\n- Base: 120px from left edge, 180px from bottom\n- Max radius: 60px\n\n**Right Side - Action Buttons:**\n- Three large buttons in bottom-right area:\n  - **Light Attack Button** (J equivalent): 96x96px, positioned at bottom-right\n  - **Heavy Attack Button** (K equivalent): 96x96px, positioned above light attack\n  - **Ultimate Button** (L equivalent): 96x96px, positioned above heavy attack, glows when meter is full\n- **Block Button** (S equivalent): 96x96px, positioned to the left of attack buttons\n\n**Button Layout (from bottom-right):**\n```\n        [Ultimate]\n        [Heavy]\n[Block] [Light]\n```\n\n**Touch Handling:**\n- Each touch tracked by unique touch ID\n- D-pad and buttons don't interfere with each other\n- Visual feedback on button press (scale/color change)\n- Buttons disabled when game is paused\n\n### Input Mapping to Game Actions\n\n**Movement:**\n- Left/Right: Character walks in direction at base speed\n- Jump: Character performs fixed-height jump with arc physics\n- Block: Character enters defensive stance, reduces incoming damage by 50%\n\n**Combat Actions:**\n- **Light Attack**: Fast, low-damage attack (10 damage), short cooldown (0.3s)\n- **Heavy Attack**: Slower, high-damage attack (25 damage), longer cooldown (0.8s)\n- **Ultimate Ability**: \n  - Baki: \"Demon Back\" - Massive damage boost for 5 seconds (50 damage per hit)\n  - Musashi: \"Two Sword Style\" - Rapid multi-hit slash combo (60 total damage)\n  - Requires full special meter (builds through dealing/taking damage)\n\n**Combo System:**\n- Landing 3 consecutive attacks within 1.5 seconds triggers combo bonus (1.5x damage multiplier)\n- Combo counter displayed above character\n- Combo breaks if opponent blocks or if too much time passes between hits\n\n### Control Feedback\n\n**Visual Feedback:**\n- Character animations clearly show attack startup, active frames, and recovery\n- Block animation shows defensive stance\n- Ultimate activation has dramatic screen effect and character transformation\n- Hit sparks and screen shake on successful attacks\n- Special meter fills visually with glowing effect\n\n**Audio Feedback:**\n- Distinct sounds for light attacks, heavy attacks, blocks, and ultimates\n- Hit confirmation sounds\n- Special meter full notification sound\n- Combo achievement sound\n\n### Accessibility Considerations\n\n- Large touch targets (96x96px minimum) for mobile\n- Clear visual distinction between buttons\n- No complex simultaneous inputs required\n- Block is hold-to-activate (no timing required)\n- Ultimate ability has clear visual indicator when available\n\n## Art Style and Visual Theme\n\n**Baki-Dou Arena Clash** embraces a **dramatic anime fighting aesthetic** with bold, high-contrast visuals that emphasize the brutal intensity of underground combat.\n\n### Overall Art Direction\n\n**Style**: Semi-realistic anime art with exaggerated musculature and dynamic action poses, inspired by the Baki manga/anime series. Characters have detailed anatomy with emphasis on powerful physiques, while maintaining stylized anime facial features.\n\n**Mood**: Dark, intense, and visceral. The atmosphere is gritty and underground, with dramatic lighting creating strong shadows and highlights. Every impact should feel weighty and brutal.\n\n**Color Palette**:\n- **Arena**: Dark grays, blacks, and browns with rust/blood red accents\n- **Lighting**: High-contrast spotlights in white/yellow, with dramatic rim lighting on characters\n- **Blood Effects**: Deep crimson red with darker shading\n- **UI Elements**: Bold reds and golds for health bars, white for text, glowing effects for special meters\n\n### Character Design Specifications\n\n**Baki Hanma**:\n- Muscular young fighter (late teens/early 20s)\n- Shirtless, showing extremely defined musculature\n- Red/orange fighting shorts\n- Black spiky hair\n- Intense, focused expression\n- Fighting stance: loose, confident, hands up\n- Size: Approximately 180px tall when standing\n- Viewing angle: Side profile for combat, can face left or right\n\n**Miyamoto Musashi**:\n- Legendary samurai with powerful build\n- Traditional samurai attire: dark blue/black kimono with hakama\n- Long dark hair tied back\n- Two katanas (one in each hand)\n- Calm, deadly expression\n- Stance: Traditional samurai ready position\n- Size: Approximately 190px tall when standing\n- Viewing angle: Side profile for combat, can face left or right\n\n### Asset Generation vs Code Rendering\n\n**Generated Assets (Complex Visuals):**\n- Character sprites (Baki and Musashi in various poses: idle, attack, block, ultimate)\n- Background arena environment (crowd, walls, floor)\n- Power-up icons (health, speed boost)\n- Victory pose illustrations\n- Blood splatter effects (particle textures)\n- Hit spark effects\n- Weapon visuals (Musashi's katanas)\n\n**Code-Rendered Elements (Simple/Precise):**\n- Health bars (rectangular with gradient fill)\n- Special meter bars (glowing animated fill)\n- Round indicators (circles)\n- Combo counter text\n- UI frames and borders\n- Screen shake and flash effects\n- Spotlight beams (radial gradients)\n- Damage numbers (floating text)\n\n### Visual Consistency Guidelines\n\n**Character Assets**:\n- All character sprites must maintain consistent proportions and anatomy\n- Lighting direction: Top-left to bottom-right for consistency\n- Outline style: Bold black outlines (3-4px) for clarity against backgrounds\n- Shading: Cell-shaded anime style with 2-3 tone levels\n\n**Background Assets**:\n- Darker, desaturated colors to keep focus on characters\n- Atmospheric perspective: Background elements are slightly blurred/less detailed\n- Consistent light sources matching character lighting\n- Gritty texture overlays for concrete and metal surfaces\n\n**Effects**:\n- Blood splatters: Dynamic, varied shapes with motion blur\n- Hit sparks: Bright white/yellow with radial burst pattern\n- Ultimate effects: Character-specific color schemes (red for Baki, blue for Musashi)\n- Screen effects: Additive blending for glows and flashes\n\n### Animation Considerations\n\nWhile we're generating static images, each character needs multiple poses for animation:\n- **Idle stance** (neutral)\n- **Walking** (mid-stride)\n- **Jump** (airborne pose)\n- **Light attack** (punch/slash mid-motion)\n- **Heavy attack** (grapple/power strike)\n- **Block** (defensive stance)\n- **Hit reaction** (taking damage)\n- **Ultimate activation** (dramatic power-up pose)\n- **Victory pose** (triumphant)\n- **Defeat** (knocked down)\n\nThese will be smoothly transitioned between using code-based interpolation and sprite swapping."])</script><script>self.__next_f.push([1,"21:T5e5,\"Create an intense 2D fighting game inspired by the upcoming Netflix anime 'BAKI-DOU: The Invincible Samurai'. Title: 'Baki-Dou Arena Clash'.\nSetting: Dark underground fighting arena with cheering crowds, spotlights, blood stains on the floor, and weapon racks. Dramatic music with heavy beats and sword clashes.\nCharacters:\n\nBaki Hanma: Muscular fighter with shadow boxing moves. Attacks: Super fast punches, kicks, grapples, Demon Back power-up for massive strength boost.\nMiyamoto Musashi: Legendary samurai clone with two katanas. Attacks: Lightning sword slashes, draws, spins, iaijutsu quick-draws.\n\nGameplay:\n\n1v1 versus battles, best of 3 rounds.\nHealth bars, stamina for specials.\nControls: WASD/Arrows to move/dodge, J to punch/kick, K for sword attack (Musashi)/grab (Baki), L for special ultimate (Demon Back for Baki, Two Sword Style for Musashi). Space to block/jump.\nPower-ups spawn randomly: Health restore, speed boost, temporary weapon for Baki.\nCombos: Chain attacks for more damage, slow-mo on perfect hits.\nWin by depleting opponent health. End screen with victory pose and quote like 'The strongest creature on earth!'\n\nVisuals \u0026 Effects: Anime-style art, fluid animations, blood splatters, screen shake on big hits, slow-motion finishers. Background reacts to damage (cracks, fire).\nModes: Single player vs AI (easy/medium/hard), endless survival mode against waves of fighters.\nGoal: Make it addictive, brutal, and hype for the anime release!\nPlay now and prepare for Baki vs Musashi!\"22:T7b6,\"Create a hyper-violent 2D side-scrolling action-fighting game inspired by Netflix's 'BAKI-DOU: h cracks and fire, enhancing the visual impact of each fight\\n• Unleash devastating ultimate abilities like Baki's Demon Back or Musashi's Two Sword Style\",\"image_urls\":null},\"role\":\"astra\",\"timestamp\":1771849275942.7021,\"request_id\":null,\"type\":\"game_design\"},{\"id\":\"user-01KJ5750SZM32TB10NFMYYBJ88\",\"content\":{\"text\":\"Ok, create it!\",\"images\":[],\"audios\":[],\"other_files\":[]},\"role\":\"user\",\"timestamp\":1771849286463,\"request_id\":\"01KJ5750SZM32TB10NFMYYBJ88\",\"type\":\"multimodal\"},{\"id\":\"2a032503-5dac-4923-935d-bee26b689cd7\",\"content\":{\"text\":\"I've created **Baki-Dou Arena Clash** - your brutal underground fighting game is ready! Step into the arena as either **Baki Hanma** with his devastating Demon Back power-up or **Miyamoto Musashi** wielding dual katanas in lightning-fast strikes.\\n\\n**Controls**: Use WASD to move, J for light attacks, K for heavy attacks, and L to unleash your ultimate when the meter fills. Chain 3 hits together for combo damage and grab power-ups as they spawn! In **Edit mode**, try adjusting the damage multiplier for even more intense battles or change the spotlight colors to set your perfect arena mood. Jump in and dominate the underground circuit!\",\"images\":[],\"audios\":[],\"other_files\":[]},\"role\":\"astra\",\"timestamp\":1771849776070.0745,\"request_id\":null,\"type\":\"multimodal\"},{\"id\":\"user-01KJ57SMASHVHJTQYEWKGBXKRD\",\"content\":{\"text\":\"punches kicks add\",\"images\":[],\"audios\":[],\"other_files\":[]},\"role\":\"user\",\"timestamp\":1771849961818,\"request_id\":\"01KJ57SMASHVHJTQYEWKGBXKRD\",\"type\":\"multimodal\"},{\"id\":\"05d06612-f75d-42a0-bfb4-6dd024312737\",\"content\":{\"text\":\"The game already has punches and kicks! Could you tell me what you'd like to add—like more attack types, separate punch/kick buttons, cooler impact effects, or something else?\",\"images\":[],\"audios\":[],\"other_files\":[]},\"role\":\"astra\",\"timestamp\":1771849976302.7776,\"re
