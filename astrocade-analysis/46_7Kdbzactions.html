 letter-spacing: 2px;\n        }\n\n.character-options {\n            display: flex;\n            gap: 24px;\n            margin-bottom: 48px;\n            padding: 0 12px;\n        }\n\n.character-card {\n            width: 300px;\n            height: 440px;\n            background: rgba(40, 0, 0, 0.8);\n            border: 4px solid rgba(255, 215, 0, 0.5);\n            border-radius: 12px;\n            padding: 24px 20px;\n            cursor: pointer;\n            transition: all var(--transition-normal) var(--ease-out);\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n        }\n\n.character-card:hover {\n            transform: scale(1.05);\n            border-color: rgba(255, 215, 0, 1);\n            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);\n        }\n\n.character-card.selected {\n            border-color: #FFD700;\n            box-shadow: 0 0 40px rgba(255, 215, 0, 0.8);\n            background: rgba(60, 0, 0, 0.9);\n        }\n\n.character-portrait {\n            width: 220px;\n            height: 260px;\n            margin-bottom: 16px;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n        }\n\n.character-portrait img {\n            max-width: 100%;\n            max-height: 100%;\n            object-fit: contain;\n        }\n\n.character-name {\n            font-size: 28px;\n            font-weight: bold;\n            color: #FFD700;\n            margin-bottom: 8px;\n            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.9);\n            text-align: center;\n            line-height: 1.2;\n        }\n\n.character-desc {\n            font-size: 20px;\n            color: #CCC;\n            text-align: center;\n            line-height: 1.5;\n        }\n\n.start-button {\n            padding: 24px 72px;\n            font-size: 36px;\n            font-weight: bold;\n            background: linear-gradient(180deg, #FF0000 0%, #8B0000 100%);\n            color: white;\n            border: 4px solid #FFD700;\n            border-radius: 12px;\n            cursor: pointer;\n            transition: all var(--transition-normal) var(--ease-out);\n            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.9);\n            min-height: 96px;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n        }\n\n.start-button:hover {\n            transform: scale(1.05);\n            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);\n        }\n\n.start-button:disabled {\n            opacity: 0.5;\n            cursor: not-allowed;\n        }\n\n/* ===== VICTORY/DEFEAT SCREEN ===== */\n\n.end-screen {\n            position: absolute;\n            top: 0;\n            left: 0;\n            width: 100%;\n            height: 100%;\n            background: rgba(0, 0, 0, 0.9);\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            z-index: 100;\n        }\n\n.end-title {\n            font-size: 60px;\n            font-weight: bold;\n            margin-bottom: 40px;\n            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.9);\n        }\n\n.end-title.victory {\n            color: #FFD700;\n        }\n\n.end-title.defeat {\n            color: #FF0000;\n        }\n\n.end-portrait {\n            width: 300px;\n            height: 400px;\n            margin-bottom: 30px;\n        }\n\n.end-portrait img {\n            max-width: 100%;\n            max-height: 100%;\n            object-fit: contain;\n        }\n\n.end-quote { font-size: 28px; color: #FFF; font-style: italic; margin-bottom: 40px; text-align: center; max-width: 600px; padding: 0 20px; }\n\n.restart-button { padding: 20px 56px; font-size: 32px; font-weight: bold; background: linear-gradient(180deg, #FFD700 0%, #FFA500 100%); color: #000; border: 3px solid #FFF; border-radius: 8px; cursor: pointer; transition: all var(--transition-normal) var(--ease-out); min-height: 96px; }\n\n.restart-button:hover {\n            transform: scale(1.05);\n            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);\n        }\n\n/* ===== EDIT MODE HELPERS ===== */\n\n.spawn-point {\n            position: absolute;\n            width: 40px;\n            height: 40px;\n            border: 3px dashed #FFD700;\n            border-radius: 50%;\n            background: rgba(255, 215, 0, 0.2);\n            cursor: pointer;\n            transition: all var(--transition-fast) var(--ease-out);\n        }\n\n.spawn-point:hover {\n            background: rgba(255, 215, 0, 0.4);\n            transform: scale(1.1);\n        }\n\n.spawn-point.selected {\n            border-color: #FF0000;\n            background: rgba(255, 0, 0, 0.3);\n            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);\n        }\n\n/* ===== LOADING SCREEN ===== */\n\n.loading-screen {\n            position: absolute;\n            top: 0;\n            left: 0;\n            width: 100%;\n            height: 100%;\n            background: #000;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            z-index: 1000;\n        }\n\n.loading-text { font-size: 40px; color: #FFD700; margin-bottom: 20px; }\n\n.loading-bar {\n            width: 400px;\n            height: 20px;\n            background: rgba(255, 255, 255, 0.2);\n            border: 2px solid #FFD700;\n            border-radius: 10px;\n            overflow: hidden;\n        }\n\n.loading-progress {\n            height: 100%;\n            background: linear-gradient(90deg, #FFD700 0%, #FF0000 100%);\n            width: 0%;\n            transition: width 0.3s ease-out;\n        }\n\n/* ===== HIDDEN ===== */\n\n.hidden {\n            display: none !important;\n        }\u003c/style\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n    \u003cdiv id=\"gameContainer\"\u003e\n        \u003ccanvas id=\"gameCanvas\" width=\"720\" height=\"1280\"\u003e\u003c/canvas\u003e\n        \n        \u003c!-- Loading Screen --\u003e\n        \u003cdiv id=\"loadingScreen\" class=\"loading-screen\"\u003e\n            \u003cdiv class=\"loading-text\"\u003eLOADING BAKI-DOU ARENA CLASH...\u003c/div\u003e\n            \u003cdiv class=\"loading-bar\"\u003e\n                \u003cdiv id=\"loadingProgress\" class=\"loading-progress\"\u003e\u003c/div\u003e\n            \u003c/div\u003e\n        \u003c/div\u003e\n\n        \u003c!-- UI Overlay --\u003e\n        \u003cdiv class=\"ui-overlay\"\u003e\n            \u003c!-- Touch Controls --\u003e\n            \u003cdiv id=\"touchControls\" class=\"touch-controls hidden\"\u003e\n                \u003cdiv class=\"dpad-container\"\u003e\n                    \u003cdiv class=\"dpad-base\"\u003e\n                        \u003cdiv id=\"dpadStick\" class=\"dpad-stick\"\u003e\u003c/div\u003e\n                    \u003c/div\u003e\n                \u003c/div\u003e\n                \u003cdiv class=\"action-buttons\"\u003e\n                    \u003cdiv class=\"action-row\"\u003e\n                        \u003cdiv id=\"ultimateBtn\" class=\"action-btn ultimate\"\u003eULT\u003c/div\u003e\n                    \u003c/div\u003e\n                    \u003cdiv class=\"action-row\"\u003e\n                        \u003cdiv id=\"powerBtn\" class=\"action-btn power\"\u003ePOWER\u003c/div\u003e\n                    \u003c/div\u003e\n                    \u003cdiv class=\"action-row\"\u003e\n                        \u003cdiv id=\"kickBtn\" class=\"action-btn\"\u003eKICK\u003c/div\u003e\n                        \u003cdiv id=\"punchBtn\" class=\"action-btn\"\u003ePUNCH\u003c/div\u003e\n                    \u003c/div\u003e\n                    \u003cdiv class=\"action-row\"\u003e\n                        \u003cdiv id=\"blockBtn\" class=\"action-btn block\"\u003eBLOCK\u003c/div\u003e\n                    \u003c/div\u003e\n                \u003c/div\u003e\n            \u003c/div\u003e\n\n            \u003c!-- Character Selection --\u003e\n            \u003cdiv id=\"characterSelect\" class=\"character-select hidden\"\u003e\n                \u003cdiv class=\"select-title\"\u003eSELECT YOUR FIGHTER\u003c/div\u003e\n                \u003cdiv class=\"character-options\"\u003e\n                    \u003cdiv class=\"character-card\" data-character=\"baki\"\u003e\n                        \u003cdiv class=\"character-portrait\"\u003e\n                            \u003cimg id=\"bakiSelectImg\" src=\"\" alt=\"Baki\"\u003e\n                        \u003c/div\u003e\n                        \u003cdiv class=\"character-name\"\u003eBAKI HANMA\u003c/div\u003e\n                        \u003cdiv class=\"character-desc\"\u003eThe strongest creature on earth. Master of hand-to-hand combat.\u003c/div\u003e\n                    \u003c/div\u003e\n                    \u003cdiv class=\"character-card\" data-character=\"musashi\"\u003e\n                        \u003cdiv class=\"character-portrait\"\u003e\n                            \u003cimg id=\"musashiSelectImg\" src=\"\" alt=\"Musashi\"\u003e\n                        \u003c/div\u003e\n                        \u003cdiv class=\"character-name\"\u003eMIYAMOTO MUSASHI\u003c/div\u003e\n                        \u003cdiv class=\"character-desc\"\u003eLegendary samurai. Dual-wielding sword master.\u003c/div\u003e\n                    \u003c/div\u003e\n                \u003c/div\u003e\n                \u003cbutton id=\"startFightBtn\" class=\"start-button\" disabled\u003eSTART FIGHT\u003c/button\u003e\n            \u003c/div\u003e\n\n            \u003c!-- End Screen --\u003e\n            \u003cdiv id=\"endScreen\" class=\"end-screen hidden\"\u003e\n                \u003cdiv id=\"endTitle\" class=\"end-title\"\u003e\u003c/div\u003e\n                \u003cdiv class=\"end-portrait\"\u003e\n                    \u003cimg id=\"endPortrait\" src=\"\" alt=\"Character\"\u003e\n                \u003c/div\u003e\n                \u003cdiv id=\"endQuote\" class=\"end-quote\"\u003e\u003c/div\u003e\n                \u003cbutton id=\"restartBtn\" class=\"restart-button\"\u003eFIGHT AGAIN\u003c/button\u003e\n            \u003c/div\u003e\n        \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003cscript\u003e\n        /* ==================================================\n         * GAME OVERVIEW: Baki-Dou Arena Clash - Intense 2D fighting game\n         * \n         * Two distinct fighters (Baki Hanma - martial artist, Miyamoto Musashi - samurai)\n         * engage in best-of-3 rounds combat with unique movesets, ultimate abilities,\n         * combo system, and power-ups. Features both Edit mode (customize arena/gameplay)\n         * and Play mode (full combat experience).\n         * \n         * GAME STATE SHAPE: window.gameConfig = {\n         *   characters: {\n         *     baki: { health: 100, colorTint: \"#FFFFFF\", specialMeterRate: 1.0 },\n         *     musashi: { health: 100, colorTint: \"#FFFFFF\", specialMeterRate: 1.0 }\n         *   },\n         *   arena: {\n         *     backgroundTint: \"#FFFFFF\",\n         *     spotlightColor: \"#FFFFFF\",\n         *     bloodEffects: true,\n         *     crowdIntensity: 1.0\n         *   },\n         *   gameplay: {\n         *     roundCount: 3,\n         *     powerupFrequency: 8,\n         *     damageMultiplier: 1.0,\n         *     movementSpeed: 1.0\n         *   },\n         *   audio: {\n         *     musicVolume: 0.7,\n         *     sfxVolume: 0.8\n         *   },\n         *   powerupSpawnPoints: [\n         *     { x: 180, y: 1100 },\n         *     { x: 360, y: 1100 },\n         *     { x: 540, y: 1100 }\n         *   ]\n         * }\n         * ==================================================\n         */\n\n        // ===== GLOBAL STATE =====\n        const canvas = document.getElementById('gameCanvas');\n        const ctx = canvas.getContext('2d');\n        \n        let currentMode = 'play';\n        let gameState = 'loading'; // loading, characterSelect, fighting, roundEnd, matchEnd\n        let assetCache = {};\n        let audioContext = null;\n        let audioBuffers = {};\n        let backgroundMusic = null;\n        \n        // Runtime game state\n        let player = null;\n        let opponent = null;\n        let playerCharacter = null;\n        let opponentCharacter = 'musashi'; // AI always plays opposite\n        let roundsWon = { player: 0, opponent: 0 };\n        let currentRound = 1;\n        let powerups = [];\n        let particles = [];\n        let lastPowerupSpawn = 0;\n        let roundStartTime = 0;\n        let matchStarted = false;\n        \n        // Input state\n        let keys = {};\n        let touchState = {\n            dpad: { active: false, touchId: null, x: 0, y: 0 },\n            buttons: {\n                punch: false,\n                kick: false,\n                power: false,\n                ultimate: false,\n                block: false\n            }\n        };\n\n        // Edit mode state\n        let selectedSpawnPoint = null;\n\n        // ===== CONSTANTS =====\n        const ARENA_WIDTH = 720;\n        const ARENA_HEIGHT = 1280;\n        const FLOOR_Y = 1100;\n        const GRAVITY = 1800;\n        const JUMP_VELOCITY = -600;\n        const MOVE_SPEED = 250;\n        const COMBO_WINDOW = 1.5;\n        const COMBO_MULTIPLIER = 1.5;\n\n        const CHARACTER_DATA = {\n            baki: {\n                name: 'Baki Hanma',\n                width: 120,\n                height: 180,\n                style: 'Grappler',\n                animations: {\n                    idle: 'baki_idle',\n                    walk: 'baki_walk',\n                    jump: 'baki_jump',\n                    lightAttack: 'baki_light_attack',\n                    heavyAttack: 'baki_heavy_attack',\n                    block: 'baki_block',\n                    hit: 'baki_hit',\n                    ultimate: 'baki_ultimate',\n                    victory: 'baki_victory',\n                    defeat: 'baki_defeat'\n                },\n                attacks: {\n                    punch: { damage: 12, cooldown: 0.35, range: 85, knockback: 150 },\n                    kick: { damage: 18, cooldown: 0.5, range: 95, knockback: 200 },\n                    power: { damage: 45, cooldown: 1.2, range: 110, knockback: 300, meterCost: 50 }\n                },\n                ultimate: {\n                    name: 'Demon Back',\n                    duration: 5,\n                    damageBoost: 5,\n                    sound: 'baki_ultimate_sfx'\n                },\n                victoryQuote: \"The strongest creature on earth!\",\n                defeatQuote: \"I'll come back stronger...\"\n            },\n            musashi: {\n                name: 'Miyamoto Musashi',\n                width: 120,\n                height: 190,\n                style: 'Swordmaster',\n                animations: {\n                    idle: 'musashi_idle',\n                    walk: 'musashi_walk',\n                    jump: 'musashi_jump',\n                    lightAttack: 'musashi_light_attack',\n                    heavyAttack: 'musashi_heavy_attack',\n                    block: 'musashi_block',\n                    hit: 'musashi_hit',\n                    ultimate: 'musashi_ultimate',\n                    victory: 'musashi_victory',\n                    defeat: 'musashi_defeat'\n                },\n                attacks: {\n                    punch: { damage: 10, cooldown: 0.3, range: 80, knockback: 120 },\n                    kick: { damage: 15, cooldown: 0.45, range: 100, knockback: 180 },\n                    power: { damage: 55, cooldown: 1.3, range: 120, knockback: 350, meterCost: 50 }\n                },\n                ultimate: {\n                    name: 'Two Sword Style',\n                    duration: 2,\n                    totalDamage: 60,\n                    hits: 8,\n                    sound: 'musashi_ultimate_sfx'\n                },\n                victoryQuote: \"The way of the sword is absolute.\",\n                defeatQuote: \"Even legends can fall...\"\n            }\n        };\n\n        // ===== ASSET LOADING =====\n        async function preloadAssets() {\n            const assetIds = [\n                'baki_idle', 'baki_walk', 'baki_jump', 'baki_light_attack', 'baki_heavy_attack',\n                'baki_block', 'baki_hit', 'baki_ultimate', 'baki_victory', 'baki_defeat',\n                'musashi_idle', 'musashi_walk', 'musashi_jump', 'musashi_light_attack', 'musashi_heavy_attack',\n                'musashi_block', 'musashi_hit', 'musashi_ultimate', 'musashi_victory', 'musashi_defeat',\n                'arena_background', 'health_powerup', 'speed_powerup', 'blood_splatter_1', 'blood_splatter_2', 'hit_spark',\n                'background_music', 'light_attack_sfx', 'heavy_attack_sfx', 'sword_slash_sfx', 'block_sfx',\n                'ultimate_activation_sfx', 'baki_ultimate_sfx', 'musashi_ultimate_sfx', 'powerup_spawn_sfx',\n                'powerup_collect_sfx', 'round_start_sfx', 'round_end_sfx', 'victory_sfx', 'defeat_sfx', 'crowd_cheer_sfx'\n            ];\n\n            const loadingProgress = document.getElementById('loadingProgress');\n            let loaded = 0;\n\n            // Initialize Web Audio\n            audioContext = new (window.AudioContext || window.webkitAudioContext)();\n\n            for (const id of assetIds) {\n                try {\n                    const assetInfo = lib.getAsset(id);\n                    if (!assetInfo) {\n                        lib.log(`Asset not found: ${id}`);\n                        continue;\n                    }\n\n                    if (assetInfo.type === 'image') {\n                        await new Promise((resolve, reject) =\u003e {\n                            const img = new Image();\n                            img.onload = () =\u003e {\n                                assetCache[id] = {\n                                    image: img,\n                                    aspectRatio: assetInfo.aspect_ratio || [1, 1]\n                                };\n                                resolve();\n                            };\n                            img.onerror = reject;\n                            img.src = assetInfo.url;\n                        });\n                    } else if (assetInfo.type === 'audio') {\n                        const response = await fetch(assetInfo.url);\n                        const arrayBuffer = await response.arrayBuffer();\n                        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);\n                        audioBuffers[id] = {\n                            buffer: audioBuffer,\n                            loop: assetInfo.loop === 'true'\n                        };\n                    }\n\n                    loaded++;\n                    loadingProgress.style.width = `${(loaded / assetIds.length) * 100}%`;\n                } catch (error) {\n                    lib.log(`Error loading asset ${id}: ${error.message}`);\n                }\n            }\n\n            lib.log('All assets loaded');\n        }\n\n        // ===== AUDIO FUNCTIONS =====\n        function playSound(soundId, volume = 1.0) {\n            if (!audioBuffers[soundId]) return;\n\n            const source = audioContext.createBufferSource();\n            const gainNode = audioContext.createGain();\n            \n            source.buffer = audioBuffers[soundId].buffer;\n            source.connect(gainNode);\n            gainNode.connect(audioContext.destination);\n            \n            const sfxVolume = window.gameConfig.audio.sfxVolume;\n            gainNode.gain.value = volume * sfxVolume;\n            \n            source.start(0);\n            return source;\n        }\n\n        function playBackgroundMusic() {\n            if (!audioBuffers['background_music']) return;\n\n            backgroundMusic = audioContext.createBufferSource();\n            const gainNode = audioContext.createGain();\n            \n            backgroundMusic.buffer = audioBuffers['background_music'].buffer;\n            backgroundMusic.loop = true;\n            backgroundMusic.connect(gainNode);\n            gainNode.connect(audioContext.destination);\n            \n            const musicVolume = window.gameConfig.audio.musicVolume;\n            gainNode.gain.value = musicVolume;\n            \n            backgroundMusic.start(0);\n        }\n\n        function stopBackgroundMusic() {\n            if (backgroundMusic) {\n                backgroundMusic.stop();\n                backgroundMusic = null;\n            }\n        }\n\n        // ===== CHARACTER CLASS =====\n        class Fighter {\n            constructor(characterType, x, y, isPlayer = true) {\n                this.type = characterType;\n                this.data = CHARACTER_DATA[characterType];\n                this.isPlayer = isPlayer;\n                \n                // Position and physics\n                this.x = x;\n                this.y = y;\n                this.vx = 0;\n                this.vy = 0;\n                this.facingRight = isPlayer;\n                this.onGround = false;\n                \n                // Combat state\n                this.maxHealth = window.gameConfig.characters[characterType].health;\n                this.health = this.maxHealth;\n                this.specialMeter = 0;\n                this.maxSpecialMeter = 100;\n                this.isBlocking = false;\n                this.isAttacking = false;\n                this.attackCooldown = 0;\n                this.currentAttack = null;\n                \n                // Animation state\n                this.currentAnimation = 'idle';\n                this.animationTime = 0;\n                \n                // Combo tracking\n                this.comboCount = 0;\n                this.lastHitTime = 0;\n                \n                // Ultimate state\n                this.ultimateActive = false;\n                this.ultimateTime = 0;\n                \n                // Hit reaction\n                this.hitStunTime = 0;\n                \n                // Speed boost\n                this.speedBoost = 1.0;\n                this.speedBoostTime = 0;\n            }\n\n            update(deltaTime) {\n                // Update timers\n                if (this.attackCooldown \u003e 0) this.attackCooldown -= deltaTime;\n                if (this.hitStunTime \u003e 0) {\n                    this.hitStunTime -= deltaTime;\n                    this.currentAnimation = 'hit';\n                    return;\n                }\n                if (this.ultimateTime \u003e 0) {\n                    this.ultimateTime -= deltaTime;\n                    if (this.ultimateTime \u003c= 0) {\n                        this.ultimateActive = false;\n                    }\n                }\n                if (this.speedBoostTime \u003e 0) {\n                    this.speedBoostTime -= deltaTime;\n                    if (this.speedBoostTime \u003c= 0) {\n                        this.speedBoost = 1.0;\n                    }\n                }\n\n                // Apply gravity\n                if (!this.onGround) {\n                    this.vy += GRAVITY * deltaTime;\n                }\n\n                // Update position\n                this.x += this.vx * deltaTime;\n                this.y += this.vy * deltaTime;\n\n                // Floor collision\n                if (this.y \u003e= FLOOR_Y) {\n                    this.y = FLOOR_Y;\n                    this.vy = 0;\n                    this.onGround = true;\n                } else {\n                    this.onGround = false;\n                }\n\n                // Arena boundaries\n                const halfWidth = this.data.width / 2;\n                if (this.x \u003c halfWidth) this.x = halfWidth;\n                if (this.x \u003e ARENA_WIDTH - halfWidth) this.x = ARENA_WIDTH - halfWidth;\n\n                // Update animation\n                this.animationTime += deltaTime;\n                if (!this.isAttacking \u0026\u0026 this.hitStunTime \u003c= 0) {\n                    if (!this.onGround) {\n                        this.currentAnimation = 'jump';\n                    } else if (Math.abs(this.vx) \u003e 10) {\n                        this.currentAnimation = 'walk';\n                    } else if (this.isBlocking) {\n                        this.currentAnimation = 'block';\n                    } else if (this.ultimateActive) {\n                        this.currentAnimation = 'ultimate';\n                    } else {\n                        this.currentAnimation = 'idle';\n                    }\n                }\n\n                // Reset combo if too much time passed\n                if (Date.now() - this.lastHitTime \u003e COMBO_WINDOW * 1000) {\n                    this.comboCount = 0;\n                }\n            }\n\n            move(direction) {\n                if (this.hitStunTime \u003e 0 || this.isAttacking) return;\n                \n                const speed = MOVE_SPEED * window.gameConfig.gameplay.movementSpeed * this.speedBoost;\n                this.vx = direction * speed;\n                \n                if (direction !== 0) {\n                    this.facingRight = direction \u003e 0;\n                }\n            }\n\n            jump() {\n                if (this.onGround \u0026\u0026 this.hitStunTime \u003c= 0 \u0026\u0026 !this.isAttacking) {\n                    this.vy = JUMP_VELOCITY;\n                    this.onGround = false;\n                }\n            }\n\n            attack(type) {\n                if (this.attackCooldown \u003e 0 || this.hitStunTime \u003e 0 || !this.onGround) return false;\n\n                // Check if power attack has enough meter\n                if (type === 'power' \u0026\u0026 this.specialMeter \u003c this.data.attacks[type].meterCost) return false;\n\n                this.isAttacking = true;\n                this.currentAttack = type;\n                \n                // Determine animation based on attack type\n                let animKey = 'lightAttack';\n                if (type === 'kick') animKey = 'heavyAttack';\n                if (type === 'power') animKey = 'heavyAttack';\n                \n                this.currentAnimation = animKey;\n                this.attackCooldown = this.data.attacks[type].cooldown;\n                this.vx = 0;\n\n                // Deduct meter for power attacks\n                if (type === 'power') {\n                    this.specialMeter -= this.data.attacks[type].meterCost;\n                }\n\n                // Play attack sound\n                if (this.type === 'musashi') {\n                    playSound('sword_slash_sfx', 0.7);\n                } else {\n                    playSound(type === 'punch' ? 'light_attack_sfx' : 'heavy_attack_sfx', 0.7);\n                }\n\n                setTimeout(() =\u003e {\n                    this.isAttacking = false;\n                    this.currentAttack = null;\n                }, this.data.attacks[type].cooldown * 1000);\n\n                return true;\n            }\n\n            block(blocking) {\n                if (this.hitStunTime \u003e 0 || this.isAttacking) return;\n                this.isBlocking = blocking;\n            }\n\n            activateUltimate() {\n                if (this.specialMeter \u003c this.maxSpecialMeter || this.ultimateActive || this.hitStunTime \u003e 0) return false;\n\n                this.specialMeter = 0;\n                this.ultimateActive = true;\n                this.ultimateTime = this.data.ultimate.duration;\n                this.currentAnimation = 'ultimate';\n\n                playSound('ultimate_activation_sfx', 0.8);\n                setTimeout(() =\u003e {\n                    playSound(this.data.ultimate.sound, 0.9);\n                }, 300);\n\n                // Screen shake\n                screenShake(15, 0.5);\n\n                return true;\n            }\n\n            takeDamage(damage, attacker) {\n                if (this.hitStunTime \u003e 0) return;\n\n                let finalDamage = damage * window.gameConfig.gameplay.damageMultiplier;\n\n                // Apply combo multiplier\n                if (attacker.comboCount \u003e= 2) {\n                    finalDamage *= COMBO_MULTIPLIER;\n                }\n\n                // Blocking reduces damage\n                if (this.isBlocking) {\n                    finalDamage *= 0.5;\n                    playSound('block_sfx', 0.6);\n                } else {\n                    playSound('heavy_attack_sfx', 0.5);\n                }\n\n                this.health = Math.max(0, this.health - finalDamage);\n                this.hitStunTime = 0.3;\n\n                // Build special meter for both fighters\n                const meterGain = (finalDamage / this.maxHealth) * 100 * window.gameConfig.characters[this.type].specialMeterRate;\n                this.specialMeter = Math.min(this.maxSpecialMeter, this.specialMeter + meterGain * 0.5);\n                attacker.specialMeter = Math.min(attacker.maxSpecialMeter, attacker.specialMeter + meterGain);\n\n                // Update attacker combo\n                attacker.comboCount++;\n                attacker.lastHitTime = Date.now();\n\n                // Visual effects\n                createBloodSplatter(this.x, this.y - this.data.height / 2);\n                createHitSpark(this.x + (this.facingRight ? -30 : 30), this.y - this.data.height / 2);\n                screenShake(finalDamage / 5, 0.2);\n\n                // Floating damage number\n                createDamageNumber(this.x, this.y - this.data.height, Math.round(finalDamage));\n\n                return finalDamage;\n            }\n\n            getHitbox() {\n                if (!this.isAttacking || !this.currentAttack) return null;\n\n                const attack = this.data.attacks[this.currentAttack];\n                const range = attack.range;\n                const offsetX = this.facingRight ? range / 2 : -range / 2;\n\n                return {\n                    x: this.x + offsetX,\n                    y: this.y - this.data.height / 2,\n                    width: range,\n                    height: this.data.height * 0.6\n                };\n            }\n\n            render() {\n                const animKey = this.data.animations[this.currentAnimation];\n                const asset = assetCache[animKey];\n                if (!asset) return;\n\n                const img = asset.image;\n                const [aspectW, aspectH] = asset.aspectRatio;\n                const aspectRatio = aspectW / aspectH;\n\n                // Calculate dimensions maintaining aspect ratio\n                let drawHeight = this.data.height;\n                let drawWidth = drawHeight * aspectRatio;\n\n                ctx.save();\n                ctx.translate(this.x, this.y - drawHeight / 2);\n\n                // Flip horizontally if needed\n                if (!this.facingRight) {\n                    ctx.scale(-1, 1);\n                }\n\n                // Apply color tint if in edit mode\n                if (currentMode === 'edit') {\n                    const tint = window.gameConfig.characters[this.type].colorTint;\n                    if (tint !== '#FFFFFF') {\n                        ctx.globalCompositeOperation = 'multiply';\n                        ctx.fillStyle = tint;\n                        ctx.fillRect(-drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);\n                        ctx.globalCompositeOperation = 'destination-in';\n                    }\n                }\n\n                // Draw character\n                ctx.drawImage(img, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);\n\n                // Ultimate glow effect\n                if (this.ultimateActive) {\n                    ctx.globalCompositeOperation = 'lighter';\n                    ctx.globalAlpha = 0.3 + Math.sin(this.animationTime * 10) * 0.2;\n                    const glowColor = this.type === 'baki' ? '#FF0000' : '#0088FF';\n                    ctx.fillStyle = glowColor;\n                    ctx.fillRect(-drawWidth / 2 - 10, -drawHeight / 2 - 10, drawWidth + 20, drawHeight + 20);\n                }\n\n                ctx.restore();\n\n                // Draw combo counter\n                if (this.comboCount \u003e= 2) {\n                    ctx.save();\n                    ctx.font = 'bold 32px Arial';\n                    ctx.fillStyle = '#FFD700';\n                    ctx.strokeStyle = '#000';\n                    ctx.lineWidth = 4;\n                    ctx.textAlign = 'center';\n                    const comboText = `${this.comboCount} HIT COMBO!`;\n                    ctx.strokeText(comboText, this.x, this.y - this.data.height - 20);\n                    ctx.fillText(comboText, this.x, this.y - this.data.height - 20);\n                    ctx.restore();\n                }\n            }\n        }\n\n        // ===== AI BEHAVIOR =====\n        function updateAI(deltaTime) {\n            if (!opponent || !player || gameState !== 'fighting') return;\n\n            const distance = Math.abs(opponent.x - player.x);\n            const isFacingPlayer = (opponent.facingRight \u0026\u0026 player.x \u003e opponent.x) || \n                                  (!opponent.facingRight \u0026\u0026 player.x \u003c opponent.x);\n\n            // Random decision making with delays\n            if (Math.random() \u003c 0.02) {\n                // Movement\n                if (distance \u003e 200) {\n                    opponent.move(player.x \u003e opponent.x ? 1 : -1);\n                } else if (distance \u003c 100) {\n                    opponent.move(player.x \u003e opponent.x ? -1 : 1);\n                } else {\n                    opponent.move(0);\n                }\n            }\n\n            // Attack when in range\n            if (distance \u003c 120 \u0026\u0026 isFacingPlayer \u0026\u0026 opponent.onGround) {\n                if (Math.random() \u003c 0.03) {\n                    const attackType = Math.random() \u003c 0.5 ? 'punch' : 'kick';\n                    opponent.attack(attackType);\n                }\n            }\n\n            // Use power attack when available\n            if (opponent.specialMeter \u003e= (opponent.data.attacks.power?.meterCost || 50) \u0026\u0026 distance \u003c 150) {\n                if (Math.random() \u003c 0.02) {\n                    opponent.attack('power');\n                }\n            }\n\n            // Use ultimate when available and close\n            if (opponent.specialMeter \u003e= opponent.maxSpecialMeter \u0026\u0026 distance \u003c 150) {\n                if (Math.random() \u003c 0.05) {\n                    opponent.activateUltimate();\n                }\n            }\n\n            // Block when player attacks\n            if (player.isAttacking \u0026\u0026 distance \u003c 150) {\n                opponent.block(true);\n            } else {\n                opponent.block(false);\n            }\n\n            // Random jump\n            if (Math.random() \u003c 0.01 \u0026\u0026 opponent.onGround) {\n                opponent.jump();\n            }\n        }\n\n        // ===== COMBAT SYSTEM =====\n        function checkCombat() {\n            if (!player || !opponent) return;\n\n            // Check player hitting opponent\n            const playerHitbox = player.getHitbox();\n            if (playerHitbox) {\n                const opponentBox = {\n                    x: opponent.x - opponent.data.width / 2,\n                    y: opponent.y - opponent.data.height,\n                    width: opponent.data.width,\n                    height: opponent.data.height\n                };\n\n                if (boxCollision(playerHitbox, opponentBox)) {\n                    let damage = player.data.attacks[player.currentAttack].damage;\n                    const knockback = player.data.attacks[player.currentAttack].knockback;\n                    \n                    // Ultimate damage boost for Baki\n                    if (player.ultimateActive \u0026\u0026 player.type === 'baki') {\n                        damage *= player.data.ultimate.damageBoost;\n                    }\n                    \n                    // Musashi ultimate multi-hit\n                    if (player.ultimateActive \u0026\u0026 player.type === 'musashi') {\n                        damage = player.data.ultimate.totalDamage / player.data.ultimate.hits;\n                    }\n\n                    opponent.takeDamage(damage, player);\n                    \n                    // Apply knockback\n                    opponent.vx = (opponent.x \u003e player.x ? 1 : -1) * knockback;\n                    \n                    player.currentAttack = null; // Prevent multi-hit\n                }\n            }\n\n            // Check opponent hitting player\n            const opponentHitbox = opponent.getHitbox();\n            if (opponentHitbox) {\n                const playerBox = {\n                    x: player.x - player.data.width / 2,\n                    y: player.y - player.data.height,\n                    width: player.data.width,\n                    height: player.data.height\n                };\n\n                if (boxCollision(opponentHitbox, playerBox)) {\n                    let damage = opponent.data.attacks[opponent.currentAttack].damage;\n                    const knockback = opponent.data.attacks[opponent.currentAttack].knockback;\n                    \n                    if (opponent.ultimateActive \u0026\u0026 opponent.type === 'baki') {\n                        damage *= opponent.data.ultimate.damageBoost;\n                    }\n                    \n                    if (opponent.ultimateActive \u0026\u0026 opponent.type === 'musashi') {\n                        damage = opponent.data.ultimate.totalDamage / opponent.data.ultimate.hits;\n                    }\n\n                    player.takeDamage(damage, opponent);\n                    \n                    // Apply knockback\n                    player.vx = (player.x \u003e opponent.x ? 1 : -1) * knockback;\n                    \n                    opponent.currentAttack = null;\n                }\n            }\n\n            // Check round end\n            if (player.health \u003c= 0 || opponent.health \u003c= 0) {\n                endRound();\n            }\n        }\n\n        function boxCollision(box1, box2) {\n            return box1.x \u003c box2.x + box2.width \u0026\u0026\n                   box1.x + box1.width \u003e box2.x \u0026\u0026\n                   box1.y \u003c box2.y + box2.height \u0026\u0026\n                   box1.y + box1.height \u003e box2.y;\n        }\n\n        // ===== POWER-UP SYSTEM =====\n        function spawnPowerup() {\n            if (powerups.length \u003e= 3) return;\n\n            const spawnPoints = window.gameConfig.powerupSpawnPoints;\n            const point = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];\n            \n            const type = Math.random() \u003c 0.5 ? 'health' : 'speed';\n            \n            powerups.push({\n                type: type,\n                x: point.x,\n                y: point.y,\n                collected: false\n            });\n\n            playSound('powerup_spawn_sfx', 0.5);\n        }\n\n        function updatePowerups(deltaTime) {\n            if (gameState !== 'fighting') return;\n\n            // Spawn new powerups\n            const now = Date.now();\n            if (now - lastPowerupSpawn \u003e window.gameConfig.gameplay.powerupFrequency * 1000) {\n                spawnPowerup();\n                lastPowerupSpawn = now;\n            }\n\n            // Check collection\n            powerups = powerups.filter(powerup =\u003e {\n                if (powerup.collected) return false;\n\n                // Check player collision\n                if (Math.abs(player.x - powerup.x) \u003c 50 \u0026\u0026 Math.abs(player.y - powerup.y) \u003c 50) {\n                    collectPowerup(powerup, player);\n                    return false;\n                }\n\n                // Check opponent collision\n                if (Math.abs(opponent.x - powerup.x) \u003c 50 \u0026\u0026 Math.abs(opponent.y - powerup.y) \u003c 50) {\n                    collectPowerup(powerup, opponent);\n                    return false;\n                }\n\n                return true;\n            });\n        }\n\n        function collectPowerup(powerup, fighter) {\n            playSound('powerup_collect_sfx', 0.6);\n\n            if (powerup.type === 'health') {\n                fighter.health = Math.min(fighter.maxHealth, fighter.health + 30);\n            } else if (powerup.type === 'speed') {\n                fighter.speedBoost = 1.5;\n                fighter.speedBoostTime = 5;\n            }\n        }\n\n        function renderPowerups() {\n            powerups.forEach(powerup =\u003e {\n                const assetId = powerup.type === 'health' ? 'health_powerup' : 'speed_powerup';\n                const asset = assetCache[assetId];\n                if (!asset) return;\n\n                const size = 64;\n                const bobOffset = Math.sin(Date.now() / 200) * 10;\n                \n                ctx.save();\n                ctx.globalAlpha = 0.8 + Math.sin(Date.now() / 300) * 0.2;\n                ctx.drawImage(asset.image, powerup.x - size / 2, powerup.y - size / 2 + bobOffset, size, size);\n                ctx.restore();\n            });\n        }\n\n        // ===== PARTICLE SYSTEM =====\n        function createBloodSplatter(x, y) {\n            if (!window.gameConfig.arena.bloodEffects) return;\n\n            for (let i = 0; i \u003c 5; i++) {\n                const asset = assetCache[Math.random() \u003c 0.5 ? 'blood_splatter_1' : 'blood_splatter_2'];\n                if (!asset) continue;\n\n                particles.push({\n                    type: 'blood',\n                    x: x,\n                    y: y,\n                    vx: (Math.random() - 0.5) * 200,\n                    vy: (Math.random() - 0.5) * 200 - 100,\n                    rotation: Math.random() * Math.PI * 2,\n                    rotationSpeed: (Math.random() - 0.5) * 5,\n                    scale: 0.3 + Math.random() * 0.4,\n                    alpha: 1,\n                    life: 1,\n                    image: asset.image\n                });\n            }\n        }\n\n        function createHitSpark(x, y) {\n            const asset = assetCache['hit_spark'];\n            if (!asset) return;\n\n            particles.push({\n                type: 'spark',\n                x: x,\n                y: y,\n                scale: 1,\n                alpha: 1,\n                life: 0.3,\n                image: asset.image\n            });\n        }\n\n        function createDamageNumber(x, y, damage) {\n            particles.push({\n                type: 'damage',\n                x: x,\n                y: y,\n                vy: -100,\n                alpha: 1,\n                life: 1,\n                text: Math.round(damage).toString()\n            });\n        }\n\n        function updateParticles(deltaTime) {\n            particles = particles.filter(particle =\u003e {\n                particle.life -= deltaTime;\n                if (particle.life \u003c= 0) return false;\n\n                if (particle.type === 'blood') {\n                    particle.x += particle.vx * deltaTime;\n                    particle.y += particle.vy * deltaTime;\n                    particle.vy += GRAVITY * deltaTime * 0.3;\n                    particle.rotation += particle.rotationSpeed * deltaTime;\n                    particle.alpha = particle.life;\n                } else if (particle.type === 'spark') {\n                    particle.scale = 1 + (1 - particle.life) * 2;\n                    particle.alpha = particle.life / 0.3;\n                } else if (particle.type === 'damage') {\n                    particle.y += particle.vy * deltaTime;\n                    particle.alpha = particle.life;\n                }\n\n                return true;\n            });\n        }\n\n        function renderParticles() {\n            particles.forEach(particle =\u003e {\n                ctx.save();\n                ctx.globalAlpha = particle.alpha;\n\n                if (particle.type === 'blood') {\n                    ctx.translate(particle.x, particle.y);\n                    ctx.rotate(particle.rotation);\n                    const size = 40 * particle.scale;\n                    ctx.drawImage(particle.image, -size / 2, -size / 2, size, size);\n                } else if (particle.type === 'spark') {\n                    const size = 96 * particle.scale;\n                    ctx.globalCompositeOperation = 'lighter';\n                    ctx.drawImage(particle.image, particle.x - size / 2, particle.y - size / 2, size, size);\n                } else if (particle.type === 'damage') {\n                    ctx.font = 'bold 40px Arial';\n                    ctx.fillStyle = '#FFD700';\n                    ctx.strokeStyle = '#000';\n                    ctx.lineWidth = 4;\n                    ctx.textAlign = 'center';\n                    ctx.strokeText(particle.text, particle.x, particle.y);\n                    ctx.fillText(particle.text, particle.x, particle.y);\n                }\n\n                ctx.restore();\n            });\n        }\n\n        // ===== SCREEN EFFECTS =====\n        let screenShakeAmount = 0;\n        let screenShakeTime = 0;\n\n        function screenShake(amount, duration) {\n            screenShakeAmount = Math.max(screenShakeAmount, amount);\n            screenShakeTime = Math.max(screenShakeTime, duration);\n        }\n\n        function updateScreenShake(deltaTime) {\n            if (screenShakeTime \u003e 0) {\n                screenShakeTime -= deltaTime;\n                if (screenShakeTime \u003c= 0) {\n                    screenShakeAmount = 0;\n                }\n            }\n        }\n\n        function applyScreenShake() {\n            if (screenShakeAmount \u003e 0) {\n                const offsetX = (Math.random() - 0.5) * screenShakeAmount;\n                const offsetY = (Math.random() - 0.5) * screenShakeAmount;\n                ctx.translate(offsetX, offsetY);\n            }\n        }\n\n        // ===== ROUND MANAGEMENT =====\n        function startRound() {\n            gameState = 'fighting';\n            roundStartTime = Date.now();\n\n            // Reset fighters\n            player.health = player.maxHealth;\n            player.specialMeter = 0;\n            player.x = 200;\n            player.y = FLOOR_Y;\n            player.vx = 0;\n            player.vy = 0;\n            player.facingRight = true;\n\n            opponent.health = opponent.maxHealth;\n            opponent.specialMeter = 0;\n            opponent.x = 520;\n            opponent.y = FLOOR_Y;\n            opponent.vx = 0;\n            opponent.vy = 0;\n            opponent.facingRight = false;\n\n            powerups = [];\n            particles = [];\n            lastPowerupSpawn = Date.now();\n\n            playSound('round_start_sfx', 0.8);\n        }\n\n        function endRound() {\n            gameState = 'roundEnd';\n\n            const playerWon = opponent.health \u003c= 0;\n            if (playerWon) {\n                roundsWon.player++;\n            } else {\n                roundsWon.opponent++;\n            }\n\n            playSound('round_end_sfx', 0.7);\n            playSound('crowd_cheer_sfx', 0.5);\n\n            // Check match end\n            const maxRounds = Math.ceil(window.gameConfig.gameplay.roundCount / 2);\n            if (roundsWon.player \u003e= maxRounds || roundsWon.opponent \u003e= maxRounds) {\n                setTimeout(() =\u003e endMatch(), 2000);\n            } else {\n                currentRound++;\n                setTimeout(() =\u003e startRound(), 2000);\n            }\n        }\n\n        function endMatch() {\n            gameState = 'matchEnd';\n            matchStarted = false;\n\n            const playerWon = roundsWon.player \u003e roundsWon.opponent;\n            const winner = playerWon ? player : opponent;\n            const winnerData = CHARACTER_DATA[winner.type];\n\n            // Show end screen\n            const endScreen = document.getElementById('endScreen');\n            const endTitle = document.getElementById('endTitle');\n            const endPortrait = document.getElementById('endPortrait');\n            const endQuote = document.getElementById('endQuote');\n\n            endTitle.textContent = playerWon ? 'VICTORY!' : 'DEFEAT';\n            endTitle.className = playerWon ? 'end-title victory' : 'end-title defeat';\n            \n            const portraitAsset = assetCache[winnerData.animations[playerWon ? 'victory' : 'defeat']];\n            if (portraitAsset) {\n                endPortrait.src = portraitAsset.image.src;\n            }\n\n            endQuote.textContent = playerWon ? winnerData.victoryQuote : winnerData.defeatQuote;\n\n            endScreen.classList.remove('hidden');\n\n            playSound(playerWon ? 'victory_sfx' : 'defeat_sfx', 0.8);\n            stopBackgroundMusic();\n        }\n\n        // ===== UI RENDERING =====\n        function renderUI() {\n            if (gameState !== 'fighting' \u0026\u0026 gameState !== 'roundEnd') return;\n\n            // Health bars\n            const barWidth = 300;\n            const barHeight = 30;\n            const barY = 50;\n\n            // Player health bar (left)\n            ctx.fillStyle = '#333';\n            ctx.fillRect(20, barY, barWidth, barHeight);\n            \n            const playerHealthPercent = player.health / player.maxHealth;\n            const playerHealthWidth = barWidth * playerHealthPercent;\n            const playerHealthGradient = ctx.createLinearGradient(20, barY, 20 + barWidth, barY);\n            playerHealthGradient.addColorStop(0, '#00FF00');\n            playerHealthGradient.addColorStop(0.5, '#FFFF00');\n            playerHealthGradient.addColorStop(1, '#FF0000');\n            ctx.fillStyle = playerHealthGradient;\n            ctx.fillRect(20, barY, playerHealthWidth, barHeight);\n            \n            ctx.strokeStyle = '#FFF';\n            ctx.lineWidth = 3;\n            ctx.strokeRect(20, barY, barWidth, barHeight);\n\n            // Player name and style\n            ctx.font = 'bold 28px Arial';\n            ctx.fillStyle = '#FFD700';\n            ctx.textAlign = 'left';\n            ctx.strokeStyle = '#000';\n            ctx.lineWidth = 4;\n            ctx.strokeText(CHARACTER_DATA[player.type].name, 20, barY - 10);\n            ctx.fillText(CHARACTER_DATA[player.type].name, 20, barY - 10);\n            \n            ctx.font = 'bold 16px Arial';\n            ctx.fillStyle = '#00FF00';\n            ctx.strokeText(`[${CHARACTER_DATA[player.type].style}]`, 20, barY - 35);\n            ctx.fillText(`[${CHARACTER_DATA[player.type].style}]`, 20, barY - 35);\n\n            // Opponent health bar (right)\n            ctx.fillStyle = '#333';\n            ctx.fillRect(ARENA_WIDTH - 20 - barWidth, barY, barWidth, barHeight);\n            \n            const opponentHealthPercent = opponent.health / opponent.maxHealth;\n            const opponentHealthWidth = barWidth * opponentHealthPercent;\n            const opponentHealthGradient = ctx.createLinearGradient(ARENA_WIDTH - 20 - barWidth, barY, ARENA_WIDTH - 20, barY);\n            opponentHealthGradient.addColorStop(0, '#FF0000');\n            opponentHealthGradient.addColorStop(0.5, '#FFFF00');\n            opponentHealthGradient.addColorStop(1, '#00FF00');\n            ctx.fillStyle = opponentHealthGradient;\n            ctx.fillRect(ARENA_WIDTH - 20 - barWidth + (barWidth - opponentHealthWidth), barY, opponentHealthWidth, barHeight);\n            \n            ctx.strokeStyle = '#FFF';\n            ctx.lineWidth = 3;\n            ctx.strokeRect(ARENA_WIDTH - 20 - barWidth, barY, barWidth, barHeight);\n\n            // Opponent name and style\n            ctx.font = 'bold 28px Arial';\n            ctx.fillStyle = '#FFD700';\n            ctx.textAlign = 'right';\n            ctx.strokeStyle = '#000';\n            ctx.lineWidth = 4;\n            ctx.strokeText(CHARACTER_DATA[opponent.type].name, ARENA_WIDTH - 20, barY - 10);\n            ctx.fillText(CHARACTER_DATA[opponent.type].name, ARENA_WIDTH - 20, barY - 10);\n            \n            ctx.font = 'bold 16px Arial';\n            ctx.fillStyle = '#00FF00';\n            ctx.strokeText(`[${CHARACTER_DATA[opponent.type].style}]`, ARENA_WIDTH - 20, barY - 35);\n            ctx.fillText(`[${CHARACTER_DATA[opponent.type].style}]`, ARENA_WIDTH - 20, barY - 35);\n\n            // Special meters\n            const meterY = barY + barHeight + 10;\n            const meterHeight = 15;\n\n            // Player special meter\n            ctx.fillStyle = '#222';\n            ctx.fillRect(20, meterY, barWidth, meterHeight);\n            \n            const playerMeterPercent = player.specialMeter / player.maxSpecialMeter;\n            const playerMeterWidth = barWidth * playerMeterPercent;\n            ctx.fillStyle = playerMeterPercent \u003e= 1 ? '#FFD700' : '#00AAFF';\n            ctx.fillRect(20, meterY, playerMeterWidth, meterHeight);\n            \n            if (playerMeterPercent \u003e= 1) {\n                ctx.save();\n                ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 200) * 0.5;\n                ctx.fillStyle = '#FFFF00';\n                ctx.fillRect(20, meterY, playerMeterWidth, meterHeight);\n                ctx.restore();\n            }\n            \n            ctx.strokeStyle = '#FFF';\n            ctx.lineWidth = 2;\n            ctx.strokeRect(20, meterY, barWidth, meterHeight);\n\n            // Opponent special meter\n            ctx.fillStyle = '#222';\n            ctx.fillRect(ARENA_WIDTH - 20 - barWidth, meterY, barWidth, meterHeight);\n            \n            const opponentMeterPercent = opponent.specialMeter / opponent.maxSpecialMeter;\n            const opponentMeterWidth = barWidth * opponentMeterPercent;\n            ctx.fillStyle = opponentMeterPercent \u003e= 1 ? '#FFD700' : '#00AAFF';\n            ctx.fillRect(ARENA_WIDTH - 20 - barWidth + (barWidth - opponentMeterWidth), meterY, opponentMeterWidth, meterHeight);\n            \n            if (opponentMeterPercent \u003e= 1) {\n                ctx.save();\n                ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 200) * 0.5;\n                ctx.fillStyle = '#FFFF00';\n                ctx.fillRect(ARENA_WIDTH - 20 - barWidth + (barWidth - opponentMeterWidth), meterY, opponentMeterWidth, meterHeight);\n                ctx.restore();\n            }\n            \n            ctx.strokeStyle = '#FFF';\n            ctx.lineWidth = 2;\n            ctx.strokeRect(ARENA_WIDTH - 20 - barWidth, meterY, barWidth, meterHeight);\n\n            // Round indicators\n            const roundY = 150;\n            const roundSize = 40;\n            const roundGap = 10;\n            const totalRounds = window.gameConfig.gameplay.roundCount;\n            const startX = (ARENA_WIDTH - (roundSize * totalRounds + roundGap * (totalRounds - 1))) / 2;\n\n            for (let i = 0; i \u003c totalRounds; i++) {\n                const x = startX + i * (roundSize + roundGap);\n                \n                ctx.fillStyle = '#333';\n                ctx.beginPath();\n                ctx.arc(x + roundSize / 2, roundY, roundSize / 2, 0, Math.PI * 2);\n                ctx.fill();\n\n                if (i \u003c roundsWon.player) {\n                    ctx.fillStyle = '#00FF00';\n                } else if (i \u003c roundsWon.opponent) {\n                    ctx.fillStyle = '#FF0000';\n                } else {\n                    ctx.fillStyle = '#666';\n                }\n                \n                ctx.beginPath();\n                ctx.arc(x + roundSize / 2, roundY, roundSize / 2 - 5, 0, Math.PI * 2);\n                ctx.fill();\n\n                ctx.strokeStyle = '#FFF';\n                ctx.lineWidth = 2;\n                ctx.beginPath();\n                ctx.arc(x + roundSize / 2, roundY, roundSize / 2, 0, Math.PI * 2);\n                ctx.stroke();\n            }\n\n            // Round number\n            ctx.font = 'bold 36px Arial';\n            ctx.fillStyle = '#FFD700';\n            ctx.textAlign = 'center';\n            ctx.strokeStyle = '#000';\n            ctx.lineWidth = 4;\n            ctx.strokeText(`ROUND ${currentRound}`, ARENA_WIDTH / 2, roundY + 60);\n            ctx.fillText(`ROUND ${currentRound}`, ARENA_WIDTH / 2, roundY + 60);\n\n            // Round end message\n            if (gameState === 'roundEnd') {\n                ctx.save();\n                ctx.globalAlpha = 0.8;\n                ctx.fillStyle = '#000';\n                ctx.fillRect(0, ARENA_HEIGHT / 2 - 100, ARENA_WIDTH, 200);\n                ctx.restore();\n\n                ctx.font = 'bold 60px Arial';\n                ctx.fillStyle = player.health \u003e 0 ? '#FFD700' : '#FF0000';\n                ctx.textAlign = 'center';\n                ctx.strokeStyle = '#000';\n                ctx.lineWidth = 6;\n                const message = player.health \u003e 0 ? 'ROUND WIN!' : 'ROUND LOST!';\n                ctx.strokeText(message, ARENA_WIDTH / 2, ARENA_HEIGHT / 2);\n                ctx.fillText(message, ARENA_WIDTH / 2, ARENA_HEIGHT / 2);\n            }\n        }\n\n        // ===== INPUT HANDLING =====\n        function handleInput() {\n            if (gameState !== 'fighting' || !player) return;\n\n            // Movement\n            let moveDir = 0;\n            if (keys['ArrowLeft'] || keys['a'] || keys['A']) moveDir -= 1;\n            if (keys['ArrowRight'] || keys['d'] || keys['D']) moveDir += 1;\n            \n            // Touch D-pad\n            if (touchState.dpad.active) {\n                if (touchState.dpad.x \u003c -0.3) moveDir -= 1;\n                if (touchState.dpad.x \u003e 0.3) moveDir += 1;\n            }\n\n            player.move(moveDir);\n\n            // Jump\n            if (keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' ']) {\n                player.jump();\n                keys['ArrowUp'] = false;\n                keys['w'] = false;\n                keys['W'] = false;\n                keys[' '] = false;\n            }\n            if (touchState.dpad.active \u0026\u0026 touchState.dpad.y \u003c -0.5) {\n                player.jump();\n            }\n\n            // Punch\n            if (keys['j'] || keys['J'] || touchState.buttons.punch) {\n                player.attack('punch');\n                keys['j'] = false;\n                keys['J'] = false;\n            }\n            // Kick\n            if (keys['k'] || keys['K'] || touchState.buttons.kick) {\n                player.attack('kick');\n                keys['k'] = false;\n                keys['K'] = false;\n            }\n            // Power attack\n            if (keys['p'] || keys['P'] || touchState.buttons.power) {\n                player.attack('power');\n                keys['p'] = false;\n                keys['P'] = false;\n            }\n            // Ultimate\n            if (keys['l'] || keys['L'] || touchState.buttons.ultimate) {\n                player.activateUltimate();\n                keys['l'] = false;\n                keys['L'] = false;\n            }\n\n            // Block\n            const blocking = keys['ArrowDown'] || keys['s'] || keys['S'] || touchState.buttons.block;\n            player.block(blocking);\n        }\n\n        // Keyboard events\n        window.addEventListener('keydown', (e) =\u003e {\n            keys[e.key] = true;\n            e.preventDefault();\n        });\n\n        window.addEventListener('keyup', (e) =\u003e {\n            keys[e.key] = false;\n        });\n\n        window.addEventListener('blur', () =\u003e {\n            keys = {};\n        });\n\n        // Touch controls\n        function setupTouchControls() {\n            const dpadContainer = document.querySelector('.dpad-container');\n            const dpadStick = document.getElementById('dpadStick');\n            const punchBtn = document.getElementById('punchBtn');\n            const kickBtn = document.getElementById('kickBtn');\n            const powerBtn = document.getElementById('powerBtn');\n            const ultimateBtn = document.getElementById('ultimateBtn');\n            const blockBtn = document.getElementById('blockBtn');\n\n            // D-pad\n            dpadContainer.addEventListener('touchstart', (e) =\u003e {\n                e.preventDefault();\n                const touch = e.touches[0];\n                touchState.dpad.touchId = touch.identifier;\n                touchState.dpad.active = true;\n                updateDpad(touch, dpadContainer, dpadStick);\n            });\n\n            dpadContainer.addEventListener('touchmove', (e) =\u003e {\n                e.preventDefault();\n                const touch = Array.from(e.touches).find(t =\u003e t.identifier === touchState.dpad.touchId);\n                if (touch) {\n                    updateDpad(touch, dpadContainer, dpadStick);\n                }\n            });\n\n            dpadContainer.addEventListener('touchend', (e) =\u003e {\n                e.preventDefault();\n                touchState.dpad.active = false;\n                touchState.dpad.touchId = null;\n                touchState.dpad.x = 0;\n                touchState.dpad.y = 0;\n                dpadStick.style.transform = 'translate(-50%, -50%)';\n            });\n\n            function updateDpad(touch, container, stick) {\n                const rect = container.getBoundingClientRect();\n                const centerX = rect.left + rect.width / 2;\n                const centerY = rect.top + rect.height / 2;\n                const maxRadius = 60;\n\n                let dx = touch.clientX - centerX;\n                let dy = touch.clientY - centerY;\n                const distance = Math.sqrt(dx * dx + dy * dy);\n\n                if (distance \u003e maxRadius) {\n                    dx = (dx / distance) * maxRadius;\n                    dy = (dy / distance) * maxRadius;\n                }\n\n                touchState.dpad.x = dx / maxRadius;\n                touchState.dpad.y = dy / maxRadius;\n\n                stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;\n            }\n\n            // Action buttons\n            function setupButton(btn, key) {\n                btn.addEventListener('touchstart', (e) =\u003e {\n                    e.preventDefault();\n                    touchState.buttons[key] = true;\n                });\n                btn.addEventListener('touchend', (e) =\u003e {\n                    e.preventDefault();\n                    touchState.buttons[key] = false;\n                });\n            }\n\n            setupButton(punchBtn, 'punch');\n            setupButton(kickBtn, 'kick');\n            setupButton(powerBtn, 'power');\n            setupButton(ultimateBtn, 'ultimate');\n            setupButton(blockBtn, 'block');\n\n            // Update ultimate button glow\n            setInterval(() =\u003e {\n                if (player \u0026\u0026 player.specialMeter \u003e= player.maxSpecialMeter) {\n                    ultimateBtn.classList.add('ready');\n                } else {\n                    ultimateBtn.classList.remove('ready');\n                }\n            }, 100);\n\n            // Update power button glow\n            setInterval(() =\u003e {\n                if (player \u0026\u0026 player.specialMeter \u003e= (player.data.attacks.power?.meterCost || 50)) {\n                    powerBtn.classList.add('ready');\n                } else {\n                    powerBtn.classList.remove('ready');\n                }\n            }, 100);\n        }\n\n        // ===== CHARACTER SELECTION =====\n        function setupCharacterSelection() {\n            const characterSelect = document.getElementById('characterSelect');\n            const cards = characterSelect.querySelectorAll('.character-card');\n            const startBtn = document.getElementById('startFightBtn');\n\n            // Set character portraits\n            const bakiImg = document.getElementById('bakiSelectImg');\n            const musashiImg = document.getElementById('musashiSelectImg');\n            \n            const bakiAsset = assetCache['baki_idle'];\n            const musashiAsset = assetCache['musashi_idle'];\n            \n            if (bakiAsset) bakiImg.src = bakiAsset.image.src;\n            if (musashiAsset) musashiImg.src = musashiAsset.image.src;\n\n            cards.forEach(card =\u003e {\n                card.addEventListener('click', () =\u003e {\n                    cards.forEach(c =\u003e c.classList.remove('selected'));\n                    card.classList.add('selected');\n                    playerCharacter = card.dataset.character;\n                    startBtn.disabled = false;\n                });\n            });\n\n            startBtn.addEventListener('click', () =\u003e {\n                if (!playerCharacter) return;\n                \n                characterSelect.classList.add('hidden');\n                opponentCharacter = playerCharacter === 'baki' ? 'musashi' : 'baki';\n                startMatch();\n            });\n\n            characterSelect.classList.remove('hidden');\n        }\n\n        function startMatch() {\n            matchStarted = true;\n            roundsWon = { player: 0, opponent: 0 };\n            currentRound = 1;\n\n            // Create fighters\n            player = new Fighter(playerCharacter, 200, FLOOR_Y, true);\n            opponent = new Fighter(opponentCharacter, 520, FLOOR_Y, false);\n\n            playBackgroundMusic();\n            startRound();\n        }\n\n        // ===== EDIT MODE =====\n        function setupEditMode() {\n            lib.log('Setting up edit mode');\n\n            // Show game parameters\n            lib.showGameParameters({\n                name: 'Game Settings',\n                params: {\n                    'Round Count': {\n                        key: 'gameConfig.gameplay.roundCount',\n                        type: 'dropdown',\n                        options: [\n                            { label: 'Best of 1', value: 1 },\n                            { label: 'Best of 3', value: 3 },\n                            { label: 'Best of 5', value: 5 }\n                        ],\n                        onChange: (value) =\u003e {\n                            window.gameConfig.gameplay.roundCount = value;\n                        }\n                    },\n                    'Damage Multiplier': {\n                        key: 'gameConfig.gameplay.damageMultiplier',\n                        type: 'slider',\n                        min: 0.7,\n                        max: 1.3,\n                        step: 0.1,\n                        onChange: (value) =\u003e {\n                            window.gameConfig.gameplay.damageMultiplier = value;\n                        }\n                    },\n                    'Movement Speed': {\n                        key: 'gameConfig.gameplay.movementSpeed',\n                        type: 'slider',\n                        min: 0.8,\n                        max: 1.2,\n                        step: 0.1,\n                        onChange: (value) =\u003e {\n                            window.gameConfig.gameplay.movementSpeed = value;\n                        }\n                    },\n                    'Power-up Frequency (seconds)': {\n                        key: 'gameConfig.gameplay.powerupFrequency',\n                        type: 'slider',\n                        min: 5,\n                        max: 15,\n                        step: 1,\n                        onChange: (value) =\u003e {\n                            window.gameConfig.gameplay.powerupFrequency = value;\n                        }\n                    },\n                    'Blood Effects': {\n                        key: 'gameConfig.arena.bloodEffects',\n                        type: 'checkbox',\n                        onChange: (value) =\u003e {\n                            window.gameConfig.arena.bloodEffects = value;\n                        }\n                    },\n                    'Music Volume': {\n                        key: 'gameConfig.audio.musicVolume',\n                        type: 'slider',\n                        min: 0,\n                        max: 1,\n                        step: 0.1,\n                        onChange: (value) =\u003e {\n                            window.gameConfig.audio.musicVolume = value;\n                        }\n                    },\n                    'SFX Volume': {\n                        key: 'gameConfig.audio.sfxVolume',\n                        type: 'slider',\n                        min: 0,\n                        max: 1,\n                        step: 0.1,\n                        onChange: (value) =\u003e {\n                            window.gameConfig.audio.sfxVolume = value;\n                        }\n                    }\n                }\n            });\n\n            // Render spawn points as editable\n            renderEditMode();\n        }\n\n        function renderEditMode() {\n            // Clear canvas\n            ctx.fillStyle = '#000';\n            ctx.fillRect(0, 0, ARENA_WIDTH, ARENA_HEIGHT);\n\n            // Draw background\n            const bgAsset = assetCache['arena_background'];\n            if (bgAsset) {\n                ctx.drawImage(bgAsset.image, 0, 0, ARENA_WIDTH, ARENA_HEIGHT);\n            }\n\n            // Draw spawn points\n            window.gameConfig.powerupSpawnPoints.forEach((point, index) =\u003e {\n                ctx.beginPath();\n                ctx.arc(point.x, point.y, 20, 0, Math.PI * 2);\n                ctx.strokeStyle = selectedSpawnPoint === index ? '#FF0000' : '#FFD700';\n                ctx.lineWidth = 3;\n                ctx.setLineDash([5, 5]);\n                ctx.stroke();\n                ctx.setLineDash([]);\n                \n                ctx.fillStyle = 'rgba(255, 215, 0, 0.2)';\n                ctx.fill();\n\n                ctx.font = 'bold 16px Arial';\n                ctx.fillStyle = '#FFF';\n                ctx.textAlign = 'center';\n                ctx.fillText(`Spawn ${index + 1}`, point.x, point.y + 40);\n            });\n\n            // Instructions\n            ctx.font = 'bold 24px Arial';\n            ctx.fillStyle = '#FFD700';\n            ctx.textAlign = 'center';\n            ctx.fillText('EDIT MODE - Click spawn points to edit', ARENA_WIDTH / 2, 250);\n        }\n\n        canvas.addEventListener('click', (e) =\u003e {\n            if (currentMode !== 'edit') return;\n\n            const rect = canvas.getBoundingClientRect();\n            const scaleX = ARENA_WIDTH / rect.width;\n            const scaleY = ARENA_HEIGHT / rect.height;\n            const x = (e.clientX - rect.left) * scaleX;\n            const y = (e.clientY - rect.top) * scaleY;\n\n            // Check spawn point clicks\n            window.gameConfig.powerupSpawnPoints.forEach((point, index) =\u003e {\n                const distance = Math.sqrt((x - point.x) ** 2 + (y - point.y) ** 2);\n                if (distance \u003c 30) {\n                    selectedSpawnPoint = index;\n                    openSpawnPointEditor(index);\n                }\n            });\n        });\n\n        function openSpawnPointEditor(index) {\n            const point = window.gameConfig.powerupSpawnPoints[index];\n\n            lib.editMenu.open({\n                name: `Spawn Point ${index + 1}`,\n                params: {\n                    'X Position': {\n                        key: `gameConfig.powerupSpawnPoints.${index}.x`,\n                        type: 'slider',\n                        min: 50,\n                        max: ARENA_WIDTH - 50,\n                        step: 10,\n                        onChange: (value) =\u003e {\n                            window.gameConfig.powerupSpawnPoints[index].x = value;\n                            renderEditMode();\n                        }\n                    },\n                    'Y Position': {\n                        key: `gameConfig.powerupSpawnPoints.${index}.y`,\n                        type: 'slider',\n                        min: 500,\n                        max: FLOOR_Y,\n                        step: 10,\n                        onChange: (value) =\u003e {\n                            window.gameConfig.powerupSpawnPoints[index].y = value;\n                            renderEditMode();\n                        }\n                    }\n                },\n                onCopy: () =\u003e {\n                    const newPoint = { ...point };\n                    newPoint.x += 50;\n                    window.gameConfig.powerupSpawnPoints.push(newPoint);\n                    renderEditMode();\n                },\n                onDelete: () =\u003e {\n                    if (window.gameConfig.powerupSpawnPoints.length \u003e 1) {\n                        window.gameConfig.powerupSpawnPoints.splice(index, 1);\n                        selectedSpawnPoint = null;\n                        lib.editMenu.close();\n                        renderEditMode();\n                    }\n                }\n            });\n        }\n\n        // ===== GAME LOOP =====\n        let lastTime = Date.now();\n\n        function gameLoop() {\n            const now = Date.now();\n            let deltaTime = (now - lastTime) / 1000;\n            lastTime = now;\n\n            // Limit delta time\n            deltaTime = Math.min(deltaTime, 0.11);\n\n            if (currentMode === 'edit') {\n                renderEditMode();\n            } else if (currentMode === 'play') {\n                // Update\n                if (gameState === 'fighting') {\n                    handleInput();\n                    \n                    if (player) player.update(deltaTime);\n                    if (opponent) {\n                        opponent.update(deltaTime);\n                        updateAI(deltaTime);\n                    }\n                    \n                    checkCombat();\n                    updatePowerups(deltaTime);\n                    updateParticles(deltaTime);\n                    updateScreenShake(deltaTime);\n                }\n\n                // Render\n                ctx.save();\n                applyScreenShake();\n\n                // Background\n                const bgAsset = assetCache['arena_background'];\n                if (bgAsset) {\n                    ctx.drawImage(bgAsset.image, 0, 0, ARENA_WIDTH, ARENA_HEIGHT);\n                }\n\n                // Game objects\n                if (matchStarted \u0026\u0026 gameState !== 'characterSelect') {\n                    renderPowerups();\n                    if (opponent) opponent.render();\n                    if (player) player.render();\n                    renderParticles();\n                    renderUI();\n                }\n\n                ctx.restore();\n            }\n\n            requestAnimationFrame(gameLoop);\n        }\n\n        // ===== MAIN RUN FUNCTION =====\n        async function run(mode) {\n            lib.log('run() called. Mode: ' + mode);\n            currentMode = mode;\n\n            // Preload assets\n            await preloadAssets();\n\n            // Hide loading screen\n            document.getElementById('loadingScreen').classList.add('hidden');\n\n            if (mode === 'edit') {\n                setupEditMode();\n            } else if (mode === 'play') {\n
