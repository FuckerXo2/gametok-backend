                mean += d / n;
                M2 += d * (x - mean);

    &lt;script&gt;
        /*
         * PIXEL MERGE MANIA
         * A casual puzzle game where players place and merge pixel art items on a grid.
         * Match 2+ adjacent identical items to merge them into the next tier.
         * Progress through 8 tiers from Seed to Rainbow Bear!
         */

        async function run(mode) {
            const gameWorld = document.getElementById('game-world');
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');

            const spawnBtn = document.getElementById('spawn-btn');

            const editInfoEl = document.getElementById('edit-info');

            // Canvas setup
            function resizeCanvas() {
                canvas.width = gameWorld.clientWidth;
                canvas.height = gameWorld.clientHeight;
                positionSpawnButton();
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // Asset IDs
            const tierAssetIds = [
                'tier1_plank',
                'tier2_woodpile',
                'tier3_foundation',
                'tier4_frame',
                'tier5_hut',
                'tier6_cottage',
                'tier7_house',
                'tier8_mansion',
                'tier9_castle'
            ];
            const audioAssetIds = ['spawn_sound', 'merge_sound', 'game_over_sound'];
            const musicAssetId = 'background_music';

            // Asset caches
            const imageCache = {};
            const audioBufferCache = {};
            let audioContext = null;
            let backgroundMusicSource = null;
            let backgroundMusicBuffer = null;

            // Essential assets to preload (shown on loading screen)
            const essentialAssetIds = ['tier1_plank', 'tier2_woodpile'];
            
            // Loading screen elements
            const loadingScreen = document.getElementById('loading-screen');
            const loadingBar = document.getElementById('loading-bar');
            const loadingText = document.getElementById('loading-text');

            // Load a single image
            function loadImage(id) {
                return new Promise((resolve) =&gt; {
                    const assetInfo = lib.getAsset(id);
                    if (assetInfo &amp;&amp; assetInfo.url) {
                        const img = new Image();
                        img.crossOrigin = 'anonymous';
                        img.onload = () =&gt; {
                            imageCache[id] = img;
                            resolve(true);
                        };
                        img.onerror = () =&gt; {
                            lib.log(`Failed to load image: ${id}`);
                            resolve(false);
                        };
                        img.src = assetInfo.url;
                    } else {
                        resolve(false);
                    }
                });
            }

            // Preload essential images with loading bar
            async function preloadEssentialImages() {
                const total = essentialAssetIds.length;
                let loaded = 0;
                
                for (const id of essentialAssetIds) {
                    loadingText.textContent = `Loading ${id.replace('tier', 'Tier ').replace('_', ' ')}...`;
                    await loadImage(id);
                    loaded++;
                    loadingBar.style.width = `${(loaded / total) * 100}%`;
                }
                
                loadingText.textContent = 'Ready!';
                loadingBar.style.width = '100%';
            }

            // Lazy load remaining images in background
            function lazyLoadRemainingImages() {
                const remainingIds = tierAssetIds.filter(id =&gt; !essentialAssetIds.includes(id));
                remainingIds.forEach(id =&gt; {
                    if (!imageCache[id]) {
                        loadImage(id);
                    }
                });
            }

            // Hide loading screen
            function hideLoadingScreen() {
                loadingScreen.classList.add('hidden');
                setTimeout(() =&gt; {
                    loadingScreen.style.display = 'none';
                }, 500);
            }

            // Initialize audio context
            function initAudioContext() {
                if (!audioContext) {
                    try {
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        lib.log('Failed to create AudioContext');
                        return null;
                    }
                }
                return audioContext;
            }

            // Preload audio
            async function preloadAudio() {
                const ctx = initAudioContext();
                if (!ctx) return;
                
                const promises = audioAssetIds.map(async id =&gt; {
                    try {
                        const assetInfo = lib.getAsset(id);
                        if (assetInfo &amp;&amp; assetInfo.url) {
                            const response = await fetch(assetInfo.url);
                            const arrayBuffer = await response.arrayBuffer();
                            const audioBuffer = await new Promise((resolve, reject) =&gt; {
                                const decodeResult = ctx.decodeAudioData(arrayBuffer, resolve, reject);
                                if (decodeResult) decodeResult.then(resolve).catch(reject);
                            });
                            audioBufferCache[id] = audioBuffer;
                        }
                    } catch (e) {
                        lib.log(`Failed to load audio: ${id}`);
                    }
                });
                
                // Load background music separately
                try {
                    const musicInfo = lib.getAsset(musicAssetId);
                    if (musicInfo &amp;&amp; musicInfo.url) {
                        const response = await fetch(musicInfo.url);
                        const arrayBuffer = await response.arrayBuffer();
                        backgroundMusicBuffer = await new Promise((resolve, reject) =&gt; {
                            const decodeResult = ctx.decodeAudioData(arrayBuffer, resolve, reject);
                            if (decodeResult) decodeResult.then(resolve).catch(reject);
                        });
                    }
                } catch (e) {
                    lib.log(`Failed to load background music: ${musicAssetId}`);
                }
                
                await Promise.all(promises);
            }

            // Play sound
            function playSound(id) {
                if (!audioContext || !audioBufferCache[id]) return;
                try {
                    if (audioContext.state === 'suspended') {
                        audioContext.resume();
                    }
                    const source = audioContext.createBufferSource();
                    source.buffer = audioBufferCache[id];
                    
                    // Create a gain node to control volume (set to 0.4 for SFX level)
                    const gainNode = audioContext.createGain();
                    gainNode.gain.value = 0.4;
                    
                    source.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    source.start(0);
                } catch (e) {
                    lib.log(`Error playing sound: ${id}`);
                }
            }

            // Play background music (looping)
            function playBackgroundMusic() {
                if (!audioContext || !backgroundMusicBuffer) return;
                
                // Stop existing music if playing
                if (backgroundMusicSource) {
                    try {
                        backgroundMusicSource.stop();
                    } catch (e) {
                        // Ignore if already stopped
                    }
                }
                
                try {
                    if (audioContext.state === 'suspended') {
                        audioContext.resume();
                    }
                    backgroundMusicSource = audioContext.createBufferSource();
                    backgroundMusicSource.buffer = backgroundMusicBuffer;
                    backgroundMusicSource.loop = true;
                    
                    // Create a gain node to control volume (set to 0.3 for background level)
                    const gainNode = audioContext.createGain();
                    gainNode.gain.value = 0.3;
                    
                    backgroundMusicSource.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    backgroundMusicSource.start(0);
                } catch (e) {
                    lib.log(`Error playing background music: ${e}`);
                }
            }

            // Stop background music
            function stopBackgroundMusic() {
                if (backgroundMusicSource) {
                    try {
                        backgroundMusicSource.stop();
                        backgroundMusicSource = null;
                    } catch (e) {
                        // Ignore if already stopped
                    }
                }

            // Game configuration defaults
            const defaultConfig = {
                gridSize: 5,
                gridColors: {
                    background: '#E8DCC8',
                    cell: '#D4C4A8',
                    border: '#8B7355',

                startingTierRange: { min: 1, max: 3 },

            // Runtime state

            let particles = [];

            let hoveredCell = null;
            let lastTime = 0;
            let discoveredTiers = new Set([1]); // Start with only tier 1 discovered

            let dragState = {

                startRow: -1,
                startCol: -1,
                currentX: 0,
                currentY: 0,
                offsetX: 0,
                offsetY: 0
            };
            let tutorialState = {

                step: 'waitForSpawn', // 'waitForSpawn', 'waitForMerge', 'complete'
                pulseTime: 0,
                seedCells: [] // Track positions of tutorial seeds
            };

            // Grid calculations
            function getGridMetrics() {
                const config = window.gameConfig;
                const gridSize = config.gridSize || 5;
                const cellGap = 8;
                
                // Calculate available space considering UI elements
                const topMargin = 120; // Space for progress bar
                const bottomMargin = 180; // Space for spawn button
                const horizontalPadding = 20;
                
                const availableWidth = canvas.width - (horizontalPadding * 2);
                const availableHeight = canvas.height - topMargin - bottomMargin;
                
                // Use the smaller dimension to keep cells square
                const maxGridSize = Math.min(availableWidth, availableHeight);
                
                const cellSize = Math.floor((maxGridSize - (gridSize - 1) * cellGap) / gridSize);
                const totalGridWidth = gridSize * cellSize + (gridSize - 1) * cellGap;
                const totalGridHeight = totalGridWidth;
                
                // Center horizontally and vertically
                const gridX = (canvas.width - totalGridWidth) / 2;
                const gridY = topMargin + (availableHeight - totalGridHeight) / 2;
                
                return { gridSize, cellSize, cellGap, gridX, gridY, totalGridWidth, totalGridHeight };
            }

            // Initialize grid
            function initGrid() {
                const { gridSize } = getGridMetrics();
                grid = [];
                for (let row = 0; row &lt; gridSize; row++) {
                    grid[row] = [];
                    for (let col = 0; col &lt; gridSize; col++) {
                        grid[row][col] = 0;
                    }
                }
                gameOver = false;
                victoryAchieved = false;
                particles = [];
                animations = [];
                discoveredTiers = new Set([1]);
                discoveryAnimation = null;
                
                // Tutorial setup: place one plank in the center for play mode
                if (mode === 'play' &amp;&amp; !tutorialState.active) {
                    tutorialState.active = true;
                    tutorialState.step = 'waitForSpawn';
                    tutorialState.pulseTime = 0;
                    
                    // Place first plank in center of grid
                    const centerRow = Math.floor(gridSize / 2);
                    const centerCol = Math.floor(gridSize / 2);
                    grid[centerRow][centerCol] = 1;
                    tutorialState.seedCells = [{ row: centerRow, col: centerCol }];
                }
            }

            // Get cell position
            function getCellPosition(row, col) {
                const { cellSize, cellGap, gridX, gridY } = getGridMetrics();
                return {
                    x: gridX + col * (cellSize + cellGap),
                    y: gridY + row * (cellSize + cellGap)
                };
            }

            // Get cell from position
            function getCellFromPosition(x, y) {
                const { gridSize, cellSize, cellGap, gridX, gridY } = getGridMetrics();
                for (let row = 0; row &lt; gridSize; row++) {
                    for (let col = 0; col &lt; gridSize; col++) {
                        const pos = getCellPosition(row, col);
                        if (x &gt;= pos.x &amp;&amp; x &lt; pos.x + cellSize &amp;&amp;
                            y &gt;= pos.y &amp;&amp; y &lt; pos.y + cellSize) {
                            return { row, col };
                        }
                    }
                }
                return null;
            }

            // Spawn random item at specific cell
            function spawnItem(row, col) {
                if (grid[row][col] !== 0 || gameOver) return false;

                const config = window.gameConfig;
                const minTier = config.startingTierRange?.min || 1;
                const maxTier = config.startingTierRange?.max || 3;
                const tier = Math.floor(Math.random() * (maxTier - minTier + 1)) + minTier;

                grid[row][col] = tier;
                playSound('spawn_sound');

                // Add spawn animation
                const pos = getCellPosition(row, col);
                const { cellSize } = getGridMetrics();
                animations.push({
                    type: 'spawn',
                    row, col,
                    x: pos.x + cellSize / 2,
                    y: pos.y + cellSize / 2,
                    scale: 0,
                    targetScale: 1,
                    duration: 300,
                    elapsed: 0
                });

                return true;
            }

            // Spawn item in random empty cell (tier 1 only)
            function spawnRandomItem() {
                if (gameOver) return;

                const { gridSize } = getGridMetrics();
                const emptyCells = [];

                // Find all empty cells
                for (let row = 0; row &lt; gridSize; row++) {
                    for (let col = 0; col &lt; gridSize; col++) {
                        if (grid[row][col] === 0) {
                            emptyCells.push({ row, col });
                        }
                    }
                }

                if (emptyCells.length === 0) return;

                // Pick random empty cell
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                
                // Always spawn tier 1 (first level item)
                grid[randomCell.row][randomCell.col] = 1;
                playSound('spawn_sound');

                // Add spawn animation
                const pos = getCellPosition(randomCell.row, randomCell.col);
                const { cellSize } = getGridMetrics();
                animations.push({
                    type: 'spawn',
                    row: randomCell.row,
                    col: randomCell.col,
                    x: pos.x + cellSize / 2,
                    y: pos.y + cellSize / 2,
                    scale: 0,
                    targetScale: 1,
                    duration: 300,
                    elapsed: 0

                    const key = `${row},${col}`;

                    if (visited.has(key)) continue;
                    if (row &lt; 0 || row &gt;= gridSize || col &lt; 0 || col &gt;= gridSize) continue;
                    if (grid[row][col] !== tier) continue;

                    visited.add(key);
                    group.push({ row, col });

                    // Check adjacent cells (not diagonal)
                    queue.push({ row: row - 1, col });
                    queue.push({ row: row + 1, col });
                    queue.push({ row, col: col - 1 });
                    queue.push({ row, col: col + 1 });
                }

                return group;
            }

            // Merge two items (drag-based merge)
            function mergeTwoItems(fromRow, fromCol, toRow, toCol) {
                const tier = grid[fromRow][fromCol];
                const newTier = Math.min(tier + 1, 9);
                const { cellSize } = getGridMetrics();

                // Check if this is a first-time discovery
                const isNewDiscovery = !discoveredTiers.has(newTier);
                
                if (isNewDiscovery &amp;&amp; mode === 'play') {
                    // Trigger discovery animation
                    const fromPos = getCellPosition(fromRow, fromCol);
                    const toPos = getCellPosition(toRow, toCol);
                    
                    startDiscoveryAnimation(
                        tier,
                        newTier,
                        fromPos.x + cellSize / 2,
                        fromPos.y + cellSize / 2,
                        toPos.x + cellSize / 2,
                        toPos.y + cellSize / 2
                    );
                    
                    // Clear both cells
                    grid[fromRow][fromCol] = 0;
                    grid[toRow][toCol] = 0;
                    
                    // Mark as discovered
                    discoveredTiers.add(newTier);
                } else {
                    // Normal merge (already discovered)
                    // Create particles at both cells
                    const fromPos = getCellPosition(fromRow, fromCol);
                    const toPos = getCellPosition(toRow, toCol);
                    createMergeParticles(fromPos.x + cellSize / 2, fromPos.y + cellSize / 2, tier);
                    createMergeParticles(toPos.x + cellSize / 2, toPos.y + cellSize / 2, tier);

                    // Clear both cells
                    grid[fromRow][fromCol] = 0;
                    grid[toRow][toCol] = 0;

                    // Place merged item at target
                    grid[toRow][toCol] = newTier;

                    // Add spawn animation
                    animations.push({
                        type: 'spawn',
                        row: toRow,
                        col: toCol,
                        x: toPos.x + cellSize / 2,
                        y: toPos.y + cellSize / 2,
                        scale: 0,
                        targetScale: 1,
                        duration: 300,
                        elapsed: 0
                    });

                    playSound('merge_sound');
                }
                
                // Tutorial: Complete after first merge
                if (tutorialState.active &amp;&amp; tutorialState.step === 'waitForMerge') {
                    tutorialState.step = 'complete';
                    tutorialState.active = false;
                }
                
                // Player can continue merging indefinitely - no game over
            }


            // Create merge particles
            function createMergeParticles(x, y, tier) {
                const colors = ['#FFD700', '#FF6B35', '#4CAF50', '#2196F3', '#9C27B0', '#FF69B4'];
                const color = colors[tier % colors.length];

                for (let i = 0; i &lt; 12; i++) {
                    const angle = (Math.PI * 2 * i) / 12;
                    const speed = 100 + Math.random() * 100;
                    particles.push({
                        x, y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        size: 6 + Math.random() * 6,
                        color,
                        life: 1,
                        decay: 1.5 + Math.random() * 0.5
                    });
                }
            }

            // Start discovery animation
            function startDiscoveryAnimation(oldTier, newTier, x1, y1, x2, y2) {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                
                discoveryAnimation = {
                    phase: 'converge', // converge -&gt; collide -&gt; reveal -&gt; waitForTap
                    elapsed: 0,
                    oldTier,
                    newTier,
                    item1: { x: x1, y: y1, targetX: centerX - 40, targetY: centerY },
                    item2: { x: x2, y: y2, targetX: centerX + 40, targetY: centerY },
                    convergeDuration: 0.8,
                    collideDuration: 0.3,
                    revealDuration: 1.0,
                    scale: 1,
                    opacity: 1,
                    sunburstRotation: 0,
                    particles: [],
                    tapPromptAlpha: 0
                };
                
                // Disable pointer events and dim UI elements during discovery
                spawnBtn.style.pointerEvents = 'none';
                spawnBtn.style.opacity = '0.3';
            }

            // Update discovery animation
            function updateDiscoveryAnimation(dt) {
                if (!discoveryAnimation) return;
                
                const anim = discoveryAnimation;
                anim.elapsed += dt;
                
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                
                if (anim.phase === 'converge') {
                    // Move both items to center
                    const progress = Math.min(anim.elapsed / anim.convergeDuration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3); // ease out cubic
                    
                    anim.item1.x = anim.item1.x + (anim.item1.targetX - anim.item1.x) * eased * 0.1;
                    anim.item1.y = anim.item1.y + (anim.item1.targetY - anim.item1.y) * eased * 0.1;
                    anim.item2.x = anim.item2.x + (anim.item2.targetX - anim.item2.x) * eased * 0.1;
                    anim.item2.y = anim.item2.y + (anim.item2.targetY - anim.item2.y) * eased * 0.1;
                    
                    if (progress &gt;= 1) {
                        anim.phase = 'collide';
                        anim.elapsed = 0;
                        playSound('merge_sound');
                        
                        // Create collision particles
                        for (let i = 0; i &lt; 40; i++) {
                            const angle = (Math.PI * 2 * i) / 40;
                            const speed = 200 + Math.random() * 200;
                            anim.particles.push({
                                x: centerX,
                                y: centerY,
                                vx: Math.cos(angle) * speed,
                                vy: Math.sin(angle) * speed,
                                size: 8 + Math.random() * 8,
                                color: ['#FFD700', '#FFA500', '#FF6B35', '#FFFF00'][Math.floor(Math.random() * 4)],
                                life: 1,
                                decay: 1.2
                            });
                        }
                    }
                } else if (anim.phase === 'collide') {
                    // Collision effect - scale up and flash
                    const progress = Math.min(anim.elapsed / anim.collideDuration, 1);
                    anim.scale = 1 + Math.sin(progress * Math.PI) * 0.5;
                    anim.opacity = 1 - progress * 0.5;
                    
                    if (progress &gt;= 1) {
                        anim.phase = 'reveal';
                        anim.elapsed = 0;
                        anim.scale = 0;
                        anim.opacity = 1;
                    }
                } else if (anim.phase === 'reveal') {
                    // Reveal new tier with growing scale
                    const progress = Math.min(anim.elapsed / anim.revealDuration, 1);
                    const eased = progress &lt; 0.5 
                        ? 4 * progress * progress * progress 
                        : 1 - Math.pow(-2 * progress + 2, 3) / 2;
                    anim.scale = eased * 1.5;
                    anim.sunburstRotation += dt * 50;
                    
                    if (progress &gt;= 1) {
                        anim.phase = 'waitForTap';
                        anim.elapsed = 0;
                        anim.tapPromptAlpha = 0;
                    }
                } else if (anim.phase === 'waitForTap') {
                    // Wait for player to tap - pulse the tap prompt
                    anim.sunburstRotation += dt * 30;
                    anim.tapPromptAlpha = 0.5 + Math.sin(anim.elapsed * 4) * 0.5;
                }
                
                // Update particles
                for (let i = anim.particles.length - 1; i &gt;= 0; i--) {
                    const p = anim.particles[i];
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vy += 300 * dt;
                    p.life -= p.decay * dt;
                    
                    if (p.life &lt;= 0) {
                        anim.particles.splice(i, 1);
                    }
                }
            }

            // Draw discovery animation
            function drawDiscoveryAnimation() {
                if (!discoveryAnimation) return;
                
                const anim = discoveryAnimation;
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                
                // Draw darkened overlay
                ctx.fillStyle = `rgba(0, 0, 0, ${0.7 * anim.opacity})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw sunburst effect
                if (anim.phase === 'reveal' || anim.phase === 'waitForTap') {
                    ctx.save();
                    ctx.globalAlpha = anim.opacity * 0.6;
                    ctx.translate(centerX, centerY);
                    ctx.rotate(anim.sunburstRotation * Math.PI / 180);
                    
                    const rayCount = 16;
                    const rayLength = Math.min(canvas.width, canvas.height);
                    
                    for (let i = 0; i &lt; rayCount; i++) {
                        const angle = (Math.PI * 2 * i) / rayCount;
                        const gradient = ctx.createLinearGradient(0, 0, Math.cos(angle) * rayLength, Math.sin(angle) * rayLength);
                        gradient.addColorStop(0, 'rgba(255, 215, 0, 0.8)');
                        gradient.addColorStop(0.3, 'rgba(255, 165, 0, 0.4)');
                        gradient.addColorStop(1, 'rgba(255, 165, 0, 0)');
                        
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.arc(0, 0, rayLength, angle - 0.1, angle + 0.1);
                        ctx.closePath();
                        ctx.fill();
                    }
                    
                    ctx.restore();
                }
                
                // Draw glow effect in center
                if (anim.phase === 'reveal' || anim.phase === 'waitForTap') {
                    const glowRadius = 200 * anim.scale;
                    const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, glowRadius);
                    gradient.addColorStop(0, `rgba(255, 255, 200, ${0.8 * anim.opacity})`);
                    gradient.addColorStop(0.5, `rgba(255, 200, 100, ${0.3 * anim.opacity})`);
                    gradient.addColorStop(1, 'rgba(255, 165, 0, 0)');
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(centerX - glowRadius, centerY - glowRadius, glowRadius * 2, glowRadius * 2);
                }
                
                // Draw particles
                ctx.globalAlpha = anim.opacity;
                anim.particles.forEach(p =&gt; {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life * anim.opacity;
                    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
                });
                ctx.globalAlpha = 1;
                
                const { cellSize } = getGridMetrics();
                const itemSize = cellSize * 0.85;
                
                // Draw items based on phase
                if (anim.phase === 'converge') {
                    // Draw both old tier items moving to center
                    ctx.globalAlpha = anim.opacity;
                    drawItemCentered(anim.oldTier, anim.item1.x, anim.item1.y, itemSize, 1);
                    drawItemCentered(anim.oldTier, anim.item2.x, anim.item2.y, itemSize, 1);
                    ctx.globalAlpha = 1;
                } else if (anim.phase === 'collide') {
                    // Draw colliding items with flash effect
                    ctx.globalAlpha = anim.opacity;
                    drawItemCentered(anim.oldTier, centerX, centerY, itemSize, anim.scale);
                    
                    // White flash
                    ctx.fillStyle = `rgba(255, 255, 255, ${(1 - anim.opacity) * 0.8})`;
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, itemSize * anim.scale, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                } else if (anim.phase === 'reveal' || anim.phase === 'waitForTap') {
                    // Draw new tier item
                    ctx.globalAlpha = anim.opacity;
                    drawItemCentered(anim.newTier, centerX, centerY, itemSize * 1.2, anim.scale);
                    
                    // Draw &quot;NEW!&quot; text
                    ctx.fillStyle = '#FFD700';
                    ctx.strokeStyle = '#4A3728';
                    ctx.lineWidth = 4;
                    ctx.font = 'bold 48px &quot;Press Start 2P&quot;';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'alphabetic';
                    const textY = centerY - itemSize * 1.3;
                    ctx.strokeText('NEW!', centerX + 4, textY);
                    ctx.fillText('NEW!', centerX + 4, textY);
                    
                    // Draw tier name
                    const config = window.gameConfig;
                    const tierName = config.tierNames?.[anim.newTier - 1] || `Tier ${anim.newTier}`;
                    ctx.font = '32px &quot;VT323&quot;';
                    const nameY = centerY + itemSize * 1.2;
                    ctx.strokeText(tierName, centerX, nameY);
                    ctx.fillText(tierName, centerX, nameY);
                    
                    // Draw tap prompt in waitForTap phase
                    if (anim.phase === 'waitForTap') {
                        ctx.globalAlpha = anim.tapPromptAlpha;
                        ctx.fillStyle = '#FFFFFF';
                        ctx.strokeStyle = '#4A3728';
                        ctx.lineWidth = 3;
                        ctx.font = '28px &quot;Press Start 2P&quot;';
                        const promptY = centerY + itemSize * 2;
                        ctx.strokeText('TAP TO CONTINUE', centerX, promptY);
                        ctx.fillText('TAP TO CONTINUE', centerX, promptY);
                    }
                    
                    ctx.globalAlpha = 1;
                }
            }

            // Draw item centered at position
            function drawItemCentered(tier, x, y, size, scale = 1) {
                const assetId = tierAssetIds[tier - 1];
                const img = imageCache[assetId];

                if (img) {
                    const drawSize = size * scale;
                    
                    ctx.save();
                    ctx.translate(x, y);

                    // Maintain aspect ratio
                    const aspectRatio = img.width / img.height;
                    let drawWidth, drawHeight;
                    if (aspectRatio &gt; 1) {
                        drawWidth = drawSize;
                        drawHeight = drawSize / aspectRatio;
                    } else {
                        drawHeight = drawSize;
                        drawWidth = drawSize * aspectRatio;
                    }

                    ctx.drawImage(img, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
                    ctx.restore();
                } else {
                    // Fallback colored square
                    const colors = ['#8B4513', '#A0522D', '#CD853F', '#D2691E', '#BC8F8F', '#DEB887', '#F5DEB3', '#FFD700', '#C0C0C0'];
                    const drawSize = size * scale;
                    
                    ctx.fillStyle = colors[tier - 1];
                    ctx.fillRect(x - drawSize / 2, y - drawSize / 2, drawSize, drawSize);
                }
            }


            // Draw progress bar with tier collection
            function drawProgressBar() {
                // Get grid position to calculate centering
                const { gridY } = getGridMetrics();
                
                const barWidth = Math.min(canvas.width * 0.95, 680);
                const barHeight = 100;
                const barX = (canvas.width - barWidth) / 2;
                // Center vertically between top of canvas and top of grid
                const barY = (gridY - barHeight) / 2;
                
                // Background
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.strokeStyle = '#8B7355';
                ctx.lineWidth = 3;
                roundRect(ctx, barX, barY, barWidth, barHeight, 16, true, true);
                
                // Progress bar fill background
                const progressBarY = barY + barHeight - 14;
                const progressBarHeight = 10;
                ctx.fillStyle = '#D4C4A8';
                roundRect(ctx, barX + 12, progressBarY, barWidth - 24, progressBarHeight, 5, true, false);
                
                // Progress bar fill (based on discovered tiers)
                const progress = discoveredTiers.size / 9;
                const progressWidth = (barWidth - 24) * progress;
                const gradient = ctx.createLinearGradient(barX + 12, progressBarY, barX + 12 + progressWidth, progressBarY);
                gradient.addColorStop(0, '#4CAF50');
                gradient.addColorStop(1, '#8BC34A');
                ctx.fillStyle = gradient;
                roundRect(ctx, barX + 12, progressBarY, progressWidth, progressBarHeight, 5, true, false);
                
                // Draw tier items (9 slots)
                const itemSize = 50;
                const itemSpacing = (barWidth - 24 - itemSize * 9) / 8;
                const itemY = barY + 10;
                
                for (let i = 1; i &lt;= 9; i++) {
                    const itemX = barX + 12 + (i - 1) * (itemSize + itemSpacing);
                    const isDiscovered = discoveredTiers.has(i);
                    
                    if (isDiscovered) {
                        // Draw unlocked item
                        const assetId = tierAssetIds[i - 1];
                        const img = imageCache[assetId];
                        
                        if (img) {
                            const aspectRatio = img.width / img.height;
                            let drawWidth, drawHeight;
                            if (aspectRatio &gt; 1) {
                                drawWidth = itemSize;
                                drawHeight = itemSize / aspectRatio;
                            } else {
                                drawHeight = itemSize;
                                drawWidth = itemSize * aspectRatio;
                            }
                            const centerX = itemX + itemSize / 2;
                            const centerY = itemY + itemSize / 2;
                            ctx.drawImage(img, centerX - drawWidth / 2, centerY - drawHeight / 2, drawWidth, drawHeight);
                        } else {
                            // Fallback colored square
                            const colors = ['#8B4513', '#A0522D', '#CD853F', '#D2691E', '#BC8F8F', '#DEB887', '#F5DEB3', '#FFD700', '#C0C0C0'];
                            ctx.fillStyle = colors[i - 1];
                            ctx.fillRect(itemX, itemY, itemSize, itemSize);
                        }
                        
                        // Tier number badge
                        const badgeSize = 20;
                        const badgeX = itemX + itemSize - badgeSize / 2;
                        const badgeY = itemY + badgeSize / 2;
                        
                        ctx.fillStyle = '#4A3728';
                        ctx.beginPath();
                        ctx.arc(badgeX, badgeY, badgeSize / 2, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#FFD700';
                        ctx.beginPath();
                        ctx.arc(badgeX, badgeY, badgeSize / 2 - 2, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#4A3728';
                        ctx.font = `bold 12px 'Press Start 2P'`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(i.toString(), badgeX, badgeY);
                    } else {
                        // Draw locked/hidden item (silhouette with question mark)
                        ctx.fillStyle = 'rgba(74, 55, 40, 0.3)';
                        roundRect(ctx, itemX, itemY, itemSize, itemSize, 8, true, false);
                        
                        // Question mark
                        ctx.fillStyle = 'rgba(74, 55, 40, 0.5)';
                        ctx.font = `bold 36px 'Press Start 2P'`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('?', itemX + itemSize / 2, itemY + itemSize / 2);
                        
                        // Lock icon (small)
                        ctx.strokeStyle = 'rgba(74, 55, 40, 0.5)';
                        ctx.lineWidth = 2;
                        const lockSize = 14;
                        const lockX = itemX + itemSize - lockSize - 2;
                        const lockY = itemY + 2;
                        
                        // Lock body
                        ctx.fillStyle = 'rgba(74, 55, 40, 0.5)';
                        ctx.fillRect(lockX, lockY + lockSize * 0.4, lockSize, lockSize * 0.6);
                        
                        // Lock shackle
                        ctx.beginPath();
                        ctx.arc(lockX + lockSize / 2, lockY + lockSize * 0.4, lockSize * 0.3, Math.PI, 0, true);
                        ctx.stroke();
                    }
                }
            }

            // Draw background
            function drawBackground() {
                // Background is handled by CSS gradient
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }

            // Draw grid
            function drawGrid() {
                const config = window.gameConfig;
                const { gridSize, cellSize, gridX, gridY, totalGridWidth, totalGridHeight } = getGridMetrics();
                const colors = config.gridColors || defaultConfig.gridColors;

                // Draw grid background
                ctx.fillStyle = colors.background;
                ctx.strokeStyle = colors.border;
                ctx.lineWidth = 4;
                roundRect(ctx, gridX - 12, gridY - 12, totalGridWidth + 24, totalGridHeight + 24, 16, true, true);

                // Draw cells
                for (let row = 0; row &lt; gridSize; row++) {
                    for (let col = 0; col &lt; gridSize; col++) {
                        const pos = getCellPosition(row, col);
                        const isHovered = hoveredCell &amp;&amp; hoveredCell.row === row &amp;&amp; hoveredCell.col === col;
                        const isEmpty = grid[row][col] === 0;
                        const isDragSource = dragState.active &amp;&amp; dragState.startRow === row &amp;&amp; dragState.startCol === col;
                        
                        // Check if this cell should be highlighted for tutorial
                        const isTutorialHighlight = tutorialState.active &amp;&amp; 
                            tutorialState.step === 'waitForMerge' &amp;&amp; 
                            tutorialState.seedCells.some(cell =&gt; cell.row === row &amp;&amp; cell.col === col) &amp;&amp;
                            grid[row][col] === 1;

                        // Cell background
                        if (isHovered &amp;&amp; isEmpty &amp;&amp; mode === 'play' &amp;&amp; !gameOver) {
                            ctx.fillStyle = colors.cellHover;
                        } else if (isDragSource) {
                            ctx.fillStyle = colors.cellHover;
                        } else {
                            ctx.fillStyle = colors.cell;
                        }
                        ctx.strokeStyle = colors.border;
                        ctx.lineWidth = 2;
                        roundRect(ctx, pos.x, pos.y, cellSize, cellSize, 8, true, true);
                        
                        // Draw tutorial highlight pulse
                        if (isTutorialHighlight) {
                            const pulse = 0.5 + Math.sin(tutorialState.pulseTime * 4) * 0.5;
                            ctx.strokeStyle = `rgba(76, 175, 80, ${pulse})`;
                            ctx.lineWidth = 6;
                            roundRect(ctx, pos.x - 3, pos.y - 3, cellSize + 6, cellSize + 6, 12, false, true);
                        }

                        // Draw item if present (but not if being dragged)
                        const tier = grid[row][col];
                        if (tier &gt; 0 &amp;&amp; !isDragSource) {
                            // Check if there's an active spawn animation for this cell
                            const anim = animations.find(a =&gt; a.type === 'spawn' &amp;&amp; a.row === row &amp;&amp; a.col === col);
                            const scale = anim ? anim.scale : 1;

                            if (scale &gt; 0) {
                                drawItem(tier, pos.x, pos.y, cellSize, scale);
                            }
                        }
                    }
                }

                // Draw dragged item
                if (dragState.active &amp;&amp; mode === 'play') {
                    const tier = grid[dragState.startRow][dragState.startCol];
                    if (tier &gt; 0) {
                        const x = dragState.currentX - cellSize / 2;
                        const y = dragState.currentY - cellSize / 2;
                        
                        // Draw semi-transparent shadow at original position
                        const originalPos = getCellPosition(dragState.startRow, dragState.startCol);
                        ctx.globalAlpha = 0.3;
                        drawItem(tier, originalPos.x, originalPos.y, cellSize, 1);
                        ctx.globalAlpha = 1;

                        // Draw item at cursor with slight scale
                        drawItem(tier, x, y, cellSize, 1.1);

                        // Show merge preview if hovering over same tier
                        if (hoveredCell &amp;&amp; 
                            (hoveredCell.row !== dragState.startRow || hoveredCell.col !== dragState.startCol)) {
                            const targetTier = grid[hoveredCell.row][hoveredCell.col];
                            if (targetTier === tier) {
                                const hoverPos = getCellPosition(hoveredCell.row, hoveredCell.col);
                                ctx.strokeStyle = '#4CAF50';
                                ctx.lineWidth = 4;
                                roundRect(ctx, hoverPos.x - 4, hoverPos.y - 4, cellSize + 8, cellSize + 8, 12, false, true);
                            }
                        }
                    }
                }
            }

            // Draw item
            function drawItem(tier, x, y, cellSize, scale = 1) {
                const assetId = tierAssetIds[tier - 1];
                const img = imageCache[assetId];

                if (img) {
                    const padding = cellSize * 0.1;
                    const drawSize = (cellSize - padding * 2) * scale;
                    const centerX = x + cellSize / 2;
                    const centerY = y + cellSize / 2;

                    ctx.save();
                    ctx.translate(centerX, centerY);

                    // Maintain aspect ratio
                    const aspectRatio = img.width / img.height;
                    let drawWidth, drawHeight;
                    if (aspectRatio &gt; 1) {
                        drawWidth = drawSize;
                        drawHeight = drawSize / aspectRatio;
                    } else {
                        drawHeight = drawSize;
                        drawWidth = drawSize * aspectRatio;
                    }

                    ctx.drawImage(img, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
                    ctx.restore();
                } else {
                    // Fallback: draw colored square with tier number
                    const colors = ['#8B4513', '#A0522D', '#CD853F', '#D2691E', '#BC8F8F', '#DEB887', '#F5DEB3', '#FFD700', '#C0C0C0'];
                    const padding = cellSize * 0.15;
                    const drawSize = (cellSize - padding * 2) * scale;
                    const centerX = x + cellSize / 2;
                    const centerY = y + cellSize / 2;

                    ctx.fillStyle = colors[tier - 1];
                    ctx.fillRect(centerX - drawSize / 2, centerY - drawSize / 2, drawSize, drawSize);
                }

                // Draw tier badge (number indicator)
                const badgeSize = Math.max(24, cellSize * 0.28);
                const badgeX = x + cellSize - badgeSize / 2 - 4;
                const badgeY = y + badgeSize / 2 + 4;

                // Badge background (circle)
                ctx.fillStyle = '#4A3728';
                ctx.beginPath();
                ctx.arc(badgeX, badgeY, badgeSize / 2, 0, Math.PI * 2);
                ctx.fill();

                // Badge inner circle
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(badgeX, badgeY, badgeSize / 2 - 3, 0, Math.PI * 2);
                ctx.fill();

                // Badge number
                ctx.fillStyle = '#4A3728';
                ctx.font = `bold ${Math.floor(badgeSize * 0.6)}px 'Press Start 2P'`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(tier.toString(), badgeX, badgeY);
            }

            // Draw particles
            function drawParticles() {
                particles.forEach(p =&gt; {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
                });
                ctx.globalAlpha = 1;
            }
            
            // Draw tutorial overlay
            function drawTutorial() {
                if (!tutorialState.active) return;
                
                const { gridY, totalGridHeight } = getGridMetrics();
                const gridBottom = gridY + totalGridHeight;
                
                if (tutorialState.step === 'waitForSpawn') {
                    // Draw instruction text
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.font = '28px &quot;VT323&quot;';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    const textY = gridBottom + 40;
                    ctx.fillStyle = '#FFFFFF';
                    ctx.strokeStyle = '#4A3728';
                    ctx.lineWidth = 4;
                    ctx.strokeText('Tap the + button to spawn', canvas.width / 2, textY);
                    ctx.fillText('Tap the + button to spawn', canvas.width / 2, textY);
                    
                    ctx.strokeText('another plank!', canvas.width / 2, textY + 32);
                    ctx.fillText('another plank!', canvas.width / 2, textY + 32);
                    
                    // Draw pulsing arrow pointing down at spawn button
                    const pulse = 0.5 + Math.sin(tutorialState.pulseTime * 3) * 0.5;
                    const arrowY = canvas.height - 140;
                    const arrowSize = 30;
                    
                    ctx.save();
                    ctx.globalAlpha = pulse;
                    ctx.fillStyle = '#FFD700';
                    ctx.strokeStyle = '#4A3728';
                    ctx.lineWidth = 3;
                    
                    // Draw arrow pointing down
                    ctx.beginPath();
                    ctx.moveTo(canvas.width / 2, arrowY + arrowSize);
                    ctx.lineTo(canvas.width / 2 - arrowSize / 2, arrowY);
                    ctx.lineTo(canvas.width / 2 + arrowSize / 2, arrowY);
                    ctx.closePath();
                    ctx.stroke();
                    ctx.fill();
                    
                    ctx.restore();
                    
                    // Pulse the spawn button
                    const buttonPulse = 1 + Math.sin(tutorialState.pulseTime * 3) * 0.1;
                    spawnBtn.style.transform = `translateX(-50%) scale(${buttonPulse})`;
                } else if (tutorialState.step === 'waitForMerge') {
                    // Draw instruction text
                    const textY = gridBottom + 40;
                    ctx.fillStyle = '#FFFFFF';
                    ctx.strokeStyle = '#4A3728';
                    ctx.lineWidth = 4;
                    ctx.font = '28px &quot;VT323&quot;';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    ctx.strokeText('Drag one plank onto the other', canvas.width / 2, textY);
                    ctx.fillText('Drag one plank onto the other', canvas.width / 2, textY);
                    
                    ctx.strokeText('to merge them!', canvas.width / 2, textY + 32);
                    ctx.fillText('to merge them!', canvas.width / 2, textY + 32);
                    
                    // Reset spawn button transform
                    spawnBtn.style.transform = 'translateX(-50%)';
                }
            }

            // Update particles
            function updateParticles(dt) {
                for (let i = particles.length - 1; i &gt;= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vy += 300 * dt; // gravity
                    p.life -= p.decay * dt;
                    p.size *= 0.98;

                    if (p.life &lt;= 0 || p.size &lt; 1) {
                        particles.splice(i, 1);
                    }
                }
            }

            // Update animations
            function updateAnimations(dt) {
                for (let i = animations.length - 1; i &gt;= 0; i--) {
                    const anim = animations[i];
                    anim.elapsed += dt * 1000;

                    if (anim.type === 'spawn') {
                        const progress = Math.min(anim.elapsed / anim.duration, 1);
                        // Bounce easing
                        const t = progress;
                        const bounce = t &lt; 0.5 
                            ? 4 * t * t * t 
                            : 1 - Math.pow(-2 * t + 2, 3) / 2;
                        anim.scale = anim.targetScale * (bounce &gt; 1 ? 1 : bounce);

                        if (progress &gt;= 1) {
                            anim.scale = anim.targetScale;
                            animations.splice(i, 1);
                        }
                    }
                }
            }

            // Rounded rectangle helper
            function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + width - radius, y);
                ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
                ctx.lineTo(x + width, y + height - radius);
                ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                ctx.lineTo(x + radius, y + height);
                ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.closePath();
                if (fill) ctx.fill();
                if (stroke) ctx.stroke();
            }

            // Get coordinates from event
            function getEventCoords(e) {
                const rect = canvas.getBoundingClientRect();
                let clientX, clientY;
                
                // For touch events, check changedTouches first (for touchend),
                // then touches (for touchstart/touchmove)
                if (e.changedTouches &amp;&amp; e.changedTouches.length &gt; 0) {
                    clientX = e.changedTouches[0].clientX;
                    clientY = e.changedTouches[0].clientY;
                } else if (e.touches &amp;&amp; e.touches.length &gt; 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                
                return {
                    x: (clientX - rect.left) * (canvas.width / rect.width),
                    y: (clientY - rect.top) * (canvas.height / rect.height)
                };
            }

            // Dismiss discovery animation on tap
            function dismissDiscoveryAnimation() {
                if (!discoveryAnimation || discoveryAnimation.phase !== 'waitForTap') return;
                
                // Place the new item in a random empty cell
                const emptyCells = [];
                const { gridSize } = getGridMetrics();
                for (let row = 0; row &lt; gridSize; row++) {
                    for (let col = 0; col &lt; gridSize; col++) {
                        if (grid[row][col] === 0) {
                            emptyCells.push({ row, col });
                        }
                    }
                }
                
                if (emptyCells.length &gt; 0) {
                    const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    grid[randomCell.row][randomCell.col] = discoveryAnimation.newTier;
                }
                
                discoveryAnimation = null;
                
                // Re-enable pointer events and restore opacity on UI elements after discovery
                spawnBtn.style.pointerEvents = 'auto';
                spawnBtn.style.opacity = '1';
            }

            // Start drag
            function onDragStart(e) {
                // Check if we should dismiss discovery animation
                if (discoveryAnimation &amp;&amp; discoveryAnimation.phase === 'waitForTap') {
                    e.preventDefault();
                    dismissDiscoveryAnimation();
                    return;
                }
                
                if (mode !== 'play' || gameOver || discoveryAnimation) return;
                
                const coords = getEventCoords(e);
                const cell = getCellFromPosition(coords.x, coords.y);
                
                if (cell &amp;&amp; grid[cell.row][cell.col] &gt; 0) {
                    e.preventDefault();
                    dragState.active = true;
                    dragState.startRow = cell.row;
                    dragState.startCol = cell.col;
                    dragState.currentX = coords.x;
                    dragState.currentY = coords.y;
                }
            }

            // Drag move
            function onDragMove(e) {
                if (!dragState.active) {
                    // Just update hover
                    const coords = getEventCoords(e);
                    hoveredCell = getCellFromPosition(coords.x, coords.y);
                    return;
                }
                
                e.preventDefault();
                const coords = getEventCoords(e);
                dragState.currentX = coords.x;
                dragState.currentY = coords.y;
                hoveredCell = getCellFromPosition(coords.x, coords.y);
            }

            // End drag
            function onDragEnd(e) {
                if (!dragState.active) return;
                
                e.preventDefault();
                const coords = getEventCoords(e);
                const targetCell = getCellFromPosition(coords.x, coords.y);
                
                if (targetCell &amp;&amp; 
                    (targetCell.row !== dragState.startRow || targetCell.col !== dragState.startCol)) {
                    const sourceTier = grid[dragState.startRow][dragState.startCol];
                    const targetTier = grid[targetCell.row][targetCell.col];
                    
                    if (targetTier === 0) {
                        // Move to empty cell
                        grid[targetCell.row][targetCell.col] = sourceTier;
                        grid[dragState.startRow][dragState.startCol] = 0;
                    } else if (targetTier === sourceTier &amp;&amp; sourceTier &lt; 9) {
                        // Merge items
                        mergeTwoItems(dragState.startRow, dragState.startCol, targetCell.row, targetCell.col);
                    }
                }
                
                dragState.active = false;
                dragState.startRow = -1;
                dragState.startCol = -1;
            }

            // Mouse events
            canvas.addEventListener('mousedown', onDragStart);
            canvas.addEventListener('mousemove', onDragMove);
            canvas.addEventListener('mouseup', onDragEnd);
            canvas.addEventListener('mouseleave', () =&gt; {
                hoveredCell = null;
                if (dragState.active) {
                    onDragEnd({ preventDefault: () =&gt; {} });
                }
            });

            // Touch events
            canvas.addEventListener('touchstart', onDragStart, { passive: false });
            canvas.addEventListener('touchmove', onDragMove, { passive: false });
            canvas.addEventListener('touchend', onDragEnd, { passive: false });
            canvas.addEventListener('touchcancel', onDragEnd, { passive: false });

            // Spawn button event
            spawnBtn.addEventListener('click', () =&gt; {
                if (!discoveryAnimation) {
                    initAudioContext();
                    spawnRandomItem();
                }
            });

            spawnBtn.addEventListener('touchstart', (e) =&gt; {
                e.preventDefault();
                if (!discoveryAnimation) {
                    initAudioContext();
                    spawnRandomItem();
                }
            }, { passive: false });


            // Keyboard shortcuts
            document.addEventListener('keydown', (e) =&gt; {
                if (e.key === 'r' || e.key === 'R') {
                    initGrid();
                }
            });

            // Preload essential assets with loading screen
            await preloadEssentialImages();
            await preloadAudio();
            
            // Hide loading screen after short delay
            await new Promise(resolve =&gt; setTimeout(resolve, 300));
            hideLoadingScreen();
            
            // Lazy load remaining images in background
            lazyLoadRemainingImages();

            // Initialize game
            initGrid();
            
            // Position spawn button
            positionSpawnButton();

            // Play mode setup
            if (mode === 'play') {
                initAudioContext();
                playBackgroundMusic();
            }

            // Edit mode setup
            if (mode === 'edit') {
                editInfoEl.style.display = 'block';
                spawnBtn.style.display = 'none';

                lib.showGameParameters({
                    gridSize: {
                        type: 'number',
                        label: 'Grid Size',
                        min: 3,
                        max: 8,
                        step: 1
                    },
                    'startingTierRange.min': {
                        type: 'number',
                        label: 'Min Spawn Tier',
                        min: 1,
                        max: 7,
                        step: 1
                    },
                    'startingTierRange.max': {
                        type: 'number',
                        label: 'Max Spawn Tier',
                        min: 1,
                        max: 7,
                        step: 1
                    },
                    'gridColors.background': {
                        type: 'color',
                        label: 'Grid Background'
                    },
                    'gridColors.cell': {
                        type: 'color',
                        label: 'Cell Color'
                    },
                    'gridColors.border': {
                        type: 'color',
                        label: 'Border Color'
                    }
                });

                // Populate grid with sample items for preview
                const { gridSize } = getGridMetrics();
                for (let i = 0; i &lt; Math.min(8, gridSize * gridSize); i++) {
                    const row = Math.floor(i / gridSize);
                    const col = i % gridSize;
                    if (row &lt; gridSize &amp;&amp; col &lt; gridSize) {
                        grid[row][col] = (i % 8) + 1;
                    }
                }
            } else {
                editInfoEl.style.display = 'none';
                spawnBtn.style.display = 'flex';
            }

            // Position spawn button vertically between grid and bottom
            function positionSpawnButton() {
                const { gridX, gridY, totalGridHeight } = getGridMetrics();
                const gridBottom = gridY + totalGridHeight;
                const verticalSpace = canvas.height - gridBottom;
                const centerY = gridBottom + verticalSpace / 2;
                const buttonHeight = 120;
                const bottomPosition = canvas.height - centerY - buttonHeight / 2;
                spawnBtn.style.bottom = bottomPosition + 'px';
            }

            // Game loop
            function gameLoop(timestamp) {
                const dt = Math.min((timestamp - lastTime) / 1000, 0.11);
                lastTime = timestamp;

                // Update
                if (discoveryAnimation) {
                    updateDiscoveryAnimation(dt);
                } else {
                    updateParticles(dt);
                    updateAnimations(dt);
                    
                    // Update tutorial pulse animation
                    if (tutorialState.active) {
                        tutorialState.pulseTime += dt;
                    }
                }

                // Reinitialize grid if config changed in edit mode
                if (mode === 'edit') {
                    const { gridSize } = getGridMetrics();
                    if (grid.length !== gridSize) {
                        grid = [];
                        for (let row = 0; row &lt; gridSize; row++) {
                            grid[row] = [];
                            for (let col = 0; col &lt; gridSize; col++) {
                                grid[row][col] = 0;
                            }
                        }
                        // Repopulate preview
                        for (let i = 0; i &lt; Math.min(8, gridSize * gridSize); i++) {
                            const row = Math.floor(i / gridSize);
                            const col = i % gridSize;
                            if (row &lt; gridSize &amp;&amp; col &lt; gridSize) {
                                grid[row][col] = (i % 8) + 1;
                            }
                        }
                        positionSpawnButton();
                    }
                }

                // Draw
                drawBackground();
                drawProgressBar();
                drawGrid();
                
                if (!discoveryAnimation) {
                    drawParticles();
                    drawTutorial(); // Draw tutorial overlay
                } else {
                    drawDiscoveryAnimation();
                }

                requestAnimationFrame(gameLoop);
            }

            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }
