        :root {

        .btn:active {
            transform: scale(0.96);

            outline: 3px solid var(--accent-yellow);

            font-family: 'Cinzel', serif;

            color: var(--accent-orange);

            width: 50px;
            height: 50px;

            border: 2px solid var(--accent-orange);

        .card-grid-container {
            flex: 1;

            justify-content: center;
            padding: 8px;
        }

        .card-grid {
            display: grid;
            gap: 8px;
            max-width: 100%;
            max-height: 100%;
        }

        .memory-card {
            position: relative;
            cursor: pointer;
            perspective: 1000px;
            transition: transform var(--transition-fast);
        }

        .memory-card:active:not(.flipped):not(.matched):not(.disabled) {
            transform: scale(0.95);
        }

        .memory-card.disabled {
            cursor: default;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s;
            transform-style: preserve-3d;
        }

        .memory-card.flipped .card-inner,
        .memory-card.matched .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);

        .card-back {
            background: linear-gradient(145deg, var(--primary-purple), #2a0a4a);
            border: 2px solid rgba(255, 140, 66, 0.4);

        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-front {
            transform: rotateY(180deg);

            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 4px;
            box-sizing: border-box;

        .memory-card.matched .card-front {

        /* Opponent Speech Bubble */
        .opponent-speech-container {

            height: 60px;

            background: linear-gradient(145deg, rgba(74, 26, 107, 0.95), rgba(26, 10, 46, 0.98));

            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            max-width: 280px;

        .speech-bubble::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 20px;
            width: 0;
            height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-right: 10px solid var(--accent-orange);

        .speech-bubble::after {
            content: '';
            position: absolute;
            left: -6px;
            top: 22px;
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-right: 8px solid rgba(74, 26, 107, 0.95);
        }

        .speech-text {
            font-size: 14px;
            color: var(--text-light);
            line-height: 1.4;
            margin: 0;

        /* Victory/Defeat Overlay */
        .result-overlay {
            position: absolute;
            top: 0;
            left: 0;

            align-items: center;

            padding: 24px;

            font-family: 'Cinzel', serif;

            font-weight: 700;

            text-shadow: 0 0 30px currentColor;

            color: var(--accent-orange);

            height: 150px;

            border: 4px solid var(--accent-orange);
            object-fit: cover;
            object-position: center top;
            margin-bottom: 24px;
        }

        .result-scores {
            font-size: 28px;
            color: var(--text-light);
            margin-bottom: 16px;
        }

        .result-dialogue {
            font-size: 20px;
            color: rgba(240, 230, 255, 0.9);
            text-align: center;
            margin-bottom: 32px;

            line-height: 1.5;

        .result-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 340px;

        .loading-screen {

            left: 0;

            height: 100%;

            justify-content: center;

                    img.crossOrigin = 'anonymous';
                    img.onload = () =&gt; {
                        imageCache[assetId] = img;
                        resolve(img);
                    };
                    img.onerror = () =&gt; {
                        lib.log(`Failed to load image: ${assetId}`);
                        resolve(null);
                    };
                    img.src = assetInfo.url;
                });
            }

            async function loadAudio(assetId) {
                if (audioCache[assetId]) return audioCache[assetId];

                const assetInfo = lib.getAsset(assetId);
                if (!assetInfo || assetInfo.type !== 'audio') {
                    lib.log(`Asset not found or not audio: ${assetId}`);
                    return null;
                }

                try {
                    initAudioContext();
                    const response = await fetch(assetInfo.url);
                    const arrayBuffer = await response.arrayBuffer();
                    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    const audioData = { buffer: audioBuffer, loop: assetInfo.loop === 'true' };
                    if (!audioCache[assetId]) {
                        audioCache[assetId] = audioData;
                    }
                    return audioCache[assetId];
                } catch (error) {
                    lib.log(`Failed to load audio: ${assetId} - ${error}`);
                    return null;
                }
            }

            function playSound(assetId, volume = 1.0) {
                const audio = audioCache[assetId];
                if (!audio || !audioContext) return;

                const source = audioContext.createBufferSource();
                const gainNode = audioContext.createGain();
                
                source.buffer = audio.buffer;
                source.loop = audio.loop;
                gainNode.gain.value = volume * (window.gameConfig?.settings?.sfxVolume ?? 1.0);
                
                source.connect(gainNode);
                gainNode.connect(audioContext.destination);
                source.start(0);

                return source;
            }

            function startBackgroundMusic() {
                if (isMusicPlaying || !audioCache['music_background'] || !audioContext) return;

                backgroundMusicSource = audioContext.createBufferSource();
                const gainNode = audioContext.createGain();
                
                backgroundMusicSource.buffer = audioCache['music_background'].buffer;
                backgroundMusicSource.loop = true;
                gainNode.gain.value = window.gameConfig?.settings?.musicVolume ?? 0.5;
                
                backgroundMusicSource.connect(gainNode);
                gainNode.connect(audioContext.destination);
                backgroundMusicSource.start(0);
                isMusicPlaying = true;
            }

            function stopBackgroundMusic() {
                if (backgroundMusicSource) {
                    try {
                        backgroundMusicSource.stop();
                    } catch (e) {}
                    backgroundMusicSource = null;
                }
                isMusicPlaying = false;
            }

            function drawBackground(assetId) {
                const img = imageCache[assetId];
                if (!img) return;

                // Cover scaling
                const canvasRatio = canvas.width / canvas.height;
                const imgRatio = img.width / img.height;

                let drawWidth, drawHeight, offsetX, offsetY;

                if (canvasRatio &gt; imgRatio) {
                    drawWidth = canvas.width;
                    drawHeight = canvas.width / imgRatio;
                    offsetX = 0;
                    offsetY = (canvas.height - drawHeight) / 2;
                } else {
                    drawHeight = canvas.height;
                    drawWidth = canvas.height * imgRatio;
                    offsetX = (canvas.width - drawWidth) / 2;
                    offsetY = 0;
                }

                ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
            }

                carouselTrack.style.transform = `translateX(${offset}px)`;
                
                document.querySelectorAll('.carousel-slide').forEach((slide, index) =&gt; {
                    slide.classList.toggle('active', index === currentCharacterIndex);

            // ==================== MEMORY GAME LOGIC ====================
            function initializeGame() {
                if (!selectedCharacter) return;
                
                clearGameTimeouts();

                const config = window.gameConfig;
                const charConfig = config.difficulties[selectedCharacter.id];
                
                const cols = charConfig?.gridCols ?? selectedCharacter.gridCols;
                const rows = charConfig?.gridRows ?? selectedCharacter.gridRows;
                const aiMemory = charConfig?.aiMemory ?? selectedCharacter.aiMemory;
                
                const totalCards = cols * rows;
                const numPairs = totalCards / 2;

                // Select card types for this game
                const shuffledTypes = [...CARD_TYPES].sort(() =&gt; Math.random() - 0.5);
                const selectedTypes = shuffledTypes.slice(0, numPairs);
                
                // Create pairs
                const cardPairs = [];
                selectedTypes.forEach((type, index) =&gt; {
                    cardPairs.push({ type, pairId: index });
                    cardPairs.push({ type, pairId: index });
                });
                
                // Shuffle cards
                for (let i = cardPairs.length - 1; i &gt; 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [cardPairs[i], cardPairs[j]] = [cardPairs[j], cardPairs[i]];
                }

                gameState = {
                    cards: cardPairs.map((card, index) =&gt; ({
                        ...card,
                        index,
                        isFlipped: false,
                        isMatched: false
                    })),
                    playerScore: 0,
                    aiScore: 0,
                    isPlayerTurn: true,
                    firstCard: null,
                    secondCard: null,
                    isProcessing: false,
                    aiMemory: {},
                    aiMemoryChance: aiMemory,
                    matchedPairs: 0,
                    totalPairs: numPairs,
                    gridCols: cols,
                    gridRows: rows
                };

                updateScoreDisplay();
                updateTurnIndicator();
                
                document.getElementById('opponent-mini').src = imageCache[selectedCharacter.neutralAsset]?.src || '';
                document.getElementById('opponent-name-label').textContent = selectedCharacter.name;
                
                showScreen('memory-game');
                
                // Create card grid after screen is shown (ensures proper dimensions)
                requestAnimationFrame(() =&gt; {
                    createCardGrid();
                    // Show game start comment
                    setGameTimeout(() =&gt; triggerOpponentComment('gameStart'), 500);
                });
            }

            function createCardGrid() {
                cardGrid.innerHTML = '';
                
                const { gridCols, gridRows } = gameState;
                let containerWidth = cardGrid.parentElement.clientWidth - 16;
                let containerHeight = cardGrid.parentElement.clientHeight - 16;
                
                // Fallback dimensions if container not properly laid out
                if (containerWidth &lt;= 0) containerWidth = 688; // 720 - padding
                if (containerHeight &lt;= 0) containerHeight = 600;
                
                const maxCardWidth = (containerWidth - (gridCols - 1) * 8) / gridCols;
                const maxCardHeight = (containerHeight - (gridRows - 1) * 8) / gridRows;
                const cardSize = Math.max(Math.min(maxCardWidth, maxCardHeight, 130), 70);
                
                cardGrid.style.gridTemplateColumns = `repeat(${gridCols}, ${cardSize}px)`;
                cardGrid.style.gridTemplateRows = `repeat(${gridRows}, ${cardSize}px)`;
                
                gameState.cards.forEach((card, index) =&gt; {
                    const cardElement = document.createElement('div');
                    cardElement.className = 'memory-card';
                    cardElement.dataset.index = index;
                    cardElement.style.width = `${cardSize}px`;
                    cardElement.style.height = `${cardSize}px`;
                    
                    const inner = document.createElement('div');
                    inner.className = 'card-inner';
                    
                    const back = document.createElement('div');
                    back.className = 'card-face card-back';
                    const backImg = document.createElement('img');
                    backImg.src = imageCache['card_back']?.src || '';
                    backImg.alt = 'Card Back';
                    back.appendChild(backImg);
                    
                    const front = document.createElement('div');
                    front.className = 'card-face card-front';
                    const frontImg = document.createElement('img');
                    frontImg.src = imageCache[card.type]?.src || '';
                    frontImg.alt = 'Card';
                    front.appendChild(frontImg);
                    
                    inner.appendChild(back);
                    inner.appendChild(front);
                    cardElement.appendChild(inner);
                    
                    cardElement.addEventListener('click', () =&gt; handleCardClick(index));
                    cardElement.addEventListener('touchend', (e) =&gt; {
                        e.preventDefault();
                        handleCardClick(index);
                    });
                    
                    cardGrid.appendChild(cardElement);
                });
            }

            function handleCardClick(index) {
                if (mode === 'edit') return;
                if (!gameState.isPlayerTurn || gameState.isProcessing) return;
                
                const card = gameState.cards[index];
                if (card.isFlipped || card.isMatched) return;
                
                // Occasional taunt during player's turn (20% chance on first card)
                if (!gameState.firstCard &amp;&amp; Math.random() &lt; 0.2) {
                    triggerOpponentComment('playerTurn');
                }
                
                flipCard(index);
            }

            function flipCard(index) {
                const card = gameState.cards[index];
                if (card.isFlipped || card.isMatched) return;
                
                card.isFlipped = true;
                playSound('sfx_card_flip');
                
                const cardElement = cardGrid.children[index];
                cardElement.classList.add('flipped');
                
                // AI remembers this card
                if (Math.random() &lt; gameState.aiMemoryChance) {
                    gameState.aiMemory[card.pairId] = gameState.aiMemory[card.pairId] || [];
                    if (!gameState.aiMemory[card.pairId].includes(index)) {
                        gameState.aiMemory[card.pairId].push(index);
                    }
                }
                
                if (gameState.firstCard === null) {
                    gameState.firstCard = index;
                } else {
                    gameState.secondCard = index;
                    gameState.isProcessing = true;
                    
                    setGameTimeout(() =&gt; checkMatch(), 800);
                }
            }

            function checkMatch() {
                if (gameState.firstCard === null || gameState.secondCard === null) return;
                
                const first = gameState.cards[gameState.firstCard];
                const second = gameState.cards[gameState.secondCard];
                
                if (first.pairId === second.pairId) {
                    // Match found!
                    playSound('sfx_match_found');
                    
                    first.isMatched = true;
                    second.isMatched = true;
                    
                    cardGrid.children[gameState.firstCard].classList.add('matched');
                    cardGrid.children[gameState.secondCard].classList.add('matched');
                    
                    if (gameState.isPlayerTurn) {
                        gameState.playerScore++;
                        triggerOpponentComment('playerMatch');
                    } else {
                        gameState.aiScore++;
                        triggerOpponentComment('aiMatch');
                    }
                    
                    gameState.matchedPairs++;
                    updateScoreDisplay();
                    
                    // Check score difference for winning/losing comments
                    if (gameState.aiScore &gt; gameState.playerScore + 1) {
                        setGameTimeout(() =&gt; triggerOpponentComment('winning'), 1500);
                    } else if (gameState.playerScore &gt; gameState.aiScore + 1) {
                        setGameTimeout(() =&gt; triggerOpponentComment('losing'), 1500);
                    }
                    
                    // Check for game end
                    if (gameState.matchedPairs &gt;= gameState.totalPairs) {
                        setGameTimeout(() =&gt; endGame(), 500);
                    }
                } else {
                    // No match
                    playSound('sfx_no_match');
                    
                    first.isFlipped = false;
                    second.isFlipped = false;
                    
                    cardGrid.children[gameState.firstCard].classList.remove('flipped');
                    cardGrid.children[gameState.secondCard].classList.remove('flipped');
                    
                    // Trigger appropriate comment
                    if (gameState.isPlayerTurn) {
                        triggerOpponentComment('playerNoMatch');
                    } else {
                        triggerOpponentComment('aiNoMatch');
                    }
                    
                    // Switch turns
                    gameState.isPlayerTurn = !gameState.isPlayerTurn;
                    updateTurnIndicator();
                }
                
                gameState.firstCard = null;
                gameState.secondCard = null;
                gameState.isProcessing = false;
                
                // AI turn
                if (!gameState.isPlayerTurn &amp;&amp; gameState.matchedPairs &lt; gameState.totalPairs) {
                    setGameTimeout(() =&gt; {
                        triggerOpponentComment('aiTurn');
                        setGameTimeout(() =&gt; aiTurn(), 800);
                    }, 1000);
                }
            }

            function aiTurn() {
                if (gameState.isPlayerTurn || gameState.isProcessing) return;
                if (gameState.matchedPairs &gt;= gameState.totalPairs) return;
                
                gameState.isProcessing = true;
                
                // Get available cards
                const availableCards = gameState.cards
                    .map((card, index) =&gt; ({ ...card, index }))
                    .filter(card =&gt; !card.isMatched &amp;&amp; !card.isFlipped);
                
                if (availableCards.length &lt; 2) {
                    gameState.isProcessing = false;
                    return;
                }
                
                let firstChoice = null;
                let secondChoice = null;
                
                // Check if AI knows a pair
                for (const pairId in gameState.aiMemory) {
                    const knownPositions = gameState.aiMemory[pairId].filter(idx =&gt; 
                        !gameState.cards[idx].isMatched
                    );
                    
                    if (knownPositions.length &gt;= 2) {
                        firstChoice = knownPositions[0];
                        secondChoice = knownPositions[1];
                        break;
                    }
                }
                
                // If no known pair, pick randomly
                if (firstChoice === null) {
                    const shuffled = [...availableCards].sort(() =&gt; Math.random() - 0.5);
                    firstChoice = shuffled[0].index;
                    
                    // Check if AI remembers the pair for first choice
                    const firstCard = gameState.cards[firstChoice];
                    const knownMatch = gameState.aiMemory[firstCard.pairId]?.find(idx =&gt; 
                        idx !== firstChoice &amp;&amp; !gameState.cards[idx].isMatched
                    );
                    
                    if (knownMatch !== undefined &amp;&amp; Math.random() &lt; gameState.aiMemoryChance) {
                        secondChoice = knownMatch;
                    } else {
                        const remaining = shuffled.filter(c =&gt; c.index !== firstChoice);
                        secondChoice = remaining[0]?.index;
                    }
                }
                
                if (firstChoice === null || secondChoice === null) {
                    gameState.isProcessing = false;
                    return;
                }
                
                // AI flips first card
                setGameTimeout(() =&gt; {
                    flipCard(firstChoice);
                    
                    // AI flips second card
                    setGameTimeout(() =&gt; {
                        flipCard(secondChoice);
                    }, 600);
                }, 500);
            }

            function updateScoreDisplay() {
                document.getElementById('player-score').textContent = gameState.playerScore;
                document.getElementById('ai-score').textContent = gameState.aiScore;
            }

            function updateTurnIndicator() {
                const indicator = document.getElementById('turn-indicator');

                    indicator.classList.add('ai-turn');

            function showSpeechBubble(text, duration = 3000) {
                const speechContainer = document.getElementById('opponent-speech');
                const speechText = document.getElementById('speech-text');
                const speechPortrait = document.getElementById('speech-portrait');

            function getRandomComment(category) {
                let comments = null;
                
                switch (selectedCharacter.id) {
                    case 'inosuke':
                        comments = INOSUKE_COMMENTS[category];
                        break;
                    case 'nezuko':
                        comments = NEZUKO_COMMENTS[category];
                        break;
                    case 'zenitsu':
                        comments = ZENITSU_COMMENTS[category];
                        break;
                    case 'tanjiro':
                        comments = TANJIRO_COMMENTS[category];
                        break;
                }
                
                if (comments &amp;&amp; comments.length &gt; 0) {
                    return comments[Math.floor(Math.random() * comments.length)];
                }
                return null;
            }

            function triggerOpponentComment(event) {
                const comment = getRandomComment(event);
                if (comment) {
                    showSpeechBubble(comment);
                }
            }

            function endGame() {
                let result, dialogueKey;
                
                if (gameState.playerScore &gt; gameState.aiScore) {
                    result = 'victory';
                    dialogueKey = 'win';
                    playSound('sfx_victory');
                } else if (gameState.playerScore &lt; gameState.aiScore) {
                    result = 'defeat';
                    dialogueKey = 'lose';
                    playSound('sfx_defeat');
                } else {
                    result = 'draw';
                    dialogueKey = 'draw';
                    playSound('sfx_match_found');

                const resultTitle = document.getElementById('result-title');
                resultTitle.textContent = result === 'victory' ? 'Victory!' :

            // ==================== EVENT LISTENERS ====================
            function setupEventListeners() {
                // Carousel navigation
                document.getElementById('arrow-left').addEventListener('click', () =&gt; navigateCarousel('left'));
                document.getElementById('arrow-right').addEventListener('click', () =&gt; navigateCarousel('right'));
                
                // Touch swipe support for carousel

                let touchEndX = 0;
                const carousel = document.getElementById('character-carousel');
                
                carousel.addEventListener('touchstart', (e) =&gt; {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });
                
                carousel.addEventListener('touchend', (e) =&gt; {
                    touchEndX = e.changedTouches[0].screenX;
                    const diff = touchStartX - touchEndX;
                    if (Math.abs(diff) &gt; 50) {
                        if (diff &gt; 0) {
                            navigateCarousel('right');
                        } else {
                            navigateCarousel('left');
                        }
                    }
                }, { passive: true });
                
                // Character selection
                document.getElementById('btn-challenge').addEventListener('click', () =&gt; {
                    playSound('sfx_button_click');
                    initializeGame();
                });
                
                // Memory game

                    clearGameTimeouts();
                    gameState.isProcessing = true;
                    playSound('sfx_button_click');
                    showScreen('character-select');
                    updateCarouselPosition();

                // Result screen
                document.getElementById('btn-play-again').addEventListener('click', () =&gt; {
                    playSound('sfx_button_click');
                    initializeGame();
                });

                        },
                        'Zenitsu AI Memory': {
                            key: 'difficulties.zenitsu.aiMemory',
                            type: 'slider',
                            min: 0,
                            max: 1,
                            step: 0.1
                        },
                        'Tanjiro AI Memory': {
                            key: 'difficulties.tanjiro.aiMemory',
                            type: 'slider',
                            min: 0,
                            max: 1,
                            step: 0.1
                        }
                    }
                });
            }

            // ==================== WISTERIA ANIMATION ====================
            const wisteriaContainer = document.getElementById('wisteria-container');
            let wisteriaPetals = [];
            const MAX_PETALS = 25;

            function createWisteriaPetal() {
                if (wisteriaPetals.length &gt;= MAX_PETALS) return;

                const petal = document.createElement('div');
                petal.className = 'wisteria-petal';
                
                // Random starting position
                const startX = Math.random() * 100;
                petal.style.left = `${startX}%`;
                petal.style.top = '-20px';
                
                // Random size variation
                const scale = 0.6 + Math.random() * 0.8;
                petal.style.width = `${12 * scale}px`;
                petal.style.height = `${18 * scale}px`;
                
                // Random drift direction and rotation
                const drift = (Math.random() - 0.5) * 150;
                const rotation = Math.random() * 720 - 360;
                const sway = (Math.random() - 0.5) * 30;
                petal.style.setProperty('--drift', `${drift}px`);
                petal.style.setProperty('--rotation', `${rotation}deg`);
                petal.style.setProperty('--sway', `${sway}px`);
                
                // Random duration for varied speeds
                const duration = 8 + Math.random() * 7;
                petal.style.animationDuration = `${duration}s`;
                
                // Random delay for staggered start
                const delay = Math.random() * 2;
                petal.style.animationDelay = `${delay}s`;
                
                // Random color variations (purple/pink/lavender)
                const colors = [
                    'radial-gradient(ellipse at center, #c8a2c8 0%, #9370db 50%, #8a2be2 100%)',
                    'radial-gradient(ellipse at center, #dda0dd 0%, #ba55d3 50%, #9932cc 100%)',
                    'radial-gradient(ellipse at center, #e6e6fa 0%, #b19cd9 50%, #9370db 100%)',
                    'radial-gradient(ellipse at center, #d8bfd8 0%, #da70d6 50%, #8b008b 100%)',
                    'radial-gradient(ellipse at center, #ffb7c5 0%, #db7093 50%, #c71585 100%)'
                ];
                petal.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                // Random opacity
                petal.style.opacity = 0.5 + Math.random() * 0.4;
                
                wisteriaContainer.appendChild(petal);
                wisteriaPetals.push(petal);
                
                // Remove petal after animation
                setTimeout(() =&gt; {
                    if (petal.parentNode) {
                        petal.parentNode.removeChild(petal);
                    }
                    wisteriaPetals = wisteriaPetals.filter(p =&gt; p !== petal);
                }, (duration + delay) * 1000);
            }

            function startWisteriaAnimation() {
                // Create initial batch
                for (let i = 0; i &lt; 10; i++) {
                    setTimeout(() =&gt; createWisteriaPetal(), i * 300);
                }
                
                // Continuously create new petals
                setInterval(() =&gt; {
                    if (Math.random() &lt; 0.7) {
                        createWisteriaPetal();
                    }
                }, 600);
            }

            // ==================== INITIALIZATION ====================
            async function initialize() {
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
                
                // Show loading screen
                showScreen('loading');
                
                // Preload all assets
                await preloadAllAssets();
                
                // Initialize audio context
                initAudioContext();
                
                // Setup UI
                createCharacterCards();
                setupEventListeners();
                
                // Setup edit mode parameters
                setupEditMode();
                
                // Start game loop
                requestAnimationFrame(gameLoop);
                
                // Show character selection
                showScreen('character-select');
                
                // Start wisteria animation
                startWisteriaAnimation();
                
                lib.log('Game initialized successfully');
            }

            // Start the game
            initialize();
        }
    &lt;/script&gt;

in-height: 200px;\n            display: flex;\n            flex-direction: column;\n            margin-top: auto;\n        }\n\n        .dialogue-header {\n            display: flex;\n            align-items: center;\n            gap: 12px;\n            margin-bottom: 12px;\n        }\n\n        .dialogue-portrait {\n            width: 60px;\n            height: 60px;\n            border-radius: 50%;\n            border: 2px solid var(--accent-orange);\n            object-fit: cover;\n            object-position: center top;\n        }\n\n        .dialogue-name {\n            font-family: 'Cinzel', serif;\n            font-size: 22px;\n            font-weight: 700;\n            color: var(--accent-orange);\n        }\n\n        .dialogue-text {\n            font-size: 20px;\n            color: var(--text-light);\n            line-height: 1.5;\n            margin-bottom: 16px;\n            flex: 1;\n        }\n\n        .dialogue-buttons {\n            display: flex;\n            gap: 12px;\n        }\n\n        .btn {\n            flex: 1;\n            padding: 16px 24px;\n            font-family: 'Poppins', sans-serif;\n            font-size: 18px;\n            font-weight: 600;\n            border: none;\n            border-radius: 12px;\n            cursor: pointer;\n            transition: transform var(--transition-fast), box-shadow var(--transition-fast);\n            min-height: 56px;\n        }\n\n        .btn:active {\n            transform: scale(0.96);\n        }\n\n        .btn:focus-visible {\n            outline: 3px solid var(--accent-yellow);\n            outline-offset: 2px;\n        }\n\n        .btn-primary {\n            background: linear-gradient(135deg, var(--accent-orange), #ff6b42);\n            color: white;\n            box-shadow: 0 4px 15px rgba(255, 140, 66, 0.4);\n        }\n\n        .btn-secondary {\n            background: linear-gradient(135deg, rgba(74, 26, 107, 0.8), rgba(138, 43, 226, 0.6));\n            color: var(--text-light);\n            border: 2px solid rgba(255, 140, 66, 0.5);\n        }\n\n        /* Memory Game UI */\n        #memory-game-ui {\n            display: flex;\n            flex-direction: column;\n            height: 100%;\n            padding: 12px;\n            box-sizing: border-box;\n        }\n\n        .game-header {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            padding: 12px 16px;\n            background: linear-gradient(180deg, rgba(26, 10, 46, 0.95), rgba(74, 26, 107, 0.8));\n            border-radius: 16px;\n            margin-bottom: 12px;\n        }\n\n        .score-display {\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n        }\n\n        .score-label {\n            font-size: 16px;\n            color: rgba(240, 230, 255, 0.8);\n            text-transform: uppercase;\n            letter-spacing: 1px;\n        }\n\n        .score-value {\n            font-family: 'Cinzel', serif;\n            font-size: 32px;\n            font-weight: 700;\n            color: var(--text-light);\n        }\n\n        .vs-text {\n            font-family: 'Cinzel', serif;\n            font-size: 24px;\n            color: var(--accent-orange);\n        }\n\n        .opponent-mini {\n            width: 50px;\n            height: 50px;\n            border-radius: 50%;\n            border: 2px solid var(--accent-orange);\n            object-fit: cover;\n        }\n\n        .card-grid-container {\n            flex: 1;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            padding: 8px;\n        }\n\n        .card-grid {\n            display: grid;\n            gap: 8px;\n            max-width: 100%;\n            max-height: 100%;\n        }\n\n        .memory-card {\n            position: relative;\n            cursor: pointer;\n            perspective: 1000px;\n            transition: transform
