chunks/app/my-arcade-experiment/(desktop-play-sidebar)/(mobile-custom-bottom-bar)/games/%5Btitle%5D/%5BgameId%5D/page-a3c1ae7b19b31ec9.js\"],\"Feed\"]\n20:T1fe9,"])</script><script>self.__next_f.push([1,"## Game Workspace\n\nThis README documents the game design and provides an overview of the code structure.\n\n### Game Overview\n\n**Title**: Sand Fusion\n\n**Description**: A creative sandbox game where players control falling colored sand streams and interact with them by drawing barrier lines. Watch as sand particles fall, collide, mix colors, and create mesmerizing patterns.\n\n**Core Gameplay Loop**: \n1. See the on-screen instruction banner (fades after 3 seconds)\n2. Tap colored buttons at the top to toggle sand sources on/off\n3. Draw lines on the canvas to create barriers\n4. Watch sand fall, bounce off lines, and mix colors when particles collide\n5. Use keyboard shortcuts (E for erase mode, C to clear sand, X to clear all)\n6. Tap RESET button at the bottom to clear everything and reset all sand sources\n\n### Code Overview\n\n**How it works**: The game uses a canvas-based particle physics simulation. Six colored sand sources at the top spawn particles when active. Players draw lines that act as solid barriers. Particles fall with gravity, collide with boundaries/lines/each other, and mix colors on contact. A spatial grid optimizes collision detection for smooth performance with thousands of particles.\n\n**Key variables**:\n- `particles` - Array of active sand particles, each with position, velocity, color, and sleep state\n- `drawnLines` - Array of line segments (each line is an array of {x, y} points)\n- `activeSources` - Boolean array tracking which of the 6 sand sources are currently on\n- `currentMode` - Either 'draw' or 'erase' mode\n- `spatialGrid` - Hash map for efficient particle collision detection\n- `window.gameConfig` - Persistent settings (sandFlowRate, gravityStrength, particleSize, maxParticles, backgroundColor, colorPalette)\n\n**Main functions**:\n- `spawnParticle(sourceIndex)` - Creates a new particle at the specified source position with that source's color\n- `updateParticles(dt)` - Updates all particle physics: applies gravity, checks collisions with boundaries/lines/other particles, mixes colors on collision\n- `Particle.checkLineCollisions()` - Tests particle against all drawn line segments, reflects velocity and pushes particle away on collision\n- `startDrawing(x, y)` / `continueDrawing(x, y)` / `endDrawing()` - Handles line drawing or erasing based on current mode\n- `eraseLinesNear(x, y)` - Removes line segments within erase radius of the given point\n- `gameLoop(timestamp)` - Main render loop: spawns particles, updates physics, draws everything to canvas\n\n**Important implementation details**:\n- Uses Verlet integration for smooth particle motion with delta time capping at 110ms\n- Spatial grid (20px cells) dramatically improves collision detection performance\n- Particles enter \"sleep\" mode when stationary to skip unnecessary updates\n- **Object pooling** - Particles are reused from a pool instead of being created/destroyed, reducing GC pressure\n- **Cached line segments** - Line collision data is pre-computed and cached, updated only when lines change\n- **Optimized collision checks** - Only active (non-sleeping) particles check particle-particle collisions\n- **Efficient particle removal** - Uses in-place array manipulation instead of filter() to avoid allocations\n- **Removed shadow effects** - Canvas shadow blur removed from particle rendering for significant performance gain\n- **Impassable lines** - Multi-pass collision detection (2 passes per frame) ensures particles cannot tunnel through drawn lines; particles are pushed away with a safety margin and reflected with strong damping\n- Color mixing uses RGB averaging when particles collide\n- Line collision uses point-to-line-segment distance calculation with normal-based reflection and directional velocity checks\n- Audio uses Web Audio API with preloaded buffers for all sound effects\n- Canvas is 720×1280 with play area between top controls (120px) and bottom controls (100px)\n\n### Code Structure\n\n#### File Organization\n\n| File | Purpose |\n|------|---------|\n| `index.html` | HTML structure with canvas, sand source buttons, control buttons |\n| `game.js` | Main game logic: particle physics, collision detection, drawing system, audio |\n| `style.css` | Visual styling for UI buttons, canvas, layout, animations |\n| `game_config.json` | Creator-editable settings (flow rate, gravity, particle size, colors) |\n\n#### Key Components in game.js\n\n```\nrun(mode)                    - Entry point, initializes game\n├── initAudio()              - Loads and decodes all audio assets\n├── setupUI()                - Configures button click handlers, keyboard shortcuts\n├── setupInput()             - Mouse and touch event handlers for drawing\n└── gameLoop(timestamp)      - Main update/render loop\n\ngameLoop(timestamp)          - Runs every frame\n├── Spawn particles          - From active sources based on flow rate\n├── updateParticles(dt)      - Physics update for all particles\n│   ├── Particle.update()    - Apply gravity, update position\n│   ├── checkBoundaries()    - Collide with canvas edges\n│   ├── checkLineCollisions()- Collide with drawn lines\n│   └── Particle-particle    - Spatial grid collision + color mixing\n└── Draw everything          - Particles, lines, erase indicator\n\nDrawing System\n├── startDrawing(x, y)       - Begin new line or erase operation\n├── continueDrawing(x, y)    - Add points to line or erase at position\n├── endDrawing()             - Finalize and save drawn line\n└── eraseLinesNear(x, y)     - Remove line segments in radius\n\nParticle Class\n├── update(dt)               - Apply gravity, move particle\n├── checkBoundaries()        - Bounce off canvas edges\n├── checkLineCollisions()    - Reflect off drawn lines\n├── wake()                   - Resume physics updates\n└── draw(ctx)                - Render particle with glow effect\n```\n\n#### State Management\n\n- **window.gameConfig**: Creator-editable parameters (loaded at start, modified in edit mode)\n  - sandFlowRate: Particles spawned per second (10-100)\n  - gravityStrength: Gravity multiplier (0.5-2.0)\n  - particleSize: Particle diameter in pixels (2-8)\n  - maxParticles: Maximum particles on screen (1000-10000)\n  - backgroundColor: Canvas background color (hex string)\n  - colorPalette: Array of 6 hex colors for sand sources\n  \n- **Runtime variables**: Temporary gameplay state (not persisted)\n  - particles: Active particle instances\n  - drawnLines: Player-drawn barrier lines\n  - activeSources: Which sand sources are currently on\n  - currentMode: 'draw' or 'erase'\n  - isDrawing: Whether user is currently drawing\n  - spatialGrid: Collision optimization structure\n  - Audio sources and buffers\n\n### Modification Guide\n\n#### Which File to Edit\n\n| Change Type | File | Notes |\n|------------|------|-------|\n| Particle physics, collision logic | game.js | Gravity, velocity, collision response |\n| UI button appearance, colors | style.css | Button styles, animations, layout |\n| Canvas layout, button structure | index.html | Add/remove UI elements |\n| Default settings, colors | game_config.json | Initial flow rate, gravity, palette |\n\n#### Adding New Features\n\n1. **New sand colors**: Add color to gameConfig.colorPalette, add button to index.html, add icon asset\n2. **Different line types**: Modify checkLineCollisions() to handle line properties (bouncy, slippery, etc.)\n3. **Particle effects**: Add rendering code in Particle.draw() for trails, sparkles\n4. **Gravity controls**: Add UI slider that modifies gameConfig.gravityStrength in real-time\n5. **Save/load**: Use lib.saveUserGameState() to persist drawnLines and other state\n\n### Important Rules\n\n1. **All JS in .js files** - No inline `\u003cscript\u003e` tags in index.html\n2. **window.run(mode)** - Required entry point, receives 'edit' or 'play'\n3. **gameConfig for creator data only** - Not for player-specific progress\n4. **Cache assets at init** - Audio loaded in initAudio(), images loaded in setupUI()\n5. **Delta time physics** - All movement uses dt (delta time) for frame-independent motion\n6. **Spatial grid optimization** - Essential for performance with many particles\n"])</script><script>self.__next_f.push([1,"21:T9fd,"])</script><script>self.__next_f.push([1,"\u003c!DOCTYPE html\u003e\n\u003chtml\u003e\n\u003chead\u003e\n    \u003ctitle\u003eSand Fusion\u003c/title\u003e\n    \u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\"\u003e\n    \u003clink rel=\"preconnect\" href=\"https://fonts.googleapis.com\"\u003e\n    \u003clink rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin\u003e\n    \u003clink href=\"https://fonts.googleapis.com/css2?family=Poppins:wght@400;600\u0026display=swap\" rel=\"stylesheet\"\u003e\n    \u003clink rel=\"stylesheet\" href=\"./style.css\"\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n    \u003cdiv id=\"game-world\"\u003e\n        \u003c!-- Instruction banner --\u003e\n        \u003cdiv id=\"instruction-banner\"\u003e\n            \u003cp\u003eTurn on the sand taps... Draw anything and watch your art make itself.\u003c/p\u003e\n        \u003c/div\u003e\n\n        \u003c!-- Top control bar with sand source buttons --\u003e\n        \u003cdiv id=\"top-controls\"\u003e\n            \u003cbutton class=\"sand-source-btn\" data-index=\"0\" aria-label=\"Red sand source\"\u003e\n                \u003cimg class=\"source-icon\" alt=\"Red sand\"\u003e\n                \u003cdiv class=\"source-indicator\"\u003e\u003c/div\u003e\n            \u003c/button\u003e\n            \u003cbutton class=\"sand-source-btn\" data-index=\"1\" aria-label=\"Blue sand source\"\u003e\n                \u003cimg class=\"source-icon\" alt=\"Blue sand\"\u003e\n ==================================\n * GAME OVERVIEW: Sand Fusion - Creative sandbox where players toggle colored sand sources,\n * draw barrier lines, and watch sand fall, mix colors, and interact with drawn structures.\n * \n * GAME STATE SHAPE: window.gameConfig = {\n *   sandFlowRate: number (10-100, particles per second per source),\n *   gravityStrength: number (0.5-2.0, gravity multiplier),\n *   particleSize: number (2-8, particle diameter in pixels),\n *   maxParticles: number (1000-10000, max particles on screen),\n *   backgroundColor: string (hex color for canvas background),\n *   colorPalette: string[] (6 hex colors for sand sources)\n * }\n * ==================================================\n */\n\n// ============================================================================\n// CONSTANTS AND CONFIGURATION\n// ============================================================================\n\nconst CANVAS_WIDTH = 720;\nconst CANVAS_HEIGHT = 1280;\nconst TOP_CONTROLS_HEIGHT = 136;\nconst BOTTOM_CONTROLS_HEIGHT = 120;\nconst PLAY_AREA_TOP = TOP_CONTROLS_HEIGHT;\nconst PLAY_AREA_BOTTOM = CANVAS_HEIGHT - BOTTOM_CONTROLS_HEIGHT;\nconst PLAY_AREA_HEIGHT = PLAY_AREA_BOTTOM - PLAY_AREA_TOP;\n\nconst GRID_SIZE = 20; // For spatial hashing\nconst MAX_VELOCITY = 15; // Cap particle velocity\nconst DAMPING = 0.98; // Velocity damping on collision\nconst LINE_WIDTH = 5;\nconst ERASE_RADIUS = 20;\n\nconst SAND_SOURCE_ICONS = [\n    'red_sand_button_icon',\n    'blue_sand_button_icon',\n    'yellow_sand_button_icon',\n    'green_sand_button_icon',\n    'purple_sand_button_icon',\n    'orange_sand_button_icon'\n];\n\n// ============================================================================\n// GAME STATE\n// ============================================================================\n\nlet canvas, ctx;\nlet particles = [];\nlet drawnLines = [];\nlet activeSources = [false, false, false, false, false, false];\nlet currentMode = 'draw'; // 'draw' or 'erase'\nlet isDrawing = false;\nlet lastDrawPoint = null;\nlet currentDrawLine = [];\n\n// Audio\nlet audioContext;\nlet audioBuffers = {};\nlet backgroundMusicSource = null;\nlet sandFlowSource = null;\n\n// Animation\nlet lastTime = 0;\nlet particleSpawnAccumulator = 0;\n\n// Spatial grid for collision optimization\nlet spatialGrid = {};\n\n// Input state\nlet mouseX = 0;\nlet mouseY = 0;\n\n// ============================================================================\n// UTILITY FUNCTIONS\n// ============================================================================\n\nfunction hexToRgb(hex) {\n    const result = /^#?([a-f\\d]{2})([a-f\\d]{2})([a-f\\d]{2})$/i.exec(hex);\n    return result ? {\n        r: parseInt(result[1], 16),\n        g: parseInt(result[2], 16),\n        b: parseInt(result[3], 16)\n    } : { r: 255, g: 255, b: 255 };\n}\n\nfunction rgbToHex(r, g, b) {\n    return '#' + [r, g, b].map(x =\u003e {\n        const hex = Math.round(x).toString(16);\n        return hex.length === 1 ? '0' + hex : hex;\n    }).join('');\n}\n\nfunction mixColors(color1, color2) {\n    return {\n        r: (color1.r + color2.r) / 2,\n        g: (color1.g + color2.g) / 2,\n        b: (color1.b + color2.b) / 2\n    };\n}\n\nfunction getGridKey(x, y) {\n    const gridX = Math.floor(x / GRID_SIZE);\n    const gridY = Math.floor(y / GRID_SIZE);\n    return `${gridX},${gridY}`;\n}\n\nfunction getNeighborCells(x, y) {\n    const gridX = Math.floor(x / GRID_SIZE);\n    const gridY = Math.floor(y / GRID_SIZE);\n    const cells = [];\n    for (let dx = -1; dx \u003c= 1; dx++) {\n        for (let dy = -1; dy \u003c= 1; dy++) {\n            cells.push(`${gridX + dx},${gridY + dy}`);\n        }\n    }\n    return cells;\n}\n\nfunction distanceToLineSegment(px, py, x1, y1, x2, y2) {\n    const A = px - x1;\n    const B = py - y1;\n    const C = x2 - x1;\n    const D = y2 - y1;\n\n    const dot = A * C + B * D;\n    const lenSq = C * C + D * D;\n    let param = -1;\n\n    if (lenSq !== 0) {\n        param = dot / lenSq;\n    }\n\n    let xx, yy;\n\n    if (param \u003c 0) {\n        xx = x1;\n        yy = y1;\n    } else if (param \u003e 1) {\n        xx = x2;\n        yy = y2;\n    } else {\n        xx = x1 + param * C;\n        yy = y1 + param * D;\n    }\n\n    const dx = px - xx;\n    const dy = py - yy;\n    return Math.sqrt(dx * dx + dy * dy);\n}\n\n// ============================================================================\n// AUDIO SYSTEM\n// ============================================================================\n\nasync function initAudio() {\n    try {\n        audioContext = new (window.AudioContext || window.webkitAudioContext)();\n        \n        const audioAssets = [\n            'ambient_background_music',\n            'draw_line_sound',\n            'sand_flow_sound',\n            'button_click_sound',\n            'clear_sound'\n        ];\n\n        for (const assetId of audioAssets) {\n            const asset = lib.getAsset(assetId);\n            if (asset \u0026\u0026 asset.url) {\n                try {\n                    const response = await fetch(asset.url);\n                    const arrayBuffer = await response.arrayBuffer();\n                    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);\n                    audioBuffers[assetId] = audioBuffer;\n                } catch (err) {\n                    lib.log(`Failed to load audio: ${assetId} - ${err.message}`);\n                }\n            }\n        }\n    } catch (err) {\n        lib.log(`Audio initialization failed: ${err.message}`);\n    }\n}\n\nfunction playSound(assetId, loop = false, volume = 1.0) {\n    if (!audioContext || !audioBuffers[assetId]) return null;\n\n    try {\n        const source = audioContext.createBufferSource();\n        const gainNode = audioContext.createGain();\n        \n        source.buffer = audioBuffers[assetId];\n        source.loop = loop;\n        gainNode.gain.value = volume;\n        \n        source.connect(gainNode);\n        gainNode.connect(audioContext.destination);\n        source.start(0);\n        \n        return source;\n    } catch (err) {\n        lib.log(`Failed to play sound: ${assetId} - ${err.message}`);\n        return null;\n    }\n}\n\nfunction stopSound(source) {\n    if (source) {\n        try {\n            source.stop();\n        } catch (err) {\n            // Already stopped\n        }\n    }\n}\n\n// ============================================================================\n// PARTICLE SYSTEM\n// ============================================================================\n\nclass Particle {\n    constructor(x, y, color) {\n        this.x = x;\n        this.y = y;\n        this.prevX = x;\n        this.prevY = y;\n        this.vx = (Math.random() - 0.5) * 2;\n        this.vy = 0;\n        this.color = color;\n        this.radius = window.gameConfig.particleSize / 2;\n        this.sleeping = false;\n        this.sleepCounter = 0;\n        this.gridKey = '';\n    }\n\n    reset(x, y, color) {\n        this.x = x;\n        this.y = y;\n        this.prevX = x;\n        this.prevY = y;\n        this.vx = (Math.random() - 0.5) * 2;\n        this.vy = 0;\n        this.color = color;\n        this.radius = window.gameConfig.particleSize / 2;\n        this.sleeping = false;\n        this.sleepCounter = 0;\n        this.gridKey = getGridKey(x, y);\n    }\n\n    update(dt) {\n        if (this.sleeping) return;\n\n        // Apply gravity\n        const gravity = 500 * window.gameConfig.gravityStrength;\n        this.vy += gravity * dt;\n\n        // Cap velocity\n        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);\n        if (speed \u003e MAX_VELOCITY) {\n            const scale = MAX_VELOCITY / speed;\n            this.vx *= scale;\n            this.vy *= scale;\n        }\n\n        // Store previous position\n        this.prevX = this.x;\n        this.prevY = this.y;\n\n        // Update position\n        this.x += this.vx * dt;\n        this.y += this.vy * dt;\n\n        // Check if particle is moving slowly\n        if (Math.abs(this.vx) \u003c 0.5 \u0026\u0026 Math.abs(this.vy) \u003c 0.5) {\n            this.sleepCounter++;\n            if (this.sleepCounter \u003e 60) {\n                this.sleeping = true;\n            }\n        } else {\n            this.sleepCounter = 0;\n        }\n    }\n\n    // Perform multiple collision checks per frame for fast-moving particles\n    multiPassLineCollisions(lineSegments, passes = 3) {\n        for (let pass = 0; pass \u003c passes; pass++) {\n            this.checkLineCollisions(lineSegments);\n        }\n    }\n\n    wake() {\n        this.sleeping = false;\n        this.sleepCounter = 0;\n    }\n\n    checkBoundaries() {\n        const playAreaLeft = 0;\n        const playAreaRight = CANVAS_WIDTH;\n        const playAreaTop = PLAY_AREA_TOP;\n        const playAreaBottom = PLAY_AREA_BOTTOM;\n\n        // Left wall\n        if (this.x - this.radius \u003c playAreaLeft) {\n            this.x = playAreaLeft + this.radius;\n            this.vx = Math.abs(this.vx) * DAMPING;\n        }\n\n        // Right wall\n        if (this.x + this.radius \u003e playAreaRight) {\n            this.x = playAreaRight - this.radius;\n            this.vx = -Math.abs(this.vx) * DAMPING;\n        }\n\n        // Bottom wall - delete particle when it reaches bottom\n        if (this.y + this.radius \u003e playAreaBottom) {\n            return false; // Mark for removal\n        }\n\n        // Top boundary (soft)\n        if (this.y - this.radius \u003c playAreaTop) {\n            this.y = playAreaTop + this.radius;\n            this.vy = Math.abs(this.vy) * DAMPING;\n        }\n        \n        return true; // Keep particle\n    }\n\n    checkLineCollisions(lineSegments) {\n        // lineSegments is a flat array: [p1, p2, p1, p2, ...]\n        // Use swept collision detection to prevent tunneling through lines\n        \n        for (let i = 0; i \u003c lineSegments.length - 1; i += 2) {\n            const p1 = lineSegments[i];\n            const p2 = lineSegments[i + 1];\n            \n            if (!p1 || !p2) continue; // Safety check\n            \n            // Check collision at current position\n            const dist = distanceToLineSegment(this.x, this.y, p1.x, p1.y, p2.x, p2.y);\n            const collisionThreshold = this.radius + LINE_WIDTH / 2;\n\n            if (dist \u003c collisionThreshold) {\n                // Calculate normal\n                const dx = p2.x - p1.x;\n                const dy = p2.y - p1.y;\n                const len = Math.sqrt(dx * dx + dy * dy);\n                \n                if (len === 0) continue; // Degenerate line segment\n                \n                const nx = -dy / len;\n                const ny = dx / len;\n\n                // Push particle away from line with extra force to ensure it stays out\n                const overlap = collisionThreshold - dist + 1; // +1 for safety margin\n                this.x += nx * overlap;\n                this.y += ny * overlap;\n\n                // Strong reflection - reverse velocity component perpendicular to line\n                const dot = this.vx * nx + this.vy * ny;\n                if (dot \u003c 0) { // Only reflect if moving toward line\n                    this.vx -= 2 * dot * nx;\n                    this.vy -= 2 * dot * ny;\n                    this.vx *= DAMPING;\n                    this.vy *= DAMPING;\n                }\n\n                this.wake();\n            }\n        }\n    }\n\n    draw(ctx) {\n        const colorStr = rgbToHex(this.color.r, this.color.g, this.color.b);\n        ctx.fillStyle = colorStr;\n        ctx.beginPath();\n        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);\n        ctx.fill();\n    }\n}\n\n// Particle pool for object reuse\nconst particlePool = [];\nconst MAX_POOL_SIZE = 15000;\n\nfunction getPooledParticle(x, y, color) {\n    if (particlePool.length \u003e 0) {\n        const particle = particlePool.pop();\n        particle.reset(x, y, color);\n        return particle;\n    }\n    return new Particle(x, y, color);\n}\n\nfunction returnToPool(particle) {\n    if (particlePool.length \u003c MAX_POOL_SIZE) {\n        particlePool.push(particle);\n    }\n}\n\nfunction spawnParticle(sourceIndex) {\n    if (particles.length \u003e= window.gameConfig.maxParticles) {\n        return;\n    }\n\n    const sourceBtn = document.querySelectorAll('.sand-source-btn')[sourceIndex];\n    const rect = sourceBtn.getBoundingClientRect();\n    const canvasRect = canvas.getBoundingClientRect();\n    \n    // Calculate spawn position relative to canvas\n    const spawnX = rect.left + rect.width / 2 - canvasRect.left;\n    const spawnY = rect.bottom - canvasRect.top;\n\n    const color = hexToRgb(window.gameConfig.colorPalette[sourceIndex]);\n    const particle = getPooledParticle(spawnX, spawnY, color);\n    particles.push(particle);\n}\n\n// Pre-computed line segments for faster collision\nlet cachedLineSegments = [];\n\nfunction updateCachedLineSegments() {\n    cachedLineSegments = [];\n    for (const line of drawnLines) {\n        for (let i = 0; i \u003c line.length - 1; i++) {\n            cachedLineSegments.push(line[i]);\n            cachedLineSegments.push(line[i + 1]);\n        }\n    }\n}\n\nfunction updateParticles(dt) {\n    // Collect particles to remove (more efficient than removing during iteration)\n    const particlesToRemove = [];\n\n    // Update all particles\n    for (let i = 0; i \u003c particles.length; i++) {\n        const particle = particles[i];\n        \n        particle.update(dt);\n        \n        // Check boundaries and mark for removal if out of bounds\n        if (!particle.checkBoundaries()) {\n            particlesToRemove.push(i);\n            continue;\n        }\n\n        // Check line collisions with multiple passes to prevent tunneling\n        if (cachedLineSegments.length \u003e 0 \u0026\u0026 !particle.sleeping) {\n            particle.multiPassLineCollisions(cachedLineSegments, 2);\n        }\n    }\n\n    // Remove particles in reverse order to maintain indices\n    for (let i = particlesToRemove.length - 1; i \u003e= 0; i--) {\n        const idx = particlesToRemove[i];\n        returnToPool(particles[idx]);\n        particles.splice(idx, 1);\n    }\n\n    // Rebuild spatial grid only for remaining particles\n    spatialGrid = {};\n    for (const particle of particles) {\n        const key = getGridKey(particle.x, particle.y);\n        particle.gridKey = key;\n        if (!spatialGrid[key]) {\n            spatialGrid[key] = [];\n        }\n        spatialGrid[key].push(particle);\n    }\n\n    // Check particle-particle collisions using spatial grid\n    // Only check active (non-sleeping) particles\n    for (const particle of particles) {\n        if (particle.sleeping) continue;\n\n        const neighborCells = getNeighborCells(particle.x, particle.y);\n        \n        for (const cellKey of neighborCells) {\n            const cellParticles = spatialGrid[cellKey];\n            if (!cellParticles) continue;\n\n            for (const other of cellParticles) {\n                if (particle === other || other.sleeping) continue;\n\n                const dx = other.x - particle.x;\n                const dy = other.y - particle.y;\n                const distSq = dx * dx + dy * dy;\n                const minDist = particle.radius + other.radius;\n                const minDistSq = minDist * minDist;\n\n                if (distSq \u003c minDistSq \u0026\u0026 distSq \u003e 0) {\n                    const dist = Math.sqrt(distSq);\n                    const overlap = minDist - dist;\n\n                    // Separate particles\n                    const nx = dx / dist;\n                    const ny = dy / dist;\n                    const separation = overlap * 0.5;\n                    particle.x -= nx * separation;\n                    particle.y -= ny * separation;\n                    other.x += nx * separation;\n                    other.y += ny * separation;\n\n                    // Mix colors\n                    const newColor = mixColors(particle.color, other.color);\n                    particle.color = newColor;\n                    other.color = newColor;\n\n                    // Exchange velocity\n                    const tempVx = particle.vx;\n                    const tempVy = particle.vy;\n                    particle.vx = other.vx * DAMPING;\n                    particle.vy = other.vy * DAMPING;\n                    other.vx = tempVx * DAMPING;\n                    other.vy = tempVy * DAMPING;\n\n                    particle.wake();\n                    other.wake();\n                }\n            }\n        }\n    }\n}\n\n// ============================================================================\n// DRAWING SYSTEM\n// ============================================================================\n\nfunction startDrawing(x, y) {\n    isDrawing = true;\n    lastDrawPoint = { x, y };\n    currentDrawLine = [{ x, y }];\n}\n\nfunction continueDrawing(x, y) {\n    if (!isDrawing) return;\n\n    if (currentMode === 'draw') {\n        // Add point to current line\n        currentDrawLine.push({ x, y });\n        lastDrawPoint = { x, y };\n\n        // Play draw sound occasionally\n        if (currentDrawLine.length % 5 === 0) {\n            playSound('draw_line_sound', false, 0.3);\n        }\n    } else if (currentMode === 'erase') {\n        // Erase lines near cursor\n        eraseLinesNear(x, y);\n    }\n}\n\nfunction endDrawing() {\n    if (isDrawing \u0026\u0026 currentMode === 'draw' \u0026\u0026 currentDrawLine.length \u003e 1) {\n        drawnLines.push(currentDrawLine);\n        updateCachedLineSegments();\n    }\n    isDrawing = false;\n    lastDrawPoint = null;\n    currentDrawLine = [];\n}\n\nfunction eraseLinesNear(x, y) {\n    let erasedAny = false;\n    const radiusSq = ERASE_RADIUS * ERA   // Update particles\n    updateParticles(dt);\n\n    // Draw particles (optimized - no shadow effects)\n    for (let i = 0; i \u003c particles.length; i++) {\n        particles[i].draw(ctx);\n    }\n\n    // Draw lines\n    drawLines(ctx);\n\n    // Draw erase indicator\n    drawEraseIndicator(ctx);\n\n    requestAnimationFrame(gameLoop);\n}\n\n// ============================================================================\n// UI CONTROLS\n// ============================================================================\n\nfunction setupUI() {\n    // Setup sand source buttons\n    const sourceButtons = document.querySelectorAll('.sand-source-btn');\n    sourceButtons.forEach((btn, index) =\u003e {\n        const icon = btn.querySelector('.source-icon');\n        const asset = lib.getAsset(SAND_SOURCE_ICONS[index]);\n        if (asset) {\n            icon.src = asset.url;\n        }\n\n        btn.addEventListener('click', () =\u003e {\n            activeSources[index] = !activeSources[index];\n            btn.classList.toggle('active', activeSources[index]);\n            playSound('button_click_sound', false, 0.5);\n\n            // Update sand flow sound\n            updateSandFlowSound();\n        });\n    });\n\n    // Setup reset button\n    const resetBtn = document.getElementById('reset-btn');\n    resetBtn.addEventListener('click', () =\u003e {\n        particles.forEach(p =\u003e returnToPool(p));\n        particles = [];\n        drawnLines = [];\n        cachedLineSegments = [];\n        activeSources = [false, false, false, false, false, false];\n        currentMode = 'draw';\n        \n        // Update UI\n        document.querySelectorAll('.sand-source-btn').forEach(btn =\u003e {\n            btn.classList.remove('active');\n        });\n        canvas.classList.remove('erase-mode');\n        \n        // Stop sand flow sound\n        if (sandFlowSource) {\n            stopSound(sandFlowSource);\n            sandFlowSource = null;\n        }\n        \n        playSound('clear_sound', false, 0.7);\n        playSound('button_click_sound', false, 0.5);\n    });\n\n    // Keyboard shortcuts\n    document.addEventListener('keydown', (e) =\u003e {\n        if (e.key === 'e' || e.key === 'E') {\n            currentMode = currentMode === 'draw' ? 'erase' : 'draw';\n            canvas.classList.toggle('erase-mode', currentMode === 'erase');\n        } else if (e.key === 'c' || e.key === 'C') {\n            particles = [];\n            playSound('clear_sound', false, 0.7);\n        } else if (e.key === 'x' || e.key === 'X') {\n            particles = [];\n            drawnLines = [];\n            playSound('clear_sound', false, 0.7);\n        }\n    });\n}\n\nfunction updateSandFlowSound() {\n    const anyActive = activeSources.some(active =\u003e active);\n    \n    if (anyActive \u0026\u0026 !sandFlowSource) {\n        sandFlowSource = playSound('sand_flow_sound', true, 0.3);\n    } else if (!anyActive \u0026\u0026 sandFlowSource) {\n        stopSound(sandFlowSource);\n        sandFlowSource = null;\n    }\n}\n\n// ============================================================================\n// INPUT HANDLING\n// ============================================================================\n\nfunction setupInput() {\n    const canvasRect = canvas.getBoundingClientRect();\n\n    // Mouse events\n    canvas.addEventListener('mousedown', (e) =\u003e {\n        const rect = canvas.getBoundingClientRect();\n        const x = (e.clientX - rect.left) * (CANVAS_WIDTH / rect.width);\n        const y = (e.clientY - rect.top) * (CANVAS_HEIGHT / rect.height);\n        startDrawing(x, y);\n    });\n\n    canvas.addEventListener('mousemove', (e) =\u003e {\n        const rect = canvas.getBoundingClientRect();\n        mouseX = (e.clientX - rect.left) * (CANVAS_WIDTH / rect.width);\n        mouseY = (e.clientY - rect.top) * (CANVAS_HEIGHT / rect.height);\n        \n        if (isDrawing) {\n            continueDrawing(mouseX, mouseY);\ n        if (asset \u0026\u0026 asset.url) {\n          try {\n            const response = await fetch(asset.url);\n            const arrayBuffer = await response.arrayBuffer();\n            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);\n            audioBuffers[assetId] = audioBuffer;\n          } catch (err) {\n            lib.log(`Failed to load audio: ${assetId} - ${err.message}`);\n          }\n        }\n      }\n    } catch (err) {\n      lib.log(`Audio initialization failed: ${err.message}`);\n    }\n  }\n  function playSound(assetId, loop = false, volume = 1) {\n    if (!audioContext || !audioBuffers[assetId])\n      return null;\n    try {\n      const source = audioContext.createBufferSource();\n      const gainNode = audioContext.createGain();\n      source.buffer = audioBuffers[assetId];\n      source.loop = loop;\n      gainNode.gain.value = volume;\n      source.connect(gainNode);\n      gainNode.connect(audioContext.destination);\n      source.start(0);\n      return source;\n    } catch (err) {\n      lib.log(`Failed to play sound: ${assetId} - ${err.message}`);\n      return null;\n    }\n  }\n  function stopSound(source) {\n    if (source) {\n      try {\n        source.stop();\n      } catch (err) {\n      }\n    }\n  }\n  var Particle = class {\n    constructor(x, y, color) {\n      this.x = x;\n      this.y = y;\n      this.prevX = x;\n      this.prevY = y;\n      this.vx = (Math.random() - 0.5) * 2;\n      this.vy = 0;\n      this.color = color;\n      this.radius = window.gameConfig.particleSize / 2;\n      this.sleeping = false;\n      this.sleepCounter = 0;\n      this.gridKey = \"\";\n    }\n    reset(x, y, color) {\n      this.x = x;\n      this.y = y;\n      this.prevX = x;\n      this.prevY = y;\n      this.vx = (Math.random() - 0.5) * 2;\n      this.vy = 0;\n      this.color = color;\n      this.radius = window.gameConfig.particleSize / 2;\n      this.sleeping = false;\n      this.sleepCounter = 0;\n      this.gridKey = getGridKey(x, y);\n    }\n    update(dt) {\n      if (this.sleeping)\n        return;\n      const gravity = 500 * window.gameConfig.gravityStrength;\n      this.vy += gravity * dt;\n      const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);\n      if (speed \u003e MAX_VELOCITY) {\n        const scale = MAX_VELOCITY / speed;\n        this.vx *= scale;\n        this.vy *= scale;\n      }\n      this.prevX = this.x;\n      this.prevY = this.y;\n      this.x += this.vx * dt;\n      this.y += this.vy * dt;\n      if (Math.abs(this.vx) \u003c 0.5 \u0026\u0026 Math.abs(this.vy) \u003c 0.5) {\n        this.sleepCounter++;\n        if (this.sleepCounter \u003e 60) {\n          this.sleeping = true;\n        }\n      } else {\n        this.sleepCounter = 0;\n      }\n    }\n    // Perform multiple collision checks per frame for fast-moving particles\n    multiPassLineCollisions(lineSegments, passes = 3) {\n      for (let pass = 0; pass \u003c passes; pass++) {\n        this.checkLineCollisions(lineSegments);\n      }\n    }\n    wake() {\n      this.sleeping = false;\n      this.sleepCounter = 0;\n    }\n    checkBoundaries() {\n      const playAreaLeft = 0;\n      const playAreaRight = CANVAS_WIDTH;\n      const playAreaTop = PLAY_AREA_TOP;\n      const playAreaBottom = PLAY_AREA_BOTTOM;\n      if (this.x - this.radius \u003c playAreaLeft) {\n        this.x = playAreaLeft + this.radius;\n        this.vx = Math.abs(this.vx) * DAMPING;\n      }\n      if (this.x + this.radius \u003e playAreaRight) {\n        this.x = playAreaRight - this.radius;\n        this.vx = -Math.abs(this.vx) * DAMPING;\n      }\n      if (this.y + this.radius \u003e playAreaBottom) {\n        return false;\n      }\n      if (this.y - this.radius \u003c playAreaTop) {\n        this.y = playAreaTop + this.radius;\n        this.vy = Math.abs(this.vy) * DAMPING;\n      }\n      return true;\n    }\n    checkLineCollisions(lineSegments) {\n      for (let i = 0; i \u003c lineSegments.length - 1; i += 2) {\n        const p1 = lineSegments[i];\n        const p2 = lineSegments[i + 1];\n        if (!p1 || !p2)\n          continue;\n        const dist = distanceToLineSegment(this.x, this.y, p1.x, p1.y, p2.x, p2.y);\n        const collisionThreshold = this.radius + LINE_WIDTH / 2;\n        if (dist \u003c collisionThreshold) {\n          const dx = p2.x - p1.x;\n          const dy = p2.y - p1.y;\n          const len = Math.sqrt(dx * dx + dy * dy);\n          if (len === 0)\n            continue;\n          const nx = -dy / len;\n          const ny = dx / len;\n          const overlap = collisionThreshold - dist + 1;\n          this.x += nx * overlap;\n          this.y += ny * overlap;\n          const dot = this.vx * nx + this.vy * ny;\n          if (dot \u003c 0) {\n            this.vx -= 2 * dot * nx;\n            this.vy -= 2 * dot * ny;\n            this.vx *= DAMPING;\n            this.vy *= DAMPING;\n          }\n          this.wake();\n        }\n      }\n    }\n    draw(ctx2) {\n      const colorStr = rgbToHex(this.color.r, this.color.g, this.color.b);\n      ctx2.fillStyle = colorStr;\n      ctx2.beginPath();\n      ctx2.arc(this.x, this.y, this.radius, 0, Math.PI * 2);\n      ctx2.fill();\n    }\n  };\n  var particlePool = [];\n  var MAX_POOL_SIZE = 15e3;\n  function getPooledParticle(x, y, color) {\n    if (particlePool.length \u003e 0) {\n      const particle = particlePool.pop();\n      particle.reset(x, y, color);\n      return particle;\n    }\n    return new Particle(x, y, color);\n  }\n  function returnToPool(particle) {\n    if (particlePool.length \u003c MAX_POOL_SIZE) {\n      particlePool.push(particle);\n    }\n  }\n  function spawnParticle(sourceIndex) {\n    if (particles.length \u003e= window.gameConfig.maxParticles) {\n      return;\n    }\n    const sourceBtn = document.querySelectorAll(\".sand-source-btn\")[sourceIndex];\n    const rect = sourceBtn.getBoundingClientRect();\n    const canvasRect = canvas.getBoundingClientRect();\n    const spawnX = rect.left + rect.width / 2 - canvasRect.left;\n    const spawnY = rect.bottom - canvasRect.top;\n    const color = hexToRgb(window.gameConfig.colorPalette[sourceIndex]);\n    const particle = getPooledParticle(spawnX, spawnY, color);\n    particles.push(particle);\n  }\n  var cachedLineSegments = [];\n  function updateCachedLineSegments() {\n    cachedLineSegments = [];\n    for (const line of drawnLines) {\n      for (let i = 0; i \u003c line.length - 1; i++) {\n        cachedLineSegments.push(line[i]);\n        cachedLineSegments.push(line[i + 1]);\n      }\n    }\n  }\n  function updateParticles(dt) {\n    const particlesToRemove = [];\n    for (let i = 0; i \u003c particles.length; i++) {\n      const particle = particles[i];\n      particle.update(dt);\n      if (!particle.checkBoundaries()) {\n        particlesToRemove.push(i);\n        continue;\n      }\n      if (cachedLineSegments.length \u003e 0 \u0026\u0026 !particle.sleeping) {\n        particle.multiPassLineCollisions(cachedLineSegments, 2);\n      }\n    }\n    for (let i = particlesToRemove.length - 1; i \u003e= 0; i--) {\n      const idx = particlesToRemove[i];\n      returnToPool(particles[idx]);\n      particles.splice(idx, 1);\n    }\n    spatialGrid = {};\n    for (const particle of particles) {\n      const key = getGridKey(particle.x, particle.y);\n      particle.gridKey = key;\n      if (!spatialGrid[key]) {\n        spatialGrid[key] = [];\n      }\n      spatialGrid[key].push(particle);\n    }\n    for (const particle of particles) {\n      if (particle.sleeping)\n        continue;\n      const neighborCells = getNeighborCells(particle.x, particle.y);\n      for (const cellKey of neighborCells) {\n        const cellParticles = spatialGrid[cellKey];\n        if (!cellParticles)\n          continue;\n        for (const other of cellParticles) {\n          if (particle === other || other.sleeping)\n            continue;\n          const dx = other.x - particle.x;\n          const dy = other.y - particle.y;\n          const distSq = dx * dx + dy * dy;\n          const minDist = particle.radius + other.radius;\n          const minDistSq = minDist * minDist;\n          if (distSq \u003c minDistSq \u0026\u0026 distSq \u003e 0) {\n            const dist = Math.sqrt(distSq);\n            const overlap = minDist - dist;\n            const nx = dx / dist;\n            const ny = dy / dist;\n            const separation = overlap * 0.5;\n            particle.x -= nx * separation;\n            particle.y -= ny * separation;\n            other.x += nx * separation;\n            other.y += ny * separation;\n            const newColor = mixColors(particle.color, other.color);\n            particle.color = newColor;\n            other.color = newColor;\n            const tempVx = particle.vx;\n            const tempVy = particle.vy;\n            particle.vx = other.vx * DAMPING;\n            particle.vy = other.vy * DAMPING;\n            other.vx = tempVx * DAMPING;\n            other.vy = tempVy * DAMPING;\n            particle.wake();\n            other.wake();\n          }\n        }\n      }\n    }\n  }\n  function startDrawing(x, y) {\n    isDrawing = true;\n    lastDrawPoint = { x, y };\n    currentDrawLine = [{ x, y }];\n  }\n  function continueDrawing(x, y) {\n    if (!isDrawing)\n      return;\n    if (currentMode === \"draw\") {\n      currentDrawLine.push({ x, y });\n      lastDrawPoint = { x, y };\n      if (currentDrawLine.length % 5 === 0) {\n        playSound(\"draw_line_sound\", false, 0.3);\n      }\n    } else if (currentMode === \"erase\") {\n      eraseLinesNear(x, y);\n    }\n  }\n  function endDrawing() {\n    if (isDrawing \u0026\u0026 currentMode === \"draw\" \u0026\u0026 currentDrawLine.length \u003e 1) {\n      drawnLines.push(currentDrawLine);\n      updateCachedLineSegments();\n    }\n    isDrawing = false;\n    lastDrawPoint = null;\n    currentDrawLine = [];\n  }\n  function eraseLinesNear(x, y) {\n    let erasedAny = false;\n    const radiusSq = ERASE_RADIUS * ERASE_RADIUS;\n    for (let lineIdx = drawnLines.length - 1; lineIdx \u003e= 0; lineIdx--) {\n      const line = drawnLines[lineIdx];\n      const newSegments = [];\n      let currentSegment = [];\n      for (let i = 0; i \u003c line.length; i++) {\n        const point = line[i];\n        const distSq = (point.x - x) * (point.x - x) + (point.y - y) * (point.y - y);\n        if (distSq \u003e radiusSq) {\n          currentSegment.push(point);\n        } else {\n          erasedAny = true;\n          if (currentSegment.length \u003e 1) {\n            newSegments.push([...currentSegment]);\n          }\n          currentSegment = [];\n        }\n      }\n      if (currentSegment.length \u003e 1) {\n        newSegments.push(currentSegment);\n      }\n      if (newSegments.length === 0) {\n        drawnLines.splice(lineIdx, 1);\n      } else if (newSegments.length === 1) {\n        drawnLines[lineIdx] = newSegments[0];\n      } else {\n        drawnLines.splice(lineIdx, 1, ...newSegments);\n      }\n    }\n    if (erasedAny) {\n      updateCachedLineSegments();\n      for (const particle of particles) {\n        const distSq = (particle.x - x) * (particle.x - x) + (particle.y - y) * (particle.y - y);\n        if (distSq \u003c ERASE_RADIUS * 2 * (ERASE_RADIUS * 2)) {\n          particle.wake();\n        }\n      }\n    }\n  }\n  function drawLines(ctx2) {\n    ctx2.strokeStyle = \"rgba(255, 255, 255, 0.6)\";\n    ctx2.lineWidth = LINE_WIDTH;\n    ctx2.lineCap = \"round\";\n    ctx2.lineJoin = \"round\";\n    for (const line of drawnLines) {\n      if (line.length \u003c 2)\n        continue;\n      ctx2.beginPath();\n      ctx2.moveTo(line[0].x, line[0].y);\n      for (let i = 1; i \u003c line.length; i++) {\n        ctx2.lineTo(line[i].x, line[i].y);\n      }\n      ctx2.stroke();\n    }\n    if (isDrawing \u0026\u0026 currentMode === \"draw\" \u0026\u0026 currentDrawLine.length \u003e 1) {\n      ctx2.strokeStyle = \"rgba(255, 255, 255, 0.8)\";\n      ctx2.beginPath();\n      ctx2.moveTo(currentDrawLine[0].x, currentDrawLine[0].y);\n      for (let i = 1; i \u003c currentDrawLine.length; i++) {\n        ctx2.lineTo(currentDrawLine[i].x, currentDrawLine[i].y);\n      }\n      ctx2.stroke();\n    }\n  }\n  function drawEraseIndicator(ctx2) {\n    if (currentMode === \"erase\") {\n      ctx2.strokeStyle = \"rgba(255, 100, 100, 0.8)\";\n      ctx2.lineWidth = 2;\n      ctx2.beginPath();\n      ctx2.arc(mouseX, mouseY, ERASE_RADIUS, 0, Math.PI * 2);\n      ctx2.stroke();\n    }\n  }\n  function gameLoop(timestamp) {\n    const dt = Math.min((timestamp - lastTime) / 1e3, 0.11);\n    lastTime = timestamp;\n    ctx.fillStyle = window.gameConfig.backgroundColor;\n    ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);\n    ctx.strokeStyle = \"rgba(255, 255, 255, 0.1)\";\n    ctx.lineWidth = 1;\n    ctx.strokeRect(0, PLAY_AREA_TOP, CANVAS_WIDTH, PLAY_AREA_HEIGHT);\n    particleSpawnAccumulator += dt;\n    const spawnInterval = 1 / window.gameConfig.sandFlowRate;\n    while (particleSpawnAccumulator \u003e= spawnInterval) {\n      for (let i = 0; i \u003c activeSources.length; i++) {\n        if (activeSources[i]) {\n          spawnParticle(i);\n        }\n      }\n      particleSpawnAccumulator -= spawnInterval;\n    }\n    updateParticles(dt);\n    for (let i = 0; i \u003c particles.length; i++) {\n      particles[i].draw(ctx);\n    }\n    drawLines(ctx);\n    drawEraseIndicator(ctx);\n    requestAnimationFrame(gameLoop);\n  }\n  function setupUI() {\n    const sourceButtons = document.querySelectorAll(\".sand-source-btn\");\n    sourceButtons.forEach((btn, index) =\u003e {\n      const icon = btn.querySelector(\".source-icon\");\n      const asset = lib.getAsset(SAND_SOURCE_ICONS[index]);\n      if (asset) {\n        icon.src = asset.url;\n      }\n      btn.addEventListener(\"click\", () =\u003e {\n        activeSources[index] = !activeSources[index];\n        btn.classList.toggle(\"active\", activeSources[index]);\n        playSound(\"button_click_sound\", false, 0.5);\n        updateSandFlowSound();\n      });\n    });\n    const resetBtn = document.getElementById(\"reset-btn\");\n    resetBtn.addEventListener(\"click\", () =\u003e {\n      particles.forEach((p) =\u003e returnToPool(p));\n      particles = [];\n      drawnLines = [];\n      cachedLineSegments = [];\n      activeSources = [false, false, false, false, false, false];\n      currentMode = \"draw\";\n      document.querySelectorAll(\".sand-source-btn\").forEach((btn) =\u003e {\n        btn.classList.remove(\"active\");\n      });\n      canvas.classList.remove(\"erase-mode\");\n      if (sandFlowSource) {\n        stopSound(sandFlowSource);\n        sandFlowSource = null;\n      }\n      playSound(\"clear_sound\", false, 0.7);\n      playSound(\"button_click_sound\", false, 0.5);\n    });\n    document.addEventListener(\"keydown\", (e) =\u003e {\n      if (e.key === \"e\" || e.key === \"E\") {\n        currentMode = currentMode === \"draw\" ? \"erase\" : \"draw\";\n        canvas.classList.toggle(\"erase-mode\", currentMode === \"erase\");\n      } else if (e.key === \"c\" || e.key === \"C\") {\n        particles = [];\n        playSound(\"clear_sound\", false, 0.7);\n      } else if (e.key === \"x\" || e.key === \"X\") {\n        particles = [];\n        drawnLines = [];\n        playSound(\"clear_sound\", false, 0.7);\n      }\n    });\n  }\n  function updateSandFlowSound() {\n    const anyActive = activeSources.some((active) =\u003e active);\n    if (anyActive \u0026\u0026 !sandFlowSource) {\n      sandFlowSource = playSound(\"sand_flow_sound\", true, 0.3);\n    } else if (!anyActive \u0026\u0026 sandFlowSource) {\n      stopSound(sandFlowSource);\n      sandFlowSource = null;\n    }\n  }\n  function setupInput() {\n    const canvasRect = canvas.getBoundingClientRect();\n    canvas.addEventListener(\"mousedown\", (e) =\u003e {\n      const rect = canvas.getBoundingClientRect();\n      const x = (e.clientX - rect.left) * (CANVAS_WIDTH / rect.width);\n      const y = (e.clientY - rect.top) * (CANVAS_HEIGHT / rect.height);\n      startDrawing(x, y);\n    });\n    canvas.addEventListener(\"mousemove\", (e) =\u003e {\n      const rect = canvas.getBoundingClientRect();\n      mouseX = (e.clientX - rect.left) * (CANVAS_WIDTH / rect.width);\n      mouseY = (e.clientY - rect.top) * (CANVAS_HEIGHT / rect.height);\n      if (isDrawing) {\n        continueDrawing(mouseX, mouseY);\n      }\n    });\n    canvas.addEventListener(\"mouseup\", () =\u003e {\n      endDrawing();\n    });\n    canvas.addEventListener(\"mouseleave\", () =\u003e {\n      endDrawing();\n    });\n    canvas.addEventListener(\"touchstart\", (e) =\u003e {\n      e.preventDefault();\n      const rect = canvas.getBoundingClientRect();\n      const touch = e.touches[0];\n      const x = (touch.clientX - rect.left) * (CANVAS_WIDTH / rect.width);\n      const y = (touch.clientY - rect.top) * (CANVAS_HEIGHT / rect.height);\n      mouseX = x;\n      mouseY = y;\n      startDrawing(x, y);\n    });\n    canvas.addEventListener(\"touchmove\", (e) =\u003e {\n      e.preventDefault();\n      const rect = canvas.getBoundingClientRect();\n      const touch = e.touches[0];\n      const x = (touch.clientX - rect.left) * (CANVAS_WIDTH / rect.width);\n      const y = (touch.clientY - rect.top) * (CANVAS_HEIGHT / rect.height);\n      mouseX = x;\n      mouseY = y;\n      continueDrawing(x, y);\n    });\n    canvas.addEventListener(\"touchend\", (e) =\u003e {\n      e.preventDefault();\n      endDrawing();\n    });\n    canvas.addEventListener(\"touchcancel\", (e) =\u003e {\n      e.preventDefault();\n      endDrawing();\n    });\n  }\n  async function run(mode) {\n    lib.log(\"Sand Fusion starting. Mode: \" + mode);\n    canvas = document.getElementById(\"game-canvas\");\n    ctx = canvas.getContext(\"2d\");\n    canvas.width = CANVAS_WIDTH;\n    canvas.height = CANVAS_HEIGHT;\n    await initAudio();\n    setupUI();\n    setupInput();\n    lib.showGameParameters({\n      name: \"Sand Fusion Settings\",\n      params: {\n        \"Sand Flow Rate\": {\n          key: \"gameConfig.sandFlowRate\",\n          type: \"slider\",\n          min: 10,\n          max: 100,\n          step: 5,\n          onChange: (value) =\u003e {\n            window.gameConfig.sandFlowRate = value;\n          }\n        },\n        \"Gravity Strength\": {\n          key: \"gameConfig.gravityStrength\",\n          type: \"slider\",\n          min: 0.5,\n          max: 2,\n          step: 0.1,\n          onChange: (value) =\u003e {\n            window.gameConfig.gravityStrength = value;\n          }\n        },\n        \"Particle Size\": {\n          key: \"gameConfig.particleSize\",\n          type: \"slider\",\n          min: 2,\n          max: 8,\n          step: 1,\n          onChange: (value) =\u003e {\n            window.gameConfig.particleSize = value;\n            particles.forEach((p) =\u003e p.radius = value / 2);\n          }\n        },\n        \"Max Particles\": {\n          key: \"gameConfig.maxParticles\",\n          type: \"slider\",\n          min: 1e3,\n          max: 1e4,\n          step: 500,\n          onChange: (value) =\u003e {\n            window.gameConfig.maxParticles = value;\n          }\n        },\n        \"Background Color\": {\n          key: \"gameConfig.backgroundColor\",\n          type: \"color\",\n          onChange: (value) =\u003e {\n            window.gameConfig.backgroundColor = value;\n          }\n        }\n      }\n    });\n    if (mode === \"play\") {\n      backgroundMusicSource = playSound(\"ambient_background_music\", true, 0.4);\n    }\n    lastTime = performance.now();\n    requestAnimationFrame(gameLoop);\n    lib.log(\"Sand Fusion initialized successfully\");\n  }\n  if (typeof window !== \"undefined\") {\n    window.run = run;\n  }\n})();\n\u003c/script\u003e\n\u003c/body\u003e\n\u003c/html\u003e\n"])</script><script>self.__next_f.push([1,"25:T212c,"])</script><script>self.__next_f.push([1,"## Core Game Loop and Mechanics\n\n**Sand Fusion** is a creative sandbox experience where players control falling sand streams and interact with them through drawing. The core loop consists of:\n\n1. **Activate Sand Sources**: Players tap/click colored buttons at the top to toggle different colored sand streams (red, blue, yellow, green, purple, orange)\n2. **Draw Barriers**: Players draw lines on the screen that act as physical barriers for the falling sand\n3. **Watch \u0026 Create**: Sand falls from active sources, bounces off drawn lines, mixes colors when particles collide, and accumulates at the bottom\n4. **Iterate**: Players can erase lines, toggle sand sources on/off, or clear all sand to start fresh\n\n**What Makes It Compelling:**\n- Mesmerizing physics simulation with realistic particle behavior\n- Satisfying color mixing (red + blue = purple, yellow + blue = green, etc.)\n- Creative freedom to build complex structures and patterns\n- Meditative, stress-free gameplay with no fail states\n- Each creation is unique and shareable\n\n**Progression:**\n- No traditional win/lose conditions - this is a creative sandbox\n- Players naturally experiment with more complex line patterns\n- Discovery of interesting color combinations and flow patterns provides intrinsic rewards\n\n## Starting Scope\n\n**First Iteration Must Include:**\n- 6 colored sand sources at the top (red, blue, yellow, green, purple, orange) with toggle buttons\n- Realistic falling sand physics with particle-to-particle collisions\n- Drawing system that creates solid barriers for sand\n- Basic color mixing (primary colors combine to create secondary colors)\n- Clear all sand button\n- Erase mode to remove drawn lines\n- Sand accumulation at bottom with proper stacking\n\n**Future Iterations Can Add:**\n- More advanced color mixing (tertiary colors, opacity blending)\n- Different brush sizes for drawing\n- Special line types (bouncy, slippery, one-way)\n- Gravity controls or wind effects\n- Save/load creations\n- Particle effects (sparkles, trails)\n- Sound effects for drawing and sand flow\n\n## Game Perspective\n\n**Fixed-screen** - The entire play area is visible at once within the 720×1280 canvas. No scrolling or camera movement. The sand simulation happens within this fixed viewport.\n\n## Game World and Level Design\n\n**Single Canvas Layout (720×1280):**\n\n- **Top Section (0-120px)**: Control bar with sand source toggle buttons\n  - 6 circular buttons (80×80px each) arranged horizontally\n  - Each button shows its color and has a clear on/off state\n  - Active sources emit sand particles from directly below the button\n  \n- **Main Play Area (120-1180px)**: The sand simulation canvas\n  - This is where sand falls, lines are drawn, and physics happen\n  - Dark background to make colored sand pop visually\n  - Sand particles are small (3-5px diameter) for smooth simulation\n  \n- **Bottom Control Bar (1180-1280px)**: Action buttons\n  - \"Clear Sand\" button (left side)\n  - \"Erase Lines\" toggle button (center)\n  - \"Clear All\" button (right side)\n  - Each button is 200×80px for easy touch targets\n\n**Physics Boundaries:**\n- Left, right, and bottom edges of the play area are solid walls\n- Top is open for sand to spawn from sources\n- Drawn lines act as additional solid barriers\n\n## Edit Mode Design\n\nEdit mode allows players to customize the sand simulation parameters and starting conditions:\n\n**Editable Properties:**\n- **Sand Flow Rate**: Adjust how many particles spawn per second from each source (range: 10-100 particles/sec, default: 30)\n- **Gravity Strength**: Control how fast sand falls (range: 0.5-2.0x, default: 1.0x)\n- **Particle Size**: Adjust sand particle diameter (range: 2-8px, default: 4px)\n- **Color Palette**: Choose which 6 colors are available as sand sources (from a preset list of 12 colors)\n- **Background Color**: Select the canvas background color (dark gray, black, navy, dark purple)\n- **Max Particles**: Set maximum number of particles allowed on screen (range: 1000-10000, default: 5000)\n\n**Constraints:**\n- At least 3 sand sources must be enabled\n- Particle size cannot make individual particles larger than 10px\n- Gravity cannot be negative (no upward falling sand)\n- Max particles capped at 10000 to prevent performance issues\n\n**Edit Mode UI:**\n- Sliders for numerical values\n- Color pickers for palette selection\n- Toggle switches for boolean options\n- Real-time preview of changes\n\n## Control Design\n\n**Mobile (Touch) Controls:**\n\n**Drawing Mode (Default):**\n- **Touch and drag**: Draw a line that becomes a solid barrier\n- **Tap sand source buttons**: Toggle that color on/off\n- **Tap \"Erase Lines\" button**: Enter erase mode\n- **Tap \"Clear Sand\" button**: Remove all sand particles (keep lines)\n- **Tap \"Clear All\" button**: Remove everything (sand and lines)\n\n**Erase Mode:**\n- **Touch and drag**: Erase lines in a small radius around touch point\n- **Tap \"Erase Lines\" button again**: Return to drawing mode\n\n**Desktop (Keyboard/Mouse) Controls:**\n\n**Drawing Mode (Default):**\n- **Left mouse button + drag**: Draw a line that becomes a solid barrier\n- **Click sand source buttons**: Toggle that color on/off\n- **Click \"Erase Lines\" button**: Enter erase mode\n- **Click \"Clear Sand\" button**: Remove all sand particles (keep lines)\n- **Click \"Clear All\" button**: Remove everything\n- **E key**: Toggle erase mode\n- **C key**: Clear sand only\n- **X key**: Clear all\n\n**Erase Mode:**\n- **Left mouse button + drag**: Erase lines in a small radius around cursor\n- **E key or click \"Erase Lines\" button**: Return to drawing mode\n\n**Input Handling:**\n- Track mouse/touch position continuously for smooth line drawing\n- Store drawn lines as arrays of connected points\n- Prevent default touch behaviors to avoid scrolling during drawing\n- Visual feedback: show cursor/touch position, highlight active buttons, show erase radius in erase mode\n\n## Art Style and Visual Theme\n\n**Style: Modern Minimalist with Vibrant Colors**\n\nThe game uses a clean, contemporary aesthetic that puts the focus on the colorful sand particles and player-created patterns.\n\n**Visual Direction:**\n- **Sand Particles**: Smooth, circular particles with slight glow/bloom effect to make them pop against the dark background\n- **Color Palette**: Vibrant, saturated colors that mix beautifully (RGB primaries plus secondaries)\n- **UI Elements**: Flat design with rounded corners, clear iconography, subtle shadows for depth\n- **Background**: Dark (charcoal or black) to provide maximum contrast with colored sand\n- **Lines**: Semi-transparent white/light gray with slight thickness (4-6px) so sand behavior is visible\n\n**Color Specifications:**\n- Red: #FF3366\n- Blue: #3366FF\n- Yellow: #FFDD33\n- Green: #33FF66\n- Purple: #9933FF\n- Orange: #FF9933\n\n**Asset vs Code Rendering:**\n- **Code-rendered (CSS/Canvas)**: All UI buttons, control bars, drawn lines, sand particles (simple circles)\n- **Generated Assets**: Sand source button icons (to show color + on/off state clearly), control button icons (clear, erase symbols)\n\n**Consistency Notes:**\n- All buttons use the same rounded rectangle style\n- All icons use simple, bold line art style\n- Sand particles maintain consistent size and glow effect\n- Color mixing follows standard RGB additive color theory\n\n## Technical Implementation Notes\n\n**Sand Physics System:**\n- Use a particle system with simple Verlet integration for smooth motion\n- Implement spatial hashing or grid-based collision detection for performance\n- Each particle tracks: position, velocity, color (RGB values)\n- Color mixing: when particles collide, average their RGB values\n- Particles interact with drawn lines by checking line segment collisions\n\n**Drawing System:**\n- Store drawn lines as arrays of connected points\n- Use line segment collision detection for sand-line interactions\n- Render lines using canvas stroke with round line caps for smooth appearance\n- In erase mode, remove line segments within radius of touch/mouse position\n\n**Performance Optimization:**\n- Cap maximum particles on screen (default 5000)\n- Use requestAnimationFrame for smooth 60fps animation\n- Implement particle pooling to avoid garbage collection\n- Only update particles that are moving (sleeping particles optimization)\n- Use canvas for all rendering (more performant than DOM elements)\n\n**State Management:**\n- Track active sand sources (boolean array)\n- Store all drawn line segments\n- Maintain particle array with positions, velocities, colors\n- Current mode (draw/erase)\n- All editable parameters from edit mode"])</script><script>self.__next_f.push([1,"1e:[\"$\",\"$L1f\",null,{\"dehydratedState\":{\"mutations\":[],\"queries\":[{\"dehydratedAt\":1778188323712,\"state\":{\"data\":{\"asset_map\":{\"red_sand_button_icon\":{\"url\":\"https://d2oir5eh8rty2e.cloudfront.net/assets/images/red_sand_button_icon_1c64dccb-361b-45f5-a253-6da83b84f20f.webp\",\"type\":\"image\",\"prompt\":\"Generate a high-quality 2D circular button icon for a game UI. The button is filled with vibrant red (#FF3366) featuring a subtle vertical gradient from light to dark. In the center, a simple bold white sand grain or droplet symbol. Modern minimalist flat design, clean edges, subtle inner shadow for depth, transparent background, front view.\",\"description\":\"Red sand source toggle button icon with a droplet symbol.\",\"subtype\":\"ui\",\"aspect_ratio\":[857,858],\"compression_suggestion\":\"high\",\"duration_secs\":null,\"loop\":null,\"animation\":null},\"blue_sand_button_icon\":{\"url\":\"https://d2oir5eh8rty2e.cloudfront.net/assets/images/blue_sand_button_icon_d3caa3cd-5069-4d61-9930-1dc80969cb3e.webp\",\"type\":\"image\",\"prompt\":\"Generate a high-quality 2D circular button icon for a game UI. Match the exact style and composition of red_sand_button_icon ttps://d2oir5eh8rty2e.cloudfront.net/assets/images/thumbnail_8c7a94b8-992c-4180-923b-d9f21f23838e.webp\",\"created_at\":1775692232,\"updated_at\":1775845961276.4927,\"art_style\":null},\"chat_history\":{\"messages\":[{\"id\":\"initial-ai-0\",\"content\":{\"text\":\"Hey there! What kind of game do you want to create?\",\"images\":[],\"audios\":[],\"other_files\":[]},\"role\":\"astra\",\"timestamp\":1775691894967,\"request_id\":null,\"type\":\"multimodal\"},{\"id\":\"user-01KNQR1SPKX37XBA5FSZH8JGJD\",\"content\":{\"text\":\"Make game where you turn on different colored falling sand from the top of the screen and then draw lines and watch the colors mix and react to the lines you draw.\",\"images\":[],\"audios\":[],\"other_files\":[]},\"role\":\"user\",\"timestamp\":1775692211923,\"request_id\":\"01KNQR1SPKX37XBA5FSZH8JGJD\",\"type\":\"multimodal\"},{\"id\":\"7bc4c9d0-6d91-4c56-b1b5-a3a4b2c35836\",\"content\":{\"title\":\"Sand Fusion\",\"description\":\"Guide streams of colorful falling sand by drawing lines, mixing hues, and creating unique reactions as the sand interacts with your drawn barriers.\\n\\n• Dynamic sand physics and color blending\\n• Freestyle drawing and evolving sand art\",\"image_urls\":null},\"role\":\"astra\",\"timestamp\":1775692212833.2502,\"request_id\":null,\"type\":\"game_design\"},{\"id\":\"user-01KNQR2F303Q409SEW1WTWFXNQ\",\"content\":{\"text\":\"Ok, create it!\",\"images\":[],\"audios\":[],\"other_files\":[]},\"role\":\"user\",\"timestamp\":1775692233824,\"request_id\":\"01KNQR2F303Q409SEW1WTWFXNQ\",\"type\":\"multimodal\"},{\"id\":\"e6df3392-e02a-4274-b7b3-3fcb5435b158\",\"content\":{\"text\":\"I've created **Sand Fusion** - your interactive color-mixing sandbox! Tap the colored buttons at the top to unleash streams of falling sand, then **draw lines with your finger** to guide and redirect the flow. Watch as colors blend when particles collide - red meets blue to create purple, yellow mixes with blue for green!\\n\\n**Clear Sand** removes
